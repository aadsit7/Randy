name = "tts-relay"
main = "worker.js"
compatibility_date = "2024-01-01"

# Set your ElevenLabs API key as a secret (never commit it):
#   npx wrangler secret put ELEVENLABS_API_KEY
# Then paste your key when prompted.
#
# Deploy:
#   cd tts-worker && npx wrangler deploy
#
# Your worker URL will be: https://tts-relay.<your-subdomain>.workers.dev
