      function playTtsChunk(idx, q, text) {
        const clean = stripMarkdown(text);
        if (!clean) return Promise.resolve();
        if (!VOICE.ttsSupported) return Promise.resolve();
        return new Promise((resolve) => {
          if (q.signal && q.signal.aborted) return resolve();
          const slot = STATE.slots[idx];
          const u = new SpeechSynthesisUtterance(clean);
          const v = pickDeepVoice();
          if (v) u.voice = v;
          u.pitch = 0.85;
          u.rate = 0.95;
          appendRecentTts(clean);
          pauseRecognitionForTts();
          slot.isSpeaking = true;
          TTS_STATE.speakingSlot = idx;
          VOICE.playingMsg = { slot: idx, msg: q.msgIdx };
          q.currentUtter = u;
          render();
          const done = () => {
            if (q.currentUtter === u) q.currentUtter = null;
            resolve();
          };
          u.onend = done;
          u.onerror = done;
          if (q.signal) q.signal.addEventListener('abort', () => {
            try { window.speechSynthesis.cancel(); } catch {}
            done();
          }, { once: true });
          try { window.speechSynthesis.speak(u); } catch { done(); }
        });
      }

      /* ========== VOICE HELPERS ========== */
      function showToast(msg) {
        VOICE.toastMessage = msg;
        render();
        if (VOICE.toastTimeoutId) clearTimeout(VOICE.toastTimeoutId);
        VOICE.toastTimeoutId = setTimeout(() => {
          VOICE.toastMessage = '';
          render();
        }, 3500);
      }

      function playBeep() {
        if (!VOICE.audioCtx) {
          try { VOICE.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
          catch { return; }
        }
        try {
          const ctx = VOICE.audioCtx;
          if (ctx.state === 'suspended') ctx.resume();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(880, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(1320, ctx.currentTime + 0.12);
          gain.gain.setValueAtTime(0.0001, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.18, ctx.currentTime + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.18);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + 0.2);
        } catch {}
      }

      function stripMarkdown(text) {
        return String(text)
          .replace(/```[\s\S]*?```/g, ' ')          // fenced code blocks
          .replace(/`([^`]+)`/g, '$1')               // inline code
          .replace(/\*\*([^*]+)\*\*/g, '$1')         // bold
          .replace(/__([^_]+)__/g, '$1')             // bold alt
          .replace(/(^|\s)\*([^*\n]+)\*/g, '$1$2')   // italic
          .replace(/(^|\s)_([^_\n]+)_/g, '$1$2')     // italic alt
          .replace(/^#{1,6}\s+/gm, '')               // headers
          .replace(/^\s*[-*+]\s+/gm, '')             // bullets
          .replace(/^\s*\d+\.\s+/gm, '')             // numbered lists
          .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')   // links
          .replace(/!\[([^\]]*)\]\([^)]+\)/g, '$1')  // images
          .replace(/^\s*>\s?/gm, '')                 // blockquotes
          .replace(/\n{3,}/g, '\n\n')
          .trim();
      }

      function pickDeepVoice() {
        if (!VOICE.ttsSupported) return null;
        const voices = window.speechSynthesis.getVoices() || [];
        if (voices.length === 0) return null;
        const enVoices = voices.filter(v => /^en(-|_|$)/i.test(v.lang));
        const pool = enVoices.length ? enVoices : voices;
        return pool.find(v => /male/i.test(v.name))
            || pool.find(v => /\b(david|daniel|alex|tom|mark|eric|fred|george|james|guy)\b/i.test(v.name))
            || pool.find(v => /google us english/i.test(v.name))
            || pool[0];
      }

      function speakText(text, idx, msgIdx) {
        if (!VOICE.ttsSupported) return;
        const clean = stripMarkdown(text);
        if (!clean) return;
        // Stop anything currently playing so the new utterance starts immediately.
        STATE.slots.forEach((_, i) => teardownTtsQueue(i));
        try { window.speechSynthesis.cancel(); } catch {}
        appendRecentTts(clean);
        const u = new SpeechSynthesisUtterance(clean);
        const v = pickDeepVoice();
        if (v) u.voice = v;
        u.pitch = 0.85;
        u.rate = 0.95;
        u.onstart = () => {
          STATE.slots[idx].isSpeaking = true;
          TTS_STATE.speakingSlot = idx;
          if (typeof msgIdx === 'number') VOICE.playingMsg = { slot: idx, msg: msgIdx };
          pauseRecognitionForTts();
          render();
        };
        u.onend = () => {
          STATE.slots[idx].isSpeaking = false;
          if (TTS_STATE.speakingSlot === idx) TTS_STATE.speakingSlot = null;
          // Preserve activeSlot/awaitingCommand while in conversation mode so the
          // next utterance is routed to the same slot without re-saying the wake word.
          if (!VOICE.conversationMode) {
            VOICE.activeSlot = null;
            VOICE.awaitingCommand = false;
          }
          VOICE.playingMsg = null;
          markTtsEnded();
          scheduleRecognitionResume();
          render();
        };
        u.onerror = u.onend;
        pauseRecognitionForTts();
        try { window.speechSynthesis.speak(u); }
        catch {
          STATE.slots[idx].isSpeaking = false;
          if (TTS_STATE.speakingSlot === idx) TTS_STATE.speakingSlot = null;
          VOICE.playingMsg = null;
          markTtsEnded();
          scheduleRecognitionResume();
          render();
        }
      }

      function stopSpeaking() {
        // Tear down any streaming-TTS queues so queued sentences don't keep playing.
        STATE.slots.forEach((_, i) => teardownTtsQueue(i));
        if (VOICE.ttsSupported) {
          try { window.speechSynthesis.cancel(); } catch {}
        }
        STATE.slots.forEach(s => { s.isSpeaking = false; });
        TTS_STATE.speakingSlot = null;
        VOICE.playingMsg = null;
        markTtsEnded();
        scheduleRecognitionResume();
        render();
      }

      /* ========== WAKE WORD + RECOGNITION ========== */
      function anyVoiceEnabled() {
        return STATE.slots.some(s => s.voiceEnabled);
      }

      // True while Randy is speaking OR within the 1200ms tail window after
      // speech ends. The physical speaker keeps producing audio briefly after
      // the last onended fires, and we don't want the mic to transcribe
      // Randy's own voice as user input.
      const TTS_ECHO_GRACE_MS = 1200;
      function ttsEchoActive() {
        if (STATE.slots.some(s => s.isSpeaking)) return true;
        if (VOICE.ttsPaused) return true;
        return (Date.now() - VOICE.lastTtsEndAt) < TTS_ECHO_GRACE_MS;
      }
      function markTtsEnded() { VOICE.lastTtsEndAt = Date.now(); }

      // Normalize text for echo comparison: lowercase, alphanumerics + spaces only.
      // This lets us compare what Randy spoke against what the recognizer heard,
      // ignoring punctuation, capitalization, and minor transcription quirks.
      function normalizeForEcho(text) {
        return String(text || '').toLowerCase()
          .replace(/[^a-z0-9]+/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
      }

      // Record TTS text in a rolling buffer so handleVoiceTranscript can detect
      // when the recognizer has picked up Randy's own voice from the speaker.
      function appendRecentTts(text) {
        const n = normalizeForEcho(text);
        if (!n) return;
        VOICE.recentTtsText = (VOICE.recentTtsText + ' ' + n).slice(-2000);
      }

      // True if `text` looks like an echo of something Randy just spoke. Uses
      // substring match plus a high-overlap word-set fallback so transcription
      // wobbles ("intune" vs "in tune") still get caught.
      function isLikelyEcho(text) {
        const n = normalizeForEcho(text);
        if (!n || n.length < 4) return false;
        if (!VOICE.recentTtsText) return false;
        if (VOICE.recentTtsText.indexOf(n) !== -1) return true;
        const words = n.split(' ').filter(w => w.length >= 3);
        if (words.length < 2) return false;
        const ttsWords = new Set(VOICE.recentTtsText.split(' '));
        let matches = 0;
        for (const w of words) if (ttsWords.has(w)) matches++;
        return (matches / words.length) >= 0.7;
      }

      // Pause speech recognition while TTS is playing. Cuts off the mic
      // entirely so Randy's own voice can't be transcribed as user input.
      // Idempotent — safe to call from every TTS chunk.
      function pauseRecognitionForTts() {
        VOICE.ttsPaused = true;
        if (VOICE.resumeRecognitionId) {
          clearTimeout(VOICE.resumeRecognitionId);
          VOICE.resumeRecognitionId = null;
        }
        clearInterim();
        if (VOICE.recognition) {
          try { VOICE.recognition.abort(); } catch {}
        }
      }

      // Resume recognition after TTS finishes, with a grace window so the
      // speaker has time to settle before the mic starts listening again.
      function scheduleRecognitionResume() {
        if (VOICE.resumeRecognitionId) clearTimeout(VOICE.resumeRecognitionId);
        VOICE.resumeRecognitionId = setTimeout(() => {
          VOICE.resumeRecognitionId = null;
          VOICE.ttsPaused = false;
          markTtsEnded();
          if (VOICE.wantRunning && anyVoiceEnabled() && VOICE.recognition) {
            try { VOICE.recognition.start(); } catch {}
          }
        }, TTS_ECHO_GRACE_MS);
      }

      function escapeRegex(s) { return String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

      function buildWakePattern(name) {
        const n = escapeRegex(String(name).trim());
        return new RegExp('\\b(?:hey|hi|ok|okay|yo)\\s+' + n + '\\b[\\s,.!?:;-]*', 'i');
      }

      // Phrases that let the user exit conversation mode or cancel the pending send.
      const EXIT_CONVERSATION_RE = /^(stop|cancel|never mind|nevermind|that'?s all|exit|goodbye|good ?bye|end (?:conversation|chat)|quiet|shut up)\b/i;

      // Exit continuous conversation mode: aborts any in-flight request, stops TTS, clears
      // interim transcript, returns to passive wake-word listening. Called from the Stop
      // button and from spoken exit phrases.
      function exitConversationMode() {
        // If an interim transcript was pending for a slot, clear its composer
        // text so we don't leave the half-captured phrase hanging in the input.
        if (VOICE.interimSlot !== null && STATE.slots[VOICE.interimSlot]) {
          STATE.slots[VOICE.interimSlot].inputText = '';
        }
        // Abort whatever's in flight (Anthropic stream).
        STATE.slots.forEach((s, i) => {
          if (s.abortController) { try { s.abortController.abort(); } catch {} s.abortController = null; }
          teardownTtsQueue(i);
          s.loading = false;
          s.isListening = false;
        });
        stopSpeaking();
        clearInterim();
        if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
        VOICE.activeSlot = null;
        VOICE.awaitingCommand = false;
        VOICE.conversationMode = false;
        render();
      }

      // Cancel the interim utterance about to be sent. Keep conversation mode on so the
      // user can retry. Does nothing if there's nothing queued.
      function cancelPendingUtterance() {
        const idx = VOICE.interimSlot;
        if (idx !== null && STATE.slots[idx]) {
          STATE.slots[idx].inputText = '';
        }
        clearInterim();
        render();
      }

      // Cancel an in-flight Anthropic stream + TTS so a fresh user utterance can
      // take over the slot. Drops the placeholder assistant bubble if no content
      // was streamed yet; the still-running sendMessage will exit via the
      // AbortError catch and skip its own cleanup (see the controller check at
      // the bottom of sendMessage).
      function interruptCurrentReply(idx) {
        const slot = STATE.slots[idx];
        if (!slot) return;
        if (slot.abortController) {
          try { slot.abortController.abort(); } catch {}
          slot.abortController = null;
        }
        teardownTtsQueue(idx);
        const last = slot.messages[slot.messages.length - 1];
        if (last && last.role === 'assistant' && !last.content) {
          slot.messages.pop();
        }
        slot.loading = false;
      }

      function handleVoiceTranscript(raw) {
        const text = String(raw).trim();
        if (!text) return;

        // Echo guard 1: if this transcript looks like something Randy spoke in
        // the last few seconds, it's a re-transcription of TTS output bleeding
        // back through the mic — drop it silently no matter when it arrived.
        if (isLikelyEcho(text)) return;

        // Echo guard 2: while TTS is speaking or in the post-playback grace
        // window the mic shouldn't be picking up anything. Recognition is
        // actively paused via pauseRecognitionForTts(), but a stray final
        // result can still arrive right at the boundary. Drop anything that
        // shows up here — voice interrupts via the mic are unreliable while
        // the speaker is loud anyway, and the user can use the Stop button.
        if (ttsEchoActive()) return;

        // Continuous conversation mode: after the first wake word we accept each
        // utterance as a command without requiring "Hey Randy" again. The user exits
        // by saying a cancel phrase or clicking the Stop button.
        if (VOICE.conversationMode && VOICE.activeSlot !== null) {
          const slot = STATE.slots[VOICE.activeSlot];
          if (!slot || !slot.voiceEnabled) {
            exitConversationMode();
            return;
          }
          // Strip a leading wake phrase if the user repeated it.
          const wakeP = buildWakePattern(slot.voiceName || slot.label);
          const cleaned = text.replace(wakeP, '').trim();
          if (EXIT_CONVERSATION_RE.test(cleaned)) {
            exitConversationMode();
            return;
          }
          if (cleaned.length < 2) return;
          // If Randy is still finishing the previous reply, treat the new
          // utterance as an interrupt: abort the in-flight request so the fresh
          // question gets processed instead of being silently dropped.
          if (slot.loading) interruptCurrentReply(VOICE.activeSlot);
          if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
          VOICE.awaitingCommand = false;
          const idx = VOICE.activeSlot;
          STATE.slots[idx].isListening = false;
          STATE.slots[idx].inputText = cleaned;
          sendMessage(idx, true);
          return;
        }

        // Legacy armed-command path (first wake without a command in the same breath).
        if (VOICE.activeSlot !== null && VOICE.awaitingCommand) {
          const slot = STATE.slots[VOICE.activeSlot];
          if (!slot || !slot.voiceEnabled) {
            if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
            VOICE.activeSlot = null;
            VOICE.awaitingCommand = false;
            return;
          }
          let cleaned = text;
          const p = buildWakePattern(slot.voiceName || slot.label);
          cleaned = text.replace(p, '').trim();
          if (EXIT_CONVERSATION_RE.test(cleaned)) {
            exitConversationMode();
            return;
          }
          if (cleaned.length < 2) return;
          if (slot.loading) interruptCurrentReply(VOICE.activeSlot);
          if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
          VOICE.awaitingCommand = false;
          VOICE.conversationMode = true; // entering conversation for follow-ups
          const idx = VOICE.activeSlot;
          STATE.slots[idx].isListening = false;
          STATE.slots[idx].inputText = cleaned;
          sendMessage(idx, true);
          return;
        }

        // Otherwise scan for a wake word across enabled slots
        for (let i = 0; i < STATE.slots.length; i++) {
          const slot = STATE.slots[i];
          if (!slot.voiceEnabled) continue;
          const pattern = buildWakePattern(slot.voiceName || slot.label);
          const match = text.match(pattern);
          if (!match) continue;

          // If a previous turn is still streaming, treat the new wake-word as
          // an interrupt rather than dropping it.
          if (slot.loading) interruptCurrentReply(i);

          playBeep();

          // If the user spoke the wake word AND the question in one breath
          // (e.g. "Hey Randy what is application workspace"), handle it now.
          const after = text.slice(match.index + match[0].length).trim();
          if (after.length >= 2) {
            VOICE.activeSlot = i;
            VOICE.awaitingCommand = false;
            VOICE.conversationMode = true;
            slot.isListening = false;
            slot.inputText = after;
            sendMessage(i, true);
            return;
          }

          // Otherwise arm: wait for the next utterance as the command. Only the first
          // arming uses the 30s fallback; once conversationMode is on we stay listening
          // until the user explicitly exits.
          VOICE.activeSlot = i;
          VOICE.awaitingCommand = true;
          slot.isListening = true;
          if (VOICE.wakeTimeoutId) clearTimeout(VOICE.wakeTimeoutId);
          const armedSlotIdx = i;
          VOICE.wakeTimeoutId = setTimeout(() => {
            VOICE.wakeTimeoutId = null;
            if (VOICE.conversationMode) return;
            if (VOICE.activeSlot !== armedSlotIdx) return; // user already moved on
            VOICE.activeSlot = null;
            VOICE.awaitingCommand = false;
            const s = STATE.slots[armedSlotIdx];
            if (s) s.isListening = false;
            render();
          }, 30000);
          render();
          return;
        }
      }

      // Pick the slot the interim transcript belongs to: the active command slot if one
      // is armed, otherwise the first voice-enabled slot (typically index 0).
      function interimTargetSlot() {
        if (VOICE.activeSlot !== null && VOICE.awaitingCommand) return VOICE.activeSlot;
        for (let i = 0; i < STATE.slots.length; i++) {
          if (STATE.slots[i].voiceEnabled) return i;
        }
        return null;
      }

      // Update the interim transcript in place without re-rendering the whole tree.
      // This is called on every SpeechRecognition tick (~100-300ms), so it must be cheap.
      function updateInterim(text) {
        // Echo guard: suppress interim while Randy is speaking (or in the
        // brief tail window after) so his own voice being re-transcribed
        // doesn't flash onscreen.
        if (ttsEchoActive()) { clearInterim(); return; }
        const trimmed = String(text || '').trim();
        if (trimmed.length < 2) { clearInterim(); return; }
        const target = interimTargetSlot();
        if (target === null) { clearInterim(); return; }

        const prevText = VOICE.interimText;
        const prevSlot = VOICE.interimSlot;
        VOICE.interimText = trimmed;
        VOICE.interimSlot = target;

        // Try the cheap path: just update the existing node's text.
        const existing = document.getElementById('interim-bubble-' + target);
        if (existing && prevSlot === target) {
          const span = existing.querySelector('.interim-text');
          if (span) { span.textContent = trimmed; return; }
        }
        // Otherwise do one render to mount the node — but not while the user is typing
        // in a composer field, because render() blows away the entire DOM and would
        // destroy the focused <input>/<textarea>, losing focus and cursor position.
        // The bubble will mount on the next natural render after focus leaves the composer.
        if (prevText !== trimmed || prevSlot !== target) {
          if (!isComposerFocused()) render();
        }
      }

      // True when the user's focus is inside one of the chat composer inputs.
      // Used to suppress full re-renders that would yank the caret out of the field.
      function isComposerFocused() {
        const el = document.activeElement;
        if (!el || !el.id) return false;
        return el.id === 'expanded-input' || el.id.startsWith('home-input-');
      }

      function clearInterim() {
        if (!VOICE.interimText && VOICE.interimSlot === null) return;
        VOICE.interimText = '';
        VOICE.interimSlot = null;
        if (!isComposerFocused()) render();
      }

      function ensureRecognition() {
        if (!VOICE.srSupported) return null;
        if (VOICE.recognition) return VOICE.recognition;
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        const r = new SR();
        r.continuous = true;
        r.interimResults = true;
        r.lang = 'en-US';
        r.onresult = (e) => {
          let interim = '';
          let finalChunk = '';
          for (let i = e.resultIndex; i < e.results.length; i++) {
            const res = e.results[i];
            const t = res[0] && res[0].transcript ? res[0].transcript : '';
            if (res.isFinal) finalChunk += t + ' ';
            else interim += t;
          }
          if (finalChunk) {
            clearInterim();
            handleVoiceTranscript(finalChunk);
          } else if (interim) {
            updateInterim(interim);
          }
        };
        r.onerror = (e) => {
          if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
            VOICE.permissionDenied = true;
            VOICE.wantRunning = false;
            STATE.slots.forEach(s => { s.voiceEnabled = false; s.isListening = false; });
            saveSettings();
            showToast('Microphone access required for voice assistant');
            render();
            return;
          }
          // For transient errors (no-speech, aborted, network), allow onend to restart.
        };
        r.onend = () => {
          // Don't auto-restart while TTS is playing — pauseRecognitionForTts()
          // intentionally aborted us. scheduleRecognitionResume() will restart
          // the recognizer after the post-TTS grace window elapses.
          if (VOICE.ttsPaused) return;
          // Auto-restart if any slot still wants voice and we haven't been told to stop.
          if (!VOICE.wantRunning || !anyVoiceEnabled()) return;
          // r.start() can throw InvalidStateError if the recognizer is still
          // shutting down from a previous session — retry with backoff so we
          // don't end up with a silently-dead recognizer.
          const tryStart = (attempt) => {
            if (!VOICE.wantRunning || !anyVoiceEnabled() || VOICE.ttsPaused) return;
            try { r.start(); }
            catch (err) {
              if (attempt < 4) setTimeout(() => tryStart(attempt + 1), 250 * (attempt + 1));
            }
          };
          tryStart(0);
        };
        VOICE.recognition = r;
        return r;
      }

      function startRecognition() {
        const r = ensureRecognition();
        if (!r) return;
        VOICE.wantRunning = true;
        try { r.start(); }
        catch (e) { /* already started - ignore */ }
      }

      function stopRecognition() {
        VOICE.wantRunning = false;
        if (VOICE.recognition) {
          try { VOICE.recognition.stop(); } catch {}
        }
        if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
        if (VOICE.resumeRecognitionId) { clearTimeout(VOICE.resumeRecognitionId); VOICE.resumeRecognitionId = null; }
        VOICE.ttsPaused = false;
        VOICE.activeSlot = null;
        VOICE.awaitingCommand = false;
        VOICE.conversationMode = false;
        VOICE.interimText = '';
        VOICE.interimSlot = null;
        VOICE.recentTtsText = '';
        STATE.slots.forEach(s => { s.isListening = false; });
      }

      function toggleSlotVoice(idx) {
        const slot = STATE.slots[idx];
        if (!VOICE.srSupported) { showToast('Voice not supported in this browser'); return; }
        slot.voiceEnabled = !slot.voiceEnabled;
        saveSettings();
        if (slot.voiceEnabled) {
          startRecognition();
        } else {
          // If this slot was mid-interaction, clear its live state too.
          if (VOICE.activeSlot === idx) {
            if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
            VOICE.activeSlot = null;
            VOICE.awaitingCommand = false;
            VOICE.conversationMode = false;
            if (slot.abortController) { try { slot.abortController.abort(); } catch {} slot.abortController = null; }
            slot.ttsQueue = null;
            slot.loading = false;
          }
          slot.isListening = false;
          if (slot.isSpeaking) stopSpeaking();
          if (!anyVoiceEnabled()) stopRecognition();
        }
        render();
      }

      /* ========== API ========== */
      async function saveToSheet(slotIdx) {
        if (!GSHEET_WEBHOOK) {
          console.warn('No Google Sheet webhook URL configured');
          return;
        }
        const slot = STATE.slots[slotIdx];
        if (!slot) return;

        const pairs = [];
        for (let i = 0; i < slot.messages.length; i++) {
          if (slot.messages[i].role === 'user' && slot.messages[i + 1]?.role === 'assistant') {
            pairs.push({
              question: slot.messages[i].content,
              answer: slot.messages[i + 1].content
            });
          }
        }

        if (pairs.length === 0) {
          showToast('No Q&A pairs to save');
          return;
        }

        let saved = 0;
        for (const pair of pairs) {
          try {
            const div = document.createElement('div');
            div.innerHTML = pair.answer;
            const plainAnswer = div.textContent.replace(/\s+/g, ' ').trim();
            const links = [];
            div.querySelectorAll('a[href]').forEach(a => links.push(a.href));

            await fetch(GSHEET_WEBHOOK, {
              method: 'POST',
              mode: 'no-cors',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                question: pair.question,
                answer: plainAnswer.substring(0, 50000),
                sources: links.join(', '),
                model: 'claude-sonnet-4-20250514',
                session_id: SESSION_ID
              })
            });
            saved++;
          } catch (err) {
            console.warn('Sheet save failed for pair:', err);
          }
        }
        showToast('Saved ' + saved + ' Q&A pair' + (saved !== 1 ? 's' : '') + ' to Google Sheet');

        const historyEntry = {
          id: SESSION_ID + '-' + Date.now(),
          session_id: SESSION_ID,
          date: new Date().toLocaleDateString('en-US'),
          timestamp: Date.now(),
          pairs: pairs.map(p => ({ question: p.question, answer: p.answer })),
          preview: pairs[0]?.question?.substring(0, 80) || 'No question'
        };
        saveHistory(historyEntry);
        render();
        // Reconcile with the sheet so the sidebar matches other devices/sessions.
        setTimeout(() => fetchHistoryFromSheet({ silent: true }), 600);
      }

      // Web-search heuristic: only attach the (slow) web_search tool when the prompt
      // clearly benefits from live data. Voice turns otherwise skip it entirely to cut
      // ~2-5 seconds off the round trip.
      const WEB_SEARCH_HINT_RE = /\b(search|look ?up|latest|news|today|right now|current|price of|weather|stock|score|who won|breaking)\b/i;

      async function sendMessage(idx, viaVoice = false) {
        const slot = STATE.slots[idx];
        // Claim the slot synchronously BEFORE any await/render, so two
        // near-simultaneous callers (e.g. voice finalization + Enter key)
        // can't both pass the check-then-set guard.
        if (slot.loading) return;
        const text = slot.inputText.trim();
        if (!text) return;
        slot.loading = true;

        slot.messages.push({ role: 'user', content: text });
        slot.inputText = '';

        // Abort controller so Stop/Cancel can tear down the in-flight request.
        const controller = new AbortController();
        slot.abortController = controller;

        // Pre-insert the assistant message so streaming deltas can mutate it in place.
        slot.messages.push({ role: 'assistant', content: '' });
        const assistantMsgIdx = slot.messages.length - 1;

        // Voice turns stream TTS sentence-by-sentence. Initialize the queue before the fetch
        // so first-audio latency is bounded only by the model's first-token time.
        if (viaVoice) initTtsQueue(idx, controller.signal, assistantMsgIdx);

        render();
        scrollChat();

        try {
          const headers = {
            "Content-Type": "application/json",
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
          };
          if (slot.apiKey) headers["x-api-key"] = slot.apiKey;

          const systemPrompt = viaVoice && slot.voicePersonality
            ? slot.prompt + '\n\n' + slot.voicePersonality
            : slot.prompt;

          const needsSearch = !viaVoice || WEB_SEARCH_HINT_RE.test(text);

          const body = {
            // Haiku for voice (fastest first-token latency + cheap), Sonnet 4.5 for typed chat.
            model: viaVoice ? 'claude-haiku-4-5-20251001' : 'claude-sonnet-4-5',
            max_tokens: viaVoice ? 256 : 1024,
            stream: true,
            system: systemPrompt,
            messages: slot.messages
              .slice(0, -1) // drop the empty placeholder we just pushed
              .filter(m => m.role === 'user' || m.role === 'assistant')
              .map(m => ({ role: m.role, content: m.content }))
          };
          if (needsSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];

          const resp = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers,
            body: JSON.stringify(body),
            signal: controller.signal
          });

          if (!resp.ok) {
            const errText = await resp.text().catch(() => '');
            let msg = `API error ${resp.status}`;
            try { const j = JSON.parse(errText); if (j.error && j.error.message) msg = j.error.message; } catch {}
            throw new Error(msg);
          }

          const reader = resp.body.getReader();
          const decoder = new TextDecoder();
          let sseBuffer = '';
          let sentenceBuffer = '';
          let reply = '';
          let lastRender = 0;

          const sentenceRe = /^[\s\S]*?[.!?](?:\s+|$)/;
          const flushSentences = () => {
            if (!viaVoice) return;
            let m;
            while ((m = sentenceBuffer.match(sentenceRe)) && m[0].length) {
              const sent = m[0].trim();
              sentenceBuffer = sentenceBuffer.slice(m[0].length);
              if (sent.length >= 2) enqueueTtsSentence(idx, sent);
            }
          };

          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            sseBuffer += decoder.decode(value, { stream: true });

            // Anthropic SSE: events separated by blank line; each event has "event:" and "data:" lines.
            let sepIdx;
            while ((sepIdx = sseBuffer.indexOf('\n\n')) !== -1) {
              const frame = sseBuffer.slice(0, sepIdx);
              sseBuffer = sseBuffer.slice(sepIdx + 2);
              for (const line of frame.split('\n')) {
                if (!line.startsWith('data:')) continue;
                const dataStr = line.slice(5).trim();
                if (!dataStr || dataStr === '[DONE]') continue;
                let ev;
                try { ev = JSON.parse(dataStr); } catch { continue; }
                if (ev.type === 'content_block_delta' && ev.delta && ev.delta.type === 'text_delta' && typeof ev.delta.text === 'string') {
                  reply += ev.delta.text;
                  sentenceBuffer += ev.delta.text;
                  slot.messages[assistantMsgIdx].content = reply;
                  flushSentences();
                  const now = Date.now();
                  if (now - lastRender > 80) { lastRender = now; render(); scrollChat(); }
                } else if (ev.type === 'message_stop') {
                  // nothing — handled below
                } else if (ev.type === 'error' && ev.error) {
                  throw new Error(ev.error.message || 'API stream error');
                }
              }
            }
          }

          // Flush any trailing partial sentence as one final chunk.
          const tail = sentenceBuffer.trim();
          if (tail && viaVoice) enqueueTtsSentence(idx, tail);
          if (viaVoice && slot.ttsQueue) {
            slot.ttsQueue.done = true;
            // Kick the queue in case no sentences were ever enqueued (e.g., empty reply).
            processTtsQueue(idx);
          }
          if (!reply && slot.messages[assistantMsgIdx]) {
            slot.messages[assistantMsgIdx].content = 'No response.';
          }
        } catch (err) {
          if (err && err.name === 'AbortError') {
            // User hit Stop/Cancel — drop the empty placeholder and stay quiet.
            const placeholder = slot.messages[assistantMsgIdx];
            if (placeholder && placeholder.role === 'assistant' && !placeholder.content) {
              slot.messages.splice(assistantMsgIdx, 1);
            }
          } else {
            const placeholder = slot.messages[assistantMsgIdx];
            const errMsg = '\u26a0\ufe0f ' + (err.message || 'Connection failed. Check your API key in Settings.');
            if (placeholder && placeholder.role === 'assistant') placeholder.content = errMsg;
            else slot.messages.push({ role: 'assistant', content: errMsg });
            // Keep the user in conversation mode so they can just try again —
            // a transient fetch error shouldn't force them to re-wake Randy.
            if (viaVoice) teardownTtsQueue(idx);
          }
        }

        // Only clean up shared slot state if this turn is still the active one.
        // If interruptCurrentReply() has already aborted us and a new sendMessage
        // has installed its own controller, leave its loading=true alone.
        if (slot.abortController === controller) {
          slot.loading = false;
          slot.abortController = null;
        }
        render();
        scrollChat();
      }

      function scrollChat() {
        setTimeout(() => {
          const el = document.getElementById('chat-scroll');
          if (el) el.scrollTop = el.scrollHeight;
          for (let i = 0; i < STATE.slots.length; i++) {
            const h = document.getElementById('home-scroll-' + i);
            if (h) h.scrollTop = h.scrollHeight;
          }
        }, 50);
      }

      function clearChat(idx) {
        // Stop any active playback whose source message is about to be wiped.
        if (VOICE.playingMsg && VOICE.playingMsg.slot === idx) stopSpeaking();
        STATE.slots[idx].messages = [];
        STATE.slots[idx].inputText = '';
        STATE.slots[idx].loading = false;
        render();
      }

      /* ========== HELPERS ========== */
      function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
      function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

      // Sanitize HTML for Assistant 1: only allow safe structural tags
      function sanitizeHtml(raw) {
        const div = document.createElement('div');
        div.innerHTML = raw;
        // Remove script, style, iframe, form, input, and event attributes
        div.querySelectorAll('script,style,iframe,form,input,textarea,button,object,embed,link,meta').forEach(el => el.remove());
        div.querySelectorAll('*').forEach(el => {
          for (const attr of [...el.attributes]) {
            if (attr.name.startsWith('on') || attr.name === 'href' && attr.value.trim().toLowerCase().startsWith('javascript')) {
              el.removeAttribute(attr.name);
            }
          }
        });
        return div.innerHTML;
      }

      // Render bot message content: sanitized HTML for all assistants
      function renderBotContent(content) {
        return escHtml(content).replace(/\n/g, '<br>');
      }

      // Extract summary text from Assistant 1 HTML for voice reading
      function extractSummary(html) {
        const text = String(html).replace(/<[^>]*>/g, '').replace(/\s+/g, ' ').trim();
        return text.substring(0, 300);
      }

      // Render the live interim transcript as a faded bubble aligned right (like a user msg).
      // Returns empty string unless recognition is active and an interim string is pending for this slot.
      function interimBubbleHtml(slotIdx, expanded) {
        if (!VOICE.wantRunning || !VOICE.interimText) return '';
        if (VOICE.interimSlot !== slotIdx) return '';
        // Don't flash an interim bubble for a slot that isn't voice-enabled
        // or while Randy's voice is echoing through the mic.
        const slot = STATE.slots[slotIdx];
        if (!slot || !slot.voiceEnabled) return '';
        if (ttsEchoActive()) return '';
        const fontSize = expanded ? '' : 'font-size:11px;padding:6px 10px;';
        const cancelSize = expanded ? 'font-size:11px;padding:4px 10px;' : 'font-size:10px;padding:3px 8px;';
        return `
          <div class="flex justify-end items-center gap-2" id="interim-bubble-${slotIdx}">
            <button title="Cancel — don't send this" data-action="cancel-pending" data-idx="${slotIdx}"
              style="background:rgba(239,68,68,0.08);color:#ef4444;border:1px solid rgba(239,68,68,0.35);border-radius:9999px;${cancelSize}cursor:pointer;font-weight:600;line-height:1">
              Cancel
            </button>
            <div class="chat-bubble chat-user interim-bubble" style="${fontSize}max-width:70%">
              <span class="interim-text">${escHtml(VOICE.interimText)}</span><span class="interim-caret">\u258A</span>
            </div>
          </div>`;
      }

      function speakerBtnHtml(slotIdx, msgIdx) {
        if (!VOICE.ttsSupported) return '';
        const isPlayingThis = !!(VOICE.playingMsg && VOICE.playingMsg.slot === slotIdx && VOICE.playingMsg.msg === msgIdx);
        const icon = isPlayingThis ? 'volume-x' : 'volume-2';
        const title = isPlayingThis ? 'Stop' : 'Speak';
        return `<button class="tts-btn ${isPlayingThis ? 'playing' : ''}" title="${title}" aria-label="${title}" data-action="tts-speak" data-slot="${slotIdx}" data-msg="${msgIdx}"><i data-lucide="${icon}" class="w-3 h-3"></i></button>`;
      }

      /* ========== RENDER ========== */
      function render() {
        const root = document.getElementById('app');
        root.innerHTML = `
          <header class="app-bar">
            <div class="app-shell mx-auto px-4 flex items-center justify-between gap-3" style="height:60px">
              <div class="flex items-center gap-3">
                <div class="brand-mark">
                  <span class="re"><span class="b1">Re</span><span class="b2">cast</span><span class="pl">+</span></span>
                </div>
                <span class="brand-tag">Assistant</span>
              </div>
              <div class="flex gap-1 p-1 rounded-lg ring-1 ring-slate-200 bg-white/70">
                <button class="tab-btn ${STATE.activeTab==='home'?'active':''}" data-action="switch-tab" data-tab="home">
                  <i data-lucide="messages-square" class="w-4 h-4"></i> Chat
                </button>
                <button class="tab-btn ${STATE.activeTab==='settings'?'active':''}" data-action="switch-tab" data-tab="settings">
                  <i data-lucide="settings" class="w-4 h-4"></i> Settings
                </button>
              </div>
            </div>
          </header>
          <main class="app-shell mx-auto px-4 pb-6 mt-3">
            ${STATE.activeTab === 'home' ? renderHome() : renderSettings()}
          </main>
          ${renderExpanded()}
          ${renderToast()}
        `;
        if (window.lucide?.createIcons) try { window.lucide.createIcons(); } catch {}
        bindEvents();
      }

      /* ========== VOICE STAGE (hero) ========== */
      function renderVoiceStage(slot, idx) {
        const name = escHtml(slot.voiceName || slot.label);
        const voiceOn = !!slot.voiceEnabled;
        const isSpeaking = !!slot.isSpeaking;
        const loading = !!slot.loading;
        const sr = VOICE.srSupported;
        const inConversation = VOICE.conversationMode && VOICE.activeSlot === idx;
        const isListening = voiceOn && !loading && !isSpeaking &&
          (inConversation || (VOICE.activeSlot === idx && VOICE.awaitingCommand));

        let orbClass, orbInner, action, title, statusText, statusClass, live = false;
        if (!sr) {
          orbClass = 'off'; orbInner = '<i data-lucide="mic-off" class="w-9 h-9"></i>';
          action = 'noop'; title = 'Voice needs Chrome or Edge';
          statusText = 'Voice unavailable'; statusClass = 'off';
        } else if (isSpeaking) {
          orbClass = 'speaking';
          orbInner = '<span class="sound-wave"><span class="sound-wave-bar"></span><span class="sound-wave-bar"></span><span class="sound-wave-bar"></span></span>';
          action = 'stop-speaking'; title = 'Stop speaking';
          statusText = 'Speaking\u2026'; statusClass = 'speaking';
        } else if (loading) {
          orbClass = 'thinking';
          orbInner = '<span class="orb-dots"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></span>';
          action = 'exit-conversation'; title = 'Stop';
          statusText = 'Thinking\u2026'; statusClass = '';
        } else if (isListening) {
          orbClass = 'listening'; orbInner = '<i data-lucide="mic" class="w-9 h-9"></i>';
          action = 'exit-conversation'; title = 'Tap to stop listening';
          statusText = 'Listening\u2026'; statusClass = 'listening'; live = true;
        } else if (voiceOn) {
          orbClass = 'ready'; orbInner = '<i data-lucide="mic" class="w-9 h-9"></i>';
          action = 'toggle-voice'; title = 'Voice on \u2014 tap to mute';
          statusText = 'Ready to talk'; statusClass = '';
        } else {
          orbClass = 'off'; orbInner = '<i data-lucide="mic-off" class="w-9 h-9"></i>';
          action = 'toggle-voice'; title = 'Tap to enable voice';
          statusText = 'Voice off'; statusClass = 'off';
        }

        const wake = !sr
          ? '<div class="wh-label">Voice</div><div class="wh-phrase">Use <b>Chrome</b> or <b>Edge</b> to talk</div>'
          : voiceOn
            ? '<div class="wh-label">Wake word</div><div class="wh-phrase">Say <b>\u201cHey ' + name + '\u201d</b></div>'
            : '<div class="wh-label">Voice</div><div class="wh-phrase">Tap the orb to start talking</div>';

        const disabled = action === 'noop' ? 'disabled' : '';

        return `
          <div class="voice-stage">
            <span class="plus" style="top:16px;right:26px;font-size:20px">+</span>
            <span class="plus" style="top:120px;right:38px;font-size:13px">+</span>
            <span class="plus" style="bottom:92px;left:22px;font-size:16px">+</span>
            <div class="stage-eyebrow">Voice Assistant</div>
            <div class="orb-wrap ${live ? 'live' : ''}">
              <span class="orb-ring"></span>
              <span class="orb-ring d"></span>
              <button class="voice-orb ${orbClass}" title="${title}" aria-label="${title}" data-action="${action}" data-idx="${idx}" ${disabled}>
                ${orbInner}
              </button>
            </div>
            <div class="stage-name">${name}</div>
            <div class="stage-role">Your Recast Application Workspace expert</div>
            <div class="stage-status ${statusClass}"><span class="st-dot"></span>${statusText}</div>
            <div class="wake-hint">${wake}</div>
          </div>`;
      }

      /* ========== HOME ========== */
      function renderHome() {
        const history = getHistory();
        const open = STATE.historyOpen;
        return `
          <div class="home-grid chat-card-wrap">
            ${renderVoiceStage(STATE.slots[0], 0)}
            ${renderCard(STATE.slots[0], 0)}
            ${open ? `
              <div class="history-panel history-panel-open">
                <div class="flex items-center justify-between" style="margin-bottom:4px">
                  <h3 class="saved-head">Saved Conversations${HISTORY_CACHE.loading ? ' <span style=\"font-weight:400;color:#94a3b8\">\u00b7 loading\u2026</span>' : ''}</h3>
                  <div class="flex items-center gap-1">
                    <button class="card-icon-btn" title="Refresh" aria-label="Refresh saved conversations" data-action="refresh-history" ${HISTORY_CACHE.loading ? 'disabled' : ''}>
                      <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    </button>
                    <button class="card-icon-btn" title="Collapse" aria-label="Collapse saved conversations" data-action="toggle-history">
                      <i data-lucide="chevron-right" class="w-4 h-4"></i>
                    </button>
                  </div>
                </div>
                ${HISTORY_CACHE.error && history.length === 0 ? `
                  <div style="text-align:center;padding:24px 12px;color:#ef4444;font-size:12px">
                    Couldn't load from Google Sheet.<br>
                    <span style="color:#94a3b8">${escHtml(HISTORY_CACHE.error)}</span><br>
                    <button class="btn-outline" style="margin-top:10px;padding:6px 12px;min-height:auto;font-size:12px" data-action="refresh-history">Retry</button>
                  </div>
                ` : history.length === 0 ? `
                  <div style="text-align:center;padding:32px 12px;color:#94a3b8;font-size:12px">${HISTORY_CACHE.loading ? 'Loading from Google Sheet\u2026' : 'No saved conversations yet.<br>Use the save button in the chat header.'}</div>
                ` : history.map(h => `
                  <div class="card lift" style="padding:11px 13px;cursor:pointer;border-radius:10px" data-action="view-history" data-id="${escAttr(h.id)}">
                    <div style="font-size:11px;color:#94a3b8;margin-bottom:4px">${escHtml(h.date)} &middot; ${h.pairs.length} Q&A</div>
                    <div style="font-size:12px;font-weight:500;color:var(--navy);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${escHtml(h.preview)}</div>
                  </div>
                `).join('')}
              </div>
            ` : `
              <div class="history-rail" role="button" tabindex="0" title="Saved conversations (${history.length})${HISTORY_CACHE.loading ? ' \u2014 loading\u2026' : ''}" aria-label="Show saved conversations" data-action="toggle-history">
                <i data-lucide="${HISTORY_CACHE.loading ? 'loader' : 'history'}" class="w-5 h-5${HISTORY_CACHE.loading ? ' rail-spin' : ''}"></i>
                ${history.length > 0 ? `<span class="history-rail-badge">${history.length}</span>` : ''}
              </div>
            `}
          </div>
          ${renderHistoryPopout()}`;
      }

      function renderHistoryPopout() {
        if (!HISTORY_VIEW.open) return '';
        const history = getHistory();
        const entry = history.find(h => h.id === HISTORY_VIEW.open);
        if (!entry) return '';

        return `
          <div class="fixed inset-0 z-50 flex items-center justify-center" style="background:rgba(0,0,0,0.4);padding:20px" data-action="close-history-bg">
            <div class="card" style="max-width:640px;width:100%;max-height:85vh;display:flex;flex-direction:column;border-radius:14px;overflow:hidden" onclick="event.stopPropagation()">
              <div style="padding:14px 16px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:between;gap:12px;background:var(--navy);color:#fff">
                <div style="flex:1;min-width:0">
                  <div style="font-size:13px;font-weight:600">${escHtml(entry.date)} — ${entry.pairs.length} Q&A pair${entry.pairs.length!==1?'s':''}</div>
                  <div style="font-size:11px;color:rgba(255,255,255,0.5)">Session ${escHtml(entry.session_id || '')}</div>
                </div>
                <button class="btn-primary" style="padding:6px 12px;font-size:11px;background:var(--cyan);flex-shrink:0" data-action="load-history" data-id="${escAttr(entry.id)}">
                  <i data-lucide="message-circle" class="w-3 h-3 inline mr-1"></i>Ask Randy
                </button>
                <button style="background:transparent;border:1px solid rgba(255,255,255,0.3);color:#fca5a5;font-size:11px;padding:6px 10px;border-radius:6px;cursor:pointer;font-weight:600;flex-shrink:0" data-action="delete-history" data-id="${escAttr(entry.id)}">
                  <i data-lucide="trash-2" class="w-3 h-3 inline mr-1"></i>Delete
                </button>
                <button style="background:transparent;border:none;color:rgba(255,255,255,0.7);cursor:pointer;padding:4px" data-action="close-history">
                  <i data-lucide="x" class="w-4 h-4"></i>
                </button>
              </div>
              <div style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:#fafbfc">
                ${entry.pairs.map(p => `
                  <div>
                    <div style="display:flex;justify-content:flex-end;margin-bottom:6px">
                      <div class="chat-bubble chat-user" style="font-size:13px">${escHtml(p.question)}</div>
                    </div>
                    <div style="display:flex;justify-content:flex-start">
                      <div class="chat-bubble chat-bot" style="font-size:13px;white-space:pre-wrap">${escHtml(p.answer)}</div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>`;
      }

      function renderCard(slot, idx) {
        const color = SLOT_COLORS[idx];
        const msgs = slot.messages;
        const composerExpanded = STATE.composerExpanded;
        const hasText = (slot.inputText || '').trim().length > 0;
        const voiceOn = !!slot.voiceEnabled;
        const isSpeaking = !!slot.isSpeaking;
        const inConversation = VOICE.conversationMode && VOICE.activeSlot === idx;
        // Mask the red "listening" state off while Randy is thinking or
        // talking — the mic isn't actually accepting input then (echo guard).
        const isListening = voiceOn && !slot.loading && !isSpeaking &&
          (inConversation || (VOICE.activeSlot === idx && VOICE.awaitingCommand));

        // Big mic button state. Four visual modes:
        //   off (grey)  ·  idle listening (blue, no pulse)  ·  listening/recording (red, pulse)  ·  speaking (green with stop icon)
        let micClass = 'off', micIcon = 'mic-off', micTitle = 'Enable voice', micAction = 'toggle-voice';
        if (isSpeaking) {
          micClass = 'speaking'; micIcon = 'volume-x'; micTitle = 'Mute \u2014 stop Randy speaking'; micAction = 'stop-speaking';
        } else if (isListening) {
          micClass = 'listening'; micIcon = 'square'; micTitle = 'Stop listening'; micAction = 'exit-conversation';
        } else if (voiceOn) {
          micClass = ''; micIcon = 'mic'; micTitle = 'Voice on \u2014 tap to disable'; micAction = 'toggle-voice';
        }

        return `
          <div class="chat-panel ${composerExpanded ? 'composer-expanded' : ''}" style="position:relative">
            <div class="conv-header">
              <div class="chat-avatar ${voiceOn ? '' : 'muted'}" style="background:${color};width:34px;height:34px;font-size:13px">
                ${escHtml(slot.label.charAt(0))}
                <span class="status-dot"></span>
              </div>
              <div style="flex:1;min-width:0">
                <div class="conv-title">${escHtml(slot.label)}</div>
                <div class="conv-sub">${isSpeaking ? 'Speaking\u2026' : isListening ? 'Listening\u2026' : slot.loading ? 'Thinking\u2026' : 'Online \u00b7 Ready to help'}</div>
              </div>
              <button class="overflow-btn" title="More actions" aria-label="More actions" aria-haspopup="true" aria-expanded="${STATE.cardMenuOpen ? 'true' : 'false'}" data-action="toggle-card-menu" data-idx="${idx}">
                <i data-lucide="more-vertical" class="w-5 h-5"></i>
              </button>
              ${STATE.cardMenuOpen ? `
                <div class="overflow-menu" data-menu="card">
                  <button data-action="save-to-sheet" data-idx="${idx}" ${slot.messages.length === 0 ? 'disabled' : ''}>
                    <i data-lucide="download" class="w-4 h-4"></i> Save conversation

      /* ========== VOICE WIDGET (expanded view FAB) ========== */
      function renderVoiceFab(slot, idx, color) {
        if (!VOICE.srSupported) return '';
        const isSpeaking = slot.isSpeaking;
        const enabled = slot.voiceEnabled;
        // "Listening" visuals are only true when we're actually accepting mic
        // input — never while Randy is thinking or talking.
        const isActiveCommand = VOICE.activeSlot === idx && VOICE.awaitingCommand && !slot.loading && !isSpeaking;
        const inConversation = VOICE.conversationMode && VOICE.activeSlot === idx && !slot.loading && !isSpeaking;
        // Show the dedicated Stop button whenever the system is "busy" — speaking, loading,
        // armed for a command, or in continuous conversation. Click exits conversation mode.
        const showStopBtn = enabled && (
          (VOICE.conversationMode && VOICE.activeSlot === idx) ||
          isSpeaking ||
          (VOICE.activeSlot === idx && VOICE.awaitingCommand) ||
          slot.loading
        );

        let inner, bg, title, extraClass = '';
        if (!enabled) {
          inner = '<i data-lucide="mic-off" class="w-6 h-6"></i>';
          bg = '#94a3b8';
          title = 'Voice off — click to enable';
        } else if (isSpeaking) {
          inner = '<span class="sound-wave"><span class="sound-wave-bar"></span><span class="sound-wave-bar"></span><span class="sound-wave-bar"></span></span>';
          bg = color;
          title = 'Speaking — click to stop';
        } else if (isActiveCommand || inConversation) {
          inner = '<span style="width:16px;height:16px;border-radius:50%;background:#fff;display:inline-block"></span>';
          bg = '#ef4444';
          title = inConversation ? 'Conversation on — click to end' : 'Listening for your command';
          extraClass = 'record-pulse';
        } else {
          inner = '<i data-lucide="mic" class="w-6 h-6"></i>';
          bg = color;
          title = 'Listening for wake word — click to disable';
        }

        // Clicking the FAB while busy exits conversation mode; otherwise toggles voice.
        const action = showStopBtn ? 'exit-conversation' : 'toggle-voice';
        const showRings = enabled && !isSpeaking && !isActiveCommand && !inConversation;

        return `
          <div class="voice-fab-wrap" style="color:${bg}">
            ${showRings ? '<span class="voice-pulse-ring"></span><span class="voice-pulse-ring delay"></span>' : ''}
            <button class="voice-fab ${extraClass}" style="background:${bg}" title="${title}" data-action="${action}" data-idx="${idx}">
              ${inner}
            </button>
          </div>`;
      }

      /* ========== EVENTS ========== */
      let _bound = false;
      function bindEvents() {
        const root = document.getElementById('app');
        if (_bound) return;
        _bound = true;

        document.addEventListener('click', e => {
          const act = e.target.closest('[data-action]');
          // Close the card overflow menu when the user clicks outside it.
          if (!act && STATE.cardMenuOpen && !e.target.closest('[data-menu="card"]')) {
            STATE.cardMenuOpen = false;
            render();
            return;
          }
          if (!act) return;
          const action = act.dataset.action;
          const idx = act.dataset.idx !== undefined ? parseInt(act.dataset.idx) : null;

          // Any menu-item click should collapse the overflow menu before executing.
          if (STATE.cardMenuOpen && action !== 'toggle-card-menu') STATE.cardMenuOpen = false;

          switch (action) {
            case 'switch-tab': STATE.activeTab = act.dataset.tab; render(); break;
            case 'toggle-history': STATE.historyOpen = !STATE.historyOpen; render(); break;
            case 'refresh-history': fetchHistoryFromSheet(); break;
            case 'toggle-composer': {
              // Preserve whatever the user has typed when swapping single-line \u2194 multi-line.
              const cur = document.getElementById('home-input-' + (idx !== null ? idx : 0));
              if (cur && STATE.slots[idx !== null ? idx : 0]) STATE.slots[idx !== null ? idx : 0].inputText = cur.value;
              STATE.composerExpanded = !STATE.composerExpanded;
              render();
              setTimeout(() => {
                const inp = document.getElementById('home-input-' + (idx !== null ? idx : 0));
                if (inp) { inp.focus(); const len = inp.value.length; try { inp.setSelectionRange(len, len); } catch {} }
              }, 40);
              break;
            }
            case 'toggle-card-menu': STATE.cardMenuOpen = !STATE.cardMenuOpen; render(); break;
            case 'expand-slot': STATE.expandedSlot = idx; render(); scrollChat(); setTimeout(()=>document.getElementById('expanded-input')?.focus(),100); break;
            case 'close-expanded': STATE.expandedSlot = null; render(); break;
            case 'clear-chat': clearChat(idx); break;
            case 'save-to-sheet': saveToSheet(idx); break;
            case 'copy-key': {
              const keys = {
                agent: 'sk-ant-api03-CSSZg-24BJtdvaN7HBOXhCYEdFMFUyZk66jPs2T_Tvr5rHNGScUtEwdnpA516'
              };
              const which = act.dataset.key;
              const val = keys[which];
              if (!val) break;
              const done = () => showToast('Agent key copied');
              if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(val).then(done).catch(() => {
                  const ta = document.createElement('textarea');
                  ta.value = val; document.body.appendChild(ta);
                  ta.select(); document.execCommand('copy');
                  document.body.removeChild(ta); done();
                });
              } else {
                const ta = document.createElement('textarea');
                ta.value = val; document.body.appendChild(ta);
                ta.select(); document.execCommand('copy');
                document.body.removeChild(ta); done();
              }
              break;
            }
            case 'select-editing-slot': readFields(); STATE.editingSlot = idx; render(); break;
            case 'send-expanded': {
              const inp = document.getElementById('expanded-input');
              if (inp) STATE.slots[STATE.expandedSlot].inputText = inp.value;
              sendMessage(STATE.expandedSlot);
              break;
            }
            case 'send-home': {
              const inp = document.getElementById('home-input-' + idx);
              if (inp) STATE.slots[idx].inputText = inp.value;
              sendMessage(idx);
              break;
            }
            case 'toggle-voice': {
              if (STATE.activeTab === 'settings') readFields();
              toggleSlotVoice(idx);
              break;
            }
            case 'stop-speaking': {
              stopSpeaking();
              break;
            }
            case 'exit-conversation': {
              exitConversationMode();
              break;
            }
            case 'cancel-pending': {
              cancelPendingUtterance();
              break;
            }
            case 'tts-speak': {
              const si = parseInt(act.dataset.slot, 10);
              const mi = parseInt(act.dataset.msg, 10);
              const sl = STATE.slots[si];
              if (!sl) break;
              // If this exact message is currently playing, stop it.
              if (VOICE.playingMsg && VOICE.playingMsg.slot === si && VOICE.playingMsg.msg === mi) {
                stopSpeaking();
                break;
              }
              // If another message is playing, stop it first so replay is responsive.
              if (sl.isSpeaking) stopSpeaking();
              const msg = sl.messages[mi];
              if (!msg || msg.role !== 'assistant') break;
              speakText(extractSummary(msg.content), si, mi);
              break;
            }
            case 'preview-voice': {
              if (STATE.activeTab === 'settings') readFields();
              speakText('Hello! This is how I sound.', idx);
              break;
            }
            case 'save-settings': {
              readFields();
              GSHEET_WEBHOOK = document.getElementById('setting-gsheet')?.value?.trim() || '';
              localStorage.setItem('recast_gsheet_url', GSHEET_WEBHOOK);
              saveSettings();
              saveRemoteConfig();
              render();
              break;
            }
            case 'view-history': {
              HISTORY_VIEW.open = act.dataset.id;
              render();
              break;
            }
            case 'close-history':
            case 'close-history-bg': {
              if (act.dataset.action === 'close-history-bg' && !e.target.hasAttribute('data-action')) break;
              HISTORY_VIEW.open = null;
              render();
              break;
            }
            case 'delete-history': {
              deleteHistoryEntry(act.dataset.id);
              HISTORY_VIEW.open = null;
              render();
              break;
            }
            case 'load-history': {
              const hist = getHistory().find(h => h.id === act.dataset.id);
              if (hist) {
                const slot = STATE.slots[0];
                const transcript = hist.pairs.map(p => 'User: ' + p.question + '\nRandy: ' + p.answer).join('\n\n');
                slot.inputText = 'Here is a previous conversation for context:\n\n' + transcript + '\n\nBased on this conversation, ';
                HISTORY_VIEW.open = null;
                STATE.expandedSlot = 0;
                render();
                scrollChat();
                setTimeout(() => {
                  const inp = document.getElementById('expanded-input');
                  if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
                }, 150);
              }
              break;
            }
            case 'reset-slot': {
              const s = STATE.slots[idx];
              const DEFAULT_PROMPTS = [ASSISTANT_2_PROMPT];
              s.apiKey = DEFAULT_API_KEY; s.prompt = DEFAULT_PROMPTS[idx];
              s.label = 'Recast SE';
              s.voiceName = 'Randy';
              s.voicePersonality = DEFAULT_VOICE_PERSONALITY;
              s.voiceEnabled = true;
              if (!anyVoiceEnabled()) stopRecognition();
              saveSettings(); render(); break;
            }
          }
        });

        document.addEventListener('input', e => {
          // Keep STATE in sync with the composer, and keep the Send button's
          // disabled state in sync live — we can't re-render on every keystroke
          // because that would yank focus out of the composer, so we patch the
          // button's disabled attr directly.
          const syncSendBtn = (sendBtn, slot) => {
            if (!sendBtn || !slot) return;
            const shouldDisable = !!slot.loading || !(slot.inputText || '').trim();
            if (sendBtn.disabled !== shouldDisable) sendBtn.disabled = shouldDisable;
          };
          if (e.target.id === 'expanded-input' && STATE.expandedSlot !== null) {
            const slot = STATE.slots[STATE.expandedSlot];
            slot.inputText = e.target.value;
            syncSendBtn(document.querySelector('[data-action="send-expanded"]'), slot);
          } else if (typeof e.target.id === 'string' && e.target.id.startsWith('home-input-')) {
            const hi = parseInt(e.target.id.slice('home-input-'.length), 10);
            if (!Number.isNaN(hi) && STATE.slots[hi]) {
              STATE.slots[hi].inputText = e.target.value;
              syncSendBtn(document.querySelector('[data-action="send-home"][data-idx="' + hi + '"]'), STATE.slots[hi]);
            }
          }
        });

        document.addEventListener('keydown', e => {
          if (e.key === 'Enter' && !e.shiftKey && e.target.id === 'expanded-input' && STATE.expandedSlot !== null) {
            e.preventDefault();
            STATE.slots[STATE.expandedSlot].inputText = e.target.value;
            sendMessage(STATE.expandedSlot);
          }
          if (e.key === 'Enter' && !e.shiftKey && typeof e.target.id === 'string' && e.target.id.startsWith('home-input-')) {
            e.preventDefault();
            const hi = parseInt(e.target.id.slice('home-input-'.length), 10);
            if (!Number.isNaN(hi) && STATE.slots[hi]) {
              STATE.slots[hi].inputText = e.target.value;
              sendMessage(hi);
            }
          }
          if (e.key === 'Escape' && STATE.expandedSlot !== null) {
            STATE.expandedSlot = null; render();
          }
        });
      }

      function readFields() {
        const i = STATE.editingSlot;
        const s = STATE.slots[i];
        const l = document.getElementById('setting-label');
        const k = document.getElementById('setting-apikey');
        const p = document.getElementById('setting-prompt');
        const vn = document.getElementById('setting-voicename');
        const vp = document.getElementById('setting-voicepersonality');
        if (l) s.label = l.value.trim() || s.label;
        if (k) s.apiKey = k.value.trim();
        if (p) s.prompt = p.value.trim() || s.prompt;
        if (vn) s.voiceName = vn.value.trim() || s.label;
        if (vp) s.voicePersonality = vp.value.trim() || DEFAULT_VOICE_PERSONALITY;
      }

      /* ========== BOOT ========== */
      document.addEventListener('DOMContentLoaded', () => {
        render();
        loadRemoteConfig();
        fetchHistoryFromSheet();
        // Re-render once the browser loads its speech voice list (async in Chrome)
        if (VOICE.ttsSupported && typeof speechSynthesis.onvoiceschanged !== 'undefined') {
          window.speechSynthesis.onvoiceschanged = () => {
            if (STATE.activeTab === 'settings') render();
          };
        }
        // If any slot had voice enabled from localStorage, try to resume recognition.
        // Chrome requires a user gesture for the very first permission prompt, so this
        // will silently no-op on cold loads — the user's first click on the mic button
        // will then trigger the permission flow.
        if (anyVoiceEnabled() && VOICE.srSupported) {
          try { startRecognition(); } catch {}
        }
      });
    </script>
  </body>
</html>
