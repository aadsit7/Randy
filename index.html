              <div class="history-rail" role="button" tabindex="0" title="Saved conversations (${history.length})${HISTORY_CACHE.loading ? ' — loading…' : ''}" aria-label="Show saved conversations" data-action="toggle-history">
                <i data-lucide="${HISTORY_CACHE.loading ? 'loader' : 'history'}" class="w-5 h-5${HISTORY_CACHE.loading ? ' rail-spin' : ''}"></i>
                ${history.length > 0 ? `<span class="history-rail-badge">${history.length}</span>` : ''}
              </div>
            `}
          </div>
          ${renderHistoryPopout()}`;
      }

      /* ---------- message rendering ---------- */

      function renderBotMessage(slot, m, mi, slotIdx) {
        if (m.kind === 'assist') {
          const srcs = Array.isArray(m.sources) ? m.sources : [];
          return `
            <div class="msg-wrap"><div class="chat-bubble chat-bot chat-md" style="padding-right:30px;white-space:normal">
              <div class="assist-badge"><i data-lucide="ear" class="w-3 h-3"></i>Technical assist</div>
              <div class="md-scroll">${mdToHtml(m.content)}</div>
              ${srcs.length ? `<div class="src-chips">${srcs.map(u => `
                <a href="${escAttr(u)}" target="_blank" rel="noopener noreferrer" title="${escAttr(u)}">
                  <i data-lucide="link" class="w-3 h-3"></i>${escHtml(hostnameOf(u))}
                </a>`).join('')}</div>` : ''}
            </div>${speakerBtnHtml(slotIdx, mi)}</div>`;
        }
        return `<div class="msg-wrap"><div class="chat-bubble chat-bot" style="padding-right:28px">${escHtml(m.content).replace(/\n/g, '<br>')}</div>${speakerBtnHtml(slotIdx, mi)}</div>`;
      }

      function renderUserMessage(m) {
        const badge = m.kind === 'assist-q'
          ? '<span style="display:inline-flex;align-items:center;gap:4px;font-size:9.5px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;opacity:0.75;margin-bottom:4px"><i data-lucide="ear" class="w-3 h-3"></i>Overheard</span><br>'
          : '';
        return `<div class="chat-bubble chat-user">${badge}${escHtml(m.content)}</div>`;
      }

      function speakerBtnHtml(slotIdx, msgIdx) {
        if (!VOICE.ttsSupported) return '';
        const isPlayingThis = !!(VOICE.playingMsg && VOICE.playingMsg.slot === slotIdx && VOICE.playingMsg.msg === msgIdx);
        const icon = isPlayingThis ? 'volume-x' : 'volume-2';
        const title = isPlayingThis ? 'Stop' : 'Speak';
        return `<button class="tts-btn ${isPlayingThis ? 'playing' : ''}" title="${title}" aria-label="${title}" data-action="tts-speak" data-slot="${slotIdx}" data-msg="${msgIdx}"><i data-lucide="${icon}" class="w-3 h-3"></i></button>`;
      }

      function interimBubbleHtml(slotIdx, expanded) {
        if (!VOICE.wantRunning || !VOICE.interimText) return '';
        if (VOICE.interimSlot !== slotIdx) return '';
        const slot = STATE.slots[slotIdx];
        if (!slot) return '';
        const assistMode = slot.techAssist && !VOICE.awaitingCommand && !VOICE.conversationMode;
        if (!slot.voiceEnabled && !slot.techAssist) return '';
        if (!desktopListening() && ttsEchoActive()) return '';
        const fontSize = expanded ? '' : 'font-size:11px;padding:6px 10px;';
        const cancelSize = expanded ? 'font-size:11px;padding:4px 10px;' : 'font-size:10px;padding:3px 8px;';
        return `
          <div class="flex justify-end items-center gap-2" id="interim-bubble-${slotIdx}">
            ${assistMode ? '' : `
            <button title="Cancel — don't send this" data-action="cancel-pending" data-idx="${slotIdx}"
              style="background:rgba(239,68,68,0.08);color:#ef4444;border:1px solid rgba(239,68,68,0.35);border-radius:9999px;${cancelSize}cursor:pointer;font-weight:600;line-height:1">
              Cancel
            </button>`}
            <div class="chat-bubble chat-user interim-bubble" style="${fontSize}max-width:70%">
              <span class="interim-text">${escHtml(VOICE.interimText)}</span><span class="interim-caret">▊</span>
            </div>
          </div>`;
      }

      // Thin status strip above the message list while tech assist is on.
      function renderAssistRibbon(idx) {
        const slot = STATE.slots[idx];
        const last = TECH.decisions[TECH.decisions.length - 1];
        return `
          <div class="passive-ribbon">
            <div class="pr-head">
              <span class="pr-dot ${TECH.pending ? 'thinking' : ''}"></span>
              <span class="pr-label">Technical assistance</span>
              <span class="pr-meta">${TECH.source === 'desktop' ? 'computer audio' : 'microphone'} · ${TECH.answered} answered / ${TECH.heard} heard</span>
              <span class="pr-spacer"></span>
              <span class="pr-mute" title="${slot.speakAnswers ? 'Answers are spoken aloud' : 'Muted — answers appear in chat only'}">
                <i data-lucide="${slot.speakAnswers ? 'volume-2' : 'volume-x'}" class="w-3 h-3"></i>
              </span>
            </div>
            ${last ? `
              <div class="pr-last ${last.accepted ? 'pr-accepted' : 'pr-skipped'}" title="${last.accepted ? 'Classified as a technical question and answered' : 'Skipped — not a technical question Randy should answer'}">
                <i data-lucide="${last.accepted ? 'check' : 'minus'}" class="w-3 h-3"></i>
                <span class="pr-text">${escHtml(truncate(last.text, 90))}</span>
                <span class="pr-conf">${Math.round((last.confidence || 0) * 100)}%</span>
              </div>
            ` : `
              <div class="pr-empty">Waiting for a technical question…</div>
            `}
          </div>`;
      }

      function renderCard(slot, idx) {
        const msgs = slot.messages;
        const composerExpanded = STATE.composerExpanded;
        const hasText = (slot.inputText || '').trim().length > 0;
        const voiceOn = !!slot.voiceEnabled;
        const isSpeaking = !!slot.isSpeaking;
        const inConversation = VOICE.conversationMode && VOICE.activeSlot === idx;
        const isListening = voiceOn && !slot.loading && !isSpeaking &&
          (inConversation || (VOICE.activeSlot === idx && VOICE.awaitingCommand));

        return `
          <div class="chat-panel ${composerExpanded ? 'composer-expanded' : ''}" style="position:relative">
            <div class="conv-header">
              <div class="chat-avatar ${voiceOn || slot.techAssist ? '' : 'muted'}" style="background:var(--primary);width:34px;height:34px;font-size:13px">
                ${escHtml(slot.label.charAt(0))}
                <span class="status-dot"></span>
              </div>
              <div style="flex:1;min-width:0">
                <div class="conv-title">${escHtml(slot.label)}</div>
                <div class="conv-sub">${
                  isSpeaking ? 'Speaking…'
                  : isListening ? 'Listening…'
                  : slot.loading ? 'Thinking…'
                  : slot.techAssist ? `<i data-lucide="ear" class="w-3 h-3 inline" style="vertical-align:-2px;margin-right:4px"></i>Technical assistance on · ${TECH.source === 'desktop' ? 'computer audio' : 'microphone'}`
                  : 'Online · Recast solution engineer'
                }</div>
              </div>
              <button class="overflow-btn" title="More actions" aria-label="More actions" aria-haspopup="true" aria-expanded="${STATE.cardMenuOpen ? 'true' : 'false'}" data-action="toggle-card-menu" data-idx="${idx}">
                <i data-lucide="more-vertical" class="w-5 h-5"></i>
              </button>
              ${STATE.cardMenuOpen ? `
                <div class="overflow-menu" data-menu="card">
                  <button data-action="save-to-sheet" data-idx="${idx}" ${slot.messages.length === 0 ? 'disabled' : ''}>
                    <i data-lucide="download" class="w-4 h-4"></i> Save conversation
                  </button>
                  <button data-action="expand-slot" data-idx="${idx}">
                    <i data-lucide="maximize-2" class="w-4 h-4"></i> Open fullscreen
                  </button>
                  <hr>
                  <button class="danger" data-action="clear-chat" data-idx="${idx}" ${slot.messages.length === 0 ? 'disabled' : ''}>
                    <i data-lucide="trash-2" class="w-4 h-4"></i> Clear chat
                  </button>
                </div>
              ` : ''}
            </div>
            ${slot.techAssist ? renderAssistRibbon(idx) : ''}
            <div id="home-scroll-${idx}" class="flex-1 overflow-y-auto px-4 py-4 flex flex-col gap-3" style="background:var(--row);min-height:0">
              ${msgs.length === 0 ? `
                <div class="flex-1 flex items-center justify-center">
                  <div class="text-center" style="max-width:340px">
                    <div style="width:46px;height:46px;border-radius:12px;background:var(--quote);display:grid;place-items:center;margin:0 auto 14px"><i data-lucide="message-square-text" class="w-5 h-5" style="color:var(--primary)"></i></div>
                    <div style="font-size:13.5px;color:var(--gray);line-height:1.6">Ask about the Recast portfolio — type below, say <b style="color:var(--navy)">“Hey ${escHtml(slot.voiceName || slot.label)}”</b>, or flip on <b style="color:var(--navy)">technical assistance</b> to let Randy listen for questions on your call.</div>
                    <div class="qp-row">
                      <button class="qp-chip" data-action="quick-prompt" data-q="What is Application Workspace and how is it different from Application Manager?">What is Application Workspace?</button>
                      <button class="qp-chip" data-action="quick-prompt" data-q="How does Application Workspace deploy apps to Intune-managed devices?">App delivery with Intune</button>
                      <button class="qp-chip" data-action="quick-prompt" data-q="How do Right Click Tools help with ConfigMgr device management?">Right Click Tools + ConfigMgr</button>
                    </div>
                  </div>
                </div>
              ` : msgs.map((m, mi) => `
                <div class="flex ${m.role==='user'?'justify-end':'justify-start'}">
                  ${m.role==='user' ? renderUserMessage(m) : renderBotMessage(slot, m, mi, idx)}
                </div>
              `).join('')}
              ${interimBubbleHtml(idx, false)}
              ${slot.loading?'<div class="flex justify-start"><div class="chat-bot" style="padding:10px 14px;border-radius:14px"><span class="typing-dot"></span> <span class="typing-dot"></span> <span class="typing-dot"></span></div></div>':''}
            </div>
            <div class="action-bar">
              <button class="action-btn edit ${composerExpanded ? 'active' : ''}" title="${composerExpanded ? 'Collapse text editor' : 'Expand text editor'}" aria-label="${composerExpanded ? 'Collapse composer' : 'Expand composer'}" data-action="toggle-composer">
                <i data-lucide="${composerExpanded ? 'chevron-down' : 'edit-3'}" class="w-5 h-5"></i>
              </button>
              <div class="composer-field">
                ${composerExpanded ? `
                  <textarea id="home-input-${idx}" class="composer-input" rows="3" placeholder="Message ${escAttr(slot.label)}…" ${slot.loading?'disabled':''}>${escHtml(slot.inputText || '')}</textarea>
                ` : `
                  <input type="text" id="home-input-${idx}" class="composer-input" placeholder="Message ${escAttr(slot.label)}…" value="${escAttr(slot.inputText)}" ${slot.loading?'disabled':''} />
                `}
              </div>
              <button class="action-btn send" title="Send message" aria-label="Send message" data-action="send-home" data-idx="${idx}" ${(slot.loading || !hasText) ? 'disabled' : ''}>
                <i data-lucide="send" class="w-5 h-5"></i>
              </button>
            </div>
          </div>`;
      }

      function renderHistoryPopout() {
        if (!HISTORY_VIEW.open) return '';
        const history = getHistory();
        const entry = history.find(h => h.id === HISTORY_VIEW.open);
        if (!entry) return '';
        const pairCount = entry.pairs.length;
        const pairLabel = pairCount === 1 ? '1 Q&A pair' : pairCount + ' Q&A pairs';
        const title = entry.preview || 'Saved conversation';
        const confirmingDelete = STATE.historyConfirmDeleteId === entry.id;

        return `
          <div class="fixed inset-0 z-50 flex items-center justify-center" style="background:rgba(15,23,42,0.55);padding:20px" data-action="close-history-bg">
            <div class="card history-popout" style="max-width:680px;width:100%;max-height:85vh;display:flex;flex-direction:column;border-radius:14px;overflow:hidden;box-shadow:0 24px 60px rgba(15,23,42,0.28)">
              <div style="padding:16px 18px;display:flex;align-items:flex-start;gap:12px;background:var(--navy);color:#fff">
                <div style="flex:1;min-width:0">
                  <div style="font-size:14px;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${escHtml(title)}</div>
                  <div style="font-size:11px;color:rgba(255,255,255,0.65);margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                    <span>${escHtml(formatHistoryDate(entry))}</span>
                    <span style="width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,0.4)"></span>
                    <span>${pairLabel}</span>
                  </div>
                </div>
                <button style="background:rgba(255,255,255,0.08);border:none;color:#fff;cursor:pointer;padding:6px;border-radius:8px;display:grid;place-items:center" data-action="close-history" title="Close" aria-label="Close">
                  <i data-lucide="x" class="w-4 h-4"></i>
                </button>
              </div>
              <div style="flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;background:#fafbfc">
                ${entry.pairs.map((p, i) => `
                  <div>
                    <div style="display:flex;justify-content:flex-end;margin-bottom:6px">
                      <div class="chat-bubble chat-user" style="font-size:13px">${escHtml(p.question)}</div>
                    </div>
                    <div style="display:flex;justify-content:flex-start">
                      <div class="popout-answer">
                        <div class="chat-bubble chat-bot chat-md" style="font-size:13px;white-space:normal">${mdToHtml(p.answer)}</div>
                        <button class="popout-copy" data-action="copy-answer" data-id="${escAttr(entry.id)}" data-pair="${i}" title="Copy answer" aria-label="Copy answer">
                          <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                        </button>
                      </div>
                    </div>
                  </div>
                `).join('')}
              </div>
              <div style="padding:12px 14px;border-top:1px solid #e2e8f0;background:#fff;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                <button class="btn-primary" style="padding:8px 14px;font-size:12.5px;min-height:auto;display:inline-flex;align-items:center;gap:6px" data-action="load-history" data-id="${escAttr(entry.id)}">
                  <i data-lucide="message-circle-plus" class="w-3.5 h-3.5"></i>Continue in chat
                </button>
                <span style="font-size:11px;color:#94a3b8">Tip: hover an answer to copy it</span>
                <div style="flex:1"></div>
                ${confirmingDelete ? `
                  <span style="font-size:12px;color:#b45309;font-weight:600;margin-right:4px">Delete this conversation?</span>
                  <button style="background:#f1f5f9;border:none;color:var(--navy);font-size:12.5px;padding:8px 12px;border-radius:8px;cursor:pointer;font-weight:600" data-action="cancel-delete-history" data-id="${escAttr(entry.id)}">Cancel</button>
                  <button style="background:#dc2626;border:none;color:#fff;font-size:12.5px;padding:8px 14px;border-radius:8px;cursor:pointer;font-weight:600" data-action="confirm-delete-history-popout" data-id="${escAttr(entry.id)}">Delete</button>
                ` : `
                  <button style="background:transparent;border:1px solid #fecaca;color:#dc2626;padding:8px 12px;font-size:12.5px;border-radius:8px;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:6px" data-action="confirm-delete-history" data-id="${escAttr(entry.id)}">
                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>Delete
                  </button>
                `}
              </div>
            </div>
          </div>`;
      }

      function renderToast() {
        if (!VOICE.toastMessage) return '';
        return `<div class="voice-toast">${escHtml(VOICE.toastMessage)}</div>`;
      }

      /* ---------- expanded (fullscreen) chat ---------- */

      function renderExpanded() {
        if (STATE.expandedSlot === null) return '';
        const idx = STATE.expandedSlot;
        const slot = STATE.slots[idx];
        return `
          <div class="fixed inset-0 z-50 flex flex-col" style="background:#fff">
           <div class="expanded-inner flex flex-col" style="flex:1;min-height:0;width:100%">
            <div class="flex items-center justify-between px-4 py-3 flex-shrink-0" style="background:var(--navy);color:#fff">
              <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full grid place-items-center text-white font-bold" style="background:var(--primary)">${escHtml(slot.label.charAt(0))}</div>
                <div>
                  <div class="text-sm font-semibold">${escHtml(slot.label)}</div>
                  <div class="text-[10px] text-white/50">${slot.messages.length} messages${slot.voiceEnabled?' · voice on':''}${slot.techAssist?' · tech assist on':''}</div>
                </div>
              </div>
              <div class="flex items-center gap-2">
                ${(VOICE.conversationMode && VOICE.activeSlot === idx) || slot.isSpeaking || slot.loading ? `
                  <button style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.5);color:#fca5a5;font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;font-weight:600" data-action="exit-conversation" data-idx="${idx}">
                    <i data-lucide="square" class="w-3 h-3 inline mr-1"></i>Stop
                  </button>
                ` : ''}
                <button style="background:transparent;border:1px solid rgba(255,255,255,0.25);color:var(--cyan);font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;font-weight:600" data-action="save-to-sheet" data-idx="${idx}" ${slot.messages.length === 0 ? 'disabled' : ''}>
                  <i data-lucide="download" class="w-3 h-3 inline mr-1"></i>Save
                </button>
                <button style="background:transparent;border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.7);font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;font-weight:600" data-action="clear-chat" data-idx="${idx}">
                  <i data-lucide="trash-2" class="w-3 h-3 inline mr-1"></i>Clear
                </button>
                <button style="background:transparent;border:1px solid rgba(255,255,255,0.25);color:#fff;font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;font-weight:600" data-action="close-expanded">
                  <i data-lucide="x" class="w-3 h-3 inline mr-1"></i>Close
                </button>
              </div>
            </div>
            <div id="chat-scroll" class="flex-1 overflow-y-auto px-4 py-4 space-y-3" style="background:#fafbfc">
              ${slot.messages.length === 0 ? `
                <div class="flex items-center justify-center" style="min-height:60vh">
                  <div class="text-center">
                    <div class="w-20 h-20 mx-auto mb-4 rounded-full grid place-items-center" style="background:rgba(0,0,204,0.08)">
                      <i data-lucide="message-circle" class="w-10 h-10" style="color:var(--primary)"></i>
                    </div>
                    <div class="text-lg font-semibold text-slate-700">${escHtml(slot.label)}</div>
                    <div class="text-sm text-slate-400 mt-1">Type a message below to start chatting.</div>
                  </div>
                </div>
              ` : slot.messages.map((m, mi) => `
                <div class="flex ${m.role==='user'?'justify-end':'justify-start'}">
                  ${m.role==='assistant'?'<div class="w-7 h-7 rounded-full grid place-items-center text-white text-xs font-bold flex-shrink-0 mr-2 mt-1" style="background:var(--primary)">'+escHtml(slot.label.charAt(0))+'</div>':''}
                  ${m.role==='user' ? renderUserMessage(m) : renderBotMessage(slot, m, mi, idx)}
                </div>
              `).join('')}
              ${interimBubbleHtml(idx, true)}
              ${slot.loading?`<div class="flex justify-start"><div class="w-7 h-7 rounded-full grid place-items-center text-white text-xs font-bold flex-shrink-0 mr-2 mt-1" style="background:var(--primary)">${escHtml(slot.label.charAt(0))}</div><div class="chat-bubble chat-bot"><span class="typing-dot"></span> <span class="typing-dot"></span> <span class="typing-dot"></span></div></div>`:''}
            </div>
            <div class="chat-input-row flex-shrink-0">
              <input type="text" id="expanded-input" placeholder="Type a message..." value="${escAttr(slot.inputText)}" ${slot.loading?'disabled':''} />
              <button class="chat-send" data-action="send-expanded" ${(slot.loading || !(slot.inputText || '').trim()) ? 'disabled' : ''}>
                <i data-lucide="send" class="w-4 h-4"></i>
              </button>
            </div>
           </div>
          </div>`;
      }

      /* ---------- settings ---------- */

      function renderSettings() {
        const es = STATE.editingSlot;
        const slot = STATE.slots[es];
        return `
          <div class="space-y-4">
            <div class="settings-section settings-grid">
              <div class="full flex items-center gap-3">
                <div class="w-9 h-9 rounded-full grid place-items-center text-white font-bold" style="background:var(--primary)">${escHtml(slot.label.charAt(0))}</div>
                <h3 class="text-lg font-semibold" style="color:var(--navy)">${escHtml(slot.label)} — Configuration</h3>
              </div>

              <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Display Name</label>
                <input type="text" id="setting-label" value="${escAttr(slot.label)}" placeholder="Assistant name..." />
              </div>

              <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Wake Word Name</label>
                <input type="text" id="setting-voicename" value="${escAttr(slot.voiceName || slot.label)}" placeholder="e.g. Randy" ${VOICE.srSupported?'':'disabled'} />
                <p class="text-[11px] text-slate-400 mt-1">Say "Hey ${escHtml(slot.voiceName || slot.label)}", "OK ${escHtml(slot.voiceName || slot.label)}", or "Yo ${escHtml(slot.voiceName || slot.label)}".</p>
              </div>

              <div class="full">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">
                  <i data-lucide="table" class="w-3 h-3 inline mr-1"></i>Apps Script Proxy URL
                </label>
                <input type="text" id="setting-gsheet" value="${escAttr(GSHEET_WEBHOOK)}" placeholder="https://script.google.com/macros/s/.../exec" />
                <p class="text-[11px] text-slate-400 mt-1">
                  The Apps Script holds the Anthropic API key, forwards chats to Anthropic, and auto-saves every Q&A to the Randy Tasks tab. Setup steps live in <code>apps-script.gs</code> in the repo.
                </p>
                <div class="mt-2 flex items-center gap-2 text-[11px] font-medium">
                  ${PROXY.ready
                    ? (PROXY.hasKey
                        ? `<span style="color:#0F7A3F"><i data-lucide="check-circle-2" class="w-3 h-3 inline mr-1"></i>Proxy connected · Anthropic key configured</span>`
                        : `<span style="color:#b45309"><i data-lucide="alert-triangle" class="w-3 h-3 inline mr-1"></i>Proxy reachable but no Anthropic key — add it to the Config tab</span>`)
                    : `<span style="color:#dc2626"><i data-lucide="x-circle" class="w-3 h-3 inline mr-1"></i>Proxy not reachable${PROXY.error ? ' (' + escHtml(PROXY.error) + ')' : ''}</span>`}
                </div>
              </div>

              <div class="full">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">
                  <i data-lucide="file-text" class="w-3 h-3 inline mr-1"></i>Randy's Persona (system prompt core)
                </label>
                <textarea id="setting-prompt" rows="8" placeholder="You are Randy, a solution engineer...">${escHtml(slot.prompt)}</textarea>
                <p class="text-[11px] text-slate-400 mt-1">Defines who Randy is. Formatting rules for chat replies and technical-assist answers are appended automatically and are not editable here.</p>
              </div>

              <div class="full">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">
                  <i data-lucide="globe" class="w-3 h-3 inline mr-1"></i>Research Domains (technical assistance)
                </label>
                <textarea id="setting-domains" rows="4" placeholder="docs.recastsoftware.com&#10;docs.liquit.com">${escHtml((slot.allowedDomains || []).join('\n'))}</textarea>
                <p class="text-[11px] text-slate-400 mt-1">One domain per line. Technical-assist answers research only these sites (support docs). Leave empty to allow the whole web.</p>
              </div>

              <div class="full" style="border-top:1px dashed #e2e8f0;padding-top:16px">
                <div class="flex items-center justify-between mb-3">
                  <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">
                    <i data-lucide="mic" class="w-3 h-3 inline mr-1"></i>Voice Assistant
                  </label>
                  ${VOICE.srSupported ? `
                    <div class="voice-switch ${slot.voiceEnabled?'on':''}" data-action="toggle-voice" data-idx="${es}" title="Toggle voice"></div>
                  ` : `<span class="text-[11px] text-red-500">Not supported in this browser (Chrome/Edge only)</span>`}
                </div>

                <div class="mb-3">
                  <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-1">Voice Personality Override</label>
                  <textarea id="setting-voicepersonality" rows="4" placeholder="${escAttr(DEFAULT_VOICE_PERSONALITY)}" ${VOICE.srSupported?'':'disabled'}>${escHtml(slot.voicePersonality || DEFAULT_VOICE_PERSONALITY)}</textarea>
                  <p class="text-[11px] text-slate-400 mt-1">Appended to the system prompt whenever a response is triggered by voice. Kept out of text-only replies.</p>
                </div>

                ${VOICE.ttsSupported ? `
                  <div>
                    <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-1">Available Speech Voices <span class="text-slate-400 normal-case">(picked automatically — prefers deep male)</span></label>
                    <select id="setting-voice-list" disabled style="opacity:0.85;width:100%;padding:10px 14px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px">
                      ${(window.speechSynthesis.getVoices() || []).filter(v => /^en(-|_|$)/i.test(v.lang)).map(v => `<option>${escHtml(v.name)} — ${escHtml(v.lang)}</option>`).join('') || '<option>(voices will load after first click)</option>'}
                    </select>
                    <button class="btn-outline" style="font-size:11px;padding:5px 12px;margin-top:8px" data-action="preview-voice" data-idx="${es}">
                      <i data-lucide="play" class="w-3 h-3 inline mr-1"></i> Preview Voice
                    </button>
                  </div>
                ` : ''}
              </div>

              <div class="full flex flex-wrap gap-2 pt-1">
                <button class="btn-primary" data-action="save-settings">
                  <i data-lucide="save" class="w-4 h-4 inline mr-1"></i> Save Configuration
                </button>
                <button class="btn-outline" data-action="reset-slot" data-idx="${es}">
                  <i data-lucide="rotate-ccw" class="w-4 h-4 inline mr-1"></i> Reset Defaults
                </button>
                <button class="btn-danger" data-action="clear-chat" data-idx="${es}">
                  <i data-lucide="trash-2" class="w-4 h-4 inline mr-1"></i> Clear Chat History
                </button>
              </div>
            </div>
          </div>`;
      }

      /* ================================================================
       * EVENTS
       * ================================================================ */

      let _bound = false;
      function bindEvents() {
        if (_bound) return;
        _bound = true;

        document.addEventListener('click', e => {
          const act = e.target.closest('[data-action]');
          // Close the card overflow menu when clicking outside it.
          if (!act && STATE.cardMenuOpen && !e.target.closest('[data-menu="card"]')) {
            STATE.cardMenuOpen = false;
            render();
            return;
          }
          // Cancel the inline delete-confirm when clicking elsewhere.
          if (STATE.historyConfirmDeleteId) {
            const insidePanel = !!e.target.closest('.history-panel-open');
            const insidePopout = !!HISTORY_VIEW.open && !!e.target.closest('.history-popout');
            const protect = act && /^(confirm-delete-history|cancel-delete-history|confirm-delete-history-yes|confirm-delete-history-popout|copy-answer|load-history|noop)$/.test(act.dataset.action);
            if ((!insidePanel && !insidePopout) || (act && !protect)) {
              STATE.historyConfirmDeleteId = null;
              if (!act) { render(); return; }
            }
          }
          if (!act) return;
          const action = act.dataset.action;
          const idx = act.dataset.idx !== undefined ? parseInt(act.dataset.idx) : null;

          if (STATE.cardMenuOpen && action !== 'toggle-card-menu') STATE.cardMenuOpen = false;

          switch (action) {
            case 'switch-tab': STATE.activeTab = act.dataset.tab; render(); break;
            case 'toggle-history': STATE.historyOpen = !STATE.historyOpen; render(); break;
            case 'refresh-history': fetchHistoryFromSheet(); break;
            case 'toggle-composer': {
              const cur = document.getElementById('home-input-' + (idx !== null ? idx : 0));
              if (cur && STATE.slots[idx !== null ? idx : 0]) STATE.slots[idx !== null ? idx : 0].inputText = cur.value;
              STATE.composerExpanded = !STATE.composerExpanded;
              render();
              setTimeout(() => {
                const inp = document.getElementById('home-input-' + (idx !== null ? idx : 0));
                if (inp) { inp.focus(); const len = inp.value.length; try { inp.setSelectionRange(len, len); } catch {} }
              }, 40);
              break;
            }
            case 'toggle-card-menu': STATE.cardMenuOpen = !STATE.cardMenuOpen; render(); break;
            case 'expand-slot': STATE.expandedSlot = idx; render(); scrollChat(); setTimeout(()=>document.getElementById('expanded-input')?.focus(),100); break;
            case 'close-expanded': STATE.expandedSlot = null; render(); break;
            case 'clear-chat': clearChat(idx !== null ? idx : 0); break;
            case 'save-to-sheet': saveToSheet(idx !== null ? idx : 0); break;
            case 'send-expanded': {
              const inp = document.getElementById('expanded-input');
              if (inp) STATE.slots[STATE.expandedSlot].inputText = inp.value;
              sendMessage(STATE.expandedSlot);
              break;
            }
            case 'send-home': {
              const inp = document.getElementById('home-input-' + idx);
              if (inp) STATE.slots[idx].inputText = inp.value;
              sendMessage(idx);
              break;
            }
            case 'quick-prompt': {
              const slot = STATE.slots[0];
              if (slot.loading) break;
              slot.inputText = act.dataset.q || '';
              sendMessage(0);
              break;
            }
            case 'toggle-voice': {
              if (STATE.activeTab === 'settings') readFields();
              toggleSlotVoice(idx !== null ? idx : 0);
              break;
            }
            case 'arm-listening': armListening(); break;
            case 'toggle-assist': setTechAssist(!STATE.slots[0].techAssist); break;
            case 'set-assist-source': setTechSource(act.dataset.source === 'desktop' ? 'desktop' : 'mic'); break;
            case 'toggle-speak-answers': {
              const s = STATE.slots[0];
              s.speakAnswers = !s.speakAnswers;
              saveSettings();
              showToast(s.speakAnswers ? 'Randy will speak answers aloud' : 'Randy is muted — answers in chat only');
              if (!s.speakAnswers && s.isSpeaking) stopSpeaking();
              render();
              break;
            }
            case 'stop-speaking': stopSpeaking(); break;
            case 'exit-conversation': exitConversationMode(); break;
            case 'cancel-pending': cancelPendingUtterance(); break;
            case 'tts-speak': {
              const si = parseInt(act.dataset.slot, 10);
              const mi = parseInt(act.dataset.msg, 10);
              const sl = STATE.slots[si];
              if (!sl) break;
              if (VOICE.playingMsg && VOICE.playingMsg.slot === si && VOICE.playingMsg.msg === mi) {
                stopSpeaking();
                break;
              }
              if (sl.isSpeaking) stopSpeaking();
              const msg = sl.messages[mi];
              if (!msg || msg.role !== 'assistant') break;
              const speech = msg.kind === 'assist'
                ? (msg.spoken || extractSummary(stripMarkdown(msg.content)))
                : extractSummary(stripMarkdown(msg.content));
              speakText(speech, si, mi);
              break;
            }
            case 'preview-voice': {
              if (STATE.activeTab === 'settings') readFields();
              speakText('Hello! This is how I sound.', idx !== null ? idx : 0);
              break;
            }
            case 'save-settings': {
              readFields();
              const newWebhook = document.getElementById('setting-gsheet')?.value?.trim() || '';
              const webhookChanged = newWebhook !== GSHEET_WEBHOOK;
              GSHEET_WEBHOOK = newWebhook;
              localStorage.setItem('recast_gsheet_url', GSHEET_WEBHOOK);
              saveSettings();
              if (webhookChanged) {
                PROXY.ready = false; PROXY.hasKey = false; PROXY.error = null;
                loadRemoteConfig().then(render);
              }
              showToast('Settings saved');
              render();
              break;
            }
            case 'view-history': {
              HISTORY_VIEW.open = act.dataset.id;
              STATE.historyConfirmDeleteId = null;
              render();
              break;
            }
            case 'close-history':
            case 'close-history-bg': {
              if (act.dataset.action === 'close-history-bg' && !e.target.hasAttribute('data-action')) break;
              HISTORY_VIEW.open = null;
              render();
              break;
            }
            case 'confirm-delete-history': {
              STATE.historyConfirmDeleteId = act.dataset.id;
              render();
              break;
            }
            case 'cancel-delete-history': {
              STATE.historyConfirmDeleteId = null;
              render();
              break;
            }
            case 'confirm-delete-history-yes': {
              deleteHistoryEntry(act.dataset.id);
              STATE.historyConfirmDeleteId = null;
              render();
              break;
            }
            case 'confirm-delete-history-popout': {
              deleteHistoryEntry(act.dataset.id);
              STATE.historyConfirmDeleteId = null;
              HISTORY_VIEW.open = null;
              render();
              showToast('Conversation deleted');
              break;
            }
            case 'copy-answer': {
              const h = getHistory().find(x => x.id === act.dataset.id);
              const pi = parseInt(act.dataset.pair, 10);
              if (!h || !h.pairs[pi]) break;
              const text = h.pairs[pi].answer || '';
              const btn = act;
              const done = () => {
                showToast('Answer copied');
                btn.classList.add('copied');
                setTimeout(() => btn.classList.remove('copied'), 1200);
              };
              const fail = () => showToast('Copy failed');
              if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(done).catch(fail);
              } else {
                try {
                  const ta = document.createElement('textarea');
                  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
                  document.body.appendChild(ta); ta.select();
                  document.execCommand('copy'); document.body.removeChild(ta);
                  done();
                } catch { fail(); }
              }
              break;
            }
            case 'noop': break;
            case 'load-history': {
              const hist = getHistory().find(h => h.id === act.dataset.id);
              if (hist) {
                const slot = STATE.slots[0];
                const transcript = hist.pairs.map(p => 'User: ' + p.question + '\nRandy: ' + stripMarkdown(p.answer)).join('\n\n');
                slot.inputText = 'Here is a previous conversation for context:\n\n' + transcript + '\n\nBased on this conversation, ';
                HISTORY_VIEW.open = null;
                STATE.expandedSlot = 0;
                render();
                scrollChat();
                setTimeout(() => {
                  const inp = document.getElementById('expanded-input');
                  if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
                }, 150);
              }
              break;
            }
            case 'reset-slot': {
              const s = STATE.slots[idx !== null ? idx : 0];
              s.prompt = RANDY_PERSONA;
              s.label = 'Randy';
              s.voiceName = 'Randy';
              s.voicePersonality = DEFAULT_VOICE_PERSONALITY;
              s.voiceEnabled = true;
              s.allowedDomains = DEFAULT_RESEARCH_DOMAINS.slice();
              if (!recognitionWanted()) stopRecognition();
              saveSettings(); render(); break;
            }
          }
        });

        // Keep STATE in sync with the composer and patch the send button's
        // disabled state live (a re-render per keystroke would steal focus).
        document.addEventListener('input', e => {
          const syncSendBtn = (sendBtn, slot) => {
            if (!sendBtn || !slot) return;
            const shouldDisable = !!slot.loading || !(slot.inputText || '').trim();
            if (sendBtn.disabled !== shouldDisable) sendBtn.disabled = shouldDisable;
          };
          if (e.target.id === 'expanded-input' && STATE.expandedSlot !== null) {
            const slot = STATE.slots[STATE.expandedSlot];
            slot.inputText = e.target.value;
            syncSendBtn(document.querySelector('[data-action="send-expanded"]'), slot);
          } else if (typeof e.target.id === 'string' && e.target.id.startsWith('home-input-')) {
            const hi = parseInt(e.target.id.slice('home-input-'.length), 10);
            if (!Number.isNaN(hi) && STATE.slots[hi]) {
              STATE.slots[hi].inputText = e.target.value;
              syncSendBtn(document.querySelector('[data-action="send-home"][data-idx="' + hi + '"]'), STATE.slots[hi]);
            }
          }
        });

        document.addEventListener('keydown', e => {
          if (e.key === 'Enter' && !e.shiftKey && e.target.id === 'expanded-input' && STATE.expandedSlot !== null) {
            e.preventDefault();
            STATE.slots[STATE.expandedSlot].inputText = e.target.value;
            sendMessage(STATE.expandedSlot);
            return;
          }
          if (e.key === 'Enter' && !e.shiftKey && typeof e.target.id === 'string' && e.target.id.startsWith('home-input-')) {
            e.preventDefault();
            const hi = parseInt(e.target.id.slice('home-input-'.length), 10);
            if (!Number.isNaN(hi) && STATE.slots[hi]) {
              STATE.slots[hi].inputText = e.target.value;
              sendMessage(hi);
            }
            return;
          }
          // Space/Enter activate the toggle switches (they're divs with role=switch).
          if ((e.key === 'Enter' || e.key === ' ') && e.target.getAttribute && e.target.getAttribute('role') === 'switch') {
            e.preventDefault();
            e.target.click();
            return;
          }
          if (e.key === 'Escape' && STATE.expandedSlot !== null) {
            STATE.expandedSlot = null; render();
          }
        });
      }

      function readFields() {
        const i = STATE.editingSlot;
        const s = STATE.slots[i];
        const l = document.getElementById('setting-label');
        const p = document.getElementById('setting-prompt');
        const vn = document.getElementById('setting-voicename');
        const vp = document.getElementById('setting-voicepersonality');
        const dm = document.getElementById('setting-domains');
        if (l) s.label = l.value.trim() || s.label;
        if (p) s.prompt = p.value.trim() || s.prompt;
        if (vn) s.voiceName = vn.value.trim() || s.label;
        if (vp) s.voicePersonality = vp.value.trim() || DEFAULT_VOICE_PERSONALITY;
        if (dm) {
          s.allowedDomains = dm.value.split('\n').map(x => x.trim()).filter(Boolean);
        }
      }

      /* ================================================================
       * BOOT
       * ================================================================ */

      document.addEventListener('DOMContentLoaded', () => {
        render();
        loadRemoteConfig().then(render);
        fetchHistoryFromSheet();
        // Re-render once the browser loads its speech voice list (async in Chrome).
        if (VOICE.ttsSupported && typeof speechSynthesis.onvoiceschanged !== 'undefined') {
          window.speechSynthesis.onvoiceschanged = () => {
            if (STATE.activeTab === 'settings') render();
          };
        }
        // Resume mic listening if voice (or mic-source tech assist) was on.
        // Chrome needs a user gesture for the very first permission prompt, so
        // this silently no-ops on cold loads — the first orb tap triggers it.
        if (recognitionWanted() && VOICE.srSupported) {
          try { startRecognition(); } catch {}
        }
      });
    </script>
  </body>
</html>
