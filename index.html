      // Tasks tab. Paste a new /exec URL into Settings if you redeploy.
      let GSHEET_WEBHOOK = 'https://script.google.com/macros/s/AKfycbxVbQD6QplZuNlr51IbbMEG4hPr6nW21K20sATktclGrwZLdgfilgGetRRldFC7e5yt/exec';
      const SESSION_ID = 'S-' + Date.now().toString(36) + Math.random().toString(36).substring(2, 6);

      const SETTINGS_KEY = 'recast_chatbot_settings';
      const HISTORY_KEY  = 'recast_chat_history';

      /* ================================================================
       * STATE
       * ================================================================ */

      function makeSlot() {
        return {
          label: 'Randy',
          prompt: RANDY_PERSONA,        // editable persona core (Settings)
          messages: [],                 // {role, content, kind?, spoken?, sources?}
          inputText: '',
          loading: false,
          voiceEnabled: true,
          voiceName: 'Randy',
          voicePersonality: DEFAULT_VOICE_PERSONALITY,
          isListening: false,
          isSpeaking: false,
          abortController: null,        // abort the in-flight proxy fetch
          ttsQueue: null,               // FIFO of sentence TTS utterances
          // Technical assistance
          techAssist: false,            // the left-panel slider
          speakAnswers: false,          // read assist answers aloud
          allowedDomains: DEFAULT_RESEARCH_DOMAINS.slice()
        };
      }

      const STATE = {
        activeTab: 'home',
        expandedSlot: null,
        editingSlot: 0,
        historyOpen: false,
        historyConfirmDeleteId: null,
        composerExpanded: false,
        cardMenuOpen: false,
        slots: [makeSlot()]
      };

      let HISTORY_VIEW = { open: null };

      const VOICE = {
        srSupported: !!(window.SpeechRecognition || window.webkitSpeechRecognition),
        ttsSupported: !!window.speechSynthesis,
        captureSupported: !!(navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia),
        recognition: null,        // shared SpeechRecognition instance
        wantRunning: false,       // should the recognizer be running?
        audioCtx: null,           // lazy AudioContext for the wake beep
        activeSlot: null,         // slot handling a voice command (post wake-word)
        awaitingCommand: false,   // wake word heard, waiting for the question
        conversationMode: false,  // keep accepting commands without re-arming
        wakeTimeoutId: null,      // 30s drop back to passive listening (first arm only)
        permissionDenied: false,
        toastTimeoutId: null,
        toastMessage: '',
        playingMsg: null,         // {slot, msg} of the message currently being spoken
        interimText: '',          // live partial transcript
        interimSlot: null,
        lastTtsEndAt: 0,          // for the post-playback echo grace window
        ttsPaused: false,         // recognition paused because TTS is playing
        resumeRecognitionId: null,
        recentTtsText: ''         // rolling buffer of spoken text for echo matching
      };

      // Technical-assist runtime state (not persisted except where noted).
      const TECH = {
        source: 'mic',            // 'mic' | 'desktop' (persisted as a preference)
        captureStream: null,      // getDisplayMedia stream while desktop-listening
        captureTrack: null,       // its audio MediaStreamTrack
        buffer: '',               // join buffer for ASR fragments
        bufferTimerId: null,
        deferrals: 0,
        pending: false,           // classifier call in flight
        context: [],              // recent utterances for the classifier
        lastSubmitted: '',
        lastSubmittedAt: 0,
        decisions: [],            // ring buffer {text, accepted, confidence, topic, ts}
        heard: 0,
        answered: 0
      };

      function activeSlotTechAssist() { return STATE.slots[0].techAssist; }
      function desktopListening() {
        return activeSlotTechAssist() && TECH.source === 'desktop' &&
               !!TECH.captureTrack && TECH.captureTrack.readyState === 'live';
      }

      /* ================================================================
       * SETTINGS PERSISTENCE
       * ================================================================ */

      function saveSettings() {
        const data = STATE.slots.map(s => ({
          label: s.label,
          prompt: s.prompt,
          voiceEnabled: s.voiceEnabled,
          voiceName: s.voiceName,
          voicePersonality: s.voicePersonality,
          techAssist: !!s.techAssist,
          speakAnswers: !!s.speakAnswers,
          allowedDomains: s.allowedDomains,
          techSource: TECH.source
        }));
        try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(data)); } catch {}
      }

      // Marker strings unique to previous default prompts. If the stored prompt
      // contains any of these we treat it as an unmodified prior default and
      // refresh to RANDY_PERSONA, so persona updates reach returning users
      // without clobbering anyone who actually customized their prompt.
      const LEGACY_PROMPT_MARKERS = [
        "Recast Software's Application Workspace expert",
        'ABSOLUTE RULE — NO EXCEPTIONS'
      ];

      function loadSettings() {
        try {
          const raw = localStorage.getItem(SETTINGS_KEY);
          if (!raw) return;
          const data = JSON.parse(raw);
          data.forEach((d, i) => {
            const s = STATE.slots[i];
            if (!s) return;
            s.label = (d.label && d.label !== 'Recast SE') ? d.label : s.label;
            const storedPrompt = d.prompt || '';
            const isLegacyDefault = storedPrompt && LEGACY_PROMPT_MARKERS.some(m => storedPrompt.includes(m));
            s.prompt = (isLegacyDefault ? '' : storedPrompt) || s.prompt;
            s.voiceEnabled = !!d.voiceEnabled;
            s.voiceName = d.voiceName || s.label;
            s.voicePersonality = d.voicePersonality || DEFAULT_VOICE_PERSONALITY;
            // techAssist (with migration from the old passiveListen key)
            s.techAssist = !!(d.techAssist !== undefined ? d.techAssist : d.passiveListen);
            s.speakAnswers = !!(d.speakAnswers !== undefined ? d.speakAnswers : d.speakResponses);
            if (Array.isArray(d.allowedDomains)) {
              s.allowedDomains = d.allowedDomains.filter(x => typeof x === 'string' && x.trim()).map(x => x.trim());
            }
            if (d.techSource === 'desktop' || d.techSource === 'mic') TECH.source = d.techSource;
          });
        } catch {}
        // Desktop capture needs a user gesture every session — never resume it
        // silently. Fall back to mic-source assist if it was left on.
        if (TECH.source === 'desktop' && STATE.slots[0].techAssist) {
          TECH.source = 'mic';
        }
        if (!VOICE.captureSupported) TECH.source = 'mic';
        // Only honor a saved proxy URL if it looks like an Apps Script /exec
        // deployment; junk values fall back to the hardcoded default.
        const savedGsheet = localStorage.getItem('recast_gsheet_url');
        if (savedGsheet && /^https:\/\/script\.google\.com\/macros\/s\/[^\/]+\/exec\b/.test(savedGsheet)) {
          GSHEET_WEBHOOK = savedGsheet;
        } else if (savedGsheet) {
          localStorage.removeItem('recast_gsheet_url');
        }
      }

      /* ================================================================
       * HISTORY (Google Sheet is source of truth; localStorage = fallback)
       * ================================================================ */

      const HISTORY_CACHE = { loaded: false, loading: false, error: null, entries: null };

      function readLocalHistory() {
        try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
      }
      function writeLocalHistory(entries) {
        try { localStorage.setItem(HISTORY_KEY, JSON.stringify(entries)); } catch {}
      }
      function getHistory() {
        if (HISTORY_CACHE.loaded && Array.isArray(HISTORY_CACHE.entries)) return HISTORY_CACHE.entries;
        return readLocalHistory();
      }

      // Strip the ===SPOKEN=== voice-summary section that assist answers carry
      // (it's saved to the sheet as part of the raw reply).
      function stripSpokenSection(text) {
        return String(text || '').split(/\n?=+\s*SPOKEN\s*=+\s*\n?/i)[0].trim();
      }

      function normalizeHistoryEntry(e) {
        const pairs = Array.isArray(e.pairs) ? e.pairs : [];
        const ts = e.timestamp || 0;
        return {
          id: (e.session_id || 'unknown') + '-' + (ts || Date.now()),
          session_id: e.session_id || '',
          date: e.date || (ts ? new Date(ts).toLocaleDateString('en-US') : ''),
          timestamp: ts,
          pairs: pairs.map(p => ({ question: String(p.question || ''), answer: stripSpokenSection(p.answer) })),
          preview: (pairs[0] && pairs[0].question ? String(pairs[0].question).substring(0, 120) : '') || (e.preview || '')
        };
      }

      function entryMs(entry) {
        let ts = Number(entry && entry.timestamp) || 0;
        if (!ts && entry && entry.date) {
          const parsed = Date.parse(entry.date);
          if (!isNaN(parsed)) ts = parsed;
        }
        return ts;
      }

      function formatHistoryDate(entry) {
        const ts = entryMs(entry);
        if (!ts) return entry && entry.date ? String(entry.date) : '';
        const d = new Date(ts);
        const now = new Date();
        const sod = x => new Date(x.getFullYear(), x.getMonth(), x.getDate()).getTime();
        const diff = Math.round((sod(now) - sod(d)) / 86400000);
        const time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        if (diff === 0) return 'Today, ' + time;
        if (diff === 1) return 'Yesterday, ' + time;
        if (diff > 1 && diff < 7) return d.toLocaleDateString([], { weekday: 'short' }) + ', ' + time;
        if (d.getFullYear() === now.getFullYear()) return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
        return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
      }

      function historyBucket(entry) {
        const ts = entryMs(entry);
        if (!ts) return 'Earlier';
        const d = new Date(ts);
        const now = new Date();
        const sod = x => new Date(x.getFullYear(), x.getMonth(), x.getDate()).getTime();
        const diff = Math.round((sod(now) - sod(d)) / 86400000);
        if (diff <= 0) return 'Today';
        if (diff === 1) return 'Yesterday';
        if (diff < 7) return 'Earlier this week';
        if (diff < 30) return 'Earlier this month';
        if (d.getFullYear() === now.getFullYear()) return 'Earlier this year';
        return 'Older';
      }

      const HISTORY_BUCKET_ORDER = ['Today', 'Yesterday', 'Earlier this week', 'Earlier this month', 'Earlier this year', 'Older'];

      function groupHistoryByBucket(history) {
        const groups = {};
        for (const h of history) {
          const k = historyBucket(h);
          (groups[k] = groups[k] || []).push(h);
        }
        return HISTORY_BUCKET_ORDER
          .filter(k => groups[k] && groups[k].length)
          .map(k => ({ label: k, items: groups[k] }));
      }

      async function fetchHistoryFromSheet({ silent = false } = {}) {
        if (!GSHEET_WEBHOOK) return;
        HISTORY_CACHE.loading = true;
        HISTORY_CACHE.error = null;
        if (!silent) render();
        try {
          const url = GSHEET_WEBHOOK + (GSHEET_WEBHOOK.includes('?') ? '&' : '?') + 'action=list_history';
          const resp = await fetch(url);
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          const data = await resp.json();
          const list = Array.isArray(data) ? data : (Array.isArray(data.history) ? data.history : []);
          const normalized = list.map(normalizeHistoryEntry).sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
          HISTORY_CACHE.entries = normalized;
          HISTORY_CACHE.loaded = true;
          writeLocalHistory(normalized);
        } catch (err) {
          HISTORY_CACHE.error = err && err.message ? err.message : 'Failed to load history';
          console.warn('fetchHistoryFromSheet failed:', err);
        } finally {
          HISTORY_CACHE.loading = false;
          render();
        }
      }

      async function deleteHistoryEntry(id) {
        const entry = getHistory().find(h => h.id === id) || readLocalHistory().find(h => h.id === id);
        // Optimistic local removal so the UI feels instant.
        const remaining = getHistory().filter(h => h.id !== id);
        if (HISTORY_CACHE.loaded) HISTORY_CACHE.entries = remaining;
        writeLocalHistory(remaining);
        if (GSHEET_WEBHOOK) {
          try {
            await fetch(GSHEET_WEBHOOK, {
              method: 'POST',
              mode: 'no-cors',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'delete_history', id, session_id: entry ? entry.session_id : id.split('-')[0] })
            });
          } catch (err) {
            console.warn('Remote delete failed:', err);
          }
        }
        setTimeout(() => fetchHistoryFromSheet({ silent: true }), 600);
      }

      /* ================================================================
       * PROXY HEALTH
       * ================================================================ */

      const PROXY = { ready: false, hasKey: false, error: null };

      async function loadRemoteConfig() {
        if (!GSHEET_WEBHOOK) return;
        try {
          const resp = await fetch(GSHEET_WEBHOOK + (GSHEET_WEBHOOK.includes('?') ? '&' : '?') + 'action=ping');
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          const info = await resp.json();
          PROXY.ready = !!info.ok;
          PROXY.hasKey = !!info.has_api_key;
          PROXY.error = info.ok ? null : (info.error || 'Proxy returned an error');
        } catch (err) {
          PROXY.ready = false;
          PROXY.error = err && err.message ? err.message : 'Proxy unreachable';
          console.warn('Proxy ping failed:', err);
        }
      }

      loadSettings();

      /* ================================================================
       * TEXT HELPERS + SAFE MARKDOWN RENDERER
       * ================================================================ */

      function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
      function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }
      function truncate(s, n) {
        s = String(s || '');
        return s.length > n ? s.substring(0, n - 1) + '…' : s;
      }

      // Minimal, safe markdown → HTML for assist answers. All input is
      // HTML-escaped first; only a small whitelist of constructs is then
      // re-introduced (bold, inline code, http(s) links, bullet/numbered
      // lists, mini headers). No raw HTML ever passes through.
      function mdInline(escaped) {
        return escaped
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g,
            '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      }

      function mdToHtml(raw) {
        const lines = String(raw || '').split('\n');
        const out = [];
        let list = null; // 'ul' | 'ol' | null
        const closeList = () => { if (list) { out.push('</' + list + '>'); list = null; } };
        for (const lineRaw of lines) {
          const line = lineRaw.trim();
          if (!line) { closeList(); continue; }
          const esc = mdInline(escHtml(line.replace(/^#{1,4}\s+(.*)$/, '$1')));
          const bullet = line.match(/^[-*•]\s+(.*)$/);
          const num = line.match(/^\d+[.)]\s+(.*)$/);
          if (bullet) {
            if (list !== 'ul') { closeList(); out.push('<ul>'); list = 'ul'; }
            out.push('<li>' + mdInline(escHtml(bullet[1])) + '</li>');
          } else if (num) {
            if (list !== 'ol') { closeList(); out.push('<ol>'); list = 'ol'; }
            out.push('<li>' + mdInline(escHtml(num[1])) + '</li>');
          } else if (/^#{1,4}\s+/.test(line)) {
            closeList();
            out.push('<div class="md-h">' + esc + '</div>');
          } else {
            closeList();
            out.push('<p>' + esc + '</p>');
          }
        }
        closeList();
        return out.join('');
      }

      // Split an assist reply into the visible answer and the spoken summary.
      function splitSpoken(reply) {
        const parts = String(reply || '').split(/\n?=+\s*SPOKEN\s*=+\s*\n?/i);
        const main = (parts[0] || '').trim();
        let spoken = (parts[1] || '').trim();
        if (!spoken) spoken = extractSummary(stripMarkdown(main));
        return { main, spoken };
      }

      function stripMarkdown(text) {
        return String(text)
          .replace(/```[\s\S]*?```/g, ' ')
          .replace(/`([^`]+)`/g, '$1')
          .replace(/\*\*([^*]+)\*\*/g, '$1')
          .replace(/__([^_]+)__/g, '$1')
          .replace(/(^|\s)\*([^*\n]+)\*/g, '$1$2')
          .replace(/(^|\s)_([^_\n]+)_/g, '$1$2')
          .replace(/^#{1,6}\s+/gm, '')
          .replace(/^\s*[-*+•]\s+/gm, '')
          .replace(/^\s*\d+[.)]\s+/gm, '')
          .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
          .replace(/!\[([^\]]*)\]\([^)]+\)/g, '$1')
          .replace(/^\s*>\s?/gm, '')
          .replace(/\n{3,}/g, '\n\n')
          .trim();
      }

      // First ~2 sentences (max 300 chars) of a plain-text blob, for TTS.
      function extractSummary(text) {
        const clean = String(text).replace(/<[^>]*>/g, '').replace(/\s+/g, ' ').trim();
        const m = clean.match(/^.*?[.!?](?:\s+.*?[.!?])?/);
        const s = m ? m[0] : clean;
        return s.substring(0, 300);
      }

      function hostnameOf(url) {
        try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return url; }
      }

      /* ================================================================
       * TOAST + BEEP
       * ================================================================ */

      function showToast(msg) {
        VOICE.toastMessage = msg;
        render();
        if (VOICE.toastTimeoutId) clearTimeout(VOICE.toastTimeoutId);
        VOICE.toastTimeoutId = setTimeout(() => {
          VOICE.toastMessage = '';
          render();
        }, 3500);
      }

      function playBeep() {
        if (!VOICE.audioCtx) {
          try { VOICE.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
          catch { return; }
        }
        try {
          const ctx = VOICE.audioCtx;
          if (ctx.state === 'suspended') ctx.resume();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(880, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(1320, ctx.currentTime + 0.12);
          gain.gain.setValueAtTime(0.0001, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.18, ctx.currentTime + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.18);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + 0.2);
        } catch {}
      }

      /* ================================================================
       * TTS — streaming sentence queue + echo protection
       * ================================================================ */

      const TTS_STATE = { speakingSlot: null };

      function pickDeepVoice() {
        if (!VOICE.ttsSupported) return null;
        const voices = window.speechSynthesis.getVoices() || [];
        if (voices.length === 0) return null;
        const enVoices = voices.filter(v => /^en(-|_|$)/i.test(v.lang));
        const pool = enVoices.length ? enVoices : voices;
        return pool.find(v => /male/i.test(v.name))
            || pool.find(v => /\b(david|daniel|alex|tom|mark|eric|fred|george|james|guy)\b/i.test(v.name))
            || pool.find(v => /google us english/i.test(v.name))
            || pool[0];
      }

      // True while Randy is speaking OR within the tail window after speech
      // ends — the speaker keeps producing audio briefly after onend fires.
      const TTS_ECHO_GRACE_MS = 1200;
      function ttsEchoActive() {
        if (STATE.slots.some(s => s.isSpeaking)) return true;
        if (VOICE.ttsPaused) return true;
        return (Date.now() - VOICE.lastTtsEndAt) < TTS_ECHO_GRACE_MS;
      }
      function markTtsEnded() { VOICE.lastTtsEndAt = Date.now(); }

      function normalizeForEcho(text) {
        return String(text || '').toLowerCase()
          .replace(/[^a-z0-9]+/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function appendRecentTts(text) {
        const n = normalizeForEcho(text);
        if (!n) return;
        VOICE.recentTtsText = (VOICE.recentTtsText + ' ' + n).slice(-2000);
      }

      // True if `text` looks like an echo of something Randy just spoke.
      function isLikelyEcho(text) {
        const n = normalizeForEcho(text);
        if (!n || n.length < 4) return false;
        if (!VOICE.recentTtsText) return false;
        if (VOICE.recentTtsText.indexOf(n) !== -1) return true;
        const words = n.split(' ').filter(w => w.length >= 3);
        if (words.length < 2) return false;
        const ttsWords = new Set(VOICE.recentTtsText.split(' '));
        let matches = 0;
        for (const w of words) if (ttsWords.has(w)) matches++;
        return (matches / words.length) >= 0.7;
      }

      // Pause mic recognition while TTS is playing so Randy can't transcribe
      // his own voice. While desktop-listening we deliberately keep the
      // recognizer running (it's hearing the call, not our speaker) and rely
      // on isLikelyEcho() text matching instead.
      function pauseRecognitionForTts() {
        if (desktopListening()) return;
        VOICE.ttsPaused = true;
        if (VOICE.resumeRecognitionId) {
          clearTimeout(VOICE.resumeRecognitionId);
          VOICE.resumeRecognitionId = null;
        }
        clearInterim();
        if (VOICE.recognition) {
          try { VOICE.recognition.abort(); } catch {}
        }
      }

      function scheduleRecognitionResume() {
        if (desktopListening()) return;
        if (VOICE.resumeRecognitionId) clearTimeout(VOICE.resumeRecognitionId);
        VOICE.resumeRecognitionId = setTimeout(() => {
          VOICE.resumeRecognitionId = null;
          VOICE.ttsPaused = false;
          markTtsEnded();
          if (VOICE.wantRunning && recognitionWanted()) {
            startRecognitionNow();
          }
        }, TTS_ECHO_GRACE_MS);
      }

      function initTtsQueue(idx, signal, msgIdx) {
        const slot = STATE.slots[idx];
        teardownTtsQueue(idx);
        slot.ttsQueue = {
          sentences: [],
          processing: false,
          signal,
          msgIdx,
          done: false,
          currentUtter: null
        };
      }

      function teardownTtsQueue(idx) {
        const slot = STATE.slots[idx];
        const q = slot && slot.ttsQueue;
        if (!q) return;
        const wasActive = q.processing || q.sentences.length > 0 || !!q.currentUtter;
        try {
          if (q.currentUtter && VOICE.ttsSupported) {
            window.speechSynthesis.cancel();
          }
        } catch {}
        slot.ttsQueue = null;
        if (TTS_STATE.speakingSlot === idx) TTS_STATE.speakingSlot = null;
        slot.isSpeaking = false;
        VOICE.playingMsg = null;
        if (wasActive) {
          markTtsEnded();
          scheduleRecognitionResume();
        }
      }

      function enqueueTtsSentence(idx, text) {
        const slot = STATE.slots[idx];
        const q = slot && slot.ttsQueue;
        if (!q) return;
        if (q.signal && q.signal.aborted) return;
        q.sentences.push(text);
        processTtsQueue(idx);
      }

      async function processTtsQueue(idx) {
        const slot = STATE.slots[idx];
        const q = slot && slot.ttsQueue;
        if (!q || q.processing) return;
        q.processing = true;
        try {
          while (slot.ttsQueue === q && q.sentences.length > 0 && !(q.signal && q.signal.aborted)) {
            const text = q.sentences.shift();
            await playTtsChunk(idx, q, text);
          }
        } catch (err) {
          if (err && err.name !== 'AbortError') console.warn('TTS queue error:', err);
        } finally {
          q.processing = false;
          if (slot.ttsQueue === q && q.done && q.sentences.length === 0) {
            slot.isSpeaking = false;
            if (TTS_STATE.speakingSlot === idx) TTS_STATE.speakingSlot = null;
            VOICE.playingMsg = null;
            markTtsEnded();
            scheduleRecognitionResume();
            render();
          }
        }
      }

      function playTtsChunk(idx, q, text) {
        const clean = stripMarkdown(text);
        if (!clean) return Promise.resolve();
        if (!VOICE.ttsSupported) return Promise.resolve();
        return new Promise((resolve) => {
          if (q.signal && q.signal.aborted) return resolve();
          const slot = STATE.slots[idx];
          const u = new SpeechSynthesisUtterance(clean);
          const v = pickDeepVoice();
          if (v) u.voice = v;
          u.pitch = 0.85;
          u.rate = 0.95;
          appendRecentTts(clean);
          pauseRecognitionForTts();
          slot.isSpeaking = true;
          TTS_STATE.speakingSlot = idx;
          VOICE.playingMsg = { slot: idx, msg: q.msgIdx };
          q.currentUtter = u;
          render();
          const done = () => {
            if (q.currentUtter === u) q.currentUtter = null;
            resolve();
          };
          u.onend = done;
          u.onerror = done;
          if (q.signal) q.signal.addEventListener('abort', () => {
            try { window.speechSynthesis.cancel(); } catch {}
            done();
          }, { once: true });
          try { window.speechSynthesis.speak(u); } catch { done(); }
        });
      }

      function speakText(text, idx, msgIdx) {
        if (!VOICE.ttsSupported) return;
        const clean = stripMarkdown(text);
        if (!clean) return;
        STATE.slots.forEach((_, i) => teardownTtsQueue(i));
        try { window.speechSynthesis.cancel(); } catch {}
        appendRecentTts(clean);
        const u = new SpeechSynthesisUtterance(clean);
        const v = pickDeepVoice();
        if (v) u.voice = v;
        u.pitch = 0.85;
        u.rate = 0.95;
        u.onstart = () => {
          STATE.slots[idx].isSpeaking = true;
          TTS_STATE.speakingSlot = idx;
          if (typeof msgIdx === 'number') VOICE.playingMsg = { slot: idx, msg: msgIdx };
          pauseRecognitionForTts();
          render();
        };
        u.onend = () => {
          STATE.slots[idx].isSpeaking = false;
          if (TTS_STATE.speakingSlot === idx) TTS_STATE.speakingSlot = null;
          if (!VOICE.conversationMode) {
            VOICE.activeSlot = null;
            VOICE.awaitingCommand = false;
          }
          VOICE.playingMsg = null;
          markTtsEnded();
          scheduleRecognitionResume();
          render();
        };
        u.onerror = u.onend;
        pauseRecognitionForTts();
        try { window.speechSynthesis.speak(u); }
        catch {
          STATE.slots[idx].isSpeaking = false;
          if (TTS_STATE.speakingSlot === idx) TTS_STATE.speakingSlot = null;
          VOICE.playingMsg = null;
          markTtsEnded();
          scheduleRecognitionResume();
          render();
        }
      }

      function stopSpeaking() {
        STATE.slots.forEach((_, i) => teardownTtsQueue(i));
        if (VOICE.ttsSupported) {
          try { window.speechSynthesis.cancel(); } catch {}
        }
        STATE.slots.forEach(s => { s.isSpeaking = false; });
        TTS_STATE.speakingSlot = null;
        VOICE.playingMsg = null;
        markTtsEnded();
        scheduleRecognitionResume();
        render();
      }

      /* ================================================================
       * SPEECH RECOGNITION — one engine, two sources (mic | desktop track)
       * ================================================================ */

      function anyVoiceEnabled() { return STATE.slots.some(s => s.voiceEnabled); }

      // The recognizer should be running when the mic assistant is enabled OR
      // technical assistance is actively listening (either source).
      function recognitionWanted() {
        return anyVoiceEnabled() || activeSlotTechAssist();
      }

      // Pick the input for the next start(): the live desktop-capture track
      // while desktop-listening, otherwise the default microphone.
      function recognitionSourceTrack() {
        if (activeSlotTechAssist() && TECH.source === 'desktop' &&
            TECH.captureTrack && TECH.captureTrack.readyState === 'live') {
          return TECH.captureTrack;
        }
        return null;
      }

      function applyPhraseBiasing(r) {
        // Chrome contextual biasing — boosts domain vocabulary so "Liquit"
        // doesn't transcribe as "liquid". Best-effort: silently skipped on
        // engines that don't support it.
        try {
          if ('phrases' in r && typeof SpeechRecognitionPhrase !== 'undefined') {
            const list = BIAS_PHRASES.slice();
            const wake = (STATE.slots[0].voiceName || 'Randy').trim();
            if (wake) list.push([wake, 3]);
            r.phrases = list.map(([p, b]) => new SpeechRecognitionPhrase(p, b));
          }
        } catch (err) { /* unsupported — fine */ }
      }

      function ensureRecognition() {
        if (!VOICE.srSupported) return null;
        if (VOICE.recognition) return VOICE.recognition;
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        const r = new SR();
        r.continuous = true;
        r.interimResults = true;
        r.lang = 'en-US';
        applyPhraseBiasing(r);
        r.onresult = (e) => {
          let interim = '';
          let finalChunk = '';
          for (let i = e.resultIndex; i < e.results.length; i++) {
            const res = e.results[i];
            const t = res[0] && res[0].transcript ? res[0].transcript : '';
            if (res.isFinal) finalChunk += t + ' ';
            else interim += t;
          }
          if (finalChunk) {
            clearInterim();
            handleVoiceTranscript(finalChunk);
          } else if (interim) {
            updateInterim(interim);
          }
        };
        r.onerror = (e) => {
          if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
            VOICE.permissionDenied = true;
            VOICE.wantRunning = false;
            STATE.slots.forEach(s => { s.voiceEnabled = false; s.isListening = false; });
            if (activeSlotTechAssist() && TECH.source === 'mic') setTechAssist(false);
            saveSettings();
            showToast('Microphone access required for voice assistant');
            render();
            return;
          }
          // Transient errors (no-speech, aborted, network) fall through to
          // onend, which restarts as needed.
        };
        r.onend = () => {
          // Intentionally paused for TTS — scheduleRecognitionResume restarts.
          if (VOICE.ttsPaused) return;
          if (!VOICE.wantRunning || !recognitionWanted()) return;
          // Desktop track died (user hit "Stop sharing") — fall back cleanly.
          if (activeSlotTechAssist() && TECH.source === 'desktop' &&
              (!TECH.captureTrack || TECH.captureTrack.readyState !== 'live')) {
            handleCaptureEnded();
            return;
          }
          // start() can throw InvalidStateError while the previous session is
          // still shutting down — retry with backoff.
          const tryStart = (attempt) => {
            if (!VOICE.wantRunning || !recognitionWanted() || VOICE.ttsPaused) return;
            try { startRecognitionNow(); }
            catch (err) {
              if (attempt < 4) setTimeout(() => tryStart(attempt + 1), 250 * (attempt + 1));
            }
          };
          tryStart(0);
        };
        VOICE.recognition = r;
        return r;
      }

      // Low-level start with the current source. Throws on InvalidStateError
      // (caller handles retry).
      function startRecognitionNow() {
        const r = ensureRecognition();
        if (!r) return;
        const track = recognitionSourceTrack();
        if (track) r.start(track);
        else r.start();
      }

      function startRecognition() {
        const r = ensureRecognition();
        if (!r) return;
        VOICE.wantRunning = true;
        try { startRecognitionNow(); }
        catch (e) { /* already started — ignore */ }
      }

      // Restart the recognizer so a source change (mic ↔ desktop track) takes
      // effect. abort() triggers onend, which restarts with the new source.
      function restartRecognition() {
        VOICE.wantRunning = true;
        const r = ensureRecognition();
        if (!r) return;
        try { r.abort(); } catch {}
        // If onend doesn't fire (recognizer was idle), kick it directly.
        setTimeout(() => {
          if (VOICE.wantRunning && recognitionWanted() && !VOICE.ttsPaused) {
            try { startRecognitionNow(); } catch {}
          }
        }, 150);
      }

      function stopRecognition() {
        VOICE.wantRunning = false;
        if (VOICE.recognition) {
          try { VOICE.recognition.stop(); } catch {}
        }
        if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
        if (VOICE.resumeRecognitionId) { clearTimeout(VOICE.resumeRecognitionId); VOICE.resumeRecognitionId = null; }
        VOICE.ttsPaused = false;
        VOICE.activeSlot = null;
        VOICE.awaitingCommand = false;
        VOICE.conversationMode = false;
        VOICE.interimText = '';
        VOICE.interimSlot = null;
        VOICE.recentTtsText = '';
        STATE.slots.forEach(s => { s.isListening = false; });
      }

      /* ================================================================
       * WAKE WORD + COMMAND ROUTING
       * ================================================================ */

      function escapeRegex(s) { return String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

      function buildWakePattern(name) {
        const n = escapeRegex(String(name).trim());
        return new RegExp('\\b(?:hey|hi|ok|okay|yo)\\s+' + n + '\\b[\\s,.!?:;-]*', 'i');
      }

      const EXIT_CONVERSATION_RE = /^(stop|cancel|never mind|nevermind|that'?s all|exit|goodbye|good ?bye|end (?:conversation|chat)|quiet|shut up)\b/i;

      function exitConversationMode() {
        if (VOICE.interimSlot !== null && STATE.slots[VOICE.interimSlot]) {
          STATE.slots[VOICE.interimSlot].inputText = '';
        }
        STATE.slots.forEach((s, i) => {
          if (s.abortController) { try { s.abortController.abort(); } catch {} s.abortController = null; }
          teardownTtsQueue(i);
          s.loading = false;
          s.isListening = false;
        });
        stopSpeaking();
        clearInterim();
        if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
        VOICE.activeSlot = null;
        VOICE.awaitingCommand = false;
        VOICE.conversationMode = false;
        render();
      }

      function cancelPendingUtterance() {
        const idx = VOICE.interimSlot;
        if (idx !== null && STATE.slots[idx]) {
          STATE.slots[idx].inputText = '';
        }
        clearInterim();
        render();
      }

      // Cancel an in-flight reply + TTS so a fresh utterance can take over.
      function interruptCurrentReply(idx) {
        const slot = STATE.slots[idx];
        if (!slot) return;
        if (slot.abortController) {
          try { slot.abortController.abort(); } catch {}
          slot.abortController = null;
        }
        teardownTtsQueue(idx);
        const last = slot.messages[slot.messages.length - 1];
        if (last && last.role === 'assistant' && !last.content) {
          slot.messages.pop();
        }
        slot.loading = false;
      }

      // Push-to-talk: the orb arms Randy to take the next utterance as a
      // command — same effect as saying the wake word.
      function armListening() {
        const slot = STATE.slots[0];
        if (!VOICE.srSupported) { showToast('Voice needs Chrome or Edge'); return; }
        if (!slot.voiceEnabled) {
          slot.voiceEnabled = true;
          saveSettings();
        }
        startRecognition();
        playBeep();
        if (slot.loading) interruptCurrentReply(0);
        VOICE.activeSlot = 0;
        VOICE.awaitingCommand = true;
        VOICE.conversationMode = true;
        slot.isListening = true;
        render();
      }

      function handleVoiceTranscript(raw) {
        const text = String(raw).trim();
        if (!text) return;

        // Echo guard 1: re-transcription of Randy's own TTS — drop.
        if (isLikelyEcho(text)) return;

        // Desktop-listening: every final utterance belongs to the technical
        // assistant (the mic isn't the source, so wake words don't apply).
        // Runs ahead of the TTS gate — the captured call keeps talking even
        // while Randy speaks, and we must not lose it.
        if (activeSlotTechAssist() && TECH.source === 'desktop') {
          assistIngest(text);
          return;
        }

        // Echo guard 2: while TTS is speaking (or just after), the mic path
        // drops everything — a stray final at the boundary is unreliable.
        if (ttsEchoActive()) return;

        // Continuous conversation: accept each utterance as a command.
        if (VOICE.conversationMode && VOICE.activeSlot !== null) {
          const slot = STATE.slots[VOICE.activeSlot];
          if (!slot || !slot.voiceEnabled) {
            exitConversationMode();
            return;
          }
          const wakeP = buildWakePattern(slot.voiceName || slot.label);
          const cleaned = text.replace(wakeP, '').trim();
          if (EXIT_CONVERSATION_RE.test(cleaned)) {
            exitConversationMode();
            return;
          }
          if (cleaned.length < 2) return;
          if (slot.loading) interruptCurrentReply(VOICE.activeSlot);
          if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
          VOICE.awaitingCommand = false;
          const idx = VOICE.activeSlot;
          STATE.slots[idx].isListening = false;
          STATE.slots[idx].inputText = cleaned;
          sendMessage(idx, { viaVoice: true });
          return;
        }

        // Armed-command path (wake word without a command in the same breath).
        if (VOICE.activeSlot !== null && VOICE.awaitingCommand) {
          const slot = STATE.slots[VOICE.activeSlot];
          if (!slot || !slot.voiceEnabled) {
            if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
            VOICE.activeSlot = null;
            VOICE.awaitingCommand = false;
            return;
          }
          const p = buildWakePattern(slot.voiceName || slot.label);
          const cleaned = text.replace(p, '').trim();
          if (EXIT_CONVERSATION_RE.test(cleaned)) {
            exitConversationMode();
            return;
          }
          if (cleaned.length < 2) return;
          if (slot.loading) interruptCurrentReply(VOICE.activeSlot);
          if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
          VOICE.awaitingCommand = false;
          VOICE.conversationMode = true;
          const idx = VOICE.activeSlot;
          STATE.slots[idx].isListening = false;
          STATE.slots[idx].inputText = cleaned;
          sendMessage(idx, { viaVoice: true });
          return;
        }

        // Scan for a wake word.
        for (let i = 0; i < STATE.slots.length; i++) {
          const slot = STATE.slots[i];
          if (!slot.voiceEnabled) continue;
          const pattern = buildWakePattern(slot.voiceName || slot.label);
          const match = text.match(pattern);
          if (!match) continue;

          if (slot.loading) interruptCurrentReply(i);
          playBeep();

          // Wake word + question in one breath.
          const after = text.slice(match.index + match[0].length).trim();
          if (after.length >= 2) {
            VOICE.activeSlot = i;
            VOICE.awaitingCommand = false;
            VOICE.conversationMode = true;
            slot.isListening = false;
            slot.inputText = after;
            sendMessage(i, { viaVoice: true });
            return;
          }

          // Arm and wait for the question. 30s fallback on the first arm only.
          VOICE.activeSlot = i;
          VOICE.awaitingCommand = true;
          slot.isListening = true;
          if (VOICE.wakeTimeoutId) clearTimeout(VOICE.wakeTimeoutId);
          const armedSlotIdx = i;
          VOICE.wakeTimeoutId = setTimeout(() => {
            VOICE.wakeTimeoutId = null;
            if (VOICE.conversationMode) return;
            if (VOICE.activeSlot !== armedSlotIdx) return;
            VOICE.activeSlot = null;
            VOICE.awaitingCommand = false;
            const s = STATE.slots[armedSlotIdx];
            if (s) s.isListening = false;
            render();
          }, 30000);
          render();
          return;
        }

        // No wake word matched. Mic-source technical assistance gets the
        // unclaimed utterance.
        if (activeSlotTechAssist() && TECH.source === 'mic') {
          assistIngest(text);
        }
      }

      /* ================================================================
       * INTERIM TRANSCRIPT (live preview bubble)
       * ================================================================ */

      function interimTargetSlot() {
        if (VOICE.activeSlot !== null && VOICE.awaitingCommand) return VOICE.activeSlot;
        if (activeSlotTechAssist()) return 0;
        for (let i = 0; i < STATE.slots.length; i++) {
          if (STATE.slots[i].voiceEnabled) return i;
        }
        return null;
      }

      function updateInterim(text) {
        // Suppress while Randy's own voice could be echoing back — except in
        // desktop-listening, where the captured call is independent of our
        // speaker output.
        if (!desktopListening() && ttsEchoActive()) { clearInterim(); return; }
        const trimmed = String(text || '').trim();
        if (trimmed.length < 2) { clearInterim(); return; }
        const target = interimTargetSlot();
        if (target === null) { clearInterim(); return; }

        const prevText = VOICE.interimText;
        const prevSlot = VOICE.interimSlot;
        VOICE.interimText = trimmed;
        VOICE.interimSlot = target;

        // Cheap path: patch the existing node's text in place.
        const existing = document.getElementById('interim-bubble-' + target);
        if (existing && prevSlot === target) {
          const span = existing.querySelector('.interim-text');
          if (span) { span.textContent = trimmed; return; }
        }
        // One render to mount the node — but never while the user is typing,
        // since render() rebuilds the DOM and would steal composer focus.
        if (prevText !== trimmed || prevSlot !== target) {
          if (!isComposerFocused()) render();
        }
      }

      function isComposerFocused() {
        const el = document.activeElement;
        if (!el || !el.id) return false;
        return el.id === 'expanded-input' || el.id.startsWith('home-input-');
      }

      function clearInterim() {
        if (!VOICE.interimText && VOICE.interimSlot === null) return;
        VOICE.interimText = '';
        VOICE.interimSlot = null;
        if (!isComposerFocused()) render();
      }

      function toggleSlotVoice(idx) {
        const slot = STATE.slots[idx];
        if (!VOICE.srSupported) { showToast('Voice not supported in this browser'); return; }
        slot.voiceEnabled = !slot.voiceEnabled;
        saveSettings();
        if (slot.voiceEnabled) {
          startRecognition();
        } else {
          if (VOICE.activeSlot === idx) {
            if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
            VOICE.activeSlot = null;
            VOICE.awaitingCommand = false;
            VOICE.conversationMode = false;
            if (slot.abortController) { try { slot.abortController.abort(); } catch {} slot.abortController = null; }
            slot.ttsQueue = null;
            slot.loading = false;
          }
          slot.isListening = false;
          if (slot.isSpeaking) stopSpeaking();
          if (!recognitionWanted()) stopRecognition();
        }
        render();
      }

      /* ================================================================
       * TECHNICAL ASSISTANCE — capture, classify, answer
       * ================================================================ */

      // Slider handler. Turning on with the desktop source opens the share
      // picker (requires the click gesture); mic source just ensures the
      // recognizer is running.
      async function setTechAssist(on) {
        const slot = STATE.slots[0];
        if (!VOICE.srSupported) { showToast('Voice not supported in this browser — use Chrome or Edge'); return; }
        if (on === slot.techAssist) return;

        if (!on) {
          slot.techAssist = false;
          stopDesktopCapture();
          clearAssistBuffer();
          TECH.pending = false;
          if (!recognitionWanted()) stopRecognition();
          else restartRecognition(); // back onto the mic if voice stays on
          saveSettings();
          showToast('Technical assistance off');
          render();
          return;
        }

        if (TECH.source === 'desktop') {
          const ok = await startDesktopCapture();
          if (!ok) { render(); return; } // toast already shown
        }
        slot.techAssist = true;
        TECH.heard = 0;
        TECH.answered = 0;
        TECH.decisions = [];
        startRecognition();
        if (TECH.source === 'desktop') restartRecognition();
        saveSettings();
        showToast(TECH.source === 'desktop'
          ? 'Listening to computer audio for technical questions'
          : 'Listening for technical questions on the microphone');
        render();
      }

      // Source pills. Switching to desktop while assist is on opens the
      // picker immediately; cancelling keeps the previous source.
      async function setTechSource(source) {
        if (source === TECH.source) return;
        if (source === 'desktop' && !VOICE.captureSupported) {
          showToast('Computer-audio capture needs desktop Chrome or Edge');
          return;
        }
        const slot = STATE.slots[0];
        if (!slot.techAssist) {
          TECH.source = source;
          saveSettings();
          render();
          return;
        }
        if (source === 'desktop') {
          const ok = await startDesktopCapture();
          if (!ok) { render(); return; }
          TECH.source = 'desktop';
        } else {
          TECH.source = 'mic';
          stopDesktopCapture();
        }
        clearAssistBuffer();
        restartRecognition();
        saveSettings();
        showToast(source === 'desktop' ? 'Now listening to computer audio' : 'Now listening on the microphone');
        render();
      }

      // Capture tab/system audio. Chrome rules: tab audio works everywhere;
      // whole-screen audio works on Windows ("Also share system audio");
      // window shares never carry audio.
      async function startDesktopCapture() {
        if (!VOICE.captureSupported) {
          showToast('Computer-audio capture needs desktop Chrome or Edge');
          return false;
        }
        stopDesktopCapture();
        let stream;
        try {
          stream = await navigator.mediaDevices.getDisplayMedia({
            video: true,
            audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
            systemAudio: 'include',
            selfBrowserSurface: 'exclude',
            surfaceSwitching: 'include'
          });
        } catch (err) {
          if (err && (err.name === 'NotAllowedError' || err.name === 'AbortError')) {
            showToast('Share cancelled — pick the meeting tab and tick “Also share tab audio”');
          } else {
            showToast('Could not capture computer audio: ' + (err && err.message ? err.message : err));
          }
          return false;
        }
        const track = stream.getAudioTracks()[0];
        if (!track) {
          stream.getTracks().forEach(t => { try { t.stop(); } catch {} });
          showToast('No audio in that share — choose a tab (or entire screen on Windows) and tick “Also share audio”');
          return false;
        }
        TECH.captureStream = stream;
        TECH.captureTrack = track;
        // "Stop sharing" (Chrome's bar) ends the tracks — fall back gracefully.
        const onEnded = () => handleCaptureEnded();
        track.addEventListener('ended', onEnded);
        const vTrack = stream.getVideoTracks()[0];
        if (vTrack) vTrack.addEventListener('ended', onEnded);
        return true;
      }

      function stopDesktopCapture() {
        if (TECH.captureStream) {
          TECH.captureStream.getTracks().forEach(t => { try { t.stop(); } catch {} });
        }
        TECH.captureStream = null;
        TECH.captureTrack = null;
      }

      function handleCaptureEnded() {
        if (!TECH.captureTrack && !TECH.captureStream) return;
        stopDesktopCapture();
        const slot = STATE.slots[0];
        if (slot.techAssist && TECH.source === 'desktop') {
          slot.techAssist = false;
          clearAssistBuffer();
          saveSettings();
          showToast('Screen share ended — technical assistance turned off');
          if (!recognitionWanted()) stopRecognition();
          else restartRecognition();
          render();
        }
      }

      /* ---------- utterance buffering + classification ---------- */

      function clearAssistBuffer() {
        TECH.buffer = '';
        TECH.deferrals = 0;
        if (TECH.bufferTimerId) { clearTimeout(TECH.bufferTimerId); TECH.bufferTimerId = null; }
      }

      // ASR finalizes mid-sentence constantly. Join fragments and classify
      // only after a quiet gap, so "so how does application workspace" +
      // "handle third party patching" lands as one question.
      function assistIngest(text) {
        const t = String(text || '').trim();
        if (!t) return;
        TECH.buffer = (TECH.buffer + ' ' + t).trim().slice(-ASSIST.MAX_BUFFER_CHARS);
        if (TECH.bufferTimerId) clearTimeout(TECH.bufferTimerId);
        TECH.bufferTimerId = setTimeout(flushAssistBuffer, ASSIST.DEBOUNCE_MS);
      }

      function flushAssistBuffer() {
        TECH.bufferTimerId = null;
        const slot = STATE.slots[0];
        if (!slot.techAssist) { clearAssistBuffer(); return; }
        const candidate = TECH.buffer.trim();

        // Busy with a previous classify/answer — defer briefly so we don't
        // pile up; give up after a few tries to stay current with the call.
        if (TECH.pending || slot.loading) {
          if (TECH.deferrals < ASSIST.MAX_DEFERRALS) {
            TECH.deferrals++;
            TECH.bufferTimerId = setTimeout(flushAssistBuffer, 1500);
          } else {
            clearAssistBuffer();
          }
          return;
        }
        TECH.buffer = '';
        TECH.deferrals = 0;
        if (!candidate) return;

        const words = candidate.split(/\s+/).filter(Boolean);
        if (candidate.length < ASSIST.MIN_CHARS || words.length < ASSIST.MIN_WORDS) {
          recordAssistDecision(candidate, false, 0, 'too short');
          renderAssistStatus();
          return;
        }
        const now = Date.now();
        if (TECH.lastSubmitted && now - TECH.lastSubmittedAt < ASSIST.DEDUPE_MS && fuzzyEqual(candidate, TECH.lastSubmitted)) {
          return;
        }

        pushAssistContext(candidate);
        TECH.pending = true;
        renderAssistStatus();
        classifyUtterance(candidate, TECH.context.slice(0, -1))
          .then(decision => {
            TECH.pending = false;
            const accepted =
              decision.is_question === true &&
              typeof decision.confidence === 'number' &&
              decision.confidence >= ASSIST.CONF_THRESHOLD;
            recordAssistDecision(candidate, accepted, decision.confidence || 0, decision.topic || '');
            if (!accepted) { renderAssistStatus(); return; }
            TECH.lastSubmitted = candidate;
            TECH.lastSubmittedAt = Date.now();
            TECH.answered++;
            runAssistAnswer(0, candidate);
          })
          .catch(err => {
            TECH.pending = false;
            console.warn('classifyUtterance failed:', err);
            recordAssistDecision(candidate, false, 0, 'classifier error');
            renderAssistStatus();
          });
      }

      function pushAssistContext(text) {
        TECH.context.push(text);
        while (TECH.context.length > ASSIST.CONTEXT_LEN) TECH.context.shift();
      }

      function recordAssistDecision(text, accepted, confidence, topic) {
        TECH.heard++;
        TECH.decisions.push({ text, accepted: !!accepted, confidence: Number(confidence) || 0, topic: topic || '', ts: Date.now() });
        while (TECH.decisions.length > ASSIST.DECISIONS_KEEP) TECH.decisions.shift();
      }

      function fuzzyEqual(a, b) {
        const n = s => String(s).toLowerCase().replace(/[^\w]+/g, ' ').trim();
        return n(a) === n(b);
      }

      // Status-only refresh that respects composer focus (a full render would
      // steal the caret mid-typing; in that case skip — the next natural
      // render catches up).
      function renderAssistStatus() {
        if (!isComposerFocused()) render();
      }

      async function classifyUtterance(text, contextArr) {
        if (!GSHEET_WEBHOOK) return { is_question: false, confidence: 0 };
        const ctxLines = (contextArr || []).map((u, i) => (i + 1) + '. ' + u).join('\n');
        const userContent =
          (ctxLines ? 'Recent context (older first):\n' + ctxLines + '\n\n' : '') +
          'Latest utterance:\n' + text;
        const data = await postChat({
          model: MODELS.classifier,
          max_tokens: 200,
          system: CLASSIFIER_SYSTEM,
          messages: [{ role: 'user', content: userContent }],
          output_config: { format: { type: 'json_schema', schema: CLASSIFIER_SCHEMA } },
          save: false // keep classifier churn out of the history sheet
        });
        return parseClassifierReply(String(data.reply || ''));
      }

      // Structured outputs guarantee valid JSON, but parse defensively anyway
      // (older proxy deployments may not forward output_config).
      function parseClassifierReply(reply) {
        const m = reply.match(/\{[\s\S]*\}/);
        if (!m) return { is_question: false, confidence: 0 };
        try {
          const j = JSON.parse(m[0]);
          return {
            is_question: !!j.is_question,
            confidence: typeof j.confidence === 'number' ? j.confidence : 0,
            topic: j.topic || '',
            reason: j.reason || ''
          };
        } catch {
          return { is_question: false, confidence: 0 };
        }
      }

      /* ================================================================
       * API LAYER
       * ================================================================ */

      // One POST to the Apps Script proxy. text/plain avoids the CORS
      // preflight Apps Script can't answer.
      async function postChat(body, signal) {
        if (!GSHEET_WEBHOOK) {
          throw new Error('Apps Script proxy URL not set. Open Settings and paste the /exec URL.');
        }
        const payload = Object.assign({ action: 'chat', session_id: SESSION_ID }, body);
        const resp = await fetch(GSHEET_WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload),
          signal
        });
        if (!resp.ok) throw new Error('Proxy HTTP ' + resp.status);
        const data = await resp.json();
        if (!data || data.ok === false) {
          throw new Error((data && data.error) || 'Proxy returned an error');
        }
        return data;
      }

      // System prompt as a block array so the stable persona prefix is
      // eligible for Anthropic prompt caching.
      function systemBlocks(text) {
        return [{ type: 'text', text, cache_control: { type: 'ephemeral' } }];
      }

      function conversationPayloadMessages(slot, cap) {
        return slot.messages
          .filter(m => (m.role === 'user' || m.role === 'assistant') && m.content)
          .slice(-cap)
          .map(m => ({ role: m.role, content: m.content }));
      }

      /* ---------- conversational sends (typed + wake-word voice) ---------- */

      async function sendMessage(idx, { viaVoice = false } = {}) {
        const slot = STATE.slots[idx];
        // Claim the slot synchronously so near-simultaneous callers (voice
        // finalization + Enter key) can't double-send.
        if (slot.loading) return;
        const text = slot.inputText.trim();
        if (!text) return;
        slot.loading = true;

        slot.messages.push({ role: 'user', content: text });
        slot.inputText = '';

        const controller = new AbortController();
        slot.abortController = controller;

        slot.messages.push({ role: 'assistant', content: '' });
        const assistantMsgIdx = slot.messages.length - 1;

        if (viaVoice) initTtsQueue(idx, controller.signal, assistantMsgIdx);

        render();
        scrollChat();

        try {
          const systemPrompt = viaVoice
            ? slot.prompt + '\n\n' + CHAT_STYLE + '\n\n# Voice Delivery\n' + (slot.voicePersonality || DEFAULT_VOICE_PERSONALITY)
            : slot.prompt + '\n\n' + CHAT_STYLE;

          const needsSearch = !viaVoice || WEB_SEARCH_HINT_RE.test(text);

          // The empty assistant placeholder is already excluded by the
          // content filter inside conversationPayloadMessages.
          const body = {
            model: viaVoice ? MODELS.voice : MODELS.chat,
            max_tokens: viaVoice ? 300 : 1500,
            system: systemBlocks(systemPrompt),
            messages: conversationPayloadMessages(slot, 20)
          };
          if (needsSearch) {
            body.tools = [viaVoice
              ? { type: SEARCH_TOOL_LEGACY, name: 'web_search', max_uses: 2 }
              : { type: SEARCH_TOOL_CURRENT, name: 'web_search', max_uses: 3 }];
          }

          const data = await postChat(body, controller.signal);
          const reply = String(data.reply || '');
          slot.messages[assistantMsgIdx].content = reply || 'No response.';
          if (Array.isArray(data.sources) && data.sources.length) {
            slot.messages[assistantMsgIdx].sources = data.sources.slice(0, 6);
          }

          if (viaVoice && slot.ttsQueue) {
            const sentenceRe = /[^.!?]+[.!?]+(?:\s+|$)|[^.!?]+$/g;
            let m;
            while ((m = sentenceRe.exec(reply)) !== null) {
              const sent = m[0].trim();
              if (sent.length >= 2) enqueueTtsSentence(idx, sent);
            }
            slot.ttsQueue.done = true;
            processTtsQueue(idx);
          }

          setTimeout(() => fetchHistoryFromSheet({ silent: true }), 600);
        } catch (err) {
          if (err && err.name === 'AbortError') {
            const placeholder = slot.messages[assistantMsgIdx];
            if (placeholder && placeholder.role === 'assistant' && !placeholder.content) {
              slot.messages.splice(assistantMsgIdx, 1);
            }
          } else {
            const placeholder = slot.messages[assistantMsgIdx];
            const errMsg = '⚠️ ' + (err.message || 'Connection failed. Check the proxy URL in Settings.');
            if (placeholder && placeholder.role === 'assistant') placeholder.content = errMsg;
            else slot.messages.push({ role: 'assistant', content: errMsg });
            if (viaVoice) teardownTtsQueue(idx);
          }
        }

        if (slot.abortController === controller) {
          slot.loading = false;
          slot.abortController = null;
        }
        render();
        scrollChat();
      }

      /* ---------- technical-assist answers ---------- */

      async function runAssistAnswer(idx, question) {
        const slot = STATE.slots[idx];
        if (slot.loading) return;
        slot.loading = true;

        slot.messages.push({ role: 'user', content: question, kind: 'assist-q' });
        const controller = new AbortController();
        slot.abortController = controller;
        slot.messages.push({ role: 'assistant', content: '', kind: 'assist' });
        const assistantMsgIdx = slot.messages.length - 1;

        render();
        scrollChat();

        try {
          // Context: the last few assist Q&A pairs keep follow-up questions
          // coherent ("and what about Intune?") without dragging latency.
          const prior = [];
          const msgs = slot.messages;
          for (let i = 0; i < msgs.length - 2 && prior.length < ASSIST.HISTORY_PAIRS * 2; i++) {
            const m = msgs[msgs.length - 3 - i];
            if (!m || !m.content) continue;
            if (m.kind === 'assist' || m.kind === 'assist-q') prior.unshift({ role: m.role, content: m.content });
          }
          // The API requires the first message to be a user turn; the cap can
          // slice a pair in half, leaving a leading assistant message.
          while (prior.length && prior[0].role !== 'user') prior.shift();

          const domains = (slot.allowedDomains || []).filter(Boolean);
          const tool = { type: SEARCH_TOOL_CURRENT, name: 'web_search', max_uses: ASSIST.SEARCH_MAX_USES };
          if (domains.length) tool.allowed_domains = domains;

          const data = await postChat({
            model: MODELS.assist,
            max_tokens: 1600,
            system: systemBlocks(slot.prompt + '\n\n' + ASSIST_STYLE),
            messages: prior.concat([{ role: 'user', content: question }]),
            tools: [tool]
          }, controller.signal);

          const { main, spoken } = splitSpoken(String(data.reply || ''));
          const msg = slot.messages[assistantMsgIdx];
          msg.content = main || 'No response.';
          msg.spoken = spoken;
          if (Array.isArray(data.sources) && data.sources.length) {
            msg.sources = data.sources.slice(0, 6);
          }

          if (slot.speakAnswers && spoken) {
            speakText(spoken, idx, assistantMsgIdx);
          }

          setTimeout(() => fetchHistoryFromSheet({ silent: true }), 600);
        } catch (err) {
          if (err && err.name === 'AbortError') {
            const placeholder = slot.messages[assistantMsgIdx];
            if (placeholder && placeholder.role === 'assistant' && !placeholder.content) {
              slot.messages.splice(assistantMsgIdx, 1);
            }
          } else {
            const placeholder = slot.messages[assistantMsgIdx];
            const errMsg = '⚠️ ' + (err.message || 'Connection failed. Check the proxy URL in Settings.');
            if (placeholder && placeholder.role === 'assistant') placeholder.content = errMsg;
          }
        }

        if (slot.abortController === controller) {
          slot.loading = false;
          slot.abortController = null;
        }
        render();
        scrollChat();
      }

      function scrollChat() {
        setTimeout(() => {
          const el = document.getElementById('chat-scroll');
          if (el) el.scrollTop = el.scrollHeight;
          for (let i = 0; i < STATE.slots.length; i++) {
            const h = document.getElementById('home-scroll-' + i);
            if (h) h.scrollTop = h.scrollHeight;
          }
        }, 50);
      }

      function clearChat(idx) {
        if (VOICE.playingMsg && VOICE.playingMsg.slot === idx) stopSpeaking();
        STATE.slots[idx].messages = [];
        STATE.slots[idx].inputText = '';
        STATE.slots[idx].loading = false;
        render();
      }

      // The proxy auto-saves every Q&A; this just confirms and refreshes.
      async function saveToSheet(slotIdx) {
        const slot = STATE.slots[slotIdx];
        if (!slot) return;
        const pairs = slot.messages.filter((m, i) =>
          m.role === 'user' && slot.messages[i + 1]?.role === 'assistant'
        ).length;
        if (pairs === 0) { showToast('No Q&A pairs yet'); return; }
        showToast('Auto-saved ' + pairs + ' Q&A pair' + (pairs !== 1 ? 's' : '') + ' to the sheet');
        fetchHistoryFromSheet({ silent: true });
      }

      /* ================================================================
       * RENDER
       * ================================================================ */

      function render() {
        const root = document.getElementById('app');
        root.innerHTML = `
          <header class="app-bar">
            <div class="app-shell mx-auto px-4 flex items-center justify-between gap-3" style="height:60px">
              <div class="flex items-center gap-3">
                <div class="brand-mark">
                  <span class="re"><span class="b1">Re</span><span class="b2">cast</span><span class="pl">+</span></span>
                </div>
                <span class="brand-tag">Randy · SE Assistant</span>
              </div>
              <div class="flex gap-1 p-1 rounded-lg ring-1 ring-slate-200 bg-white/70">
                <button class="tab-btn ${STATE.activeTab==='home'?'active':''}" data-action="switch-tab" data-tab="home">
                  <i data-lucide="messages-square" class="w-4 h-4"></i> Chat
                </button>
                <button class="tab-btn ${STATE.activeTab==='settings'?'active':''}" data-action="switch-tab" data-tab="settings">
                  <i data-lucide="settings" class="w-4 h-4"></i> Settings
                </button>
              </div>
            </div>
          </header>
          <main class="app-shell mx-auto px-4 pb-6 mt-3">
            ${STATE.activeTab === 'home' ? renderHome() : renderSettings()}
          </main>
          ${renderExpanded()}
          ${renderToast()}
        `;
        if (window.lucide?.createIcons) try { window.lucide.createIcons(); } catch {}
        bindEvents();
      }

      /* ---------- left panel: orb + technical assistance ---------- */

      function renderVoiceStage(slot, idx) {
        const name = escHtml(slot.voiceName || slot.label);
        const voiceOn = !!slot.voiceEnabled;
        const isSpeaking = !!slot.isSpeaking;
        const loading = !!slot.loading;
        const sr = VOICE.srSupported;
        const inConversation = VOICE.conversationMode && VOICE.activeSlot === idx;
        const isListening = voiceOn && !loading && !isSpeaking &&
          (inConversation || (VOICE.activeSlot === idx && VOICE.awaitingCommand));

        let orbClass, orbInner, action, title, statusText, statusClass, live = false;
        if (!sr) {
          orbClass = 'off'; orbInner = '<i data-lucide="mic-off" class="w-9 h-9"></i>';
          action = 'noop'; title = 'Voice needs Chrome or Edge';
          statusText = 'Voice unavailable'; statusClass = 'off';
        } else if (isSpeaking) {
          orbClass = 'speaking';
          orbInner = '<span class="sound-wave"><span class="sound-wave-bar"></span><span class="sound-wave-bar"></span><span class="sound-wave-bar"></span></span>';
          action = 'stop-speaking'; title = 'Stop speaking';
          statusText = 'Speaking…'; statusClass = 'speaking';
        } else if (loading) {
          orbClass = 'thinking';
          orbInner = '<span class="orb-dots"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></span>';
          action = 'exit-conversation'; title = 'Stop';
          statusText = 'Thinking…'; statusClass = '';
        } else if (isListening) {
          orbClass = 'listening'; orbInner = '<i data-lucide="mic" class="w-9 h-9"></i>';
          action = 'exit-conversation'; title = 'Tap to stop listening';
          statusText = 'Listening…'; statusClass = 'listening'; live = true;
        } else if (slot.techAssist && TECH.source === 'desktop') {
          orbClass = 'monitor'; orbInner = '<i data-lucide="ear" class="w-9 h-9"></i>';
          action = 'toggle-assist'; title = 'Monitoring computer audio — tap to stop';
          statusText = 'Monitoring computer audio'; statusClass = 'listening'; live = true;
        } else if (slot.techAssist) {
          orbClass = 'monitor'; orbInner = '<i data-lucide="ear" class="w-9 h-9"></i>';
          action = 'arm-listening'; title = 'Monitoring the mic — tap to ask Randy directly';
          statusText = 'Monitoring microphone'; statusClass = 'listening'; live = true;
        } else if (voiceOn) {
          orbClass = 'ready'; orbInner = '<i data-lucide="mic" class="w-9 h-9"></i>';
          action = 'arm-listening'; title = 'Tap to talk to ' + name;
          statusText = 'Ready — tap or say “Hey ' + name + '”'; statusClass = '';
        } else {
          orbClass = 'off'; orbInner = '<i data-lucide="mic-off" class="w-9 h-9"></i>';
          action = 'arm-listening'; title = 'Tap to talk';
          statusText = 'Voice off'; statusClass = 'off';
        }

        const wake = !sr
          ? '<div class="wh-label">Voice</div><div class="wh-phrase">Use <b>Chrome</b> or <b>Edge</b> to talk</div>'
          : (slot.techAssist && TECH.source === 'desktop')
            ? '<div class="wh-label">Computer audio</div><div class="wh-phrase">Randy hears the shared tab / screen</div>'
            : voiceOn
              ? '<div class="wh-label">Wake word</div><div class="wh-phrase">Say <b>“Hey ' + name + '”</b> or tap the orb</div>'
              : '<div class="wh-label">Voice</div><div class="wh-phrase">Tap the orb to start talking</div>';

        const disabled = action === 'noop' ? 'disabled' : '';
        const muteBtn = sr && voiceOn && !(slot.techAssist && TECH.source === 'desktop')
          ? `<button class="stage-mutebtn" data-action="toggle-voice" data-idx="${idx}"><i data-lucide="mic-off" class="w-3 h-3"></i>Turn microphone off</button>`
          : (sr && !voiceOn && !slot.techAssist
            ? `<button class="stage-mutebtn" data-action="toggle-voice" data-idx="${idx}"><i data-lucide="mic" class="w-3 h-3"></i>Enable wake-word listening</button>`
            : '');

        return `
          <div class="voice-stage">
            <span class="plus" style="top:16px;right:26px;font-size:20px">+</span>
            <span class="plus" style="top:120px;right:38px;font-size:13px">+</span>
            <span class="plus" style="bottom:92px;left:22px;font-size:16px">+</span>
            <div class="stage-eyebrow">Voice Assistant</div>
            <div class="orb-wrap ${live ? 'live' : ''}">
              <span class="orb-ring"></span>
              <span class="orb-ring d"></span>
              <button class="voice-orb ${orbClass}" title="${escAttr(title)}" aria-label="${escAttr(title)}" data-action="${action}" data-idx="${idx}" ${disabled}>
                ${orbInner}
              </button>
            </div>
            <div class="stage-name">${name}</div>
            <div class="stage-role">Recast solution engineer — ask anything, or let him listen for questions on your call</div>
            <div class="stage-status ${statusClass}"><span class="st-dot"></span>${statusText}</div>
            ${muteBtn}
            ${renderAssistCard(slot, idx)}
            <div class="wake-hint">${wake}</div>
          </div>`;
      }

      function renderAssistCard(slot, idx) {
        const on = !!slot.techAssist;
        const sr = VOICE.srSupported;
        const last = TECH.decisions[TECH.decisions.length - 1];
        const desktopOk = VOICE.captureSupported;
        const statusLine = !on ? ''
          : TECH.pending
            ? 'Checking a possible question…'
            : (TECH.source === 'desktop'
                ? (desktopListening() ? 'Listening to shared audio' : 'Waiting for shared audio…')
                : 'Listening on the microphone')
              + ' · ' + TECH.answered + ' answered / ' + TECH.heard + ' heard';
        return `
          <div class="assist-card">
            <div class="ac-head">
              <div class="ac-title">Listen for technical assistance</div>
              <div class="voice-switch ${on ? 'on' : ''} ${sr ? '' : 'disabled'}" role="switch" aria-checked="${on}" tabindex="0"
                   title="${sr ? 'Randy listens for technical questions and answers like a solution engineer' : 'Needs Chrome or Edge'}"
                   data-action="toggle-assist"></div>
            </div>
            <div class="ac-sub">Randy quietly listens, spots technical questions about the product, researches the support docs, and answers in chat${slot.speakAnswers ? ' and out loud' : ''}.</div>
            ${on ? `
              <div class="src-pills" role="tablist" aria-label="Audio source">
                <button class="src-pill ${TECH.source === 'mic' ? 'active' : ''}" data-action="set-assist-source" data-source="mic" title="Listen through the microphone">
                  <i data-lucide="mic" class="w-3.5 h-3.5"></i>Microphone
                </button>
                <button class="src-pill ${TECH.source === 'desktop' ? 'active' : ''}" data-action="set-assist-source" data-source="desktop" ${desktopOk ? '' : 'disabled'}
                        title="${desktopOk ? 'Capture a meeting tab or screen and listen to the computer audio' : 'Needs desktop Chrome or Edge'}">
                  <i data-lucide="monitor-speaker" class="w-3.5 h-3.5"></i>Computer audio
                </button>
              </div>
              <div class="ac-row">
                <span class="ac-label"><i data-lucide="${slot.speakAnswers ? 'volume-2' : 'volume-x'}" class="w-3.5 h-3.5"></i>Speak answers aloud</span>
                <div class="voice-switch ${slot.speakAnswers ? 'on' : ''}" role="switch" aria-checked="${!!slot.speakAnswers}" tabindex="0"
                     title="${slot.speakAnswers ? 'Randy reads each answer summary out loud' : 'Answers appear in chat only'}"
                     data-action="toggle-speak-answers"></div>
              </div>
              <div class="ac-status">
                <span class="acs-dot ${TECH.pending ? 'thinking' : ''}"></span>
                <span>${escHtml(statusLine)}</span>
              </div>
              ${last ? `
                <div class="ac-last">
                  <i data-lucide="${last.accepted ? 'check' : 'minus'}" class="w-3 h-3 ${last.accepted ? 'ok' : 'skip'}" style="margin-top:1px"></i>
                  <span class="txt">${escHtml(truncate(last.text, 110))}${last.topic ? ' · ' + escHtml(last.topic) : ''} (${Math.round((last.confidence || 0) * 100)}%)</span>
                </div>
              ` : on ? '<div class="ac-last"><span class="txt" style="font-style:italic">Waiting for a technical question…</span></div>' : ''}
            ` : ''}
          </div>`;
      }

      /* ---------- home grid ---------- */

      function renderHome() {
        const history = getHistory();
        const open = STATE.historyOpen;
        return `
          <div class="home-grid chat-card-wrap">
            ${renderVoiceStage(STATE.slots[0], 0)}
            ${renderCard(STATE.slots[0], 0)}
            ${open ? `
              <div class="history-panel history-panel-open">
                <div class="flex items-center justify-between" style="margin-bottom:4px">
                  <h3 class="saved-head">Saved Conversations${HISTORY_CACHE.loading ? ' <span style=\"font-weight:400;color:#94a3b8\">· loading…</span>' : ''}</h3>
                  <div class="flex items-center gap-1">
                    <button class="card-icon-btn" title="Refresh" aria-label="Refresh saved conversations" data-action="refresh-history" ${HISTORY_CACHE.loading ? 'disabled' : ''}>
                      <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    </button>
                    <button class="card-icon-btn" title="Collapse" aria-label="Collapse saved conversations" data-action="toggle-history">

                  <div style="text-align:center;padding:24px 12px;color:#ef4444;font-size:12px">

                ` : `
                  <div class="saved-list">

                      <div class="saved-group">
