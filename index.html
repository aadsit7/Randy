      // from intensive throttling, so the interval still fires while hidden.
      function startRecognitionWatchdog() {
        if (VOICE.watchdogId) return;
        VOICE.watchdogId = setInterval(() => {
          if (!VOICE.wantRunning || !recognitionWanted()) return;
          if (VOICE.ttsPaused || VOICE.srRunning) return;
          try { startRecognitionNow(); } catch {}
        }, 5000);
      }

      function stopRecognitionWatchdog() {
        if (VOICE.watchdogId) { clearInterval(VOICE.watchdogId); VOICE.watchdogId = null; }
      }

      // Restart the recognizer so a source change (mic ↔ desktop track) takes
      // effect. abort() triggers onend, which restarts with the new source.
      function restartRecognition() {
        VOICE.wantRunning = true;
        const r = ensureRecognition();
        if (!r) return;
        try { r.abort(); } catch {}
        // If onend doesn't fire (recognizer was idle), kick it directly.
        setTimeout(() => {
          if (VOICE.wantRunning && recognitionWanted() && !VOICE.ttsPaused) {
            try { startRecognitionNow(); } catch {}
          }
        }, 150);
      }

      function stopRecognition() {
        VOICE.wantRunning = false;
        stopRecognitionWatchdog();
        if (VOICE.recognition) {
          try { VOICE.recognition.stop(); } catch {}
        }
        if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
        if (VOICE.resumeRecognitionId) { clearTimeout(VOICE.resumeRecognitionId); VOICE.resumeRecognitionId = null; }
        VOICE.ttsPaused = false;
        VOICE.activeSlot = null;
        VOICE.awaitingCommand = false;
        VOICE.conversationMode = false;
        VOICE.interimText = '';
        VOICE.interimSlot = null;
        VOICE.recentTtsText = '';
        STATE.slots.forEach(s => { s.isListening = false; });
      }

      /* ================================================================
       * WAKE WORD + COMMAND ROUTING
       * ================================================================ */

      function escapeRegex(s) { return String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

      function buildWakePattern(name) {
        const n = escapeRegex(String(name).trim());
        return new RegExp('\\b(?:hey|hi|ok|okay|yo)\\s+' + n + '\\b[\\s,.!?:;-]*', 'i');
      }

      const EXIT_CONVERSATION_RE = /^(stop|cancel|never mind|nevermind|that'?s all|exit|goodbye|good ?bye|end (?:conversation|chat)|quiet|shut up)\b/i;

      function exitConversationMode() {
        clearConvAutoExit();
        if (VOICE.interimSlot !== null && STATE.slots[VOICE.interimSlot]) {
          STATE.slots[VOICE.interimSlot].inputText = '';
        }
        STATE.slots.forEach((s, i) => {
          if (s.abortController) { try { s.abortController.abort(); } catch {} s.abortController = null; }
          teardownTtsQueue(i);
          s.loading = false;
          s.isListening = false;
        });
        stopSpeaking();
        clearInterim();
        if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
        VOICE.activeSlot = null;
        VOICE.awaitingCommand = false;
        VOICE.conversationMode = false;
        render();
      }

      function cancelPendingUtterance() {
        const idx = VOICE.interimSlot;
        if (idx !== null && STATE.slots[idx]) {
          STATE.slots[idx].inputText = '';
        }
        clearInterim();
        render();
      }

      // Cancel an in-flight reply + TTS so a fresh utterance can take over.
      function interruptCurrentReply(idx) {
        const slot = STATE.slots[idx];
        if (!slot) return;
        if (slot.abortController) {
          try { slot.abortController.abort(); } catch {}
          slot.abortController = null;
        }
        teardownTtsQueue(idx);
        const last = slot.messages[slot.messages.length - 1];
        if (last && last.role === 'assistant' && !last.content) {
          slot.messages.pop();
        }
        slot.loading = false;
      }

      // After Randy answers a spoken question, he keeps listening for a
      // follow-up for a short window, then quietly goes back to passive
      // listening — so a live call can't get swallowed as "commands".
      function scheduleConvAutoExit() {
        clearConvAutoExit();
        VOICE.convExitTimerId = setTimeout(() => {
          VOICE.convExitTimerId = null;
          if (!VOICE.conversationMode && !VOICE.awaitingCommand) return;
          VOICE.conversationMode = false;
          VOICE.awaitingCommand = false;
          VOICE.activeSlot = null;
          STATE.slots.forEach(s => { s.isListening = false; });
          render();
        }, ASSIST.CONV_EXIT_MS);
      }
      function clearConvAutoExit() {
        if (VOICE.convExitTimerId) { clearTimeout(VOICE.convExitTimerId); VOICE.convExitTimerId = null; }
      }

      function handleVoiceTranscript(raw) {
        const text = String(raw).trim();
        if (!text) return;

        // Drop re-transcriptions of Randy's own voice.
        if (isLikelyEcho(text)) return;

        const ttsBusy = ttsEchoActive();

        // Active conversation ("Hey Randy" was said): each utterance is a
        // question for Randy. Turn-taking — ignored while Randy is talking.
        if (VOICE.conversationMode && VOICE.activeSlot !== null) {
          if (ttsBusy) return;
          const slot = STATE.slots[VOICE.activeSlot];
          if (!slot || !slot.listenOn) {
            exitConversationMode();
            return;
          }
          const wakeP = buildWakePattern(slot.voiceName || slot.label);
          const cleaned = text.replace(wakeP, '').trim();
          if (EXIT_CONVERSATION_RE.test(cleaned)) {
            exitConversationMode();
            return;
          }
          if (cleaned.length < 2) return;
          clearConvAutoExit();
          if (slot.loading) interruptCurrentReply(VOICE.activeSlot);
          if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
          VOICE.awaitingCommand = false;
          const idx = VOICE.activeSlot;
          STATE.slots[idx].isListening = false;
          STATE.slots[idx].inputText = cleaned;
          sendMessage(idx, { viaVoice: true });
          return;
        }

        // Armed (wake word heard, waiting for the question).
        if (VOICE.activeSlot !== null && VOICE.awaitingCommand) {
          if (ttsBusy) return;
          const slot = STATE.slots[VOICE.activeSlot];
          if (!slot || !slot.listenOn) {
            if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
            VOICE.activeSlot = null;
            VOICE.awaitingCommand = false;
            return;
          }
          const p = buildWakePattern(slot.voiceName || slot.label);
          const cleaned = text.replace(p, '').trim();
          if (EXIT_CONVERSATION_RE.test(cleaned)) {
            exitConversationMode();
            return;
          }
          if (cleaned.length < 2) return;
          clearConvAutoExit();
          if (slot.loading) interruptCurrentReply(VOICE.activeSlot);
          if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
          VOICE.awaitingCommand = false;
          VOICE.conversationMode = true;
          const idx = VOICE.activeSlot;
          STATE.slots[idx].isListening = false;
          STATE.slots[idx].inputText = cleaned;
          sendMessage(idx, { viaVoice: true });
          return;
        }

        // Wake word scan (skipped while Randy is talking).
        if (!ttsBusy) {
          for (let i = 0; i < STATE.slots.length; i++) {
            const slot = STATE.slots[i];
            if (!slot.listenOn) continue;
            const pattern = buildWakePattern(slot.voiceName || slot.label);
            const match = text.match(pattern);
            if (!match) continue;

            if (slot.loading) interruptCurrentReply(i);
            playBeep();

            // Wake word + question in one breath.
            const after = text.slice(match.index + match[0].length).trim();
            if (after.length >= 2) {
              VOICE.activeSlot = i;
              VOICE.awaitingCommand = false;
              VOICE.conversationMode = true;
              slot.isListening = false;
              slot.inputText = after;
              sendMessage(i, { viaVoice: true });
              return;
            }

            // Arm and wait for the question. 30s fallback on the first arm only.
            VOICE.activeSlot = i;
            VOICE.awaitingCommand = true;
            slot.isListening = true;
            if (VOICE.wakeTimeoutId) clearTimeout(VOICE.wakeTimeoutId);
            const armedSlotIdx = i;
            VOICE.wakeTimeoutId = setTimeout(() => {
              VOICE.wakeTimeoutId = null;
              if (VOICE.conversationMode) return;
              if (VOICE.activeSlot !== armedSlotIdx) return;
              VOICE.activeSlot = null;
              VOICE.awaitingCommand = false;
              const s = STATE.slots[armedSlotIdx];
              if (s) s.isListening = false;
              render();
            }, 30000);
            render();
            return;
          }
        }

        // Everything else: passive listening for technical questions — this
        // keeps working even while Randy is talking, because the call on the
        // computer keeps going.
        if (listeningOn()) assistIngest(text);
      }

      /* ================================================================
       * INTERIM TRANSCRIPT (live "Hearing live" panel on the voice stage)
       * ================================================================ */

      function interimTargetSlot() {
        if (VOICE.activeSlot !== null && VOICE.awaitingCommand) return VOICE.activeSlot;
        return listeningOn() ? 0 : null;
      }

      // Patch the stage panel's transcript text in place when it's mounted;
      // fall back to a render only when it isn't (e.g. listening just turned
      // on). Returns true when the cheap path worked.
      function patchLiveTranscript(text) {
        const wrap = document.getElementById('live-transcript');
        const span = document.getElementById('live-transcript-text');
        if (!wrap || !span) return false;
        span.textContent = text;
        wrap.classList.toggle('hearing', !!text);
        return true;
      }

      function updateInterim(text) {
        const trimmed = String(text || '').trim();
        if (trimmed.length < 2) { clearInterim(); return; }
        // Don't flash Randy's own voice back onscreen.
        if (isLikelyEcho(trimmed)) { clearInterim(); return; }
        if ((VOICE.conversationMode || VOICE.awaitingCommand) && ttsEchoActive()) { clearInterim(); return; }
        const target = interimTargetSlot();
        if (target === null) { clearInterim(); return; }

        const prevText = VOICE.interimText;
        const prevSlot = VOICE.interimSlot;
        VOICE.interimText = trimmed;
        VOICE.interimSlot = target;
        VOICE.interimAt = Date.now();

        if (patchLiveTranscript(trimmed)) return;
        // One render to mount the node — but never while the user is typing,
        // since render() rebuilds the DOM and would steal composer focus.
        if (prevText !== trimmed || prevSlot !== target) {
          if (!isComposerFocused()) render();
        }
      }

      function isComposerFocused() {
        const el = document.activeElement;
        if (!el || !el.id) return false;
        return el.id === 'expanded-input' || el.id === 'history-search' || el.id.startsWith('home-input-');
      }

      function clearInterim() {
        if (!VOICE.interimText && VOICE.interimSlot === null) return;
        VOICE.interimText = '';
        VOICE.interimSlot = null;
        if (patchLiveTranscript('')) return;
        if (!isComposerFocused()) render();
      }



      /* ================================================================
       * LISTENING — one switch, microphone only (no pickers, no pop-ups)
       * ================================================================ */

      // The big mic button. ON: ask for the microphone once and start
      // listening. The mic hears the user's voice AND the call playing on
      // the speakers — no screen sharing, nothing to choose. OFF: stop.
      async function toggleListening() {
        const slot = STATE.slots[0];
        if (!VOICE.srSupported) { showToast('Randy needs Chrome or Edge to listen'); return; }
        if (slot.listenOn) { stopListening(); return; }
        await startListening();
      }

      async function startListening() {
        const slot = STATE.slots[0];
        if (slot.listenOn) return;
        const r = ensureRecognition();
        if (!r) { showToast('Randy needs Chrome or Edge to listen'); return; }

        // Ask for the mic up front so a denial fails loudly here, with a
        // clear message, instead of dying quietly inside the recognizer.
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
          try {
            const probe = await navigator.mediaDevices.getUserMedia({ audio: true });
            probe.getTracks().forEach(t => { try { t.stop(); } catch {} });
          } catch (err) {
            showToast('Randy needs the microphone. Click Allow and try again.');
            render();
            return;
          }
        }

        slot.listenOn = true;
        TECH.heard = 0;
        TECH.answered = 0;
        TECH.decisions = [];
        startRecognition();
        // Warn right away if the answer service is unreachable, so "hears
        // but never answers" can't happen silently.
        loadRemoteConfig().then(() => {
          if (!PROXY.ready) showToast('⚠ Randy cannot reach his answer service — open Settings');
          else if (!PROXY.hasKey) showToast('⚠ The answer service has no API key — open Settings');
        });
        showToast('Randy is listening');
        render();
      }

      function stopListening({ silent = false } = {}) {
        const slot = STATE.slots[0];
        const wasOn = slot.listenOn;
        slot.listenOn = false;
        clearAssistBuffer();
        clearConvAutoExit();
        TECH.pending = false;
        exitConversationMode();   // aborts in-flight replies and any TTS
        stopRecognition();
        if (!silent && wasOn) showToast('Randy stopped listening');
        render();
      }

      /* ---------- utterance buffering + classification ---------- */

      function clearAssistBuffer() {
        TECH.buffer = '';
        TECH.deferrals = 0;
        if (TECH.bufferTimerId) { clearTimeout(TECH.bufferTimerId); TECH.bufferTimerId = null; }
      }

      // ASR finalizes mid-sentence constantly. Join fragments and classify
      // only after a quiet gap, so "so how does application workspace" +
      // "handle third party patching" lands as one question.
      function assistIngest(text) {
        const t = String(text || '').trim();
        if (!t) return;
        TECH.buffer = (TECH.buffer + ' ' + t).trim().slice(-ASSIST.MAX_BUFFER_CHARS);
        if (TECH.bufferTimerId) clearTimeout(TECH.bufferTimerId);
        // Complete-looking questions get a shorter quiet-gap before firing.
        const delay = isInstantTechQuestion(TECH.buffer) ? ASSIST.DEBOUNCE_FAST_MS : ASSIST.DEBOUNCE_MS;
        TECH.bufferTimerId = setTimeout(flushAssistBuffer, delay);
      }

      function flushAssistBuffer() {
        TECH.bufferTimerId = null;
        const slot = STATE.slots[0];
        if (!slot.listenOn) { clearAssistBuffer(); return; }
        const candidate = TECH.buffer.trim();

        // The speaker is still mid-sentence (fresh interim words are
        // arriving) — hold the flush so the question isn't cut off halfway.
        // The final transcript re-arms the timer when it lands; bounded so
        // a stale interim can't stall the pipeline.
        if (VOICE.interimText &&
            Date.now() - VOICE.interimAt < ASSIST.INTERIM_FRESH_MS &&
            TECH.deferrals < ASSIST.MAX_DEFERRALS) {
          TECH.deferrals++;
          TECH.bufferTimerId = setTimeout(flushAssistBuffer, ASSIST.INTERIM_RECHECK_MS);
          return;
        }

        // Busy with a previous classify/answer — defer briefly so we don't
        // pile up; give up after a few tries to stay current with the call.
        if (TECH.pending || slot.loading) {
          if (TECH.deferrals < ASSIST.MAX_DEFERRALS) {
            TECH.deferrals++;
            TECH.bufferTimerId = setTimeout(flushAssistBuffer, 1500);
          } else {
            clearAssistBuffer();
          }
          return;
        }
        TECH.buffer = '';
        TECH.deferrals = 0;
        if (!candidate) return;

        const words = candidate.split(/\s+/).filter(Boolean);
        if (candidate.length < ASSIST.MIN_CHARS || words.length < ASSIST.MIN_WORDS) {
          recordAssistDecision(candidate, false, 0, 'too short');
          renderAssistStatus();
          return;
        }
        const now = Date.now();
        if (TECH.lastSubmitted && now - TECH.lastSubmittedAt < ASSIST.DEDUPE_MS && fuzzyEqual(candidate, TECH.lastSubmitted)) {
          return;
        }

        pushAssistContext(candidate);

        // Fast path: an obvious technical question goes straight to the
        // answer — no classifier round-trip (saves a couple of seconds).
        if (isInstantTechQuestion(candidate)) {
          recordAssistDecision(candidate, true, 0.85, 'instant');
          TECH.lastSubmitted = candidate;
          TECH.lastSubmittedAt = Date.now();
          runAssistAnswer(0, candidate);
          return;
        }

        TECH.pending = true;
        renderAssistStatus();
        classifyUtterance(candidate, TECH.context.slice(0, -1))
          .then(decision => {
            TECH.pending = false;
            const accepted =
              decision.is_question === true &&
              typeof decision.confidence === 'number' &&
              decision.confidence >= ASSIST.CONF_THRESHOLD;
            recordAssistDecision(candidate, accepted, decision.confidence || 0, decision.topic || '');
            if (!accepted) { renderAssistStatus(); return; }
            TECH.lastSubmitted = candidate;
            TECH.lastSubmittedAt = Date.now();
            runAssistAnswer(0, candidate);
          })
          .catch(err => {
            TECH.pending = false;
            console.error('classifier failed:', err);
            toastPipelineError("Randy couldn't check a question", err);
            // Keep the SE alive: obvious technical questions are answered
            // even when the classifier service is down.
            if (looksLikeTechQuestion(candidate)) {
              recordAssistDecision(candidate, true, 0.7, 'fallback match');
              TECH.lastSubmitted = candidate;
              TECH.lastSubmittedAt = Date.now();
              runAssistAnswer(0, candidate);
            } else {
              recordAssistDecision(candidate, false, 0, 'check failed');
              renderAssistStatus();
            }
          });
      }

      function pushAssistContext(text) {
        TECH.context.push(text);
        while (TECH.context.length > ASSIST.CONTEXT_LEN) TECH.context.shift();
      }

      function recordAssistDecision(text, accepted, confidence, topic) {
        TECH.heard++;
        TECH.decisions.push({ text, accepted: !!accepted, confidence: Number(confidence) || 0, topic: topic || '', ts: Date.now() });
        while (TECH.decisions.length > ASSIST.DECISIONS_KEEP) TECH.decisions.shift();
      }

      // One pipeline-failure toast per 30s — loud, but not spammy.
      function toastPipelineError(prefix, err) {
        const now = Date.now();
        if (now - TECH.lastErrorToastAt < 30000) return;
        TECH.lastErrorToastAt = now;
        showToast(prefix + ' — ' + (err && err.message ? err.message : err));
      }

      function fuzzyEqual(a, b) {
        const n = s => String(s).toLowerCase().replace(/[^\w]+/g, ' ').trim();
        return n(a) === n(b);
      }

      // Status-only refresh that respects composer focus (a full render would
      // steal the caret mid-typing; in that case skip — the next natural
      // render catches up).
      function renderAssistStatus() {
        if (!isComposerFocused()) render();
      }

      async function classifyUtterance(text, contextArr) {
        if (!GSHEET_WEBHOOK) return { is_question: false, confidence: 0 };
        const ctxLines = (contextArr || []).map((u, i) => (i + 1) + '. ' + u).join('\n');
        const userContent =
          (ctxLines ? 'Recent context (older first):\n' + ctxLines + '\n\n' : '') +
          'Latest utterance:\n' + text;
        const data = await postChat({
          model: MODELS.classifier,
          max_tokens: 200,
          system: CLASSIFIER_SYSTEM,
          messages: [{ role: 'user', content: userContent }],
          output_config: { format: { type: 'json_schema', schema: CLASSIFIER_SCHEMA } },
          save: false // keep classifier churn out of the history sheet
        });
        return parseClassifierReply(String(data.reply || ''));
      }

      // Structured outputs guarantee valid JSON, but parse defensively anyway
      // (older proxy deployments may not forward output_config).
      function parseClassifierReply(reply) {
        const m = reply.match(/\{[\s\S]*\}/);
        if (!m) return { is_question: false, confidence: 0 };
        try {
          const j = JSON.parse(m[0]);
          return {
            is_question: !!j.is_question,
            confidence: typeof j.confidence === 'number' ? j.confidence : 0,
            topic: j.topic || '',
            reason: j.reason || ''
          };
        } catch {
          return { is_question: false, confidence: 0 };
        }
      }

      /* ================================================================
       * API LAYER
       * ================================================================ */

      // One POST to the Apps Script proxy. text/plain avoids the CORS
      // preflight Apps Script can't answer.
      async function postChat(body, signal) {
        if (!GSHEET_WEBHOOK) {
          throw new Error('Answer service is not configured.');
        }
        const payload = Object.assign({ action: 'chat', session_id: SESSION_ID }, body);
        const resp = await fetch(GSHEET_WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload),
          signal
        });
        if (!resp.ok) throw new Error('Proxy HTTP ' + resp.status);
        const data = await resp.json();
        if (!data || data.ok === false) {
          throw new Error((data && data.error) || 'Proxy returned an error');
        }
        return data;
      }

      // Fire-and-forget Q&A save (the proxy's legacy save action). Chat calls
      // send save:false so the proxy skips its synchronous sheet append —
      // that append cost ~0.5-2s of SpreadsheetApp time on every answer's
      // critical path. Saving from here instead happens after the answer is
      // already on screen. This is the silent per-session log: rows go UP to
      // the sheet tagged with session_id, and nothing is ever read back.
      function postSaveToSheet({ question, answer, sources, model, sessionId }) {
        if (!GSHEET_WEBHOOK || !question || !answer) return Promise.resolve();
        return fetch(GSHEET_WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            question: question,
            answer: answer,
            sources: Array.isArray(sources) ? sources.join(', ') : String(sources || ''),
            model: model || '',
            session_id: sessionId || ''
          })
        }).catch(err => console.warn('Background save failed:', err));
      }

      // System prompt as a block array so the stable persona prefix is
      // eligible for Anthropic prompt caching.
      function systemBlocks(text) {
        return [{ type: 'text', text, cache_control: { type: 'ephemeral' } }];
      }

      function conversationPayloadMessages(slot, cap) {
        return slot.messages
          .filter(m => (m.role === 'user' || m.role === 'assistant') && m.content)
          .slice(-cap)
          .map(m => ({ role: m.role, content: m.content }));
      }

      /* ---------- conversational sends (typed + wake-word voice) ---------- */

      async function sendMessage(idx, { viaVoice = false } = {}) {
        const slot = STATE.slots[idx];
        // Claim the slot synchronously so near-simultaneous callers (voice
        // finalization + Enter key) can't double-send.
        if (slot.loading) return;
        const text = slot.inputText.trim();
        if (!text) return;
        slot.loading = true;

        slot.messages.push({ role: 'user', content: text });
        slot.inputText = '';

        const controller = new AbortController();
        slot.abortController = controller;

        slot.messages.push({ role: 'assistant', content: '' });
        const assistantMsgIdx = slot.messages.length - 1;

        if (viaVoice) initTtsQueue(idx, controller.signal, assistantMsgIdx);

        render();
        scrollChat();

        try {
          const systemPrompt = viaVoice
            ? slot.prompt + '\n\n' + CHAT_STYLE + '\n\n# Voice Delivery\n' + (slot.voicePersonality || DEFAULT_VOICE_PERSONALITY)
            : slot.prompt + '\n\n' + CHAT_STYLE;

          const needsSearch = !viaVoice || WEB_SEARCH_HINT_RE.test(text);

          // The empty assistant placeholder is already excluded by the
          // content filter inside conversationPayloadMessages.
          const sessionIdAtSend = SESSION_ID;
          const body = {
            model: viaVoice ? MODELS.voice : MODELS.chat,
            max_tokens: viaVoice ? 300 : 1500,
            system: systemBlocks(systemPrompt),
            messages: conversationPayloadMessages(slot, 20),
            // Skip the proxy's synchronous sheet append; saved from the
            // client below, off the answer's critical path.
            save: false
          };
          if (needsSearch) {
            body.tools = [{ type: SEARCH_TOOL, name: 'web_search', max_uses: viaVoice ? 2 : 3 }];
          }

          const data = await postChat(body, controller.signal);
          const reply = String(data.reply || '');
          slot.messages[assistantMsgIdx].content = reply || 'No response.';
          if (Array.isArray(data.sources) && data.sources.length) {
            slot.messages[assistantMsgIdx].sources = data.sources.slice(0, 6);
          }

          if (viaVoice && slot.ttsQueue) {
            const sentenceRe = /[^.!?]+[.!?]+(?:\s+|$)|[^.!?]+$/g;
            let m;
            while ((m = sentenceRe.exec(reply)) !== null) {
              const sent = m[0].trim();
              if (sent.length >= 2) enqueueTtsSentence(idx, sent);
            }
            slot.ttsQueue.done = true;
            processTtsQueue(idx);
          }

          // Background save (the proxy only saved non-empty replies; mirror that).
          postSaveToSheet({
            question: text,
            answer: reply,
            sources: data.sources,
            model: body.model,
            sessionId: sessionIdAtSend
          });
        } catch (err) {
          if (err && err.name === 'AbortError') {
            const placeholder = slot.messages[assistantMsgIdx];
            if (placeholder && placeholder.role === 'assistant' && !placeholder.content) {
              slot.messages.splice(assistantMsgIdx, 1);
            }
          } else {
            const placeholder = slot.messages[assistantMsgIdx];
            const errMsg = '⚠️ ' + (err.message || 'Connection failed. Check your internet connection and try again.');
            if (placeholder && placeholder.role === 'assistant') placeholder.content = errMsg;
            else slot.messages.push({ role: 'assistant', content: errMsg });
            if (viaVoice) teardownTtsQueue(idx);
          }
        }

        if (slot.abortController === controller) {
          slot.loading = false;
          slot.abortController = null;
        }
        // Keep the follow-up window open for a bit, then drop back to
        // passive listening automatically.
        if (viaVoice && (VOICE.conversationMode || VOICE.awaitingCommand)) scheduleConvAutoExit();
        render();
        scrollChat();
      }

      /* ---------- technical-assist answers ---------- */

      async function runAssistAnswer(idx, question) {
        const slot = STATE.slots[idx];
        if (slot.loading) return;
        slot.loading = true;

        // Every auto-answered question starts a visually fresh chat: the
        // previous Q&A slides into Saved Conversations so the panel always
        // shows just the question being answered now. Follow-up context is
        // preserved separately in TECH.recentPairs.
        if (collectPairs(slot).length) {
          if (slot.isSpeaking) stopSpeaking();
          archiveChatToHistory(slot);
        }

        slot.messages.push({ role: 'user', content: question, kind: 'assist-q' });
        const controller = new AbortController();
        slot.abortController = controller;
        slot.messages.push({ role: 'assistant', content: '', kind: 'assist' });
        const assistantMsgIdx = slot.messages.length - 1;

        render();
        scrollChat();

        try {
          // Context: the last few assist Q&A pairs keep follow-up questions
          // coherent ("and what about Intune?") without dragging latency.
          // Pulled from TECH.recentPairs, not the chat — the chat is archived
          // to History before each new question.
          const prior = [];
          for (const p of TECH.recentPairs.slice(-ASSIST.HISTORY_PAIRS)) {
            prior.push({ role: 'user', content: p.question });
            prior.push({ role: 'assistant', content: p.answer });
          }

          const domains = (slot.allowedDomains || []).filter(Boolean);
          const tool = { type: SEARCH_TOOL, name: 'web_search', max_uses: ASSIST.SEARCH_MAX_USES };
          if (domains.length) tool.allowed_domains = domains;

          const sessionIdAtSend = SESSION_ID;
          const baseBody = {
            model: MODELS.assist,
            max_tokens: 1100,
            // Medium effort trades a sliver of depth for noticeably faster
            // answers — right for a live call. (Older proxy deployments drop
            // this field harmlessly.)
            output_config: { effort: 'medium' },
            system: systemBlocks(slot.prompt + '\n\n' + ASSIST_STYLE),
            messages: prior.concat([{ role: 'user', content: question }]),
            // The proxy's synchronous sheet append would sit on the answer's
            // critical path — skip it and save from the client afterwards.
            save: false
          };
          let data;
          try {
            data = await postChat(Object.assign({ tools: [tool] }, baseBody), controller.signal);
          } catch (err) {
            if (err && err.name === 'AbortError') throw err;
            // Web search failed (tool rejected, timeout, transient error) —
            // answer from knowledge rather than staying silent.
            console.error('search-enabled answer failed, retrying without tools:', err);
            data = await postChat(baseBody, controller.signal);
          }

          const { main, spoken } = splitSpoken(String(data.reply || ''));
          const msg = slot.messages[assistantMsgIdx];
          msg.content = sanitizeAssistAnswer(main) || 'No response.';
          msg.spoken = spoken;
          if (Array.isArray(data.sources) && data.sources.length) {
            msg.sources = data.sources.slice(0, 6);
          }

          if (slot.speakAnswers && spoken) {
            speakText(spoken, idx, assistantMsgIdx);
          }
          TECH.answered++;
          TECH.recentPairs.push({ question, answer: msg.content });
          while (TECH.recentPairs.length > ASSIST.HISTORY_PAIRS) TECH.recentPairs.shift();

          // Save the raw reply (same text the proxy used to append) in the
          // background.
          postSaveToSheet({
            question,
            answer: String(data.reply || ''),
            sources: data.sources,
            model: MODELS.assist,
            sessionId: sessionIdAtSend
          });
        } catch (err) {
          if (err && err.name === 'AbortError') {
            const placeholder = slot.messages[assistantMsgIdx];
            if (placeholder && placeholder.role === 'assistant' && !placeholder.content) {
              slot.messages.splice(assistantMsgIdx, 1);
            }
          } else {
            console.error('assist answer failed:', err);
            toastPipelineError("Randy couldn't answer", err);
            const placeholder = slot.messages[assistantMsgIdx];
            const errMsg = '⚠️ ' + (err.message || 'Connection failed. Check your internet connection and try again.');
            if (placeholder && placeholder.role === 'assistant') placeholder.content = errMsg;
          }
        }

        if (slot.abortController === controller) {
          slot.loading = false;
          slot.abortController = null;
        }
        render();
        scrollChat();
      }

      function scrollChat() {
        setTimeout(() => {
          const el = document.getElementById('chat-scroll');
          if (el) el.scrollTop = el.scrollHeight;
          for (let i = 0; i < STATE.slots.length; i++) {
            const h = document.getElementById('home-scroll-' + i);
            if (h) h.scrollTop = h.scrollHeight;
          }
        }, 50);
      }

      function clearChat(idx) {
        if (VOICE.playingMsg && VOICE.playingMsg.slot === idx) stopSpeaking();
        STATE.slots[idx].messages = [];
        STATE.slots[idx].inputText = '';
        STATE.slots[idx].loading = false;
        render();
      }

      /* ================================================================
       * RENDER
       * ================================================================ */

      // render() rebuilds the whole DOM, which would reset every scroll
      // container to the top. Capture positions first and restore after:
      // if the user was at (or near) the bottom, stick to the bottom so the
      // newest answer stays in view; otherwise put them back where they were.
      const SCROLL_IDS = ['home-scroll-0', 'chat-scroll'];

      function captureScroll() {
        const state = {};
        for (const id of SCROLL_IDS) {
          const el = document.getElementById(id);
          if (!el) continue;
          state[id] = {
            top: el.scrollTop,
            atBottom: el.scrollTop + el.clientHeight >= el.scrollHeight - 48
          };
        }
        return state;
      }

      function restoreScroll(state) {
        for (const id in state) {
          const el = document.getElementById(id);
          if (!el) continue;
          el.scrollTop = state[id].atBottom
            ? el.scrollHeight
            : Math.min(state[id].top, el.scrollHeight);
        }
      }

      function render() {
        const root = document.getElementById('app');
        const scroll = captureScroll();
        root.innerHTML = `
          <header class="app-bar">
            <div class="app-shell mx-auto px-4 flex items-center justify-between gap-3" style="height:60px">
              <div class="flex items-center gap-3">
                <div class="brand-mark">
                  <span class="re"><span class="b1">Re</span><span class="b2">cast</span><span class="pl">+</span></span>
                </div>
                <span class="brand-tag">Randy · SE Assistant</span>
              </div>
              <div class="flex gap-1 p-1 rounded-lg ring-1 ring-slate-200 bg-white/70">
                <button class="tab-btn ${STATE.activeTab==='home'?'active':''}" data-action="switch-tab" data-tab="home">
                  <i data-lucide="messages-square" class="w-4 h-4"></i> Chat
                </button>
                <button class="tab-btn ${STATE.activeTab==='settings'?'active':''}" data-action="switch-tab" data-tab="settings" title="Settings" aria-label="Settings">
                  <i data-lucide="settings" class="w-4 h-4"></i>
                </button>
              </div>
            </div>
          </header>
          <main class="app-shell mx-auto px-4 pb-6 mt-3">
            ${STATE.activeTab === 'home' ? renderHome() : renderSettings()}
          </main>
          ${renderExpanded()}
          ${renderToast()}
        `;
        if (window.lucide?.createIcons) try { window.lucide.createIcons(); } catch {}
        restoreScroll(scroll);
        bindEvents();
        if (PIP.window) renderPip();
      }

      /* ---------- left panel: orb + technical assistance ---------- */

      function renderVoiceStage(slot, idx) {
        const name = escHtml(slot.voiceName || slot.label);
        const on = !!slot.listenOn;
        const isSpeaking = !!slot.isSpeaking;
        const loading = !!slot.loading;
        const sr = VOICE.srSupported;
        const inConversation = on && VOICE.activeSlot === idx && !loading && !isSpeaking &&
          (VOICE.conversationMode || VOICE.awaitingCommand);

        let orbClass, orbInner, action, title, statusText, statusClass, live = false;
        if (!sr) {
          orbClass = 'off'; orbInner = '<i data-lucide="mic-off" class="w-9 h-9"></i>';
          action = 'noop'; title = 'Randy needs Chrome or Edge';
          statusText = 'Use Chrome or Edge to talk to Randy'; statusClass = 'off';
        } else if (isSpeaking) {
          orbClass = 'speaking';
          orbInner = '<span class="sound-wave"><span class="sound-wave-bar"></span><span class="sound-wave-bar"></span><span class="sound-wave-bar"></span></span>';
          action = 'stop-speaking'; title = 'Tap to stop Randy talking';
          statusText = 'Talking…'; statusClass = 'speaking';
        } else if (loading) {
          orbClass = 'thinking';
          orbInner = '<span class="orb-dots"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></span>';
          action = 'exit-conversation'; title = 'Tap to cancel';
          statusText = 'Thinking…'; statusClass = '';
        } else if (inConversation) {
          orbClass = 'listening'; orbInner = '<i data-lucide="mic" class="w-9 h-9"></i>';
          action = 'exit-conversation'; title = 'Randy is listening to you — tap to stop';
          statusText = 'Listening to you — ask away'; statusClass = 'listening'; live = true;
        } else if (on) {
          orbClass = 'monitor'; orbInner = '<i data-lucide="mic" class="w-9 h-9"></i>';
          action = 'toggle-listen'; title = 'Randy is on — tap to turn him off';
          statusText = 'Listening for questions…';
          statusClass = 'listening'; live = true;
        } else {
          orbClass = 'off'; orbInner = '<i data-lucide="mic-off" class="w-9 h-9"></i>';
          action = 'toggle-listen'; title = 'Tap to turn Randy on';
          statusText = 'Off — tap the mic to start'; statusClass = 'off';
        }

        // While Randy is busy talking or thinking, the orb does something
        // else, so show a small "turn off" link to keep OFF one tap away.
        const offLink = sr && on && (isSpeaking || loading || inConversation)
          ? `<button class="stage-mutebtn" data-action="toggle-listen"><i data-lucide="power" class="w-3 h-3"></i>Turn Randy off</button>`
          : '';

        const disabled = action === 'noop' ? 'disabled' : '';

        return `
          <div class="voice-stage">
            <span class="plus" style="top:16px;right:26px;font-size:20px">+</span>
            <span class="plus" style="top:120px;right:38px;font-size:13px">+</span>
            <span class="plus" style="bottom:92px;left:22px;font-size:16px">+</span>
            <div class="stage-eyebrow">Voice Assistant</div>
            <div class="orb-wrap ${live ? 'live' : ''}">
              <span class="orb-ring"></span>
              <span class="orb-ring d"></span>
              <button class="voice-orb ${orbClass}" title="${escAttr(title)}" aria-label="${escAttr(title)}" data-action="${action}" data-idx="${idx}" ${disabled}>
                ${orbInner}
              </button>
            </div>
            <div class="stage-name">${name}</div>
            <div class="stage-role">Your Recast product expert. He listens, spots tech questions, and answers them in the chat.</div>
            <div class="stage-status ${statusClass}"><span class="st-dot"></span>${statusText}</div>
            ${offLink}
            ${renderListenCard(slot)}
          </div>`;
      }

      function renderListenCard(slot) {
        const on = !!slot.listenOn;
        const last = TECH.decisions[TECH.decisions.length - 1];
        const inConvo = VOICE.awaitingCommand || VOICE.conversationMode;
        const statusLine = !on ? ''
          : TECH.pending
            ? 'Checking a question…'
            : 'Listening · ' + TECH.answered + ' answered / ' + TECH.heard + ' heard';
        return `
          <div class="assist-card">
            <div class="ac-row" style="margin-top:0">
              <span class="ac-label"><i data-lucide="${slot.speakAnswers ? 'volume-2' : 'volume-x'}" class="w-3.5 h-3.5"></i>Read answers out loud</span>
              <div class="voice-switch ${slot.speakAnswers ? 'on' : ''}" role="switch" aria-checked="${!!slot.speakAnswers}" tabindex="0"
                   title="${slot.speakAnswers ? 'Randy reads each answer out loud' : 'Answers show in the chat only'}"
                   data-action="toggle-speak-answers"></div>
            </div>
            ${on ? `
              <div class="ac-status">
                <span class="acs-dot ${TECH.pending ? 'thinking' : ''}"></span>
                <span>${escHtml(statusLine)}</span>
              </div>
              <div class="ac-live ${VOICE.interimText ? 'hearing' : ''}" id="live-transcript">
                <div class="ac-live-label"><i data-lucide="audio-lines" class="w-3 h-3"></i>Hearing live</div>
                <div class="ac-live-text"><span id="live-transcript-text">${escHtml(VOICE.interimText || '')}</span><span class="interim-caret">▊</span></div>
                ${inConvo ? `<button class="ac-cancel" title="Cancel — don't send this" data-action="cancel-pending" data-idx="0">Cancel</button>` : ''}
              </div>
              ${last ? `
                <div class="ac-last">
                  <i data-lucide="${last.accepted ? 'check' : 'minus'}" class="w-3 h-3 ${last.accepted ? 'ok' : 'skip'}" style="margin-top:1px"></i>
                  <span class="txt">${escHtml(truncate(last.text, 110))} (${Math.round((last.confidence || 0) * 100)}%)</span>
                </div>
              ` : '<div class="ac-last"><span class="txt" style="font-style:italic">Waiting for a question…</span></div>'}
            ` : ''}
          </div>`;
      }

      /* ---------- home grid ---------- */

      function renderHome() {
        const history = STATE.sessionHistory;
        const filtered = filterHistory(history, STATE.historyQuery);
        const open = STATE.historyOpen;
        return `
          <div class="home-grid chat-card-wrap">
            ${renderVoiceStage(STATE.slots[0], 0)}
            ${renderCard(STATE.slots[0], 0)}
            ${open ? `
              <div class="history-panel history-panel-open">
                <div class="flex items-center justify-between" style="margin-bottom:4px">
                  <h3 class="saved-head">Saved Conversations</h3>
                  <div class="flex items-center gap-1">
                    <button class="card-icon-btn" title="Collapse" aria-label="Collapse saved conversations" data-action="toggle-history">
                      <i data-lucide="chevron-right" class="w-4 h-4"></i>
                    </button>
                  </div>
                </div>
                ${history.length > 0 ? `
                  <div class="saved-search">
                    <i data-lucide="search" class="saved-search-icon w-3.5 h-3.5"></i>
                    <input type="text" id="history-search" placeholder="Search conversations…" value="${escAttr(STATE.historyQuery)}" autocomplete="off" aria-label="Search saved conversations" />
                    ${STATE.historyQuery ? `
                      <button class="saved-search-clear" data-action="clear-history-search" title="Clear search" aria-label="Clear search">
                        <i data-lucide="x" class="w-3 h-3"></i>
                      </button>
                    ` : ''}
                  </div>
                ` : ''}
                ${history.length === 0 ? `
                  <div class="saved-empty">Conversations from this visit appear here.<br>History clears when you close or refresh the page.</div>
                ` : filtered.length === 0 ? `
                  <div class="saved-empty">No conversations match “${escHtml(truncate(STATE.historyQuery.trim(), 40))}”.</div>
                ` : `
                  <div class="saved-list">
                    ${groupHistoryByBucket(filtered).map(g => `
                      <div class="saved-group">
                        <div class="saved-group-head">${escHtml(g.label)}</div>
                        ${g.items.map(h => {
                          const confirming = STATE.historyConfirmDeleteId === h.id;
                          const itemAction = confirming ? 'noop' : 'view-history';
                          const pairCount = h.pairs.length;
                          return `
                          <div class="saved-item${confirming ? ' confirming' : ''}" role="button" tabindex="0" data-action="${itemAction}" data-id="${escAttr(h.id)}" title="Open saved conversation">
                            <div class="saved-icon"><i data-lucide="message-square-text" class="w-4 h-4"></i></div>
                            <div class="saved-body">
                              <div class="saved-title">${escHtml(h.preview || 'Untitled conversation')}</div>
                              <div class="saved-meta">
                                <span>${escHtml(formatHistoryTime(h))}</span>
                                ${pairCount > 1 ? `<span class="sep"></span><span>${pairCount} Q&As</span>` : ''}
                              </div>
                              ${confirming ? `
                                <div class="saved-confirm">
                                  <span class="label">Delete this conversation?</span>
                                  <button class="no" data-action="cancel-delete-history" data-id="${escAttr(h.id)}">Cancel</button>
                                  <button class="ok" data-action="confirm-delete-history-yes" data-id="${escAttr(h.id)}">Delete</button>
                                </div>
                              ` : ''}
                            </div>
                            <div class="saved-actions">
                              <button data-action="load-history" data-id="${escAttr(h.id)}" title="Continue in chat" aria-label="Continue in chat">
                                <i data-lucide="message-circle-plus" class="w-3.5 h-3.5"></i>
                              </button>
                              <button class="danger" data-action="confirm-delete-history" data-id="${escAttr(h.id)}" title="Delete" aria-label="Delete">
                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                              </button>
                            </div>
                          </div>`;
                        }).join('')}
                      </div>
                    `).join('')}
                  </div>
                `}
              </div>
            ` : `
              <div class="history-rail" role="button" tabindex="0" title="Saved conversations (${history.length})" aria-label="Show saved conversations" data-action="toggle-history">
                <i data-lucide="history" class="w-5 h-5"></i>
                ${history.length > 0 ? `<span class="history-rail-badge">${history.length}</span>` : ''}
              </div>
            `}
          </div>
          ${renderHistoryPopout()}`;
      }

      /* ---------- message rendering ---------- */

      function renderBotMessage(slot, m, mi, slotIdx) {
        if (m.kind === 'assist') {
          const srcs = Array.isArray(m.sources) ? m.sources : [];
          return `
            <div class="msg-wrap"><div class="chat-bubble chat-bot chat-md" style="padding-right:38px;white-space:normal">
              <div class="assist-badge"><i data-lucide="ear" class="w-3 h-3"></i>Technical assist</div>
              ${mdToHtml(m.content)}
              ${srcs.length ? `<div class="src-chips">${srcs.map(u => `
                <a href="${escAttr(u)}" target="_blank" rel="noopener noreferrer" title="${escAttr(u)}">
                  <i data-lucide="link" class="w-3 h-3"></i>${escHtml(hostnameOf(u))}
                </a>`).join('')}</div>` : ''}
            </div>${copyBtnHtml(slotIdx, mi)}${speakerBtnHtml(slotIdx, mi)}</div>`;
        }
        return `<div class="msg-wrap"><div class="chat-bubble chat-bot" style="padding-right:38px">${escHtml(m.content).replace(/\n/g, '<br>')}</div>${copyBtnHtml(slotIdx, mi)}${speakerBtnHtml(slotIdx, mi)}</div>`;
      }

      function renderUserMessage(m) {
        const badge = m.kind === 'assist-q'
          ? '<span style="display:inline-flex;align-items:center;gap:4px;font-size:9.5px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;opacity:0.75;margin-bottom:4px"><i data-lucide="ear" class="w-3 h-3"></i>Overheard</span><br>'
          : '';
        return `<div class="chat-bubble chat-user">${badge}${escHtml(m.content)}</div>`;
      }

      function copyBtnHtml(slotIdx, msgIdx) {
        return `<button class="msg-copy" title="Copy answer" aria-label="Copy answer" data-action="copy-msg" data-slot="${slotIdx}" data-msg="${msgIdx}"><i data-lucide="copy" class="w-3 h-3"></i></button>`;
      }

      function speakerBtnHtml(slotIdx, msgIdx) {
        if (!VOICE.ttsSupported) return '';
        const isPlayingThis = !!(VOICE.playingMsg && VOICE.playingMsg.slot === slotIdx && VOICE.playingMsg.msg === msgIdx);
        const icon = isPlayingThis ? 'volume-x' : 'volume-2';
        const title = isPlayingThis ? 'Stop' : 'Speak';
        return `<button class="tts-btn ${isPlayingThis ? 'playing' : ''}" title="${title}" aria-label="${title}" data-action="tts-speak" data-slot="${slotIdx}" data-msg="${msgIdx}"><i data-lucide="${icon}" class="w-3 h-3"></i></button>`;
      }

      function renderCard(slot, idx) {
        const msgs = slot.messages;
        const composerExpanded = STATE.composerExpanded;
        const hasText = (slot.inputText || '').trim().length > 0;
        const on = !!slot.listenOn;
        const isSpeaking = !!slot.isSpeaking;
        const inConversation = VOICE.conversationMode && VOICE.activeSlot === idx;
        const isListening = on && !slot.loading && !isSpeaking &&
          (inConversation || (VOICE.activeSlot === idx && VOICE.awaitingCommand));

        return `
          <div class="chat-panel ${composerExpanded ? 'composer-expanded' : ''}" style="position:relative">
            <div class="conv-header">
              <div class="chat-avatar ${on ? '' : 'muted'}" style="background:var(--primary);width:34px;height:34px;font-size:13px">
                ${escHtml(slot.label.charAt(0))}
                <span class="status-dot"></span>
              </div>
              <div style="flex:1;min-width:0">
                <div class="conv-title">${escHtml(slot.label)}</div>
                <div class="conv-sub">${
                  isSpeaking ? 'Talking…'
                  : isListening ? 'Listening to you…'
                  : slot.loading ? 'Thinking…'
                  : on ? `<i data-lucide="ear" class="w-3 h-3 inline" style="vertical-align:-2px;margin-right:4px"></i>Listening for tech questions`
                  : 'Online · Recast product expert'
                }</div>
              </div>
              <button class="new-chat-btn" title="Start a new chat — this one is saved in History" data-action="new-chat">
                <i data-lucide="plus" class="w-3.5 h-3.5"></i>New chat
              </button>
              ${PIP.supported ? `
                <button class="card-icon-btn" title="${PIP.window ? 'Close the pop-out chat window' : 'Pop out chat — floats on top while you use other apps'}" aria-label="${PIP.window ? 'Close pop-out chat' : 'Pop out chat'}" data-action="pop-out-chat" data-idx="${idx}" ${PIP.window ? 'style="color:var(--primary);background:#dbeafe"' : ''}>
                  <i data-lucide="picture-in-picture-2" class="w-4 h-4"></i>
                </button>
              ` : ''}
              <button class="overflow-btn" title="More actions" aria-label="More actions" aria-haspopup="true" aria-expanded="${STATE.cardMenuOpen ? 'true' : 'false'}" data-action="toggle-card-menu" data-idx="${idx}">
                <i data-lucide="more-vertical" class="w-5 h-5"></i>
              </button>
              ${STATE.cardMenuOpen ? `
                <div class="overflow-menu" data-menu="card">
                  <button data-action="expand-slot" data-idx="${idx}">
                    <i data-lucide="maximize-2" class="w-4 h-4"></i> Open fullscreen
                  </button>
                  <hr>
                  <button class="danger" data-action="clear-chat" data-idx="${idx}" ${slot.messages.length === 0 ? 'disabled' : ''}>
                    <i data-lucide="trash-2" class="w-4 h-4"></i> Clear chat
                  </button>
                </div>
              ` : ''}
            </div>
            <div id="home-scroll-${idx}" class="flex-1 overflow-y-auto px-4 py-4 flex flex-col gap-3" style="background:var(--row);min-height:0">
              ${msgs.length === 0 ? `
                <div class="flex-1 flex items-center justify-center">
                  <div class="text-center" style="max-width:340px">
                    <div style="width:46px;height:46px;border-radius:12px;background:var(--quote);display:grid;place-items:center;margin:0 auto 14px"><i data-lucide="message-square-text" class="w-5 h-5" style="color:var(--primary)"></i></div>
                    <div style="font-size:13.5px;color:var(--gray);line-height:1.6">Tap the <b style="color:var(--navy)">mic button</b> and Randy listens for tech questions and answers them here.</div>
                  </div>
                </div>
              ` : msgs.map((m, mi) => `
                <div class="flex ${m.role==='user'?'justify-end':'justify-start'}">
                  ${m.role==='user' ? renderUserMessage(m) : renderBotMessage(slot, m, mi, idx)}
                </div>
              `).join('')}
              ${slot.loading?'<div class="flex justify-start"><div class="chat-bot" style="padding:10px 14px;border-radius:14px"><span class="typing-dot"></span> <span class="typing-dot"></span> <span class="typing-dot"></span></div></div>':''}
            </div>
            <div class="action-bar">
              <button class="action-btn edit ${composerExpanded ? 'active' : ''}" title="${composerExpanded ? 'Collapse text editor' : 'Expand text editor'}" aria-label="${composerExpanded ? 'Collapse composer' : 'Expand composer'}" data-action="toggle-composer">
                <i data-lucide="${composerExpanded ? 'chevron-down' : 'edit-3'}" class="w-5 h-5"></i>
              </button>
              <div class="composer-field">
                ${composerExpanded ? `
                  <textarea id="home-input-${idx}" class="composer-input" rows="3" placeholder="Message ${escAttr(slot.label)}…" ${slot.loading?'disabled':''}>${escHtml(slot.inputText || '')}</textarea>
                ` : `
                  <input type="text" id="home-input-${idx}" class="composer-input" placeholder="Message ${escAttr(slot.label)}…" value="${escAttr(slot.inputText)}" ${slot.loading?'disabled':''} />
                `}
              </div>
              <button class="action-btn send" title="Send message" aria-label="Send message" data-action="send-home" data-idx="${idx}" ${(slot.loading || !hasText) ? 'disabled' : ''}>
                <i data-lucide="send" class="w-5 h-5"></i>
              </button>
            </div>
          </div>`;
      }

      function renderHistoryPopout() {
        if (!HISTORY_VIEW.open) return '';
        const entry = STATE.sessionHistory.find(h => h.id === HISTORY_VIEW.open);
        if (!entry) return '';
        const pairCount = entry.pairs.length;
        const pairLabel = pairCount === 1 ? '1 Q&A pair' : pairCount + ' Q&A pairs';
        const title = entry.preview || 'Saved conversation';
        const confirmingDelete = STATE.historyConfirmDeleteId === entry.id;

        return `
          <div class="fixed inset-0 z-50 flex items-center justify-center" style="background:rgba(15,23,42,0.55);padding:20px" data-action="close-history-bg">
            <div class="card history-popout" style="max-width:680px;width:100%;max-height:85vh;display:flex;flex-direction:column;border-radius:14px;overflow:hidden;box-shadow:0 24px 60px rgba(15,23,42,0.28)">
              <div style="padding:16px 18px;display:flex;align-items:flex-start;gap:12px;background:var(--navy);color:#fff">
                <div style="flex:1;min-width:0">
                  <div style="font-size:14px;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${escHtml(title)}</div>
                  <div style="font-size:11px;color:rgba(255,255,255,0.65);margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                    <span>${escHtml(formatHistoryDate(entry))}</span>
                    <span style="width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,0.4)"></span>
                    <span>${pairLabel}</span>
                  </div>
                </div>
                <button style="background:rgba(255,255,255,0.08);border:none;color:#fff;cursor:pointer;padding:6px;border-radius:8px;display:grid;place-items:center" data-action="close-history" title="Close" aria-label="Close">
                  <i data-lucide="x" class="w-4 h-4"></i>
                </button>
              </div>
              <div style="flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;background:#fafbfc">
                ${entry.pairs.map((p, i) => `
                  <div>
                    <div style="display:flex;justify-content:flex-end;margin-bottom:6px">
                      <div class="chat-bubble chat-user" style="font-size:13px">${escHtml(p.question)}</div>
                    </div>
                    <div style="display:flex;justify-content:flex-start">
                      <div class="popout-answer">
                        <div class="chat-bubble chat-bot chat-md" style="font-size:13px;white-space:normal">${mdToHtml(p.answer)}</div>
                        <button class="popout-copy" data-action="copy-answer" data-id="${escAttr(entry.id)}" data-pair="${i}" title="Copy answer" aria-label="Copy answer">
                          <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                        </button>
                      </div>
                    </div>
                  </div>
                `).join('')}
              </div>
              <div style="padding:12px 14px;border-top:1px solid #e2e8f0;background:#fff;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                <button class="btn-primary" style="padding:8px 14px;font-size:12.5px;min-height:auto;display:inline-flex;align-items:center;gap:6px" data-action="load-history" data-id="${escAttr(entry.id)}">
                  <i data-lucide="message-circle-plus" class="w-3.5 h-3.5"></i>Continue in chat
                </button>
                <span style="font-size:11px;color:#94a3b8">Tip: hover an answer to copy it</span>
                <div style="flex:1"></div>
                ${confirmingDelete ? `
                  <span style="font-size:12px;color:#b45309;font-weight:600;margin-right:4px">Delete this conversation?</span>
                  <button style="background:#f1f5f9;border:none;color:var(--navy);font-size:12.5px;padding:8px 12px;border-radius:8px;cursor:pointer;font-weight:600" data-action="cancel-delete-history" data-id="${escAttr(entry.id)}">Cancel</button>
                  <button style="background:#dc2626;border:none;color:#fff;font-size:12.5px;padding:8px 14px;border-radius:8px;cursor:pointer;font-weight:600" data-action="confirm-delete-history-popout" data-id="${escAttr(entry.id)}">Delete</button>
                ` : `
                  <button style="background:transparent;border:1px solid #fecaca;color:#dc2626;padding:8px 12px;font-size:12.5px;border-radius:8px;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:6px" data-action="confirm-delete-history" data-id="${escAttr(entry.id)}">
                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>Delete
                  </button>
                `}
              </div>
            </div>
          </div>`;
      }

      function renderToast() {
        if (!VOICE.toastMessage) return '';
        return `<div class="voice-toast">${escHtml(VOICE.toastMessage)}</div>`;
      }

      /* ---------- expanded (fullscreen) chat ---------- */

      function renderExpanded() {
        if (STATE.expandedSlot === null) return '';
        const idx = STATE.expandedSlot;
        const slot = STATE.slots[idx];
        return `
          <div class="fixed inset-0 z-50 flex flex-col" style="background:#fff">
           <div class="expanded-inner flex flex-col" style="flex:1;min-height:0;width:100%">
            <div class="flex items-center justify-between px-4 py-3 flex-shrink-0" style="background:var(--navy);color:#fff">
              <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full grid place-items-center text-white font-bold" style="background:var(--primary)">${escHtml(slot.label.charAt(0))}</div>
                <div>
                  <div class="text-sm font-semibold">${escHtml(slot.label)}</div>
                  <div class="text-[10px] text-white/50">${slot.messages.length} messages${slot.listenOn?' · listening':''}</div>
                </div>
              </div>
              <div class="flex items-center gap-2">
                ${(VOICE.conversationMode && VOICE.activeSlot === idx) || slot.isSpeaking || slot.loading ? `
                  <button style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.5);color:#fca5a5;font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;font-weight:600" data-action="exit-conversation" data-idx="${idx}">
                    <i data-lucide="square" class="w-3 h-3 inline mr-1"></i>Stop
                  </button>
                ` : ''}
                <button style="background:transparent;border:1px solid rgba(255,255,255,0.25);color:#fff;font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;font-weight:600" data-action="new-chat">

      /* ---------- settings ---------- */

      function renderSettings() {
        const es = STATE.editingSlot;
        const slot = STATE.slots[es];
        return `
          <div class="space-y-4">
            <div class="settings-section settings-grid">

                ${VOICE.ttsSupported ? `
