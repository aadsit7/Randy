<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Recast — AI Assistant Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --bg-main: #ffffff;
        --primary: #0070F3;
        --primary-hover: #005AD0;
        --navy: #0A1C60;
        --radius: 1rem;
        --shadow-card: 0 2px 10px rgba(15,23,42,0.06), 0 1px 3px rgba(15,23,42,0.04);
        --shadow-hover: 0 14px 36px rgba(15,23,42,0.10), 0 4px 12px rgba(15,23,42,0.06);
      }
      html, body { background: var(--bg-main); color: #111827; font-family: Inter, system-ui, sans-serif; }
      .card { border-radius: var(--radius); background: rgba(255,255,255,0.88); border: 1px solid rgba(226,232,240,0.70); box-shadow: var(--shadow-card); transition: box-shadow 300ms, transform 300ms; }
      .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
      .btn-primary { background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 10px 18px; min-height: 40px; font-weight: 600; font-size: 13px; cursor: pointer; transition: background 0.2s; }
      .btn-primary:hover { background: var(--primary-hover); }
      .btn-outline { background: transparent; color: var(--navy); border: 2px solid var(--navy); border-radius: 8px; padding: 8px 16px; min-height: 40px; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s; }
      .btn-outline:hover { color: var(--primary); border-color: var(--primary); }
      .btn-danger { background: transparent; color: #ef4444; border: 2px solid #ef4444; border-radius: 8px; padding: 8px 16px; min-height: 40px; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s; }
      .btn-danger:hover { background: #ef4444; color: #fff; }
      input[type="text"], input[type="password"], textarea {
        width: 100%; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 10px;
        font-size: 14px; font-weight: 500; color: var(--navy); background: #fff; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      }
      input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,112,243,0.1); }
      textarea { resize: vertical; min-height: 80px; }
      .chat-bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; }
      .chat-user { background: var(--primary); color: #fff; border-radius: 12px 12px 4px 12px; margin-left: auto; }
      .chat-bot { background: #f1f5f9; color: #1e293b; border-radius: 12px 12px 12px 4px; }

      /* ===== Assistant 1 structured HTML cards ===== */
      .chat-html { white-space: normal; }
      .chat-html details { margin: 6px 0; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; background: #fff; transition: box-shadow 0.2s; }
      .chat-html details[open] { box-shadow: 0 2px 8px rgba(15,23,42,0.06); }
      .chat-html summary { display: flex; align-items: center; gap: 8px; padding: 10px 14px; font-weight: 600; font-size: 13px; color: var(--navy); cursor: pointer; user-select: none; background: linear-gradient(135deg, #f8fafc, #f1f5f9); border-bottom: 1px solid transparent; transition: background 0.15s, border-color 0.15s; list-style: none; }
      .chat-html details[open] > summary { border-bottom-color: #e2e8f0; background: linear-gradient(135deg, #eef2ff, #e0e7ff); }
      .chat-html summary::-webkit-details-marker { display: none; }
      .chat-html summary::before { content: '\25B6'; font-size: 9px; color: #94a3b8; transition: transform 0.2s; flex-shrink: 0; }
      .chat-html details[open] > summary::before { transform: rotate(90deg); color: var(--primary); }
      .chat-html summary:hover { background: linear-gradient(135deg, #eef2ff, #dbeafe); }
      .chat-html summary .s-icon { width: 22px; height: 22px; border-radius: 6px; display: grid; place-items: center; font-size: 12px; flex-shrink: 0; }
      .chat-html details > div { padding: 12px 14px; font-size: 13px; line-height: 1.65; color: #334155; }
      .chat-html details > div p { margin: 0 0 8px; }
      .chat-html details > div p:last-child { margin-bottom: 0; }
      .chat-html details > div ul, .chat-html details > div ol { margin: 4px 0 8px 18px; padding: 0; }
      .chat-html details > div li { margin-bottom: 4px; }
      .chat-html details > div strong { color: var(--navy); }
      .chat-html details > div code { background: #f1f5f9; padding: 2px 5px; border-radius: 4px; font-size: 12px; }
      .chat-html .summary-card { background: linear-gradient(135deg, #0070F3, #005AD0); color: #fff; border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; font-size: 13px; line-height: 1.6; }
      .chat-html .summary-card strong { color: #fff; }
      .chat-html .summary-card p { margin: 0 0 6px; }
      .chat-html .summary-card p:last-child { margin-bottom: 0; }
      .chat-html .section-group { margin-top: 4px; }
      .chat-html .checklist-item { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 3px; }
      .chat-html .check { color: #10b981; font-weight: 700; flex-shrink: 0; }
      .chat-html .pending { color: #f59e0b; flex-shrink: 0; }
      .chat-html h4 { margin: 0 0 6px; font-size: 13px; font-weight: 700; color: var(--navy); }
      .chat-input-row { display: flex; gap: 8px; align-items: center; padding: 12px; border-top: 1px solid #e2e8f0; background: #fff; }
      .chat-input-row input { flex: 1; border-radius: 9999px; padding: 10px 16px; font-size: 14px; }
      .chat-send { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); color: #fff; border: none; display: grid; place-items: center; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
      .chat-send:hover { background: var(--primary-hover); }
      .chat-send:disabled { background: #cbd5e1; cursor: not-allowed; }
      @keyframes dotPulse { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
      .typing-dot { width: 8px; height: 8px; border-radius: 50%; background: #94a3b8; display: inline-block; animation: dotPulse 1.4s infinite ease-in-out both; }
      .typing-dot:nth-child(1) { animation-delay: -0.32s; }
      .typing-dot:nth-child(2) { animation-delay: -0.16s; }
      .settings-section { border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; background: #fafbfc; }
      .tab-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px; min-height: 40px; font-size: 14px; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; transition: all 0.2s; }
      .tab-btn.active { background: var(--primary); color: #fff; }
      .tab-btn:not(.active) { background: transparent; color: var(--navy); }
      .tab-btn:not(.active):hover { background: #f1f5f9; }

      /* ===== Voice widget ===== */
      .voice-fab { position: fixed; bottom: 24px; right: 24px; z-index: 60; width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer; display: grid; place-items: center; color: #fff; box-shadow: 0 8px 24px rgba(15,23,42,0.18); transition: transform 0.15s ease; }
      .voice-fab:hover { transform: scale(1.06); }
      .voice-fab:disabled { cursor: not-allowed; opacity: 0.7; }
      .voice-fab-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 60; width: 56px; height: 56px; }
      .voice-fab-wrap .voice-fab { position: absolute; inset: 0; }
      .voice-pulse-ring { position: absolute; inset: 0; border-radius: 50%; pointer-events: none; border: 3px solid currentColor; animation: voicePulse 1.8s ease-out infinite; }
      .voice-pulse-ring.delay { animation-delay: 0.9s; }
      @keyframes voicePulse {
        0% { transform: scale(1); opacity: 0.55; }
        100% { transform: scale(1.9); opacity: 0; }
      }
      .record-pulse { animation: recordPulse 1.2s ease-in-out infinite; }
      @keyframes recordPulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.55); }
        50%      { box-shadow: 0 0 0 14px rgba(239,68,68,0); }
      }
      .sound-wave { display: inline-flex; align-items: center; gap: 3px; height: 20px; }
      .sound-wave-bar { display: block; width: 4px; height: 100%; background: currentColor; border-radius: 2px; transform-origin: center; animation: soundWave 0.9s ease-in-out infinite; }
      .sound-wave-bar:nth-child(1) { animation-delay: -0.2s; }
      .sound-wave-bar:nth-child(2) { animation-delay: -0.1s; }
      .sound-wave-bar:nth-child(3) { animation-delay: 0s; }
      @keyframes soundWave {
        0%, 100% { transform: scaleY(0.3); }
        50%      { transform: scaleY(1); }
      }
      .voice-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 100; background: #0f172a; color: #fff; padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: 0 12px 30px rgba(15,23,42,0.25); pointer-events: none; animation: toastIn 0.25s ease-out; }
      @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 12px); } to { opacity: 1; transform: translate(-50%, 0); } }
      .voice-switch { position: relative; display: inline-flex; align-items: center; width: 44px; height: 24px; border-radius: 9999px; background: #cbd5e1; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
      .voice-switch.on { background: #10b981; }
      .voice-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: left 0.2s; box-shadow: 0 1px 3px rgba(15,23,42,0.2); }
      .voice-switch.on::after { left: 22px; }
      .header-mic { background: transparent; border: none; cursor: pointer; padding: 6px; min-width: 32px; min-height: 32px; display: grid; place-items: center; border-radius: 4px; }
      .header-mic.on { color: #34d399; }
      .header-mic:not(.on) { color: rgba(255,255,255,0.4); }
      .header-mic:hover { background: rgba(255,255,255,0.08); }

      /* ===== TTS speaker button ===== */
      .msg-wrap { position: relative; display: inline-block; }
      .tts-btn { position: absolute; bottom: 4px; right: 4px; background: transparent; border: none; cursor: pointer; padding: 6px; min-width: 28px; min-height: 28px; border-radius: 4px; color: #94a3b8; transition: color 0.15s, background 0.15s; line-height: 0; }
      .tts-btn:hover { color: #475569; background: rgba(148,163,184,0.12); }
      .tts-btn.playing { color: var(--primary); }

      /* ===== Live interim transcript bubble ===== */
      .interim-bubble { opacity: 0.6; font-style: italic; border: 1px dashed rgba(37,99,235,0.4); background: rgba(37,99,235,0.06) !important; color: #334155 !important; }
      .interim-caret { display: inline-block; width: 6px; margin-left: 2px; animation: interim-blink 1s steps(2,end) infinite; color: #2563eb; }
      @keyframes interim-blink { 50% { opacity: 0; } }
      @media (prefers-reduced-motion: reduce) { .interim-caret { animation: none; } }

      @media (prefers-reduced-motion: reduce) {
        .voice-pulse-ring, .record-pulse, .sound-wave-bar, .voice-toast { animation: none !important; }
        .voice-pulse-ring { display: none; }
      }

      /* ===== Responsive layout ===== */
      .chat-card-wrap { min-height: calc(100svh - 180px); min-height: calc(100dvh - 180px); }
      .settings-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
      .settings-grid > .full { grid-column: 1 / -1; }
      .chat-input-row { padding-bottom: max(8px, env(safe-area-inset-bottom)) !important; }
      .voice-fab, .voice-fab-wrap {
        bottom: max(24px, env(safe-area-inset-bottom));
        right:  max(24px, env(safe-area-inset-right));
      }

      /* Phone (≤480px) */
      @media (max-width: 480px) {
        .brand-wrap  { padding-top: 16px; padding-bottom: 8px; }
        .brand-logo  { font-size: 28px !important; line-height: 1.05; }
        .tab-btn     { padding: 10px 14px; font-size: 13px; }
        .chat-bubble { max-width: 92%; font-size: 14px; }
        .msg-wrap    { max-width: 96%; }
        .settings-section { padding: 14px; }
        .voice-fab, .voice-fab-wrap {
          bottom: calc(72px + env(safe-area-inset-bottom));
        }
      }

      /* iPad (481–1024px) */
      @media (min-width: 481px) {
        .app-shell       { max-width: 760px; margin-inline: auto; }
        .chat-card-wrap  { min-height: calc(100dvh - 240px); }
        .settings-grid   { grid-template-columns: 1fr 1fr; }
        .chat-bubble     { max-width: 78%; }
        .msg-wrap        { max-width: 88%; }
      }

      /* Laptop / desktop (≥1025px) */
      @media (min-width: 1025px) {
        .app-shell       { max-width: 880px; }
        .chat-card-wrap  { min-height: calc(100dvh - 260px); max-height: calc(100dvh - 120px); }
        .chat-bubble     { max-width: 68%; }
        .msg-wrap        { max-width: 75%; }
        .settings-grid   { grid-template-columns: 1fr 1fr; gap: 20px 24px; }
        .expanded-inner  { max-width: 980px; margin-inline: auto; width: 100%; }
        .brand-wrap      { padding-top: 32px; }
      }

      /* Landscape short viewports (iPad landscape, phone landscape) */
      @media (min-width: 481px) and (orientation: landscape) and (max-height: 640px) {
        .brand-wrap     { padding-top: 10px; padding-bottom: 4px; }
        .brand-logo     { font-size: 32px !important; }
        .chat-card-wrap { min-height: calc(100dvh - 150px); }
      }

      /* Touch devices: enforce ≥44px hit targets regardless of width */
      @media (pointer: coarse) {
        .btn-primary, .btn-outline, .btn-danger { padding: 12px 18px; font-size: 14px; min-height: 44px; }
        .tab-btn     { padding: 12px 18px; min-height: 44px; }
        .header-mic  { padding: 10px; min-width: 44px; min-height: 44px; }
        .header-mic i{ width: 20px; height: 20px; }
        .tts-btn     { padding: 10px; min-width: 44px; min-height: 44px; bottom: 0; right: 0; }
        .voice-switch       { width: 52px; height: 30px; }
        .voice-switch::after{ width: 26px; height: 26px; }
        .voice-switch.on::after { left: 24px; }
        .chat-send   { width: 44px; height: 44px; }
        input[type="text"], input[type="password"], textarea { font-size: 16px; padding: 12px 14px; }
      }
    </style>
  </head>
  <body class="min-h-screen antialiased">
    <div id="app"></div>
    <script>
      const ASSISTANT_2_PROMPT = `# Role
You are Randy, Recast Software's Application Workspace expert. You sound like a knowledgeable colleague who genuinely enjoys explaining how things work — confident but never condescending, warm but never fluffy.

# How You Work
You have web search. Use it on every question to pull current information from these sources before answering:
- https://docs.liquit.com/
- https://docs.recastsoftware.com
- https://docs.recastsoftware.com/help
- https://www.recastsoftware.com/resources-collection/application-workspace/
- https://www.reddit.com/r/RecastSoftware/

Search first, then answer. Never skip the search step. Never guess when you can verify.

# How You Answer
- Lead with the direct answer. No preamble, no "Great question," no narration of your process.
- Use plain language. If a technical term is necessary, define it in the same breath — "agents, which are the small programs running on each device" not just "agents."
- Use concrete examples and analogies to make abstract features click. Compare to things people already understand.
- Keep answers focused. One clear explanation is better than three overlapping ones.
- When documentation is unclear or missing on a point, say so in one sentence and move on. Never fill gaps with assumptions.

# Accuracy Rules
- Only state facts you confirmed in the documentation. If you searched and found nothing, say "I couldn't find that in the current docs" rather than speculating.
- Never fabricate features, capabilities, statistics, or URLs.
- Never pad with generic filler or marketing language.
- If a question is outside Application Workspace scope, say so in one sentence.

# Response Format
- Respond in plain text. No HTML tags, no markdown headers, no bullet points.
- Use short paragraphs separated by blank lines.
- Bold nothing. Format nothing. Just clear, readable sentences.
- Keep answers concise — aim for 2-4 short paragraphs max unless the question genuinely requires more detail.`;

      // Paste your Anthropic API key between the quotes to pre-fill every assistant's
      // Settings → API Key field. The key is never sent anywhere except api.anthropic.com
      // and is cached to the browser's localStorage the first time the user clicks
      // "Save Configuration". Leave as '' to force manual entry.
      const DEFAULT_API_KEY = '';

      const DEFAULT_VOICE_PERSONALITY = "Keep all responses to 2-3 short sentences since they will be spoken aloud. Use natural conversational language. Say numbers the way people talk \u2014 like '120 grand' not '$120,000'. Never use markdown, bullet points, or formatting. Be direct and warm.";

      // ElevenLabs TTS configuration
      const DEFAULT_ELEVENLABS_API_KEY = '';
      const DEFAULT_ELEVENLABS_VOICE_ID = 'JBFqnCBsd6RMkjVDRZzb'; // George
      const ELEVENLABS_VOICES = [
        { id: 'JBFqnCBsd6RMkjVDRZzb', name: 'George', desc: 'Warm British male' },
        { id: '21m00Tcm4TlvDq8ikWAM', name: 'Rachel', desc: 'Calm female' },
        { id: 'pNInz6obpgDQGcFmaJgB', name: 'Adam', desc: 'Deep American male' },
        { id: 'ErXwobaYiN019PkySvjV', name: 'Antoni', desc: 'Well-rounded male' },
        { id: 'EXAVITQu4vr4xnSDxMaL', name: 'Bella', desc: 'Soft female' },
        { id: 'TxGEqnHWrfWFTfGW9XjX', name: 'Josh', desc: 'Young American male' },
        { id: 'AZnzlk1XvdvUeBnXmlld', name: 'Domi', desc: 'Strong female' },
        { id: 'MF3mGyEYCl7XYWbV9V6O', name: 'Elli', desc: 'Young female' },
      ];

      // Google Sheet webhook for saving Q&A results
      let GSHEET_WEBHOOK = 'https://script.google.com/macros/s/AKfycbz0gE7H7Nd6LX9S4JJsWZb4h0W0qf04CDVloFFbfnc_0s80orwybcATHs3L7vicQAbE/exec';

      function makeSlot(label, prompt) {
        return {
          label, apiKey: DEFAULT_API_KEY, prompt,
          messages: [], inputText: '', loading: false,
          voiceEnabled: true,
          voiceName: 'Randy',
          voicePersonality: DEFAULT_VOICE_PERSONALITY,
          isListening: false,
          isSpeaking: false,
          elevenlabsApiKey: DEFAULT_ELEVENLABS_API_KEY,
          elevenlabsVoiceId: DEFAULT_ELEVENLABS_VOICE_ID,
          elevenlabsEnabled: true
        };
      }

      /* ========== STATE ========== */
      const STATE = {
        activeTab: 'home',
        expandedSlot: null,
        editingSlot: 0,
        slots: [
          makeSlot('Recast SE', ASSISTANT_2_PROMPT)
        ]
      };

      /* ========== VOICE GLOBAL STATE ========== */
      const VOICE = {
        srSupported: !!(window.SpeechRecognition || window.webkitSpeechRecognition),
        ttsSupported: !!window.speechSynthesis,
        recognition: null,       // shared SpeechRecognition instance
        wantRunning: false,      // should the recognizer be running?
        audioCtx: null,          // lazy AudioContext for beep
        activeSlot: null,        // slot index currently handling a voice command (post wake-word)
        awaitingCommand: false,  // wake word heard, waiting for the actual question
        wakeTimeoutId: null,     // 30s timeout to drop back to passive listening
        permissionDenied: false,
        toastTimeoutId: null,
        toastMessage: '',
        playingMsg: null,        // { slot, msg } of the specific assistant message currently being spoken
        interimText: '',         // live partial transcript from SpeechRecognition
        interimSlot: null        // slot idx the interim transcript belongs to
      };

      const SLOT_COLORS = ['#10b981'];

      /* ========== LOCAL STORAGE ========== */
      const SETTINGS_KEY = 'recast_chatbot_settings';

      function saveSettings() {
        const data = STATE.slots.map(s => ({
          label: s.label,
          apiKey: s.apiKey,
          prompt: s.prompt,
          voiceEnabled: s.voiceEnabled,
          voiceName: s.voiceName,
          voicePersonality: s.voicePersonality,
          elevenlabsEnabled: s.elevenlabsEnabled,
          elevenlabsApiKey: s.elevenlabsApiKey,
          elevenlabsVoiceId: s.elevenlabsVoiceId
        }));
        try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(data)); } catch {}
      }

      function loadSettings() {
        try {
          const raw = localStorage.getItem(SETTINGS_KEY);
          if (!raw) return;
          const data = JSON.parse(raw);
          data.forEach((d, i) => {
            if (STATE.slots[i]) {
              STATE.slots[i].label = d.label || STATE.slots[i].label;
              STATE.slots[i].apiKey = d.apiKey || DEFAULT_API_KEY;
              STATE.slots[i].prompt = d.prompt || STATE.slots[i].prompt;
              STATE.slots[i].voiceEnabled = !!d.voiceEnabled;
              STATE.slots[i].voiceName = d.voiceName || STATE.slots[i].label;
              STATE.slots[i].voicePersonality = d.voicePersonality || DEFAULT_VOICE_PERSONALITY;
              if (d.elevenlabsEnabled !== undefined) STATE.slots[i].elevenlabsEnabled = !!d.elevenlabsEnabled;
              if (d.elevenlabsApiKey !== undefined) STATE.slots[i].elevenlabsApiKey = d.elevenlabsApiKey;
              if (d.elevenlabsVoiceId) STATE.slots[i].elevenlabsVoiceId = d.elevenlabsVoiceId;
            }
          });
        } catch {}
        const savedGsheet = localStorage.getItem('recast_gsheet_url');
        if (savedGsheet) GSHEET_WEBHOOK = savedGsheet;
      }

      loadSettings();

      /* ========== ELEVENLABS TTS ========== */
      // blobUrl: currently bound <audio> src. owned=true means we also own the URL's lifetime
      // (revoke on cleanup); owned=false means the URL lives on a message's audioUrl cache and
      // must NOT be revoked here — the message owns it.
      const EL_AUDIO = { el: null, blobUrl: null, owned: false, speakingSlot: null };

      function getElAudio() {
        if (!EL_AUDIO.el) {
          const a = document.createElement('audio');
          a.addEventListener('ended', () => {
            cleanupElAudio();
            if (EL_AUDIO.speakingSlot !== null && STATE.slots[EL_AUDIO.speakingSlot]) {
              STATE.slots[EL_AUDIO.speakingSlot].isSpeaking = false;
              VOICE.activeSlot = null;
              VOICE.awaitingCommand = false;
            }
            EL_AUDIO.speakingSlot = null;
            VOICE.playingMsg = null;
            render();
          });
          a.addEventListener('error', () => {
            cleanupElAudio();
            if (EL_AUDIO.speakingSlot !== null && STATE.slots[EL_AUDIO.speakingSlot]) {
              STATE.slots[EL_AUDIO.speakingSlot].isSpeaking = false;
            }
            EL_AUDIO.speakingSlot = null;
            VOICE.playingMsg = null;
            render();
          });
          document.body.appendChild(a);
          EL_AUDIO.el = a;
        }
        return EL_AUDIO.el;
      }

      function cleanupElAudio() {
        if (EL_AUDIO.blobUrl && EL_AUDIO.owned) {
          URL.revokeObjectURL(EL_AUDIO.blobUrl);
        }
        EL_AUDIO.blobUrl = null;
        EL_AUDIO.owned = false;
      }

      function stopElAudio() {
        const a = EL_AUDIO.el;
        if (a) {
          a.pause();
          a.removeAttribute('src');
          a.load();
        }
        cleanupElAudio();
        if (EL_AUDIO.speakingSlot !== null && STATE.slots[EL_AUDIO.speakingSlot]) {
          STATE.slots[EL_AUDIO.speakingSlot].isSpeaking = false;
        }
        EL_AUDIO.speakingSlot = null;
        VOICE.playingMsg = null;
      }

      // Play a cached ElevenLabs blob URL that lives on a message (no re-fetch).
      async function playCachedAudio(audioUrl, slotIdx, msgIdx) {
        const slot = STATE.slots[slotIdx];
        if (!slot || !audioUrl) return false;
        stopElAudio();
        try { window.speechSynthesis.cancel(); } catch {}
        slot.isSpeaking = true;
        EL_AUDIO.speakingSlot = slotIdx;
        EL_AUDIO.blobUrl = audioUrl;
        EL_AUDIO.owned = false; // message owns this URL; don't revoke
        VOICE.playingMsg = { slot: slotIdx, msg: msgIdx };
        render();
        try {
          const audio = getElAudio();
          audio.src = audioUrl;
          await audio.play();
          return true;
        } catch (err) {
          console.warn('Cached audio replay failed:', err);
          slot.isSpeaking = false;
          EL_AUDIO.speakingSlot = null;
          VOICE.playingMsg = null;
          render();
          return false;
        }
      }

      async function elevenLabsSpeak(text, idx, msgIdx) {
        const slot = STATE.slots[idx];
        if (!slot.elevenlabsEnabled) return false;
        if (!slot.elevenlabsApiKey) {
          showToast('No ElevenLabs API key \u2014 add one in Settings or disable ElevenLabs');
          return false;
        }

        const clean = stripMarkdown(text);
        if (!clean) return false;

        stopElAudio();
        try { window.speechSynthesis.cancel(); } catch {}

        slot.isSpeaking = true;
        EL_AUDIO.speakingSlot = idx;
        if (typeof msgIdx === 'number') VOICE.playingMsg = { slot: idx, msg: msgIdx };
        render();

        try {
          const voiceId = slot.elevenlabsVoiceId || DEFAULT_ELEVENLABS_VOICE_ID;
          const resp = await fetch(
            `https://api.elevenlabs.io/v1/text-to-speech/${voiceId}?output_format=mp3_44100_128`,
            {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'xi-api-key': slot.elevenlabsApiKey
              },
              body: JSON.stringify({
                text: clean,
                model_id: 'eleven_multilingual_v2',
                voice_settings: { stability: 0.5, similarity_boost: 0.75 }
              })
            }
          );

          if (!resp.ok) {
            const errBody = await resp.text().catch(() => '');
            let userMsg;
            switch (resp.status) {
              case 401: userMsg = 'Invalid ElevenLabs API key — update in Settings'; break;
              case 403: userMsg = 'ElevenLabs API key lacks permission — check your plan'; break;
              case 429: userMsg = 'ElevenLabs rate limit reached — try again shortly'; break;
              case 400: userMsg = 'ElevenLabs request error — voice or model may be invalid'; break;
              default:  userMsg = `ElevenLabs error (${resp.status}) — using browser voice`;
            }
            console.warn(`ElevenLabs TTS ${resp.status}:`, errBody.substring(0, 200));
            throw new Error(userMsg);
          }

          const blob = await resp.blob();
          const url = URL.createObjectURL(blob);
          cleanupElAudio();
          EL_AUDIO.blobUrl = url;

          // Cache on the message so replay is instant and free.
          const msg = typeof msgIdx === 'number' ? slot.messages[msgIdx] : null;
          if (msg && msg.role === 'assistant') {
            if (msg.audioUrl && msg.audioUrl !== url) {
              try { URL.revokeObjectURL(msg.audioUrl); } catch {}
            }
            msg.audioUrl = url;
            msg.audioSource = 'elevenlabs';
            EL_AUDIO.owned = false; // ownership transferred to message
          } else {
            EL_AUDIO.owned = true;  // no message to hand off to; we own it
          }

          const audio = getElAudio();
          audio.src = url;
          await audio.play();
          return true;
        } catch (err) {
          const msg = err.message || 'ElevenLabs failed';
          console.warn('ElevenLabs TTS failed, falling back to browser TTS:', msg);
          showToast(msg);
          slot.isSpeaking = false;
          EL_AUDIO.speakingSlot = null;
          VOICE.playingMsg = null;
          render();
          return false;
        }
      }

      /* ========== VOICE HELPERS ========== */
      function showToast(msg) {
        VOICE.toastMessage = msg;
        render();
        if (VOICE.toastTimeoutId) clearTimeout(VOICE.toastTimeoutId);
        VOICE.toastTimeoutId = setTimeout(() => {
          VOICE.toastMessage = '';
          render();
        }, 3500);
      }

      function playBeep() {
        if (!VOICE.audioCtx) {
          try { VOICE.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
          catch { return; }
        }
        try {
          const ctx = VOICE.audioCtx;
          if (ctx.state === 'suspended') ctx.resume();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(880, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(1320, ctx.currentTime + 0.12);
          gain.gain.setValueAtTime(0.0001, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.18, ctx.currentTime + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.18);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + 0.2);
        } catch {}
      }

      function stripMarkdown(text) {
        return String(text)
          .replace(/```[\s\S]*?```/g, ' ')          // fenced code blocks
          .replace(/`([^`]+)`/g, '$1')               // inline code
          .replace(/\*\*([^*]+)\*\*/g, '$1')         // bold
          .replace(/__([^_]+)__/g, '$1')             // bold alt
          .replace(/(^|\s)\*([^*\n]+)\*/g, '$1$2')   // italic
          .replace(/(^|\s)_([^_\n]+)_/g, '$1$2')     // italic alt
          .replace(/^#{1,6}\s+/gm, '')               // headers
          .replace(/^\s*[-*+]\s+/gm, '')             // bullets
          .replace(/^\s*\d+\.\s+/gm, '')             // numbered lists
          .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')   // links
          .replace(/!\[([^\]]*)\]\([^)]+\)/g, '$1')  // images
          .replace(/^\s*>\s?/gm, '')                 // blockquotes
          .replace(/\n{3,}/g, '\n\n')
          .trim();
      }

      function pickDeepVoice() {
        if (!VOICE.ttsSupported) return null;
        const voices = window.speechSynthesis.getVoices() || [];
        if (voices.length === 0) return null;
        const enVoices = voices.filter(v => /^en(-|_|$)/i.test(v.lang));
        const pool = enVoices.length ? enVoices : voices;
        return pool.find(v => /male/i.test(v.name))
            || pool.find(v => /\b(david|daniel|alex|tom|mark|eric|fred|george|james|guy)\b/i.test(v.name))
            || pool.find(v => /google us english/i.test(v.name))
            || pool[0];
      }

      async function speakText(text, idx, msgIdx) {
        const slot = STATE.slots[idx];

        // Try ElevenLabs first if configured
        if (slot.elevenlabsEnabled && slot.elevenlabsApiKey) {
          const ok = await elevenLabsSpeak(text, idx, msgIdx);
          if (ok) return;
        }

        // Fallback: browser Web Speech API (cannot cache; mark source accordingly)
        if (!VOICE.ttsSupported) return;
        const clean = stripMarkdown(text);
        if (!clean) return;
        try { window.speechSynthesis.cancel(); } catch {}
        const msg = typeof msgIdx === 'number' ? slot.messages[msgIdx] : null;
        if (msg && msg.role === 'assistant' && !msg.audioSource) msg.audioSource = 'browser';
        const u = new SpeechSynthesisUtterance(clean);
        const v = pickDeepVoice();
        if (v) u.voice = v;
        u.pitch = 0.85;
        u.rate = 0.95;
        u.onstart = () => {
          STATE.slots[idx].isSpeaking = true;
          if (typeof msgIdx === 'number') VOICE.playingMsg = { slot: idx, msg: msgIdx };
          render();
        };
        u.onend = () => {
          STATE.slots[idx].isSpeaking = false;
          VOICE.activeSlot = null;
          VOICE.awaitingCommand = false;
          VOICE.playingMsg = null;
          render();
        };
        u.onerror = u.onend;
        try { window.speechSynthesis.speak(u); }
        catch {
          STATE.slots[idx].isSpeaking = false;
          VOICE.playingMsg = null;
          render();
        }
      }

      function stopSpeaking() {
        stopElAudio();
        if (VOICE.ttsSupported) {
          try { window.speechSynthesis.cancel(); } catch {}
        }
        STATE.slots.forEach(s => { s.isSpeaking = false; });
        VOICE.playingMsg = null;
        render();
      }

      /* ========== WAKE WORD + RECOGNITION ========== */
      function anyVoiceEnabled() {
        return STATE.slots.some(s => s.voiceEnabled);
      }

      function escapeRegex(s) { return String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

      function buildWakePattern(name) {
        const n = escapeRegex(String(name).trim());
        return new RegExp('\\b(?:hey|hi|ok|okay|yo)\\s+' + n + '\\b[\\s,.!?:;-]*', 'i');
      }

      function handleVoiceTranscript(raw) {
        const text = String(raw).trim();
        if (!text) return;

        // Echo guard: while TTS is speaking, only accept short stop commands so the
        // assistant's own voice doesn't get re-transcribed as input.
        if (STATE.slots.some(s => s.isSpeaking)) {
          const t = text.toLowerCase();
          if (/^(stop|cancel|quiet|shut up|never mind)\b/.test(t)) stopSpeaking();
          return;
        }

        // If we are already waiting for the command following a wake word, treat this
        // utterance as the command.
        if (VOICE.activeSlot !== null && VOICE.awaitingCommand) {
          const slot = STATE.slots[VOICE.activeSlot];
          // Bail if the slot was disabled between wake word and command.
          if (!slot || !slot.voiceEnabled) {
            if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
            VOICE.activeSlot = null;
            VOICE.awaitingCommand = false;
            return;
          }
          // Strip a leading wake phrase if the user repeated it
          let cleaned = text;
          const p = buildWakePattern(slot.voiceName || slot.label);
          cleaned = text.replace(p, '').trim();
          const lower = cleaned.toLowerCase();
          if (lower === 'stop' || lower === 'cancel' || lower === 'never mind') {
            stopSpeaking();
            VOICE.activeSlot = null;
            VOICE.awaitingCommand = false;
            if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
            STATE.slots.forEach(s => { s.isListening = false; });
            render();
            return;
          }
          if (cleaned.length < 2) return; // ignore stray noise
          if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
          VOICE.awaitingCommand = false;
          const idx = VOICE.activeSlot;
          STATE.slots[idx].isListening = false;
          STATE.slots[idx].inputText = cleaned;
          sendMessage(idx, true);
          return;
        }

        // "Stop speaking" shortcut while TTS is active
        const lower = text.toLowerCase();
        if (/\b(stop|cancel|quiet|shut up|never mind)\b/.test(lower) && STATE.slots.some(s => s.isSpeaking)) {
          stopSpeaking();
          return;
        }

        // Otherwise scan for a wake word across enabled slots
        for (let i = 0; i < STATE.slots.length; i++) {
          const slot = STATE.slots[i];
          if (!slot.voiceEnabled) continue;
          const pattern = buildWakePattern(slot.voiceName || slot.label);
          const match = text.match(pattern);
          if (!match) continue;

          playBeep();

          // If the user spoke the wake word AND the question in one breath
          // (e.g. "Hey Randy what is application workspace"), handle it now.
          const after = text.slice(match.index + match[0].length).trim();
          if (after.length >= 2) {
            VOICE.activeSlot = i;
            VOICE.awaitingCommand = false;
            slot.isListening = false;
            slot.inputText = after;
            sendMessage(i, true);
            return;
          }

          // Otherwise arm: wait for the next utterance as the command.
          VOICE.activeSlot = i;
          VOICE.awaitingCommand = true;
          slot.isListening = true;
          if (VOICE.wakeTimeoutId) clearTimeout(VOICE.wakeTimeoutId);
          VOICE.wakeTimeoutId = setTimeout(() => {
            VOICE.activeSlot = null;
            VOICE.awaitingCommand = false;
            slot.isListening = false;
            VOICE.wakeTimeoutId = null;
            render();
          }, 30000);
          render();
          return;
        }
      }

      // Pick the slot the interim transcript belongs to: the active command slot if one
      // is armed, otherwise the first voice-enabled slot (typically index 0).
      function interimTargetSlot() {
        if (VOICE.activeSlot !== null && VOICE.awaitingCommand) return VOICE.activeSlot;
        for (let i = 0; i < STATE.slots.length; i++) {
          if (STATE.slots[i].voiceEnabled) return i;
        }
        return null;
      }

      // Update the interim transcript in place without re-rendering the whole tree.
      // This is called on every SpeechRecognition tick (~100-300ms), so it must be cheap.
      function updateInterim(text) {
        // Echo guard: suppress interim while Randy is speaking so his own voice
        // being re-transcribed doesn't flash onscreen.
        if (STATE.slots.some(s => s.isSpeaking)) { clearInterim(); return; }
        const trimmed = String(text || '').trim();
        if (trimmed.length < 2) { clearInterim(); return; }
        const target = interimTargetSlot();
        if (target === null) { clearInterim(); return; }

        const prevText = VOICE.interimText;
        const prevSlot = VOICE.interimSlot;
        VOICE.interimText = trimmed;
        VOICE.interimSlot = target;

        // Try the cheap path: just update the existing node's text.
        const existing = document.getElementById('interim-bubble-' + target);
        if (existing && prevSlot === target) {
          const span = existing.querySelector('.interim-text');
          if (span) { span.textContent = trimmed; return; }
        }
        // Otherwise do one render to mount the node.
        if (prevText !== trimmed || prevSlot !== target) render();
      }

      function clearInterim() {
        if (!VOICE.interimText && VOICE.interimSlot === null) return;
        VOICE.interimText = '';
        VOICE.interimSlot = null;
        render();
      }

      function ensureRecognition() {
        if (!VOICE.srSupported) return null;
        if (VOICE.recognition) return VOICE.recognition;
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        const r = new SR();
        r.continuous = true;
        r.interimResults = true;
        r.lang = 'en-US';
        r.onresult = (e) => {
          let interim = '';
          let finalChunk = '';
          for (let i = e.resultIndex; i < e.results.length; i++) {
            const res = e.results[i];
            const t = res[0] && res[0].transcript ? res[0].transcript : '';
            if (res.isFinal) finalChunk += t + ' ';
            else interim += t;
          }
          if (finalChunk) {
            clearInterim();
            handleVoiceTranscript(finalChunk);
          } else if (interim) {
            updateInterim(interim);
          }
        };
        r.onerror = (e) => {
          if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
            VOICE.permissionDenied = true;
            VOICE.wantRunning = false;
            STATE.slots.forEach(s => { s.voiceEnabled = false; s.isListening = false; });
            saveSettings();
            showToast('Microphone access required for voice assistant');
            render();
            return;
          }
          // For transient errors (no-speech, aborted, network), allow onend to restart.
        };
        r.onend = () => {
          // Auto-restart if any slot still wants voice and we haven't been told to stop.
          if (VOICE.wantRunning && anyVoiceEnabled()) {
            try { r.start(); } catch {}
          }
        };
        VOICE.recognition = r;
        return r;
      }

      function startRecognition() {
        const r = ensureRecognition();
        if (!r) return;
        VOICE.wantRunning = true;
        try { r.start(); }
        catch (e) { /* already started - ignore */ }
      }

      function stopRecognition() {
        VOICE.wantRunning = false;
        if (VOICE.recognition) {
          try { VOICE.recognition.stop(); } catch {}
        }
        if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
        VOICE.activeSlot = null;
        VOICE.awaitingCommand = false;
        VOICE.interimText = '';
        VOICE.interimSlot = null;
        STATE.slots.forEach(s => { s.isListening = false; });
      }

      function toggleSlotVoice(idx) {
        const slot = STATE.slots[idx];
        if (!VOICE.srSupported) { showToast('Voice not supported in this browser'); return; }
        slot.voiceEnabled = !slot.voiceEnabled;
        saveSettings();
        if (slot.voiceEnabled) {
          startRecognition();
        } else {
          // If this slot was mid-interaction, clear its live state too.
          if (VOICE.activeSlot === idx) {
            if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
            VOICE.activeSlot = null;
            VOICE.awaitingCommand = false;
          }
          slot.isListening = false;
          if (slot.isSpeaking) stopSpeaking();
          if (!anyVoiceEnabled()) stopRecognition();
        }
        render();
      }

      /* ========== API ========== */
      async function saveToSheet(question, answerHtml) {
        console.log('saveToSheet called, webhook:', GSHEET_WEBHOOK ? 'set' : 'empty');
        if (!GSHEET_WEBHOOK) return;
        try {
          const div = document.createElement('div');
          div.innerHTML = answerHtml;
          const plainAnswer = div.textContent.replace(/\s+/g, ' ').trim();
          const links = [];
          div.querySelectorAll('a[href]').forEach(a => links.push(a.href));
          const sources = links.join(', ');
          await fetch(GSHEET_WEBHOOK, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              question: question,
              answer: plainAnswer.substring(0, 50000),
              sources: sources
            })
          });
        } catch (err) {
          console.warn('Sheet save failed:', err);
        }
      }

      async function sendMessage(idx, viaVoice = false) {
        const slot = STATE.slots[idx];
        const text = slot.inputText.trim();
        if (!text || slot.loading) return;

        slot.messages.push({ role: 'user', content: text });
        slot.inputText = '';
        slot.loading = true;
        render();
        scrollChat();

        try {
          const headers = {
            "Content-Type": "application/json",
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
          };
          if (slot.apiKey) headers["x-api-key"] = slot.apiKey;

          const systemPrompt = viaVoice && slot.voicePersonality
            ? slot.prompt + '\n\n' + slot.voicePersonality
            : slot.prompt;

          const resp = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers,
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1024,
              system: systemPrompt,
              tools: [{ type: "web_search_20250305", name: "web_search" }],
              messages: slot.messages
                .filter(m => m.role === 'user' || m.role === 'assistant')
                .map(m => ({ role: m.role, content: m.content }))
            })
          });

          const data = await resp.json();
          if (data.error) throw new Error(data.error.message || 'API error');
          const reply = data.content?.filter(c => c.type === 'text').map(c => c.text).join('') || 'No response.';
          slot.messages.push({ role: 'assistant', content: reply });
          const assistantMsgIdx = slot.messages.length - 1;
          const lastUserMsg = slot.messages.filter(m => m.role === 'user').pop();
          console.log('Saving to sheet:', GSHEET_WEBHOOK, lastUserMsg?.content?.substring(0, 50));
          saveToSheet(lastUserMsg?.content || '', slot.messages[slot.messages.length - 1].content);
          if (viaVoice) {
            // Speak only the summary card text (all assistants output structured HTML)
            speakText(extractSummary(reply), idx, assistantMsgIdx);
          }
        } catch (err) {
          slot.messages.push({ role: 'assistant', content: '\u26a0\ufe0f ' + (err.message || 'Connection failed. Check your API key in Settings.') });
          if (viaVoice) {
            VOICE.activeSlot = null;
            VOICE.awaitingCommand = false;
          }
        }

        slot.loading = false;
        render();
        scrollChat();
      }

      function scrollChat() {
        setTimeout(() => {
          const el = document.getElementById('chat-scroll');
          if (el) el.scrollTop = el.scrollHeight;
          for (let i = 0; i < STATE.slots.length; i++) {
            const h = document.getElementById('home-scroll-' + i);
            if (h) h.scrollTop = h.scrollHeight;
          }
        }, 50);
      }

      function clearChat(idx) {
        // Stop any active playback whose source message is about to be wiped.
        if (VOICE.playingMsg && VOICE.playingMsg.slot === idx) stopSpeaking();
        // Release cached TTS blob URLs so they don't leak.
        STATE.slots[idx].messages.forEach(m => {
          if (m && m.audioUrl) {
            try { URL.revokeObjectURL(m.audioUrl); } catch {}
          }
        });
        STATE.slots[idx].messages = [];
        STATE.slots[idx].inputText = '';
        STATE.slots[idx].loading = false;
        render();
      }

      /* ========== HELPERS ========== */
      function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
      function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

      // Sanitize HTML for Assistant 1: only allow safe structural tags
      function sanitizeHtml(raw) {
        const div = document.createElement('div');
        div.innerHTML = raw;
        // Remove script, style, iframe, form, input, and event attributes
        div.querySelectorAll('script,style,iframe,form,input,textarea,button,object,embed,link,meta').forEach(el => el.remove());
        div.querySelectorAll('*').forEach(el => {
          for (const attr of [...el.attributes]) {
            if (attr.name.startsWith('on') || attr.name === 'href' && attr.value.trim().toLowerCase().startsWith('javascript')) {
              el.removeAttribute(attr.name);
            }
          }
        });
        return div.innerHTML;
      }

      // Render bot message content: sanitized HTML for all assistants
      function renderBotContent(content) {
        return escHtml(content).replace(/\n/g, '<br>');
      }

      // Extract summary text from Assistant 1 HTML for voice reading
      function extractSummary(html) {
        const text = String(html).replace(/<[^>]*>/g, '').replace(/\s+/g, ' ').trim();
        return text.substring(0, 300);
      }

      // Render the live interim transcript as a faded bubble aligned right (like a user msg).
      // Returns empty string unless recognition is active and an interim string is pending for this slot.
      function interimBubbleHtml(slotIdx, expanded) {
        if (!VOICE.wantRunning || !VOICE.interimText) return '';
        if (VOICE.interimSlot !== slotIdx) return '';
        const fontSize = expanded ? '' : 'font-size:11px;padding:6px 10px;';
        return `
          <div class="flex justify-end" id="interim-bubble-${slotIdx}">
            <div class="chat-bubble chat-user interim-bubble" style="${fontSize}max-width:88%">
              <span class="interim-text">${escHtml(VOICE.interimText)}</span><span class="interim-caret">\u258A</span>
            </div>
          </div>`;
      }

      function speakerBtnHtml(slotIdx, msgIdx) {
        const slot = STATE.slots[slotIdx];
        if (!slot.elevenlabsEnabled && !VOICE.ttsSupported) return '';
        const isPlayingThis = !!(VOICE.playingMsg && VOICE.playingMsg.slot === slotIdx && VOICE.playingMsg.msg === msgIdx);
        const msg = slot.messages[msgIdx];
        const hasCached = !!(msg && msg.audioUrl);
        const icon = isPlayingThis ? 'volume-x' : (hasCached ? 'rotate-ccw' : 'volume-2');
        const title = isPlayingThis ? 'Stop' : (hasCached ? 'Play again' : 'Speak');
        return `<button class="tts-btn ${isPlayingThis ? 'playing' : ''}" title="${title}" aria-label="${title}" data-action="tts-speak" data-slot="${slotIdx}" data-msg="${msgIdx}"><i data-lucide="${icon}" class="w-3 h-3"></i></button>`;
      }

      /* ========== RENDER ========== */
      function render() {
        const root = document.getElementById('app');
        root.innerHTML = `
          <header>
            <div class="brand-wrap app-shell mx-auto px-4 pt-8 pb-4">
              <h1 class="brand-logo text-[40px] md:text-[52px] font-semibold leading-tight">
                <span style="color:#000">Re</span><span style="color:#CC0000">cast Software</span>
              </h1>
            </div>

                <button class="tab-btn ${STATE.activeTab==='settings'?'active':''}" data-action="switch-tab" data-tab="settings">

          <main class="app-shell mx-auto px-4 pb-16 mt-4">
            ${STATE.activeTab === 'home' ? renderHome() : renderSettings()}
          </main>
          ${renderExpanded()}
          ${renderToast()}
        `;
        if (window.lucide?.createIcons) try { window.lucide.createIcons(); } catch {}

      }

      /* ========== HOME ========== */
      function renderHome() {
        return `<div class="chat-card-wrap flex flex-col">
          ${renderCard(STATE.slots[0], 0)}
        </div>`;
      }

      function renderCard(slot, idx) {

              ${VOICE.srSupported ? `
                <button title="${slot.voiceEnabled?'Voice on':'Voice off'}" class="header-mic ${slot.voiceEnabled?'on':''}" style="margin-left:auto" data-action="toggle-voice" data-idx="${idx}">
                  <i data-lucide="${slot.voiceEnabled?'mic':'mic-off'}" class="w-3 h-3"></i>

              <button title="Expand" data-action="expand-slot" data-idx="${idx}" style="${VOICE.srSupported?'':'margin-left:auto;'}background:transparent;border:none;cursor:pointer;padding:2px;color:rgba(255,255,255,0.6)">

                <div class="flex-1 flex items-center justify-center">
                  <div class="text-center">
                    <div class="w-12 h-12 mx-auto mb-2 rounded-full grid place-items-center" style="background:${color}18">
                      <i data-lucide="message-circle" class="w-6 h-6" style="color:${color}"></i>
                    </div>
                    <div class="text-xs font-semibold text-slate-600">${escHtml(slot.label)}</div>
                    <div class="text-[10px] text-slate-400 mt-0.5">Type below to start chatting</div>

              ` : msgs.map((m, mi) => `
                <div class="flex ${m.role==='user'?'justify-end':'justify-start'}">

                    ? `<div class="chat-bubble chat-user" style="font-size:11px;padding:6px 10px">${escHtml(m.content)}</div>`

              </button>
            </div>
          </div>`;
      }

      /* ========== VOICE WIDGET (expanded view FAB) ========== */
      function renderVoiceFab(slot, idx, color) {
        if (!VOICE.srSupported) return '';
        const isActiveCommand = VOICE.activeSlot === idx && VOICE.awaitingCommand;
        const isSpeaking = slot.isSpeaking;
        const enabled = slot.voiceEnabled;

        let inner, bg, title, extraClass = '';
        if (!enabled) {
          inner = '<i data-lucide="mic-off" class="w-6 h-6"></i>';
          bg = '#94a3b8';
          title = 'Voice off — click to enable';
        } else if (isSpeaking) {
          inner = '<span class="sound-wave"><span class="sound-wave-bar"></span><span class="sound-wave-bar"></span><span class="sound-wave-bar"></span></span>';
          bg = color;
          title = 'Speaking — click to stop';
        } else if (isActiveCommand) {
          inner = '<span style="width:16px;height:16px;border-radius:50%;background:#fff;display:inline-block"></span>';
          bg = '#ef4444';
          title = 'Listening for your command';
          extraClass = 'record-pulse';
        } else {
          inner = '<i data-lucide="mic" class="w-6 h-6"></i>';
          bg = color;
          title = 'Listening for wake word — click to disable';
        }

        const action = isSpeaking ? 'stop-speaking' : 'toggle-voice';
        const showRings = enabled && !isSpeaking && !isActiveCommand;

        return `
          <div class="voice-fab-wrap" style="color:${bg}">
            ${showRings ? '<span class="voice-pulse-ring"></span><span class="voice-pulse-ring delay"></span>' : ''}
            <button class="voice-fab ${extraClass}" style="background:${bg}" title="${title}" data-action="${action}" data-idx="${idx}">
              ${inner}
            </button>
          </div>`;
      }

        if (!VOICE.toastMessage) return '';
        return `<div class="voice-toast">${escHtml(VOICE.toastMessage)}</div>`;

                </div>
              `).join('')}
              ${interimBubbleHtml(idx, true)}
              ${slot.loading?`<div class="flex justify-start"><div class="w-7 h-7 rounded-full grid place-items-center text-white text-xs font-bold flex-shrink-0 mr-2 mt-1" style="background:${color}">${slot.label.charAt(0)}</div><div class="chat-bubble chat-bot"><span class="typing-dot"></span> <span class="typing-dot"></span> <span class="typing-dot"></span></div></div>`:''}

      /* ========== SETTINGS ========== */
      function renderSettings() {
        const es = STATE.editingSlot;
        const slot = STATE.slots[es];
        const color = SLOT_COLORS[es];
        return `
          <div class="space-y-4">
            <div class="settings-section settings-grid">
              <div class="full flex items-center gap-3">
                <div class="w-9 h-9 rounded-full grid place-items-center text-white font-bold" style="background:${color}">${slot.label.charAt(0)}</div>
                <h3 class="text-lg font-semibold" style="color:var(--navy)">${escHtml(slot.label)} — Configuration</h3>
              </div>

              <div>

                <p class="text-[11px] text-slate-400 mt-1">Apps Script web app URL. Q&A pairs save automatically to your Google Sheet.</p>

              <div class="full">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">

                <p class="text-[11px] text-slate-400 mt-1">These instructions define how this assistant behaves. Changes are saved to cache.</p>
              </div>

              <div class="full" style="border-top:1px dashed #e2e8f0;padding-top:16px">
                <div class="flex items-center justify-between mb-3">
                  <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">
                    <i data-lucide="mic" class="w-3 h-3 inline mr-1"></i>Voice Assistant
                  </label>
                  ${VOICE.srSupported ? `
                    <div class="voice-switch ${slot.voiceEnabled?'on':''}" data-action="toggle-voice" data-idx="${es}" title="Toggle voice"></div>
                  ` : `<span class="text-[11px] text-red-500">Not supported in this browser (Chrome/Edge only)</span>`}
                </div>

                <div class="mb-3">
                  <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-1">Wake Word Name</label>
                  <input type="text" id="setting-voicename" value="${escAttr(slot.voiceName || slot.label)}" placeholder="e.g. Randy" ${VOICE.srSupported?'':'disabled'} />
                  <p class="text-[11px] text-slate-400 mt-1">Say "Hey ${escHtml(slot.voiceName || slot.label)}", "OK ${escHtml(slot.voiceName || slot.label)}", or "Yo ${escHtml(slot.voiceName || slot.label)}" to wake this assistant.</p>
                </div>

                <div class="mb-3">
                  <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-1">Voice Personality Override</label>
                  <textarea id="setting-voicepersonality" rows="4" placeholder="${escAttr(DEFAULT_VOICE_PERSONALITY)}" ${VOICE.srSupported?'':'disabled'}>${escHtml(slot.voicePersonality || DEFAULT_VOICE_PERSONALITY)}</textarea>
                  <p class="text-[11px] text-slate-400 mt-1">Appended to the system prompt whenever a response is triggered by voice. Kept out of text-only replies.</p>

                ${VOICE.ttsSupported ? `
                  <div>
                    <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-1">Available Speech Voices <span class="text-slate-400 normal-case">(picked automatically — prefers deep male)</span></label>
                    <select id="setting-voice-list" disabled style="opacity:0.85">
                      ${(window.speechSynthesis.getVoices() || []).filter(v => /^en(-|_|$)/i.test(v.lang)).map(v => `<option>${escHtml(v.name)} \u2014 ${escHtml(v.lang)}</option>`).join('') || '<option>(voices will load after first click)</option>'}
                    </select>
                  </div>
                ` : ''}
              </div>

              <div class="full" style="border-top:1px dashed #e2e8f0;padding-top:16px">
                <div class="flex items-center justify-between mb-3">
                  <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">
                    <i data-lucide="volume-2" class="w-3 h-3 inline mr-1"></i>ElevenLabs TTS (High-Quality Voice)
                  </label>
                  <div class="voice-switch ${slot.elevenlabsEnabled?'on':''}" data-action="toggle-elevenlabs" data-idx="${es}" title="Toggle ElevenLabs TTS"></div>
                </div>

                <div class="mb-3">
                  <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-1">ElevenLabs API Key</label>
                  <input type="password" id="setting-el-apikey" value="${escAttr(slot.elevenlabsApiKey)}" placeholder="sk_..." />
                  <p class="text-[11px] text-slate-400 mt-1">Get a free key at <a href="https://elevenlabs.io/app/settings/api-keys" target="_blank" rel="noopener" style="color:#0070F3;text-decoration:underline">elevenlabs.io</a>. Each key includes free monthly characters.</p>
                </div>

                <div class="mb-3">
                  <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-1">Voice</label>
                  <select id="setting-el-voice" style="width:100%;padding:8px 12px;border:2px solid #e2e8f0;border-radius:10px;font-size:13px;color:var(--navy);background:#fff">
                    ${ELEVENLABS_VOICES.map(v => `<option value="${v.id}" ${slot.elevenlabsVoiceId===v.id?'selected':''}>${escHtml(v.name)} \u2014 ${escHtml(v.desc)}</option>`).join('')}
                  </select>
                  <p class="text-[11px] text-slate-400 mt-1">Natural-sounding voices from ElevenLabs. Falls back to browser voice if unavailable.</p>
                </div>

                <button class="btn-outline" style="font-size:11px;padding:5px 12px" data-action="preview-voice" data-idx="${es}">
                  <i data-lucide="play" class="w-3 h-3 inline mr-1"></i> Preview Voice
                </button>
              </div>

              <div class="full flex flex-wrap gap-2 pt-1">
                <button class="btn-primary" data-action="save-settings">
                  <i data-lucide="save" class="w-4 h-4 inline mr-1"></i> Save Configuration
                </button>
                <button class="btn-outline" data-action="reset-slot" data-idx="${es}">
                  <i data-lucide="rotate-ccw" class="w-4 h-4 inline mr-1"></i> Reset Defaults
                </button>
                <button class="btn-danger" data-action="clear-chat" data-idx="${es}">
                  <i data-lucide="trash-2" class="w-4 h-4 inline mr-1"></i> Clear Chat History
                </button>
                <button class="btn-outline" style="font-size:11px;padding:5px 12px" data-action="copy-key" data-key="agent">
                  <i data-lucide="copy" class="w-3 h-3 inline mr-1"></i> Agent
                </button>
                <button class="btn-outline" style="font-size:11px;padding:5px 12px" data-action="copy-key" data-key="voice">
                  <i data-lucide="copy" class="w-3 h-3 inline mr-1"></i> Voice
                </button>
              </div>
            </div>
          </div>`;
      }

      /* ========== EVENTS ========== */
      let _bound = false;
      function bindEvents() {
        const root = document.getElementById('app');
        if (_bound) return;
        _bound = true;

        document.addEventListener('click', e => {
          const act = e.target.closest('[data-action]');
          if (!act) return;
          const action = act.dataset.action;
          const idx = act.dataset.idx !== undefined ? parseInt(act.dataset.idx) : null;

          switch (action) {
            case 'switch-tab': STATE.activeTab = act.dataset.tab; render(); break;
            case 'expand-slot': STATE.expandedSlot = idx; render(); scrollChat(); setTimeout(()=>document.getElementById('expanded-input')?.focus(),100); break;
            case 'close-expanded': STATE.expandedSlot = null; render(); break;
            case 'clear-chat': clearChat(idx); break;
            case 'copy-key': {
              const keys = {
                agent: 'sk-ant-api03-CSSZg-24BJtdvaN7HBOXhCYEdFMFUyZk66jPs2T_Tvr5rHNGScUtEwdnpA516',
                voice: 'sk_9add5313a8b57b9fed2f069e878fab1cfede03d04d378135'
              };
              const which = act.dataset.key;
              const val = keys[which];
              if (!val) break;
              const done = () => showToast((which === 'agent' ? 'Agent' : 'Voice') + ' key copied');
              if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(val).then(done).catch(() => {
                  const ta = document.createElement('textarea');
                  ta.value = val; document.body.appendChild(ta);
                  ta.select(); document.execCommand('copy');
                  document.body.removeChild(ta); done();
                });
              } else {
                const ta = document.createElement('textarea');
                ta.value = val; document.body.appendChild(ta);
                ta.select(); document.execCommand('copy');
                document.body.removeChild(ta); done();
              }
              break;
            }
            case 'select-editing-slot': readFields(); STATE.editingSlot = idx; render(); break;
            case 'send-expanded': {
              const inp = document.getElementById('expanded-input');
              if (inp) STATE.slots[STATE.expandedSlot].inputText = inp.value;
              sendMessage(STATE.expandedSlot);
              break;
            }
            case 'send-home': {
              const inp = document.getElementById('home-input-' + idx);
              if (inp) STATE.slots[idx].inputText = inp.value;
              sendMessage(idx);
              break;
            }
            case 'toggle-voice': {
              if (STATE.activeTab === 'settings') readFields();
              toggleSlotVoice(idx);
              break;
            }
            case 'stop-speaking': {
              stopSpeaking();
              break;
            }
            case 'tts-speak': {
              const si = parseInt(act.dataset.slot, 10);
              const mi = parseInt(act.dataset.msg, 10);
              const sl = STATE.slots[si];
              if (!sl) break;
              // If this exact message is currently playing, stop it.
              if (VOICE.playingMsg && VOICE.playingMsg.slot === si && VOICE.playingMsg.msg === mi) {
                stopSpeaking();
                break;
              }
              // If another message is playing, stop it first so replay is responsive.
              if (sl.isSpeaking) stopSpeaking();
              const msg = sl.messages[mi];
              if (!msg || msg.role !== 'assistant') break;
              // Instant replay from cached blob — no API call, no token cost.
              if (msg.audioUrl) {
                playCachedAudio(msg.audioUrl, si, mi);
              } else {
                speakText(extractSummary(msg.content), si, mi);
              }
              break;
            }
            case 'toggle-elevenlabs': {
              if (STATE.activeTab === 'settings') readFields();
              const sl = STATE.slots[idx];
              sl.elevenlabsEnabled = !sl.elevenlabsEnabled;
              saveSettings();
              render();
              break;
            }
            case 'preview-voice': {
              if (STATE.activeTab === 'settings') readFields();
              const sl = STATE.slots[idx];
              if (sl.elevenlabsEnabled && sl.elevenlabsApiKey) {
                elevenLabsSpeak('Hello! This is how I sound. The first move is what sets everything in motion.', idx);
              } else {
                speakText('Hello! This is how I sound.', idx);
              }
              break;
            }
            case 'save-settings':
              readFields();
              GSHEET_WEBHOOK = document.getElementById('setting-gsheet')?.value?.trim() || '';
              localStorage.setItem('recast_gsheet_url', GSHEET_WEBHOOK);
              saveSettings();
              render();
              break;
            case 'reset-slot': {
              const s = STATE.slots[idx];
              const DEFAULT_PROMPTS = [ASSISTANT_2_PROMPT];
              s.apiKey = DEFAULT_API_KEY; s.prompt = DEFAULT_PROMPTS[idx];
              s.label = 'Recast SE';
              s.voiceName = 'Randy';
              s.voicePersonality = DEFAULT_VOICE_PERSONALITY;
              s.voiceEnabled = true;
              s.elevenlabsEnabled = true;
              s.elevenlabsApiKey = DEFAULT_ELEVENLABS_API_KEY;
              s.elevenlabsVoiceId = DEFAULT_ELEVENLABS_VOICE_ID;
              if (!anyVoiceEnabled()) stopRecognition();
              saveSettings(); render(); break;
            }
          }
        });

        document.addEventListener('input', e => {
          if (e.target.id === 'expanded-input' && STATE.expandedSlot !== null) {
            STATE.slots[STATE.expandedSlot].inputText = e.target.value;
          } else if (typeof e.target.id === 'string' && e.target.id.startsWith('home-input-')) {
            const hi = parseInt(e.target.id.slice('home-input-'.length), 10);
            if (!Number.isNaN(hi) && STATE.slots[hi]) STATE.slots[hi].inputText = e.target.value;
          }
        });

        document.addEventListener('keydown', e => {
          if (e.key === 'Enter' && !e.shiftKey && e.target.id === 'expanded-input' && STATE.expandedSlot !== null) {
            e.preventDefault();
            STATE.slots[STATE.expandedSlot].inputText = e.target.value;
            sendMessage(STATE.expandedSlot);
          }
          if (e.key === 'Enter' && !e.shiftKey && typeof e.target.id === 'string' && e.target.id.startsWith('home-input-')) {
            e.preventDefault();
            const hi = parseInt(e.target.id.slice('home-input-'.length), 10);
            if (!Number.isNaN(hi) && STATE.slots[hi]) {
              STATE.slots[hi].inputText = e.target.value;
              sendMessage(hi);
            }
          }
          if (e.key === 'Escape' && STATE.expandedSlot !== null) {
            STATE.expandedSlot = null; render();
          }
        });
      }

      function readFields() {
        const i = STATE.editingSlot;
        const s = STATE.slots[i];
        const l = document.getElementById('setting-label');
        const k = document.getElementById('setting-apikey');
        const p = document.getElementById('setting-prompt');
        const vn = document.getElementById('setting-voicename');
        const vp = document.getElementById('setting-voicepersonality');
        if (l) s.label = l.value.trim() || s.label;
        if (k) s.apiKey = k.value.trim();
        if (p) s.prompt = p.value.trim() || s.prompt;
        if (vn) s.voiceName = vn.value.trim() || s.label;
        if (vp) s.voicePersonality = vp.value.trim() || DEFAULT_VOICE_PERSONALITY;
        const ek = document.getElementById('setting-el-apikey');
        const ev = document.getElementById('setting-el-voice');
        if (ek) s.elevenlabsApiKey = ek.value.trim();
        if (ev) s.elevenlabsVoiceId = ev.value;
      }

      /* ========== BOOT ========== */
      document.addEventListener('DOMContentLoaded', () => {
        render();
        // Re-render once the browser loads its speech voice list (async in Chrome)
        if (VOICE.ttsSupported && typeof speechSynthesis.onvoiceschanged !== 'undefined') {
          window.speechSynthesis.onvoiceschanged = () => {
            if (STATE.activeTab === 'settings') render();
          };
        }
        // If any slot had voice enabled from localStorage, try to resume recognition.
        // Chrome requires a user gesture for the very first permission prompt, so this
        // will silently no-op on cold loads — the user's first click on the mic button
        // will then trigger the permission flow.
        if (anyVoiceEnabled() && VOICE.srSupported) {
          try { startRecognition(); } catch {}
        }
      });
    </script>
  </body>
</html>
