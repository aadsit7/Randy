<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Recast — AI Assistant Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --bg-main: #ffffff;
        --primary: #0070F3;
        --primary-hover: #005AD0;
        --navy: #0A1C60;
        --radius: 1rem;
        --shadow-card: 0 2px 10px rgba(15,23,42,0.06), 0 1px 3px rgba(15,23,42,0.04);
        --shadow-hover: 0 14px 36px rgba(15,23,42,0.10), 0 4px 12px rgba(15,23,42,0.06);
      }
      html, body { background: var(--bg-main); color: #111827; font-family: Inter, system-ui, sans-serif; }
      .card { border-radius: var(--radius); background: rgba(255,255,255,0.88); border: 1px solid rgba(226,232,240,0.70); box-shadow: var(--shadow-card); transition: box-shadow 300ms, transform 300ms; }
      .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
      .btn-primary { background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-weight: 600; font-size: 13px; cursor: pointer; transition: background 0.2s; }
      .btn-primary:hover { background: var(--primary-hover); }
      .btn-outline { background: transparent; color: var(--navy); border: 2px solid var(--navy); border-radius: 8px; padding: 6px 14px; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s; }
      .btn-outline:hover { color: var(--primary); border-color: var(--primary); }
      .btn-danger { background: transparent; color: #ef4444; border: 2px solid #ef4444; border-radius: 8px; padding: 6px 14px; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s; }
      .btn-danger:hover { background: #ef4444; color: #fff; }
      input[type="text"], input[type="password"], textarea {
        width: 100%; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 10px;
        font-size: 14px; font-weight: 500; color: var(--navy); background: #fff; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      }
      input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,112,243,0.1); }
      textarea { resize: vertical; min-height: 80px; }
      .chat-bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; max-width: 85%; word-wrap: break-word; white-space: pre-wrap; }
      .chat-user { background: var(--primary); color: #fff; border-radius: 12px 12px 4px 12px; margin-left: auto; }
      .chat-bot { background: #f1f5f9; color: #1e293b; border-radius: 12px 12px 12px 4px; }
      .chat-input-row { display: flex; gap: 8px; align-items: center; padding: 12px; border-top: 1px solid #e2e8f0; background: #fff; }
      .chat-input-row input { flex: 1; border-radius: 9999px; padding: 10px 16px; font-size: 14px; }
      .chat-send { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); color: #fff; border: none; display: grid; place-items: center; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
      .chat-send:hover { background: var(--primary-hover); }
      .chat-send:disabled { background: #cbd5e1; cursor: not-allowed; }
      @keyframes dotPulse { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
      .typing-dot { width: 8px; height: 8px; border-radius: 50%; background: #94a3b8; display: inline-block; animation: dotPulse 1.4s infinite ease-in-out both; }
      .typing-dot:nth-child(1) { animation-delay: -0.32s; }
      .typing-dot:nth-child(2) { animation-delay: -0.16s; }
      .settings-section { border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; background: #fafbfc; }
      .tab-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; font-size: 14px; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; transition: all 0.2s; }
      .tab-btn.active { background: var(--primary); color: #fff; }
      .tab-btn:not(.active) { background: transparent; color: var(--navy); }
      .tab-btn:not(.active):hover { background: #f1f5f9; }

      /* ===== Voice widget ===== */
      .voice-fab { position: fixed; bottom: 24px; right: 24px; z-index: 60; width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer; display: grid; place-items: center; color: #fff; box-shadow: 0 8px 24px rgba(15,23,42,0.18); transition: transform 0.15s ease; }
      .voice-fab:hover { transform: scale(1.06); }
      .voice-fab:disabled { cursor: not-allowed; opacity: 0.7; }
      .voice-fab-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 60; width: 56px; height: 56px; }
      .voice-fab-wrap .voice-fab { position: absolute; inset: 0; }
      .voice-pulse-ring { position: absolute; inset: 0; border-radius: 50%; pointer-events: none; border: 3px solid currentColor; animation: voicePulse 1.8s ease-out infinite; }
      .voice-pulse-ring.delay { animation-delay: 0.9s; }
      @keyframes voicePulse {
        0% { transform: scale(1); opacity: 0.55; }
        100% { transform: scale(1.9); opacity: 0; }
      }
      .record-pulse { animation: recordPulse 1.2s ease-in-out infinite; }
      @keyframes recordPulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.55); }
        50%      { box-shadow: 0 0 0 14px rgba(239,68,68,0); }
      }
      .sound-wave { display: inline-flex; align-items: center; gap: 3px; height: 20px; }
      .sound-wave-bar { display: block; width: 4px; height: 100%; background: currentColor; border-radius: 2px; transform-origin: center; animation: soundWave 0.9s ease-in-out infinite; }
      .sound-wave-bar:nth-child(1) { animation-delay: -0.2s; }
      .sound-wave-bar:nth-child(2) { animation-delay: -0.1s; }
      .sound-wave-bar:nth-child(3) { animation-delay: 0s; }
      @keyframes soundWave {
        0%, 100% { transform: scaleY(0.3); }
        50%      { transform: scaleY(1); }
      }
      .voice-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 100; background: #0f172a; color: #fff; padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: 0 12px 30px rgba(15,23,42,0.25); pointer-events: none; animation: toastIn 0.25s ease-out; }
      @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 12px); } to { opacity: 1; transform: translate(-50%, 0); } }
      .voice-switch { position: relative; display: inline-flex; align-items: center; width: 44px; height: 24px; border-radius: 9999px; background: #cbd5e1; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
      .voice-switch.on { background: #10b981; }
      .voice-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: left 0.2s; box-shadow: 0 1px 3px rgba(15,23,42,0.2); }
      .voice-switch.on::after { left: 22px; }
      .header-mic { background: transparent; border: none; cursor: pointer; padding: 2px; display: grid; place-items: center; border-radius: 4px; }
      .header-mic.on { color: #34d399; }
      .header-mic:not(.on) { color: rgba(255,255,255,0.4); }
      .header-mic:hover { background: rgba(255,255,255,0.08); }

      @media (prefers-reduced-motion: reduce) {
        .voice-pulse-ring, .record-pulse, .sound-wave-bar, .voice-toast { animation: none !important; }
        .voice-pulse-ring { display: none; }
      }
    </style>
  </head>
  <body class="min-h-screen antialiased">
    <div id="app"></div>
    <script>
      const ASSISTANT_2_PROMPT = `# Role
You are a world-class product expert and technical communicator specializing in Recast Software's **Application Workspace**. You combine deep product knowledge with the rare ability to explain complex software concepts the way Geoffrey Hinton explains AI—turning technical depth into clear, intuitive understanding that anyone can grasp.

# Task
Answer user questions about Application Workspace by first researching Recast Software's official support documentation, then delivering a confident, accurate, and beautifully simple explanation of what you find.

# Context
Users need to understand Application Workspace—its capabilities, value, and how it works—but may not be technical. Your job is to bridge that gap: be the trusted expert who has done the hard research work so the user doesn't have to, and then translate that into something memorable and clear.

# Instructions
**Research first, answer second.**
Before forming any response, search Recast Software's support documentation for Application Workspace at:
https://docs.liquit.com/
https://docs.recastsoftware.com
https://docs.recastsoftware.com/help
https://www.reddit.com/r/RecastSoftware/
https://www.recastsoftware.com/resources-collection/application-workspace/
Your answer must be grounded in what you find in the above sites or on the attached files. Do not speculate or rely on prior knowledge alone—confirm it against the source.

**Accuracy is non-negotiable.**
Only assert something as fact if you are highly confident based on your research. If the documentation is unclear or incomplete on a point, acknowledge the gap honestly rather than fill it with assumptions.

**Explain like Hinton—simple, precise, vivid.**
Once you are confident in the facts, translate them into plain language. Use analogies, concrete examples, and everyday comparisons to make capabilities and value immediately intuitive. Eliminate jargon unless necessary, and define it when you use it.

**Only show the final output.**
Do not narrate your research process, show intermediate steps, cite sources inline, or explain what you're about to do. Deliver only the polished, clear answer as if you already knew it cold.

**Constraints:**
- Never fabricate product features or capabilities
- Never pad the answer with generic filler or hedging language
- If a question falls outside Application Workspace or Recast Software's scope, say so directly and briefly

When you are unsure or don't have reliable information, say so clearly. Never fabricate sources, citations, statistics, quotes, or URLs. If a question is outside your reliable knowledge, state that explicitly rather than guessing. Distinguish clearly between what you know confidently, what you think is likely, and what you're speculating about. If asked for specific data, either provide it with a confidence note or say you can't verify it. Prefer being honest and incomplete over sounding confident and wrong.`;

      // Paste your Anthropic API key between the quotes to pre-fill every assistant's
      // Settings → API Key field. The key is never sent anywhere except api.anthropic.com
      // and is cached to the browser's localStorage the first time the user clicks
      // "Save Configuration". Leave as '' to force manual entry.
      const DEFAULT_API_KEY = '';

      const DEFAULT_VOICE_PERSONALITY = "Keep all responses to 2-3 short sentences since they will be spoken aloud. Use natural conversational language. Say numbers the way people talk \u2014 like '120 grand' not '$120,000'. Never use markdown, bullet points, or formatting. Be direct and warm.";

      function makeSlot(label, prompt) {
        return {
          label, apiKey: DEFAULT_API_KEY, prompt,
          messages: [], inputText: '', loading: false,
          voiceEnabled: false,
          voiceName: label,
          voicePersonality: DEFAULT_VOICE_PERSONALITY,
          isListening: false,
          isSpeaking: false
        };
      }

      /* ========== STATE ========== */
      const STATE = {
        activeTab: 'home',
        expandedSlot: null,
        editingSlot: 0,
        slots: [
          makeSlot('Assistant 1', 'You are a helpful AI assistant. Be concise and friendly.'),
          makeSlot('Assistant 2', ASSISTANT_2_PROMPT),
          makeSlot('Assistant 3', 'You are a helpful AI assistant. Be concise and friendly.'),
          makeSlot('Assistant 4', 'You are a helpful AI assistant. Be concise and friendly.')
        ]
      };

      /* ========== VOICE GLOBAL STATE ========== */
      const VOICE = {
        srSupported: !!(window.SpeechRecognition || window.webkitSpeechRecognition),
        ttsSupported: !!window.speechSynthesis,
        recognition: null,       // shared SpeechRecognition instance
        wantRunning: false,      // should the recognizer be running?
        audioCtx: null,          // lazy AudioContext for beep
        activeSlot: null,        // slot index currently handling a voice command (post wake-word)
        awaitingCommand: false,  // wake word heard, waiting for the actual question
        wakeTimeoutId: null,     // 30s timeout to drop back to passive listening
        permissionDenied: false,
        toastTimeoutId: null,
        toastMessage: ''
      };

      const SLOT_COLORS = ['#0070F3','#10b981','#8b5cf6','#f59e0b'];

      /* ========== LOCAL STORAGE ========== */
      const SETTINGS_KEY = 'recast_chatbot_settings';

      function saveSettings() {
        const data = STATE.slots.map(s => ({
          label: s.label,
          apiKey: s.apiKey,
          prompt: s.prompt,
          voiceEnabled: s.voiceEnabled,
          voiceName: s.voiceName,
          voicePersonality: s.voicePersonality
        }));
        try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(data)); } catch {}
      }

      function loadSettings() {
        try {
          const raw = localStorage.getItem(SETTINGS_KEY);
          if (!raw) return;
          const data = JSON.parse(raw);
          data.forEach((d, i) => {
            if (STATE.slots[i]) {
              STATE.slots[i].label = d.label || STATE.slots[i].label;
              STATE.slots[i].apiKey = d.apiKey || DEFAULT_API_KEY;
              STATE.slots[i].prompt = d.prompt || STATE.slots[i].prompt;
              STATE.slots[i].voiceEnabled = !!d.voiceEnabled;
              STATE.slots[i].voiceName = d.voiceName || STATE.slots[i].label;
              STATE.slots[i].voicePersonality = d.voicePersonality || DEFAULT_VOICE_PERSONALITY;
            }
          });
        } catch {}
      }

      loadSettings();

      /* ========== VOICE HELPERS ========== */
      function showToast(msg) {
        VOICE.toastMessage = msg;
        render();
        if (VOICE.toastTimeoutId) clearTimeout(VOICE.toastTimeoutId);
        VOICE.toastTimeoutId = setTimeout(() => {
          VOICE.toastMessage = '';
          render();
        }, 3500);
      }

      function playBeep() {
        if (!VOICE.audioCtx) {
          try { VOICE.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
          catch { return; }
        }
        try {
          const ctx = VOICE.audioCtx;
          if (ctx.state === 'suspended') ctx.resume();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(880, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(1320, ctx.currentTime + 0.12);
          gain.gain.setValueAtTime(0.0001, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.18, ctx.currentTime + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.18);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + 0.2);
        } catch {}
      }

      function stripMarkdown(text) {
        return String(text)
          .replace(/```[\s\S]*?```/g, ' ')          // fenced code blocks
          .replace(/`([^`]+)`/g, '$1')               // inline code
          .replace(/\*\*([^*]+)\*\*/g, '$1')         // bold
          .replace(/__([^_]+)__/g, '$1')             // bold alt
          .replace(/(^|\s)\*([^*\n]+)\*/g, '$1$2')   // italic
          .replace(/(^|\s)_([^_\n]+)_/g, '$1$2')     // italic alt
          .replace(/^#{1,6}\s+/gm, '')               // headers
          .replace(/^\s*[-*+]\s+/gm, '')             // bullets
          .replace(/^\s*\d+\.\s+/gm, '')             // numbered lists
          .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')   // links
          .replace(/!\[([^\]]*)\]\([^)]+\)/g, '$1')  // images
          .replace(/^\s*>\s?/gm, '')                 // blockquotes
          .replace(/\n{3,}/g, '\n\n')
          .trim();
      }

      function pickDeepVoice() {
        if (!VOICE.ttsSupported) return null;
        const voices = window.speechSynthesis.getVoices() || [];
        if (voices.length === 0) return null;
        const enVoices = voices.filter(v => /^en(-|_|$)/i.test(v.lang));
        const pool = enVoices.length ? enVoices : voices;
        return pool.find(v => /male/i.test(v.name))
            || pool.find(v => /\b(david|daniel|alex|tom|mark|eric|fred|george|james|guy)\b/i.test(v.name))
            || pool.find(v => /google us english/i.test(v.name))
            || pool[0];
      }

      function speakText(text, idx) {
        if (!VOICE.ttsSupported) return;
        const clean = stripMarkdown(text);
        if (!clean) return;
        try { window.speechSynthesis.cancel(); } catch {}
        const u = new SpeechSynthesisUtterance(clean);
        const v = pickDeepVoice();
        if (v) u.voice = v;
        u.pitch = 0.85;
        u.rate = 0.95;
        u.onstart = () => { STATE.slots[idx].isSpeaking = true; render(); };
        u.onend = () => {
          STATE.slots[idx].isSpeaking = false;
          VOICE.activeSlot = null;
          VOICE.awaitingCommand = false;
          render();
        };
        u.onerror = u.onend;
        try { window.speechSynthesis.speak(u); }
        catch { STATE.slots[idx].isSpeaking = false; render(); }
      }

      function stopSpeaking() {
        if (!VOICE.ttsSupported) return;
        try { window.speechSynthesis.cancel(); } catch {}
        STATE.slots.forEach(s => { s.isSpeaking = false; });
        render();
      }

      /* ========== WAKE WORD + RECOGNITION ========== */
      function anyVoiceEnabled() {
        return STATE.slots.some(s => s.voiceEnabled);
      }

      function escapeRegex(s) { return String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

      function buildWakePattern(name) {
        const n = escapeRegex(String(name).trim());
        return new RegExp('\\b(?:hey|hi|ok|okay|yo)\\s+' + n + '\\b[\\s,.!?:;-]*', 'i');
      }

      function handleVoiceTranscript(raw) {
        const text = String(raw).trim();
        if (!text) return;

        // Echo guard: while TTS is speaking, only accept short stop commands so the
        // assistant's own voice doesn't get re-transcribed as input.
        if (STATE.slots.some(s => s.isSpeaking)) {
          const t = text.toLowerCase();
          if (/^(stop|cancel|quiet|shut up|never mind)\b/.test(t)) stopSpeaking();
          return;
        }

        // If we are already waiting for the command following a wake word, treat this
        // utterance as the command.
        if (VOICE.activeSlot !== null && VOICE.awaitingCommand) {
          // Strip a leading wake phrase if the user repeated it
          let cleaned = text;
          const slot = STATE.slots[VOICE.activeSlot];
          if (slot) {
            const p = buildWakePattern(slot.voiceName || slot.label);
            cleaned = text.replace(p, '').trim();
          }
          const lower = cleaned.toLowerCase();
          if (lower === 'stop' || lower === 'cancel' || lower === 'never mind') {
            stopSpeaking();
            VOICE.activeSlot = null;
            VOICE.awaitingCommand = false;
            if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
            STATE.slots.forEach(s => { s.isListening = false; });
            render();
            return;
          }
          if (cleaned.length < 2) return; // ignore stray noise
          if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
          VOICE.awaitingCommand = false;
          const idx = VOICE.activeSlot;
          STATE.slots[idx].isListening = false;
          STATE.slots[idx].inputText = cleaned;
          sendMessage(idx, true);
          return;
        }

        // "Stop speaking" shortcut while TTS is active
        const lower = text.toLowerCase();
        if (/\b(stop|cancel|quiet|shut up|never mind)\b/.test(lower) && STATE.slots.some(s => s.isSpeaking)) {
          stopSpeaking();
          return;
        }

        // Otherwise scan for a wake word across enabled slots
        for (let i = 0; i < STATE.slots.length; i++) {
          const slot = STATE.slots[i];
          if (!slot.voiceEnabled) continue;
          const pattern = buildWakePattern(slot.voiceName || slot.label);
          const match = text.match(pattern);
          if (!match) continue;

          playBeep();

          // If the user spoke the wake word AND the question in one breath
          // (e.g. "Hey Assistant 2 what is application workspace"), handle it now.
          const after = text.slice(match.index + match[0].length).trim();
          if (after.length >= 2) {
            VOICE.activeSlot = i;
            VOICE.awaitingCommand = false;
            slot.isListening = false;
            slot.inputText = after;
            sendMessage(i, true);
            return;
          }

          // Otherwise arm: wait for the next utterance as the command.
          VOICE.activeSlot = i;
          VOICE.awaitingCommand = true;
          slot.isListening = true;
          if (VOICE.wakeTimeoutId) clearTimeout(VOICE.wakeTimeoutId);
          VOICE.wakeTimeoutId = setTimeout(() => {
            VOICE.activeSlot = null;
            VOICE.awaitingCommand = false;
            slot.isListening = false;
            VOICE.wakeTimeoutId = null;
            render();
          }, 30000);
          render();
          return;
        }
      }

      function ensureRecognition() {
        if (!VOICE.srSupported) return null;
        if (VOICE.recognition) return VOICE.recognition;
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        const r = new SR();
        r.continuous = true;
        r.interimResults = true;
        r.lang = 'en-US';
        r.onresult = (e) => {
          for (let i = e.resultIndex; i < e.results.length; i++) {
            const res = e.results[i];
            if (res.isFinal) {
              handleVoiceTranscript(res[0].transcript);
            }
          }
        };
        r.onerror = (e) => {
          if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
            VOICE.permissionDenied = true;
            VOICE.wantRunning = false;
            STATE.slots.forEach(s => { s.voiceEnabled = false; s.isListening = false; });
            saveSettings();
            showToast('Microphone access required for voice assistant');
            render();
            return;
          }
          // For transient errors (no-speech, aborted, network), allow onend to restart.
        };
        r.onend = () => {
          // Auto-restart if any slot still wants voice and we haven't been told to stop.
          if (VOICE.wantRunning && anyVoiceEnabled()) {
            try { r.start(); } catch {}
          }
        };
        VOICE.recognition = r;
        return r;
      }

      function startRecognition() {
        const r = ensureRecognition();
        if (!r) return;
        VOICE.wantRunning = true;
        try { r.start(); }
        catch (e) { /* already started - ignore */ }
      }

      function stopRecognition() {
        VOICE.wantRunning = false;
        if (VOICE.recognition) {
          try { VOICE.recognition.stop(); } catch {}
        }
        if (VOICE.wakeTimeoutId) { clearTimeout(VOICE.wakeTimeoutId); VOICE.wakeTimeoutId = null; }
        VOICE.activeSlot = null;
        VOICE.awaitingCommand = false;
        STATE.slots.forEach(s => { s.isListening = false; });
      }

      function toggleSlotVoice(idx) {
        const slot = STATE.slots[idx];
        if (!VOICE.srSupported) { showToast('Voice not supported in this browser'); return; }
        slot.voiceEnabled = !slot.voiceEnabled;
        saveSettings();
        if (slot.voiceEnabled) {
          startRecognition();
        } else if (!anyVoiceEnabled()) {
          stopRecognition();
        }
        render();
      }

      /* ========== API ========== */
      async function sendMessage(idx, viaVoice = false) {
        const slot = STATE.slots[idx];
        const text = slot.inputText.trim();
        if (!text || slot.loading) return;

        slot.messages.push({ role: 'user', content: text });
        slot.inputText = '';
        slot.loading = true;
        render();
        scrollChat();

        try {
          const headers = {
            "Content-Type": "application/json",
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
          };
          if (slot.apiKey) headers["x-api-key"] = slot.apiKey;

          const systemPrompt = viaVoice && slot.voicePersonality
            ? slot.prompt + '\n\n' + slot.voicePersonality
            : slot.prompt;

          const resp = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers,
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1024,
              system: systemPrompt,
              messages: slot.messages.filter(m => m.role === 'user' || m.role === 'assistant')
            })
          });

          const data = await resp.json();
          if (data.error) throw new Error(data.error.message || 'API error');
          const reply = data.content?.map(c => c.text || '').join('') || 'No response.';
          slot.messages.push({ role: 'assistant', content: reply });
          if (viaVoice) speakText(reply, idx);
        } catch (err) {
          slot.messages.push({ role: 'assistant', content: '\u26a0\ufe0f ' + (err.message || 'Connection failed. Check your API key in Settings.') });
          if (viaVoice) {
            VOICE.activeSlot = null;
            VOICE.awaitingCommand = false;
          }
        }

        slot.loading = false;
        render();
        scrollChat();
      }

      function scrollChat() {
        setTimeout(() => {
          const el = document.getElementById('chat-scroll');
          if (el) el.scrollTop = el.scrollHeight;
          for (let i = 0; i < STATE.slots.length; i++) {
            const h = document.getElementById('home-scroll-' + i);
            if (h) h.scrollTop = h.scrollHeight;
          }
        }, 50);
      }

      function clearChat(idx) {
        STATE.slots[idx].messages = [];
        STATE.slots[idx].inputText = '';
        STATE.slots[idx].loading = false;
        render();
      }

      /* ========== HELPERS ========== */
      function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
      function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

      /* ========== RENDER ========== */
      function render() {
        const root = document.getElementById('app');
        root.innerHTML = `
          <header>
            <div class="mx-auto max-w-6xl px-4 pt-8 pb-4">
              <h1 class="text-[40px] md:text-[52px] font-semibold leading-tight">
                <span style="color:#000">Re</span><span style="color:#CC0000">cast Software</span>
              </h1>
            </div>
            <div class="mx-auto max-w-6xl px-4 pb-2">
              <div class="flex gap-2 bg-white/60 backdrop-blur-lg p-1 rounded-lg ring-1 ring-slate-200 inline-flex">
                <button class="tab-btn ${STATE.activeTab==='home'?'active':''}" data-action="switch-tab" data-tab="home">
                  <i data-lucide="home" class="w-4 h-4"></i> Home
                </button>
                <button class="tab-btn ${STATE.activeTab==='settings'?'active':''}" data-action="switch-tab" data-tab="settings">
                  <i data-lucide="settings" class="w-4 h-4"></i> Settings
                </button>
              </div>
            </div>
          </header>
          <main class="mx-auto max-w-6xl px-4 pb-16 mt-4">
            ${STATE.activeTab === 'home' ? renderHome() : renderSettings()}
          </main>
          ${renderExpanded()}
          ${renderToast()}
        `;
        if (window.lucide?.createIcons) try { window.lucide.createIcons(); } catch {}
        bindEvents();
      }

      /* ========== HOME ========== */
      function renderHome() {
        return `<div class="grid grid-cols-2 gap-4" style="min-height:calc(100vh - 220px)">
          ${STATE.slots.map((s, i) => renderCard(s, i)).join('')}
        </div>`;
      }

      function renderCard(slot, idx) {
        const color = SLOT_COLORS[idx];
        const msgs = slot.messages;
        return `
          <div class="card flex flex-col overflow-hidden" style="aspect-ratio:1/1;position:relative">
            <div class="flex items-center gap-2 px-3 py-2 border-b border-slate-100" style="background:var(--navy)">
              <div class="w-6 h-6 rounded-full grid place-items-center text-white font-bold text-[10px]" style="background:${color}">${slot.label.charAt(0)}</div>
              <span class="text-xs font-semibold text-white">${escHtml(slot.label)}</span>
              ${VOICE.srSupported ? `
                <button title="${slot.voiceEnabled?'Voice on':'Voice off'}" class="header-mic ${slot.voiceEnabled?'on':''}" style="margin-left:auto" data-action="toggle-voice" data-idx="${idx}">
                  <i data-lucide="${slot.voiceEnabled?'mic':'mic-off'}" class="w-3 h-3"></i>
                </button>
              ` : ''}
              <button title="Expand" data-action="expand-slot" data-idx="${idx}" style="${VOICE.srSupported?'':'margin-left:auto;'}background:transparent;border:none;cursor:pointer;padding:2px;color:rgba(255,255,255,0.6)">
                <i data-lucide="maximize-2" class="w-3 h-3"></i>
              </button>
            </div>
            <div id="home-scroll-${idx}" class="flex-1 overflow-y-auto px-3 py-2 flex flex-col gap-1.5" style="background:#fafbfc;min-height:0">
              ${msgs.length === 0 ? `
                <div class="flex-1 flex items-center justify-center">
                  <div class="text-center">
                    <div class="w-12 h-12 mx-auto mb-2 rounded-full grid place-items-center" style="background:${color}18">
                      <i data-lucide="message-circle" class="w-6 h-6" style="color:${color}"></i>
                    </div>
                    <div class="text-xs font-semibold text-slate-600">${escHtml(slot.label)}</div>
                    <div class="text-[10px] text-slate-400 mt-0.5">Type below to start chatting</div>
                  </div>
                </div>
              ` : msgs.map(m => `
                <div class="flex ${m.role==='user'?'justify-end':'justify-start'}">
                  <div class="${m.role==='user'?'chat-user':'chat-bot'}" style="font-size:11px;padding:6px 10px;max-width:85%;word-wrap:break-word;white-space:pre-wrap">${escHtml(m.content)}</div>
                </div>
              `).join('')}
              ${slot.loading?'<div class="flex justify-start"><div class="chat-bot" style="padding:6px 12px"><span class="typing-dot"></span> <span class="typing-dot"></span> <span class="typing-dot"></span></div></div>':''}
            </div>
            <div class="flex items-center gap-1.5 px-2 py-2 border-t border-slate-200" style="background:#fff">
              <input type="text" id="home-input-${idx}" placeholder="Type a message..." value="${escAttr(slot.inputText)}" ${slot.loading?'disabled':''} style="flex:1;padding:6px 12px;border:1.5px solid #e2e8f0;border-radius:9999px;font-size:12px;outline:none;color:var(--navy);min-width:0" />
              <button class="chat-send" style="width:30px;height:30px" data-action="send-home" data-idx="${idx}" ${slot.loading?'disabled':''}>
                <i data-lucide="send" class="w-3 h-3"></i>
              </button>
            </div>
          </div>`;
      }

      /* ========== VOICE WIDGET (expanded view FAB) ========== */
      function renderVoiceFab(slot, idx, color) {
        if (!VOICE.srSupported) return '';
        const isActiveCommand = VOICE.activeSlot === idx && VOICE.awaitingCommand;
        const isSpeaking = slot.isSpeaking;
        const enabled = slot.voiceEnabled;

        let inner, bg, title, extraClass = '';
        if (!enabled) {
          inner = '<i data-lucide="mic-off" class="w-6 h-6"></i>';
          bg = '#94a3b8';
          title = 'Voice off — click to enable';
        } else if (isSpeaking) {
          inner = '<span class="sound-wave"><span class="sound-wave-bar"></span><span class="sound-wave-bar"></span><span class="sound-wave-bar"></span></span>';
          bg = color;
          title = 'Speaking — click to stop';
        } else if (isActiveCommand) {
          inner = '<span style="width:16px;height:16px;border-radius:50%;background:#fff;display:inline-block"></span>';
          bg = '#ef4444';
          title = 'Listening for your command';
          extraClass = 'record-pulse';
        } else {
          inner = '<i data-lucide="mic" class="w-6 h-6"></i>';
          bg = color;
          title = 'Listening for wake word — click to disable';
        }

        const action = isSpeaking ? 'stop-speaking' : 'toggle-voice';
        const showRings = enabled && !isSpeaking && !isActiveCommand;

        return `
          <div class="voice-fab-wrap" style="color:${bg}">
            ${showRings ? '<span class="voice-pulse-ring"></span><span class="voice-pulse-ring delay"></span>' : ''}
            <button class="voice-fab ${extraClass}" style="background:${bg}" title="${title}" data-action="${action}" data-idx="${idx}">
              ${inner}
            </button>
          </div>`;
      }

      function renderToast() {
        if (!VOICE.toastMessage) return '';
        return `<div class="voice-toast">${escHtml(VOICE.toastMessage)}</div>`;
      }

      /* ========== EXPANDED CHAT ========== */
      function renderExpanded() {
        if (STATE.expandedSlot === null) return '';
        const idx = STATE.expandedSlot;
        const slot = STATE.slots[idx];
        const color = SLOT_COLORS[idx];
        return `
          <div class="fixed inset-0 z-50 flex flex-col" style="background:#fff">
            <div class="flex items-center justify-between px-4 py-3 flex-shrink-0" style="background:var(--navy);color:#fff">
              <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full grid place-items-center text-white font-bold" style="background:${color}">${slot.label.charAt(0)}</div>
                <div>
                  <div class="text-sm font-semibold">${escHtml(slot.label)}</div>
                  <div class="text-[10px] text-white/50">${slot.messages.length} messages${slot.voiceEnabled?' \u00b7 voice on':''}</div>
                </div>
              </div>
              <div class="flex items-center gap-2">
                ${slot.isSpeaking ? `
                  <button style="background:transparent;border:1px solid rgba(255,255,255,0.25);color:#fca5a5;font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;font-weight:600" data-action="stop-speaking" data-idx="${idx}">
                    <i data-lucide="volume-x" class="w-3 h-3 inline mr-1"></i>Stop Speaking
                  </button>
                ` : ''}
                <button style="background:transparent;border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.7);font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;font-weight:600" data-action="clear-chat" data-idx="${idx}">
                  <i data-lucide="trash-2" class="w-3 h-3 inline mr-1"></i>Clear
                </button>
                <button style="background:transparent;border:1px solid rgba(255,255,255,0.25);color:#fff;font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;font-weight:600" data-action="close-expanded">
                  <i data-lucide="x" class="w-3 h-3 inline mr-1"></i>Close
                </button>
              </div>
            </div>
            <div id="chat-scroll" class="flex-1 overflow-y-auto px-4 py-4 space-y-3" style="background:#fafbfc">
              ${slot.messages.length === 0 ? `
                <div class="flex items-center justify-center" style="min-height:60vh">
                  <div class="text-center">
                    <div class="w-20 h-20 mx-auto mb-4 rounded-full grid place-items-center" style="background:${color}15">
                      <i data-lucide="message-circle" class="w-10 h-10" style="color:${color}"></i>
                    </div>
                    <div class="text-lg font-semibold text-slate-700">${escHtml(slot.label)}</div>
                    <div class="text-sm text-slate-400 mt-1">Type a message below to start chatting.</div>
                  </div>
                </div>
              ` : slot.messages.map(m => `
                <div class="flex ${m.role==='user'?'justify-end':'justify-start'}">
                  ${m.role==='assistant'?'<div class="w-7 h-7 rounded-full grid place-items-center text-white text-xs font-bold flex-shrink-0 mr-2 mt-1" style="background:'+color+'">'+slot.label.charAt(0)+'</div>':''}
                  <div class="chat-bubble ${m.role==='user'?'chat-user':'chat-bot'}">${escHtml(m.content)}</div>
                </div>
              `).join('')}
              ${slot.loading?`<div class="flex justify-start"><div class="w-7 h-7 rounded-full grid place-items-center text-white text-xs font-bold flex-shrink-0 mr-2 mt-1" style="background:${color}">${slot.label.charAt(0)}</div><div class="chat-bubble chat-bot"><span class="typing-dot"></span> <span class="typing-dot"></span> <span class="typing-dot"></span></div></div>`:''}
            </div>
            <div class="chat-input-row flex-shrink-0">
              <input type="text" id="expanded-input" placeholder="Type a message..." value="${escAttr(slot.inputText)}" ${slot.loading?'disabled':''} />
              <button class="chat-send" data-action="send-expanded" ${slot.loading?'disabled':''}>
                <i data-lucide="send" class="w-4 h-4"></i>
              </button>
            </div>
            ${renderVoiceFab(slot, idx, color)}
          </div>`;
      }

      /* ========== SETTINGS ========== */
      function renderSettings() {
        const es = STATE.editingSlot;
        const slot = STATE.slots[es];
        const color = SLOT_COLORS[es];
        return `
          <div class="space-y-4">
            <div class="flex gap-2">
              ${STATE.slots.map((s, i) => `
                <button class="tab-btn flex-1 ${es===i?'active':''}" data-action="select-editing-slot" data-idx="${i}">
                  ${escHtml(s.label)} ${s.apiKey?'<i data-lucide="check-circle" class="w-3 h-3 inline ml-1"></i>':''}
                </button>
              `).join('')}
            </div>

            <div class="settings-section space-y-5">
              <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full grid place-items-center text-white font-bold" style="background:${color}">${slot.label.charAt(0)}</div>
                <h3 class="text-lg font-semibold" style="color:var(--navy)">${escHtml(slot.label)} — Configuration</h3>
              </div>

              <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Display Name</label>
                <input type="text" id="setting-label" value="${escAttr(slot.label)}" placeholder="Assistant name..." />
              </div>

              <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">
                  <i data-lucide="key" class="w-3 h-3 inline mr-1"></i>Anthropic API Key
                </label>
                <input type="password" id="setting-apikey" value="${escAttr(slot.apiKey)}" placeholder="sk-ant-api03-..." />
                <p class="text-[11px] text-slate-400 mt-1">Get a key at console.anthropic.com → Settings → API Keys.</p>
              </div>

              <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">
                  <i data-lucide="file-text" class="w-3 h-3 inline mr-1"></i>System Prompt Instructions
                </label>
                <textarea id="setting-prompt" rows="6" placeholder="You are a helpful AI assistant...">${escHtml(slot.prompt)}</textarea>
                <p class="text-[11px] text-slate-400 mt-1">These instructions define how this assistant behaves. Changes are saved to cache.</p>
              </div>

              <div style="border-top:1px dashed #e2e8f0;padding-top:16px">
                <div class="flex items-center justify-between mb-3">
                  <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide">
                    <i data-lucide="mic" class="w-3 h-3 inline mr-1"></i>Voice Assistant
                  </label>
                  ${VOICE.srSupported ? `
                    <div class="voice-switch ${slot.voiceEnabled?'on':''}" data-action="toggle-voice" data-idx="${es}" title="Toggle voice"></div>
                  ` : `<span class="text-[11px] text-red-500">Not supported in this browser (Chrome/Edge only)</span>`}
                </div>

                <div class="mb-3">
                  <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-1">Wake Word Name</label>
                  <input type="text" id="setting-voicename" value="${escAttr(slot.voiceName || slot.label)}" placeholder="e.g. Randy" ${VOICE.srSupported?'':'disabled'} />
                  <p class="text-[11px] text-slate-400 mt-1">Say "Hey ${escHtml(slot.voiceName || slot.label)}", "OK ${escHtml(slot.voiceName || slot.label)}", or "Yo ${escHtml(slot.voiceName || slot.label)}" to wake this assistant.</p>
                </div>

                <div class="mb-3">
                  <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-1">Voice Personality Override</label>
                  <textarea id="setting-voicepersonality" rows="4" placeholder="${escAttr(DEFAULT_VOICE_PERSONALITY)}" ${VOICE.srSupported?'':'disabled'}>${escHtml(slot.voicePersonality || DEFAULT_VOICE_PERSONALITY)}</textarea>
                  <p class="text-[11px] text-slate-400 mt-1">Appended to the system prompt whenever a response is triggered by voice. Kept out of text-only replies.</p>
                </div>

                ${VOICE.ttsSupported ? `
                  <div>
                    <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-1">Available Speech Voices <span class="text-slate-400 normal-case">(picked automatically — prefers deep male)</span></label>
                    <select id="setting-voice-list" disabled style="opacity:0.85">
                      ${(window.speechSynthesis.getVoices() || []).filter(v => /^en(-|_|$)/i.test(v.lang)).map(v => `<option>${escHtml(v.name)} \u2014 ${escHtml(v.lang)}</option>`).join('') || '<option>(voices will load after first click)</option>'}
                    </select>
                  </div>
                ` : ''}
              </div>

              <div class="flex flex-wrap gap-2 pt-1">
                <button class="btn-primary" data-action="save-settings">
                  <i data-lucide="save" class="w-4 h-4 inline mr-1"></i> Save Configuration
                </button>
                <button class="btn-outline" data-action="reset-slot" data-idx="${es}">
                  <i data-lucide="rotate-ccw" class="w-4 h-4 inline mr-1"></i> Reset Defaults
                </button>
                <button class="btn-danger" data-action="clear-chat" data-idx="${es}">
                  <i data-lucide="trash-2" class="w-4 h-4 inline mr-1"></i> Clear Chat History
                </button>
              </div>
            </div>
          </div>`;
      }

      /* ========== EVENTS ========== */
      let _bound = false;
      function bindEvents() {
        const root = document.getElementById('app');
        if (_bound) return;
        _bound = true;

        document.addEventListener('click', e => {
          const act = e.target.closest('[data-action]');
          if (!act) return;
          const action = act.dataset.action;
          const idx = act.dataset.idx !== undefined ? parseInt(act.dataset.idx) : null;

          switch (action) {
            case 'switch-tab': STATE.activeTab = act.dataset.tab; render(); break;
            case 'expand-slot': STATE.expandedSlot = idx; render(); scrollChat(); setTimeout(()=>document.getElementById('expanded-input')?.focus(),100); break;
            case 'close-expanded': STATE.expandedSlot = null; render(); break;
            case 'clear-chat': clearChat(idx); break;
            case 'select-editing-slot': readFields(); STATE.editingSlot = idx; render(); break;
            case 'send-expanded': {
              const inp = document.getElementById('expanded-input');
              if (inp) STATE.slots[STATE.expandedSlot].inputText = inp.value;
              sendMessage(STATE.expandedSlot);
              break;
            }
            case 'send-home': {
              const inp = document.getElementById('home-input-' + idx);
              if (inp) STATE.slots[idx].inputText = inp.value;
              sendMessage(idx);
              break;
            }
            case 'toggle-voice': {
              if (STATE.activeTab === 'settings') readFields();
              toggleSlotVoice(idx);
              break;
            }
            case 'stop-speaking': {
              stopSpeaking();
              break;
            }
            case 'save-settings': readFields(); saveSettings(); render(); break;
            case 'reset-slot': {
              const s = STATE.slots[idx];
              const DEFAULT_PROMPTS = ['You are a helpful AI assistant. Be concise and friendly.', ASSISTANT_2_PROMPT, 'You are a helpful AI assistant. Be concise and friendly.', 'You are a helpful AI assistant. Be concise and friendly.'];
              s.apiKey = DEFAULT_API_KEY; s.prompt = DEFAULT_PROMPTS[idx];
              s.label = 'Assistant ' + (idx + 1);
              s.voiceName = s.label;
              s.voicePersonality = DEFAULT_VOICE_PERSONALITY;
              s.voiceEnabled = false;
              if (!anyVoiceEnabled()) stopRecognition();
              saveSettings(); render(); break;
            }
          }
        });

        document.addEventListener('input', e => {
          if (e.target.id === 'expanded-input' && STATE.expandedSlot !== null) {
            STATE.slots[STATE.expandedSlot].inputText = e.target.value;
          } else if (typeof e.target.id === 'string' && e.target.id.startsWith('home-input-')) {
            const hi = parseInt(e.target.id.slice('home-input-'.length), 10);
            if (!Number.isNaN(hi) && STATE.slots[hi]) STATE.slots[hi].inputText = e.target.value;
          }
        });

        document.addEventListener('keydown', e => {
          if (e.key === 'Enter' && !e.shiftKey && e.target.id === 'expanded-input' && STATE.expandedSlot !== null) {
            e.preventDefault();
            STATE.slots[STATE.expandedSlot].inputText = e.target.value;
            sendMessage(STATE.expandedSlot);
          }
          if (e.key === 'Enter' && !e.shiftKey && typeof e.target.id === 'string' && e.target.id.startsWith('home-input-')) {
            e.preventDefault();
            const hi = parseInt(e.target.id.slice('home-input-'.length), 10);
            if (!Number.isNaN(hi) && STATE.slots[hi]) {
              STATE.slots[hi].inputText = e.target.value;
              sendMessage(hi);
            }
          }
          if (e.key === 'Escape' && STATE.expandedSlot !== null) {
            STATE.expandedSlot = null; render();
          }
        });
      }

      function readFields() {
        const i = STATE.editingSlot;
        const s = STATE.slots[i];
        const l = document.getElementById('setting-label');
        const k = document.getElementById('setting-apikey');
        const p = document.getElementById('setting-prompt');
        const vn = document.getElementById('setting-voicename');
        const vp = document.getElementById('setting-voicepersonality');
        if (l) s.label = l.value.trim() || s.label;
        if (k) s.apiKey = k.value.trim();
        if (p) s.prompt = p.value.trim() || s.prompt;
        if (vn) s.voiceName = vn.value.trim() || s.label;
        if (vp) s.voicePersonality = vp.value.trim() || DEFAULT_VOICE_PERSONALITY;
      }

      /* ========== BOOT ========== */
      document.addEventListener('DOMContentLoaded', () => {
        render();
        // Re-render once the browser loads its speech voice list (async in Chrome)
        if (VOICE.ttsSupported && typeof speechSynthesis.onvoiceschanged !== 'undefined') {
          window.speechSynthesis.onvoiceschanged = () => {
            if (STATE.activeTab === 'settings') render();
          };
        }
        // If any slot had voice enabled from localStorage, try to resume recognition.
        // Chrome requires a user gesture for the very first permission prompt, so this
        // will silently no-op on cold loads — the user's first click on the mic button
        // will then trigger the permission flow.
        if (anyVoiceEnabled() && VOICE.srSupported) {
          try { startRecognition(); } catch {}
        }
      });
    </script>
  </body>
</html>
