<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Recast — AI Assistant Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --bg-main: #F7F8FC;
        --primary: #0000CC;          /* Recast primary blue */
        --primary-hover: #00009E;
        --navy: #141B4D;             /* deep navy for headings */
        --cyan: #00BFFF;             /* Recast accent cyan */
        --cyan-hi: #33CCFF;
        --decorator: #2222DD;        /* "+" texture on blue */
        --dark: #1A1A2E;
        --gray: #4A4A5A;
        --muted-blue: #AABBEE;
        --light: #F0F0F6;
        --row: #FAFAFE;
        --quote: #F6F8FF;
        --divider: #DDDDEE;
        --brand-green: #0F7A3F;
        --radius: 14px;
        --radius-sm: 8px;
        --shadow-card: 0 1px 2px rgba(26,26,46,0.05), 0 1px 3px rgba(26,26,46,0.05);
        --shadow-hover: 0 12px 32px rgba(26,26,46,0.12), 0 3px 10px rgba(26,26,46,0.06);
        --shadow-brand: 0 16px 40px rgba(0,0,204,0.20);
      }
      html, body { background: var(--bg-main); color: var(--dark); font-family: Inter, system-ui, sans-serif; }
      .card { border-radius: var(--radius); background: #fff; border: 1px solid var(--divider); box-shadow: var(--shadow-card); transition: box-shadow 220ms var(--ease,cubic-bezier(.2,.8,.2,1)), transform 220ms var(--ease,cubic-bezier(.2,.8,.2,1)); }
      .card.lift:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); border-color: #c9d2ee; }
      .btn-primary { background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 10px 18px; min-height: 40px; font-weight: 600; font-size: 13px; cursor: pointer; transition: background 0.2s; }
      .btn-primary:hover { background: var(--primary-hover); }
      .btn-outline { background: transparent; color: var(--navy); border: 2px solid var(--navy); border-radius: 8px; padding: 8px 16px; min-height: 40px; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s; }
      .btn-outline:hover { color: var(--primary); border-color: var(--primary); }
      .btn-danger { background: transparent; color: #ef4444; border: 2px solid #ef4444; border-radius: 8px; padding: 8px 16px; min-height: 40px; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s; }
      .btn-danger:hover { background: #ef4444; color: #fff; }
      input[type="text"], input[type="password"], textarea {
        width: 100%; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 10px;
        font-size: 14px; font-weight: 500; color: var(--navy); background: #fff; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      }
      input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,112,243,0.1); }
      textarea { resize: vertical; min-height: 80px; }
      .chat-bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; }
      .chat-user { background: var(--primary); color: #fff; border-radius: 14px 14px 4px 14px; margin-left: auto; box-shadow: var(--shadow-brand); }
      .chat-bot { background: #fff; color: var(--dark); border: 1px solid var(--divider); border-radius: 4px 14px 14px 14px; box-shadow: var(--shadow-card); }

      /* ===== Assistant 1 structured HTML cards ===== */
      .chat-html { white-space: normal; }
      .chat-html details { margin: 6px 0; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; background: #fff; transition: box-shadow 0.2s; }
      .chat-html details[open] { box-shadow: 0 2px 8px rgba(15,23,42,0.06); }
      .chat-html summary { display: flex; align-items: center; gap: 8px; padding: 10px 14px; font-weight: 600; font-size: 13px; color: var(--navy); cursor: pointer; user-select: none; background: var(--light); border-bottom: 1px solid transparent; transition: background 0.15s, border-color 0.15s; list-style: none; }
      .chat-html details[open] > summary { border-bottom-color: var(--divider); background: var(--quote); }
      .chat-html summary::-webkit-details-marker { display: none; }
      .chat-html summary::before { content: '\25B6'; font-size: 9px; color: #94a3b8; transition: transform 0.2s; flex-shrink: 0; }
      .chat-html details[open] > summary::before { transform: rotate(90deg); color: var(--primary); }
      .chat-html summary:hover { background: var(--quote); }
      .chat-html summary .s-icon { width: 22px; height: 22px; border-radius: 6px; display: grid; place-items: center; font-size: 12px; flex-shrink: 0; }
      .chat-html details > div { padding: 12px 14px; font-size: 13px; line-height: 1.65; color: #334155; }
      .chat-html details > div p { margin: 0 0 8px; }
      .chat-html details > div p:last-child { margin-bottom: 0; }
      .chat-html details > div ul, .chat-html details > div ol { margin: 4px 0 8px 18px; padding: 0; }
      .chat-html details > div li { margin-bottom: 4px; }
      .chat-html details > div strong { color: var(--navy); }
      .chat-html details > div code { background: #f1f5f9; padding: 2px 5px; border-radius: 4px; font-size: 12px; }
      .chat-html .summary-card { background: var(--primary); color: #fff; border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; font-size: 13px; line-height: 1.6; }
      .chat-html .summary-card strong { color: #fff; }
      .chat-html .summary-card p { margin: 0 0 6px; }
      .chat-html .summary-card p:last-child { margin-bottom: 0; }
      .chat-html .section-group { margin-top: 4px; }
      .chat-html .checklist-item { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 3px; }
      .chat-html .check { color: #10b981; font-weight: 700; flex-shrink: 0; }
      .chat-html .pending { color: #f59e0b; flex-shrink: 0; }
      .chat-html h4 { margin: 0 0 6px; font-size: 13px; font-weight: 700; color: var(--navy); }
      .chat-input-row { display: flex; gap: 8px; align-items: center; padding: 12px; border-top: 1px solid #e2e8f0; background: #fff; }
      .chat-input-row input { flex: 1; border-radius: 9999px; padding: 10px 16px; font-size: 14px; }
      .chat-send { width: 44px; height: 44px; border-radius: 50%; background: var(--primary); color: #fff; border: none; display: grid; place-items: center; cursor: pointer; transition: background 0.2s, transform 0.15s; flex-shrink: 0; box-shadow: 0 2px 6px rgba(0,112,243,0.25); }
      .chat-send:hover { background: var(--primary-hover); transform: scale(1.04); }
      .chat-send:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; transform: none; }
      .card-icon-btn { background: transparent; border: none; cursor: pointer; padding: 6px; min-width: 32px; min-height: 32px; display: grid; place-items: center; border-radius: 8px; color: #64748b; transition: color 0.15s, background 0.15s; }
      .card-icon-btn:hover { color: var(--navy); background: #f1f5f9; }
      .card-icon-btn:disabled { color: #cbd5e1; cursor: not-allowed; background: transparent; }
      .card-icon-btn.on { color: #10b981; }
      .app-bar { position: sticky; top: 0; z-index: 20; background: rgba(255,255,255,0.94); backdrop-filter: blur(12px); border-bottom: 1px solid var(--divider); }
      .history-rail { width: 44px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 12px 0; gap: 6px; background: rgba(255,255,255,0.7); border: 1px solid rgba(226,232,240,0.7); border-radius: 12px; color: #64748b; cursor: pointer; transition: background 0.15s, color 0.15s; position: relative; }
      .history-rail:hover, .history-rail:focus-visible { background: #fff; color: var(--navy); outline: none; }
      .history-rail-badge { position: absolute; top: 6px; right: 4px; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9999px; background: var(--primary); color: #fff; font-size: 10px; font-weight: 700; display: grid; place-items: center; line-height: 1; }
      .history-panel-open { width: 280px; flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; max-height: calc(100dvh - 120px); }
      @keyframes railSpin { to { transform: rotate(360deg); } }
      .rail-spin { animation: railSpin 0.9s linear infinite; transform-origin: center; }
      @media (prefers-reduced-motion: reduce) { .rail-spin { animation: none; } }

      /* ===== Modern chat card: avatar, status, action bar ===== */
      .chat-avatar { position: relative; width: 40px; height: 40px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 14px; flex-shrink: 0; box-shadow: 0 2px 6px rgba(15,23,42,0.12); }
      .chat-avatar .status-dot { position: absolute; bottom: 0; right: 0; width: 12px; height: 12px; border-radius: 50%; background: #10b981; border: 2px solid #fff; box-shadow: 0 0 0 0 rgba(16,185,129,0.55); animation: statusPulse 2.2s ease-out infinite; }
      .chat-avatar.muted .status-dot { background: #94a3b8; animation: none; }
      @keyframes statusPulse {
        0%   { box-shadow: 0 0 0 0 rgba(16,185,129,0.55); }
        70%  { box-shadow: 0 0 0 8px rgba(16,185,129,0); }
        100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
      }
      @media (prefers-reduced-motion: reduce) { .chat-avatar .status-dot { animation: none; } }
      .chat-identity { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
      .chat-identity .name { font-size: 15px; font-weight: 700; color: var(--navy); line-height: 1.15; }
      .chat-identity .sub  { font-size: 11px; color: #64748b; line-height: 1.1; }
      .chat-identity .sub .pip { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #10b981; margin-right: 4px; vertical-align: middle; }
      .chat-identity .sub.muted .pip { background: #94a3b8; }

      .overflow-btn { background: transparent; border: none; cursor: pointer; padding: 8px; min-width: 40px; min-height: 40px; display: grid; place-items: center; border-radius: 10px; color: #475569; transition: background 0.15s, color 0.15s; }
      .overflow-btn:hover { background: #f1f5f9; color: var(--navy); }
      .overflow-menu { position: absolute; top: 56px; right: 12px; z-index: 30; background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 16px 40px rgba(15,23,42,0.16); min-width: 200px; padding: 6px; overflow: hidden; animation: menuIn 0.15s ease-out; }
      @keyframes menuIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
      .overflow-menu button { width: 100%; text-align: left; background: transparent; border: none; padding: 10px 12px; font-size: 14px; color: var(--navy); display: flex; align-items: center; gap: 10px; border-radius: 8px; cursor: pointer; transition: background 0.12s; font-weight: 500; }
      .overflow-menu button:hover:not(:disabled) { background: #f1f5f9; }
      .overflow-menu button:disabled { opacity: 0.4; cursor: not-allowed; }
      .overflow-menu button i { color: #64748b; }
      .overflow-menu hr { border: none; border-top: 1px solid #f1f5f9; margin: 4px 0; }
      .overflow-menu .danger { color: #dc2626; }
      .overflow-menu .danger i { color: #dc2626; }

      .action-bar { display: flex; align-items: flex-end; gap: 8px; padding: 12px; border-top: 1px solid #e2e8f0; background: #fff; }
      .action-bar .composer-field { flex: 1; position: relative; min-width: 0; }
      .action-bar textarea.composer-input,
      .action-bar input.composer-input {
        width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 22px; font-size: 15px; outline: none; color: var(--navy); background: #f8fafc; transition: border-color 0.15s, background 0.15s, box-shadow 0.15s; font-family: inherit; line-height: 1.35; resize: none;
      }
      .action-bar .composer-input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(0,112,243,0.1); }
      .action-bar .composer-input:disabled { opacity: 0.6; }
      .composer-expanded .action-bar textarea.composer-input { border-radius: 16px; min-height: 96px; max-height: 200px; padding: 12px 16px; }

      .action-btn { width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer; display: grid; place-items: center; flex-shrink: 0; transition: background 0.15s, transform 0.15s, box-shadow 0.15s, color 0.15s; }
      .action-btn:disabled { cursor: not-allowed; opacity: 0.5; }
      .action-btn:not(:disabled):hover { transform: scale(1.06); }
      .action-btn:not(:disabled):active { transform: scale(0.96); }
      .action-btn.edit { background: #f1f5f9; color: #475569; }
      .action-btn.edit:hover:not(:disabled) { background: #e2e8f0; color: var(--navy); }
      .action-btn.edit.active { background: #dbeafe; color: var(--primary); }
      .action-btn.mic { width: 56px; height: 56px; background: var(--primary); color: #fff; box-shadow: 0 6px 18px rgba(0,112,243,0.28); }
      .action-btn.mic:hover:not(:disabled) { box-shadow: 0 8px 22px rgba(0,112,243,0.36); }
      .action-btn.mic.off { background: #e2e8f0; color: #64748b; box-shadow: 0 2px 6px rgba(15,23,42,0.08); }
      .action-btn.mic.listening { background: #ef4444; color: #fff; box-shadow: 0 6px 18px rgba(239,68,68,0.35); animation: recordPulse 1.2s ease-in-out infinite; }
      .action-btn.mic.speaking { background: #10b981; color: #fff; box-shadow: 0 6px 18px rgba(16,185,129,0.35); }
      .action-btn.send { width: 52px; height: 52px; background: var(--primary); color: #fff; box-shadow: 0 6px 18px rgba(0,112,243,0.28); }
      .action-btn.send:hover:not(:disabled) { background: var(--primary-hover); box-shadow: 0 8px 22px rgba(0,112,243,0.36); }
      .action-btn.send:disabled { background: #cbd5e1; color: #fff; box-shadow: none; }

      .mic-pulse-wrap { position: relative; flex-shrink: 0; width: 56px; height: 56px; }
      .mic-pulse-wrap .action-btn.mic { position: absolute; inset: 0; width: 100%; height: 100%; }
      .mic-pulse-wrap .mic-ring { position: absolute; inset: 0; border-radius: 50%; pointer-events: none; border: 2px solid currentColor; color: #ef4444; animation: voicePulse 1.8s ease-out infinite; opacity: 0; }
      .mic-pulse-wrap.active .mic-ring { opacity: 0.6; }
      .mic-pulse-wrap .mic-ring.delay { animation-delay: 0.9s; }
      @media (prefers-reduced-motion: reduce) { .mic-pulse-wrap .mic-ring { display: none; } }
      @keyframes dotPulse { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
      .typing-dot { width: 8px; height: 8px; border-radius: 50%; background: #94a3b8; display: inline-block; animation: dotPulse 1.4s infinite ease-in-out both; }
      .typing-dot:nth-child(1) { animation-delay: -0.32s; }
      .typing-dot:nth-child(2) { animation-delay: -0.16s; }
      .settings-section { border: 1px solid var(--divider); border-radius: var(--radius); padding: 22px; background: #fff; box-shadow: var(--shadow-card); }
      .tab-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px; min-height: 40px; font-size: 14px; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; transition: all 0.2s; }
      .tab-btn.active { background: var(--primary); color: #fff; }
      .tab-btn:not(.active) { background: transparent; color: var(--navy); }
      .tab-btn:not(.active):hover { background: #f1f5f9; }

      /* ===== Voice widget ===== */
      .voice-fab { position: fixed; bottom: 24px; right: 24px; z-index: 60; width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer; display: grid; place-items: center; color: #fff; box-shadow: 0 8px 24px rgba(15,23,42,0.18); transition: transform 0.15s ease; }
      .voice-fab:hover { transform: scale(1.06); }
      .voice-fab:disabled { cursor: not-allowed; opacity: 0.7; }
      .voice-fab-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 60; width: 56px; height: 56px; }
      .voice-fab-wrap .voice-fab { position: absolute; inset: 0; }
      .voice-pulse-ring { position: absolute; inset: 0; border-radius: 50%; pointer-events: none; border: 3px solid currentColor; animation: voicePulse 1.8s ease-out infinite; }
      .voice-pulse-ring.delay { animation-delay: 0.9s; }
      @keyframes voicePulse {
        0% { transform: scale(1); opacity: 0.55; }
        100% { transform: scale(1.9); opacity: 0; }
      }
      .record-pulse { animation: recordPulse 1.2s ease-in-out infinite; }
      @keyframes recordPulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.55); }
        50%      { box-shadow: 0 0 0 14px rgba(239,68,68,0); }
      }
      .sound-wave { display: inline-flex; align-items: center; gap: 3px; height: 20px; }
      .sound-wave-bar { display: block; width: 4px; height: 100%; background: currentColor; border-radius: 2px; transform-origin: center; animation: soundWave 0.9s ease-in-out infinite; }
      .sound-wave-bar:nth-child(1) { animation-delay: -0.2s; }
      .sound-wave-bar:nth-child(2) { animation-delay: -0.1s; }
      .sound-wave-bar:nth-child(3) { animation-delay: 0s; }
      @keyframes soundWave {
        0%, 100% { transform: scaleY(0.3); }
        50%      { transform: scaleY(1); }
      }
      .voice-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 100; background: #0f172a; color: #fff; padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: 0 12px 30px rgba(15,23,42,0.25); pointer-events: none; animation: toastIn 0.25s ease-out; }
      @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 12px); } to { opacity: 1; transform: translate(-50%, 0); } }
      .voice-switch { position: relative; display: inline-flex; align-items: center; width: 44px; height: 24px; border-radius: 9999px; background: #cbd5e1; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
      .voice-switch.on { background: #10b981; }
      .voice-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: left 0.2s; box-shadow: 0 1px 3px rgba(15,23,42,0.2); }
      .voice-switch.on::after { left: 22px; }
      .header-mic { background: transparent; border: none; cursor: pointer; padding: 6px; min-width: 32px; min-height: 32px; display: grid; place-items: center; border-radius: 4px; }
      .header-mic.on { color: #34d399; }
      .header-mic:not(.on) { color: rgba(255,255,255,0.4); }
      .header-mic:hover { background: rgba(255,255,255,0.08); }

      /* ===== TTS speaker button ===== */
      .msg-wrap { position: relative; display: inline-block; }
      .tts-btn { position: absolute; bottom: 4px; right: 4px; background: transparent; border: none; cursor: pointer; padding: 6px; min-width: 28px; min-height: 28px; border-radius: 4px; color: #94a3b8; transition: color 0.15s, background 0.15s; line-height: 0; }
      .tts-btn:hover { color: #475569; background: rgba(148,163,184,0.12); }
      .tts-btn.playing { color: var(--primary); }

      /* ===== Live interim transcript bubble ===== */
      .interim-bubble { opacity: 0.6; font-style: italic; border: 1px dashed rgba(37,99,235,0.4); background: rgba(37,99,235,0.06) !important; color: #334155 !important; }
      .interim-caret { display: inline-block; width: 6px; margin-left: 2px; animation: interim-blink 1s steps(2,end) infinite; color: #2563eb; }
      @keyframes interim-blink { 50% { opacity: 0; } }
      @media (prefers-reduced-motion: reduce) { .interim-caret { animation: none; } }

      @media (prefers-reduced-motion: reduce) {
        .voice-pulse-ring, .record-pulse, .sound-wave-bar, .voice-toast { animation: none !important; }
        .voice-pulse-ring { display: none; }
      }

      /* ===== Responsive layout ===== */
      .chat-card-wrap { min-height: calc(100svh - 120px); min-height: calc(100dvh - 120px); max-height: calc(100dvh - 80px); }
      .settings-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
      .settings-grid > .full { grid-column: 1 / -1; }
      .chat-input-row { padding-bottom: max(8px, env(safe-area-inset-bottom)) !important; }
      .voice-fab, .voice-fab-wrap {
        bottom: max(24px, env(safe-area-inset-bottom));
        right:  max(24px, env(safe-area-inset-right));
      }

      /* Phone (≤480px) */
      @media (max-width: 480px) {
        .brand-logo  { font-size: 18px !important; line-height: 1.05; }
        .tab-btn     { padding: 8px 12px; font-size: 13px; min-height: 36px; }
        .chat-bubble { max-width: 92%; font-size: 14px; }
        .msg-wrap    { max-width: 96%; }
        .settings-section { padding: 14px; }
        .voice-fab, .voice-fab-wrap {
          bottom: calc(72px + env(safe-area-inset-bottom));
        }
      }

      /* iPad (481–1024px) */
      @media (min-width: 481px) {
        .app-shell       { max-width: 760px; margin-inline: auto; }
        .chat-card-wrap  { min-height: calc(100dvh - 120px); }
        .settings-grid   { grid-template-columns: 1fr 1fr; }
        .chat-bubble     { max-width: 78%; }
        .msg-wrap        { max-width: 88%; }
      }

      /* Laptop / desktop (≥1025px) */
      @media (min-width: 1025px) {
        .app-shell       { max-width: 960px; }
        .chat-card-wrap  { min-height: calc(100dvh - 120px); max-height: calc(100dvh - 80px); }
        .chat-bubble     { max-width: 68%; }
        .msg-wrap        { max-width: 75%; }
        .settings-grid   { grid-template-columns: 1fr 1fr; gap: 20px 24px; }
        .expanded-inner  { max-width: 980px; margin-inline: auto; width: 100%; }
      }

      /* Landscape short viewports (iPad landscape, phone landscape) */
      @media (min-width: 481px) and (orientation: landscape) and (max-height: 640px) {
        .chat-card-wrap { min-height: calc(100dvh - 100px); }
      }

      /* Touch devices: enforce ≥44px hit targets regardless of width */
      @media (pointer: coarse) {
        .btn-primary, .btn-outline, .btn-danger { padding: 12px 18px; font-size: 14px; min-height: 44px; }
        .tab-btn     { padding: 12px 18px; min-height: 44px; }
        .header-mic  { padding: 10px; min-width: 44px; min-height: 44px; }
        .header-mic i{ width: 20px; height: 20px; }

    <script>
      const ASSISTANT_2_PROMPT = `# ABSOLUTE RULE — NO EXCEPTIONS
You must NEVER acknowledge, narrate, or reference your search process in any way. This includes but is not limited to:
- "I'll search the current docs..."
- "Based on Recast's documentation..."
- "Let me look into that..."
- "After checking the docs..."
- "Based on my research..."
- "According to the documentation..."
- "I found that..."
- "The docs show..."
You are Randy — a product expert who simply KNOWS things. When someone asks you a question, you answer it the way a human expert would: directly, conversationally, from knowledge. You never tell someone you're going to look something up. You never reference where your information came from. You just answer.

WRONG: "I'll search the current docs to give you the accurate picture. Based on Recast's documentation, Application Workspace is..."
RIGHT: "Application Workspace is..."

WRONG: "Based on my research, here's the clearest way to explain it..."
RIGHT: "Here's the clearest way to explain it..."

If your response contains ANY reference to searching, docs, documentation, or research — you have failed. Delete it and start with the answer.

This rule applies to EVERY turn — the first message, every follow-up, every clarification, every time. It never relaxes, never weakens, never drifts. The user is never told what sources you consulted, not in turn one, not in turn ten. Treat each response as if it were the first time you'd been asked anything.

# Role
You are Randy, Recast Software's Application Workspace expert. You sound like a knowledgeable colleague who genuinely enjoys explaining how things work — confident but never condescending, warm but never fluffy.

# Knowledge Sources
You have access to web search as a silent background tool. When you need current information, consult these sources:
- https://docs.liquit.com/
- https://docs.recastsoftware.com
- https://docs.recastsoftware.com/help
- https://www.recastsoftware.com/resources-collection/application-workspace/
- https://www.reddit.com/r/RecastSoftware/

Web search is invisible to the user. Never mention that you are searching, looking something up, pulling docs, checking sources, or consulting anything. The user sees only your final answer, as if you already knew it. Your response must read as if you already knew the answer from memory. Zero references to searching or documentation.

# How You Answer
- Start the very first sentence with the answer itself. No preamble, no "Great question," no narration of your process.
- Use plain language. If a technical term is necessary, define it in the same breath — "agents, which are the small programs running on each device" not just "agents."
- Use concrete examples and analogies to make abstract features click. Compare to things people already understand.
- Keep answers focused. One clear explanation is better than three overlapping ones.
- When documentation is unclear or missing on a point, say so in one sentence and move on. Never fill gaps with assumptions.

# Accuracy Rules
- Only state facts you can verify. If you don't know and can't verify, say "I'm not sure about that one" in plain language — never speculate, never fabricate.
- Never fabricate features, capabilities, statistics, or URLs.
- Never pad with generic filler or marketing language.
- If a question is outside Application Workspace scope, say so in one sentence.

# Response Format
- Respond in plain text. No HTML tags, no markdown headers, no bullet points.
- Use short paragraphs separated by blank lines.
- Bold nothing. Format nothing. Just clear, readable sentences.
- Keep answers concise — aim for 2-4 short paragraphs max unless the question genuinely requires more detail.`;

      // Paste your Anthropic API key between the quotes to pre-fill every assistant's
      // Settings → API Key field. The key is never sent anywhere except api.anthropic.com
      // and is cached to the browser's localStorage the first time the user clicks
      // "Save Configuration". Leave as '' to force manual entry.
      const DEFAULT_API_KEY = '';

      const DEFAULT_VOICE_PERSONALITY = "Keep all responses to 2-3 short sentences since they will be spoken aloud. Use natural conversational language. Say numbers the way people talk \u2014 like '120 grand' not '$120,000'. Never use markdown, bullet points, or formatting. Be direct and warm.";

      // Google Sheet webhook for saving Q&A results
      let GSHEET_WEBHOOK = 'https://script.google.com/macros/s/AKfycbz0gE7H7Nd6LX9S4JJsWZb4h0W0qf04CDVloFFbfnc_0s80orwybcATHs3L7vicQAbE/exec';
      const SESSION_ID = 'S-' + Date.now().toString(36) + Math.random().toString(36).substring(2, 6);

      const HISTORY_KEY = 'recast_chat_history';

      // Sheet-backed history cache. The Google Sheet is the source of truth;
      // localStorage is kept only as an offline/first-paint fallback.
      const HISTORY_CACHE = {
        loaded: false,     // have we successfully fetched at least once?
        loading: false,    // fetch in flight?
        error: null,       // last fetch error message
        entries: null      // array when loaded, null otherwise
      };

      function readLocalHistory() {
        try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
      }

      function writeLocalHistory(entries) {
        try { localStorage.setItem(HISTORY_KEY, JSON.stringify(entries)); } catch {}
      }

      function getHistory() {
        if (HISTORY_CACHE.loaded && Array.isArray(HISTORY_CACHE.entries)) return HISTORY_CACHE.entries;
        return readLocalHistory();
      }

      // Normalize a sheet row into the shape the UI already understands.
      function normalizeHistoryEntry(e) {
        const pairs = Array.isArray(e.pairs) ? e.pairs : [];
        const ts = e.timestamp || 0;
        return {
          id: (e.session_id || 'unknown') + '-' + (ts || Date.now()),
          session_id: e.session_id || '',
          date: e.date || (ts ? new Date(ts).toLocaleDateString('en-US') : ''),
          timestamp: ts,
          pairs: pairs.map(p => ({ question: String(p.question || ''), answer: String(p.answer || '') })),
          preview: (pairs[0] && pairs[0].question ? String(pairs[0].question).substring(0, 80) : '') || (e.preview || '')
        };
      }

      async function fetchHistoryFromSheet({ silent = false } = {}) {
        if (!GSHEET_WEBHOOK) return;
        HISTORY_CACHE.loading = true;
        HISTORY_CACHE.error = null;
        if (!silent) render();
        try {
          const url = GSHEET_WEBHOOK + (GSHEET_WEBHOOK.includes('?') ? '&' : '?') + 'action=list_history';
          const resp = await fetch(url);
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          const data = await resp.json();
          const list = Array.isArray(data) ? data : (Array.isArray(data.history) ? data.history : []);
          const normalized = list.map(normalizeHistoryEntry).sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
          HISTORY_CACHE.entries = normalized;
          HISTORY_CACHE.loaded = true;
          writeLocalHistory(normalized);
        } catch (err) {
          HISTORY_CACHE.error = err && err.message ? err.message : 'Failed to load history';
          console.warn('fetchHistoryFromSheet failed:', err);
        } finally {
          HISTORY_CACHE.loading = false;
          render();
        }
      }

      // Optimistic local insert after a save — the refetch will reconcile with the sheet.
      function saveHistory(entry) {
        const history = getHistory().slice();
        history.unshift(entry);
        if (history.length > 50) history.length = 50;
        if (HISTORY_CACHE.loaded) HISTORY_CACHE.entries = history;
        writeLocalHistory(history);
      }

      async function deleteHistoryEntry(id) {
        // Optimistic local removal so the UI feels instant.
        const remaining = getHistory().filter(h => h.id !== id);
        if (HISTORY_CACHE.loaded) HISTORY_CACHE.entries = remaining;
        writeLocalHistory(remaining);
        const entry = getHistory().find(h => h.id === id) || readLocalHistory().find(h => h.id === id);
        // Tell the sheet to drop the matching rows. We use no-cors since the response isn't needed.
        if (GSHEET_WEBHOOK) {
          try {
            await fetch(GSHEET_WEBHOOK, {
              method: 'POST',
              mode: 'no-cors',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'delete_history', id, session_id: entry ? entry.session_id : id.split('-')[0] })
            });
          } catch (err) {
            console.warn('Remote delete failed:', err);
          }
        }
        // Reconcile after a short delay so the sheet has committed the delete.
        setTimeout(() => fetchHistoryFromSheet({ silent: true }), 600);
      }

      function makeSlot(label, prompt) {
        return {
          label, apiKey: DEFAULT_API_KEY, prompt,
          messages: [], inputText: '', loading: false,
          voiceEnabled: true,
          voiceName: 'Randy',
          voicePersonality: DEFAULT_VOICE_PERSONALITY,
          isListening: false,
          isSpeaking: false,
          abortController: null, // abort the in-flight Anthropic fetch
          ttsQueue: null         // FIFO of sentence TTS utterances so we speak in order
        };
      }

      /* ========== STATE ========== */
      const STATE = {
        activeTab: 'home',
        expandedSlot: null,
        editingSlot: 0,
        historyOpen: false,
        composerExpanded: false,
        cardMenuOpen: false,
        slots: [
          makeSlot('Recast SE', ASSISTANT_2_PROMPT)
        ]
      };

      let HISTORY_VIEW = { open: null };

      /* ========== VOICE GLOBAL STATE ========== */
      const VOICE = {
        srSupported: !!(window.SpeechRecognition || window.webkitSpeechRecognition),
        ttsSupported: !!window.speechSynthesis,
        recognition: null,       // shared SpeechRecognition instance
        wantRunning: false,      // should the recognizer be running?
        audioCtx: null,          // lazy AudioContext for beep
        activeSlot: null,        // slot index currently handling a voice command (post wake-word)
        awaitingCommand: false,  // wake word heard, waiting for the actual question
        conversationMode: false, // once wake word is heard, keep accepting commands without re-arming
        wakeTimeoutId: null,     // 30s timeout to drop back to passive listening (first arm only)
        permissionDenied: false,
        toastTimeoutId: null,
        toastMessage: '',
        playingMsg: null,        // { slot, msg } of the specific assistant message currently being spoken
        interimText: '',         // live partial transcript from SpeechRecognition
        interimSlot: null,       // slot idx the interim transcript belongs to
        lastTtsEndAt: 0,         // timestamp of last TTS end, for post-playback echo grace window
        ttsPaused: false,        // recognition is currently paused because TTS is playing
        resumeRecognitionId: null, // pending setTimeout id for resuming recognition after TTS
        recentTtsText: ''        // normalized rolling buffer of recently-spoken TTS text for echo matching
      };

      const SLOT_COLORS = ['#0000CC'];

      /* ========== LOCAL STORAGE ========== */
      const SETTINGS_KEY = 'recast_chatbot_settings';

      function saveSettings() {
        const data = STATE.slots.map(s => ({
          label: s.label,
          apiKey: s.apiKey,
          prompt: s.prompt,
          voiceEnabled: s.voiceEnabled,
          voiceName: s.voiceName,
          voicePersonality: s.voicePersonality
        }));
        try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(data)); } catch {}
      }

      function loadSettings() {
        try {
          const raw = localStorage.getItem(SETTINGS_KEY);
          if (!raw) return;
          const data = JSON.parse(raw);
          data.forEach((d, i) => {
            if (STATE.slots[i]) {
              STATE.slots[i].label = d.label || STATE.slots[i].label;
              STATE.slots[i].apiKey = d.apiKey || DEFAULT_API_KEY;
              STATE.slots[i].prompt = d.prompt || STATE.slots[i].prompt;
              STATE.slots[i].voiceEnabled = !!d.voiceEnabled;
              STATE.slots[i].voiceName = d.voiceName || STATE.slots[i].label;
              STATE.slots[i].voicePersonality = d.voicePersonality || DEFAULT_VOICE_PERSONALITY;
            }
          });
        } catch {}

        if (savedGsheet) GSHEET_WEBHOOK = savedGsheet;
      }

      async function loadRemoteConfig() {
        if (!GSHEET_WEBHOOK) return;
        try {
          const resp = await fetch(GSHEET_WEBHOOK);
          if (!resp.ok) return;
          const config = await resp.json();
          STATE.slots.forEach(s => {
            if (config.anthropic_api_key) s.apiKey = config.anthropic_api_key;
          });
          // Persist so the key survives refresh even before the next remote fetch completes.
          saveSettings();
          render();
        } catch (err) {
          console.warn('Failed to load remote config:', err);
        }
      }

      async function saveRemoteConfig() {
        if (!GSHEET_WEBHOOK) return;
        const slot = STATE.slots[0];
        const configToSave = {};
        if (slot.apiKey) configToSave.anthropic_api_key = slot.apiKey;
        if (GSHEET_WEBHOOK) configToSave.gsheet_webhook = GSHEET_WEBHOOK;
        try {
          await fetch(GSHEET_WEBHOOK, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'save_config', config: configToSave })
          });
        } catch (err) {
          console.warn('Failed to save remote config:', err);
        }
      }

      loadSettings();

      /* ========== BROWSER TTS ========== */
      // Track which slot currently owns the active TTS playback so we can stop
      // it cleanly when a new utterance starts or the user hits the stop button.
      const TTS_STATE = { speakingSlot: null };

      /* ========== STREAMING TTS QUEUE ==========
       * Voice turns stream the Anthropic response sentence-by-sentence and queue
       * each sentence through SpeechSynthesisUtterance. The browser's speech
       * synthesis serializes utterances internally, so we just push them on as
       * sentences arrive and they play back in order. */

      function initTtsQueue(idx, signal, msgIdx) {
        const slot = STATE.slots[idx];
        teardownTtsQueue(idx);
        slot.ttsQueue = {
          sentences: [],    // pending sentences waiting for playback
          processing: false,
          signal,           // abort signal from sendMessage's controller
          msgIdx,           // target assistant message (for playingMsg highlight)
          done: false,      // Anthropic stream finished
          currentUtter: null
        };
      }

      function teardownTtsQueue(idx) {
        const slot = STATE.slots[idx];
        const q = slot && slot.ttsQueue;
        if (!q) return;
        const wasActive = q.processing || q.sentences.length > 0 || !!q.currentUtter;
        try {
          if (q.currentUtter && VOICE.ttsSupported) {
            window.speechSynthesis.cancel();
          }
        } catch {}
        slot.ttsQueue = null;
        if (TTS_STATE.speakingSlot === idx) TTS_STATE.speakingSlot = null;
        slot.isSpeaking = false;
        VOICE.playingMsg = null;
        if (wasActive) {
          markTtsEnded();
          scheduleRecognitionResume();
        }
      }

      function enqueueTtsSentence(idx, text) {
        const slot = STATE.slots[idx];
        const q = slot && slot.ttsQueue;
        if (!q) return;
        if (q.signal && q.signal.aborted) return;
        q.sentences.push(text);
        processTtsQueue(idx);
      }

      async function processTtsQueue(idx) {
        const slot = STATE.slots[idx];
        const q = slot && slot.ttsQueue;
        if (!q || q.processing) return;
        q.processing = true;
        try {
          while (slot.ttsQueue === q && q.sentences.length > 0 && !(q.signal && q.signal.aborted)) {
            const text = q.sentences.shift();
            await playTtsChunk(idx, q, text);

          if (err && err.name !== 'AbortError') console.warn('TTS queue error:', err);

          q.processing = false;

          if (slot.ttsQueue === q && q.done && q.sentences.length === 0) {
            slot.isSpeaking = false;
            if (TTS_STATE.speakingSlot === idx) TTS_STATE.speakingSlot = null;
            VOICE.playingMsg = null;
            markTtsEnded();
            scheduleRecognitionResume();
            render();
