<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Recast — Compact Click-Through (Realistic Catalog)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://unpkg.com">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      :root {
        --bg-main: #f9fafb;
        --text-primary: #111827;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --radius: 1rem;
        --border-subtle: #e5e7eb;
        --shadow-card: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        --shadow-hover: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      }
      html, body {
        background: var(--bg-main);
        color: var(--text-primary);
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .focus-ring:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
      .section-card { border-radius: var(--radius); background: #ffffff; box-shadow: var(--shadow-card); transition: box-shadow 300ms ease, transform 300ms ease; }
      .section-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
      .sub-card { border-radius: calc(var(--radius) / 1.5); border: 1px solid var(--border-subtle); background: #f9fafb; transition: box-shadow 300ms ease; }
      .tile { width: 0.45rem; height: 0.45rem; border-radius: 2px; background: #e5e7eb; opacity: 0.9; }
      .run .tile { animation: tilePulse 1s ease-in-out var(--d, 0s) 1 forwards; }
      @keyframes tilePulse { 0% { transform: scale(0.7); background: #e5e7eb; opacity: 0.4; } 60% { transform: scale(1); background: var(--primary); opacity: 1; } 100% { background: #e5e7eb; opacity: 0.9; } }
      .flow-bar { height: 0.22rem; border-radius: 2px; transform-origin: left center; transform: scaleX(0); }
      .run .flow-bar { animation: barGrow 0.9s ease forwards var(--d, 0s); }
      @keyframes barGrow { to { transform: scaleX(1); } }
      .bolt-line { width: 0.22rem; border-radius: 2px; transform-origin: top center; transform: scaleY(0); }
      .run .bolt-line { animation: boltDrop 0.9s ease forwards var(--d, 0s); }
      @keyframes boltDrop { to { transform: scaleY(1); } }
      .logo-ring { width: 2.1rem; height: 2.1rem; border-radius: 9999px; display: grid; place-items: center; background: #ffffff; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); transition: all 0.3s ease; }
      .logo-ring:hover { box-shadow: 0 0 8px rgba(37,99,235,0.3); transform: scale(1.05); }
      .logo-wrap { display: flex; align-items: center; gap: 0.4rem; position: relative; transition: all 300ms ease; }
      .logo-name { font-size: 0.7rem; color: #6b7280; opacity: 0; transform: translateX(-10px); transition: all 0.3s ease; }
      .show-labels .logo-wrap { flex-direction: column; align-items: flex-start; gap: 0.2rem; }
      .show-labels .logo-name { opacity: 1; transform: translateX(0); white-space: normal; text-align: left; }
      .show-labels .logo-wrap .logo-ring { width: 1.8rem; height: 1.8rem; }
      .run .logo-ring { animation: appLiftPulse 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) var(--d, 0s) 1 forwards; }
      @keyframes appLiftPulse { 0% { transform: translateY(0) scale(1); filter: saturate(0.4); opacity: 0.65; } 30% { transform: translateY(-4px) scale(1.05); } 60% { transform: translateY(-2px) scale(1.02); filter: saturate(1); opacity: 1; } 100% { transform: translateY(0) scale(1); } }
      .user-beam { height: 0.38rem; border-radius: 2px; transform-origin: left center; transform: scaleX(0); }
      .run .user-beam { animation: barGrow 1s ease forwards var(--d, 0s); }
      .badge { width: 1.15rem; height: 1.15rem; border-radius: 9999px; opacity: 0; transform: translateY(-6px) scale(0.9); }
      .run .badge { animation: badgeDrop 0.8s ease-out var(--d, 0s) forwards; }
      @keyframes badgeDrop { to { opacity: 1; transform: translateY(0) scale(1); } }
      .cat-row { display: grid; grid-template-columns: 15ch 1fr; gap: 0.5rem; align-items: center; border-top: 1px solid #e5e7eb; padding-top: 0.5rem; transition: all 300ms ease; }
      .cat-row:first-child { border-top: none; padding-top: 0; }
      .cat-title { font-size: 0.7rem; letter-spacing: 0.08em; display: flex; align-items: center; gap: 0.5rem; }
      .re-primary { background: var(--primary) !important; color: #fff !important; border: 0; border-radius: 9999px; padding: 0.5rem 1.5rem; transition: background 0.2s ease, transform 0.2s ease; }
      .re-primary:hover { background: var(--primary-hover) !important; transform: scale(1.02); }
      .re-primary:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
      .re-secondary { background: transparent !important; color: var(--text-primary) !important; border: 2px solid var(--text-primary) !important; border-radius: 9999px; padding: 0.5rem 1.5rem; transition: all 0.2s ease, transform 0.2s ease; }
      .re-secondary:hover { color: var(--primary) !important; border-color: var(--primary) !important; transform: scale(1.02); }
      @media (prefers-reduced-motion: reduce) {
        .accordion-content { transition: none !important; }
      }
      .modal-overlay { transition: opacity 300ms ease; }
      .modal-content { transition: transform 300ms cubic-bezier(0.2, 0.8, 0.2, 1), opacity 300ms ease; }
      .modal-open .modal-content { transform: scale(1); opacity: 1; }
      .modal-closed .modal-content { transform: scale(0.95); opacity: 0; }
      .check-appear{opacity:0;animation:fadeInOut 1.5s ease var(--d,0s) forwards}
      @keyframes fadeInOut{0%{opacity:0}30%{opacity:1}70%{opacity:1}100%{opacity:0}}
      .flow-connect{background-image:linear-gradient(to right, transparent 50%, #e5e7eb 50%);background-size:4px 1px;background-repeat:repeat-x;height:1px;opacity:0.5}
      .end-user-expand{transition:all 0.5s ease;transform:scale(1.05);background:#ffffff;border-color:#10b981}
      .icon-launch{animation:iconLaunch 0.5s ease forwards}
      @keyframes iconLaunch{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
      .tagline-fade{opacity:0;animation:fadeIn 1s ease 10s forwards}
      @keyframes fadeIn{to{opacity:1}}
      .overlay-tag{opacity:0;transition:opacity 0.3s ease;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(255,255,255,0.9);padding:1rem;border-radius:var(--radius);box-shadow:var(--shadow-card);z-index:10}
      .show-labels .overlay-tag{opacity:1;transition-delay:0.5s}
      .meta-label{font-size:0.6rem;color:#6b7280;opacity:0;transform:translateY(5px);transition:all 0.3s ease;position:relative;top:auto;left:auto;z-index:5;white-space:nowrap;display:flex;flex-direction:column;gap:0.1rem;align-items:flex-start;width:100%;justify-content:flex-start}
      .show-labels .meta-label{opacity:1;transform:translateY(0)}
      .show-labels .cat-row{grid-template-columns:15ch 1fr;gap:1rem}
      .show-labels #flowCard .flex-wrap{gap:1rem}
      .show-labels .logo-wrap{width:calc(33.333% - 0.666rem);margin-bottom:0.5rem}
      .env-wrap { display: flex; align-items: center; gap: 0.2rem; position: relative; transition: all 300ms ease; width: calc(16.666% - 0.5rem); flex-direction: column; }
      .env-name { font-size: 0.7rem; color: #6b7280; opacity: 1; transform: translateY(0); transition: all 0.3s ease; white-space: nowrap; text-align: center; }
      .env-ring { width: 1.8rem; height: 1.8rem; }
      .run .env-ring { animation: envPulse 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) var(--d, 0s) 1 forwards; }
      @keyframes envPulse { 0% { transform: scale(1); filter: saturate(0.4); opacity: 0.65; box-shadow: 0 0 0 rgba(37,99,235,0); } 30% { transform: scale(1.05); box-shadow: 0 0 12px rgba(37,99,235,0.5); } 60% { transform: scale(1.02); filter: saturate(1); opacity: 1; box-shadow: 0 0 8px rgba(37,99,235,0.3); } 100% { transform: scale(1); box-shadow: 0 0 0 rgba(37,99,235,0); } }
      .arrow-line { height: 1.5rem; width: 0.15rem; background: linear-gradient(to bottom, #e5e7eb, #2563eb); transform-origin: top center; transform: scaleY(0); margin: 0 auto; position: relative; }
      .arrow-line::after { content: ''; position: absolute; bottom: -0.3rem; left: -0.25rem; border-left: 0.4rem solid transparent; border-right: 0.4rem solid transparent; border-top: 0.6rem solid #1d4ed8; opacity: 0; transition: opacity 0.3s; }
      .run .arrow-line { animation: arrowDrop 0.8s ease forwards var(--d, 0s); }
      .run .arrow-line::after { animation: arrowTip 0.8s ease forwards var(--d, 0s); }
      @keyframes arrowDrop { 0% { transform: scaleY(0); } 100% { transform: scaleY(1); } }
      @keyframes arrowTip { 0% { opacity: 0; } 80% { opacity: 0; } 100% { opacity: 1; } }
      .hub-card { opacity: 0; transform: translateY(10px); transition: all 0.5s ease; }
      .run .hub-card { animation: hubAppear 0.8s ease forwards var(--d, 2.5s); }
      @keyframes hubAppear { to { opacity: 1; transform: translateY(0); } }
      .metrics-banner { opacity: 0; transform: translateY(10px); transition: all 0.5s ease; text-align: center; font-size: 0.9rem; font-weight: 500; color: #111827; }
      .run .metrics-banner { animation: metricsAppear 0.8s ease forwards var(--d, 3.5s); }
      @keyframes metricsAppear { to { opacity: 1; transform: translateY(0); } }
      .interactive-node { transition: opacity 0.3s, transform 0.3s; }
      .interactive-node:hover { opacity: 0.9; transform: scale(1.05); }

      /* New Chart Styles */
      .chart-container { width: 100%; height: auto; aspect-ratio: 800 / 420; background: linear-gradient(180deg, #fafbfd 0%, #ffffff 100%); border-radius: 12px; border: 1px solid #e2e8f0; padding: 8px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.03); }
      #capacity-gap-chart { width: 100%; height: 100%; }
      .chart-text { font-size: 12px; font-weight: 600; fill: #334155; letter-spacing: 0.01em; font-family: Inter, system-ui, sans-serif; }
      .chart-axis { stroke: #e2e8f0; stroke-width: 1; }
      .chart-axis-label { font-size: 12px; font-weight: 700; fill: #0A1C60; font-family: Inter, system-ui, sans-serif; letter-spacing: 0.04em; }
      .chart-year-label { font-size: 12px; fill: #64748b; font-weight: 600; }
      @media (max-width: 640px) { .chart-year-label { font-size: 10px; } }
      .chart-annotation { font-size: 13px; font-weight: 600; fill: #94a3b8; font-family: Inter, system-ui, sans-serif; letter-spacing: 0.04em; text-transform: uppercase; }
      .demand-line { stroke-width: 2.5; filter: drop-shadow(0 2px 4px rgba(239,68,68,0.2)); }
      .capacity-line { stroke-width: 2.5; filter: drop-shadow(0 2px 4px rgba(10,28,96,0.12)); }
      .gap-fill { }
      .marker-group:hover { transform: scale(1.1); transition: transform 0.2s ease; }
      .marker-group:hover circle { animation: pulse 1.5s infinite; }
      @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
      .chart-element { opacity: 0; animation: fadeIn 0.5s forwards; }
      @keyframes fadeIn { to { opacity: 1; } }
      .axis-element { animation-delay: 0s; }
      .line-element { animation-delay: 0.3s; }
      .gap-element { animation-delay: 0.6s; }
      .marker-element { animation-delay: 0.9s; }
      .label-element { animation-delay: 1.2s; }

      /* =========================
         2026 SaaS polish overrides
         ========================= */

      :root{
        --bg-main: #ffffff;

        --shadow-card:
          0 2px 10px rgba(15, 23, 42, 0.06),
          0 1px 3px rgba(15, 23, 42, 0.04);
        --shadow-hover:
          0 14px 36px rgba(15, 23, 42, 0.10),
          0 4px 12px rgba(15, 23, 42, 0.06);
        --shadow-elevated:
          0 28px 70px rgba(15, 23, 42, 0.18),
          0 10px 24px rgba(15, 23, 42, 0.10);

        --re-green: #10b981;
      }

      html, body { background: var(--bg-main); background-attachment: fixed; }

      .section-card{
        background: rgba(255,255,255,0.88);
        border: 1px solid rgba(226,232,240,0.70);
      }

      .glass{
        background: rgba(255,255,255,0.72) !important;
        border: 1px solid rgba(255,255,255,0.55);
        box-shadow: var(--shadow-elevated) !important;
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }
      .glass-soft{
        background: rgba(255,255,255,0.62) !important;
        border: 1px solid rgba(255,255,255,0.50);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }

      .modal-overlay{ background: rgba(2,6,23,0.55) !important; }
      .modal-content{ box-shadow: var(--shadow-elevated) !important; }

      .demand-line, .capacity-line{ stroke-linecap: round; stroke-linejoin: round; }

      .marker-group{
        transition: transform 160ms ease, filter 160ms ease, opacity 160ms ease;
      }
      .marker-group:hover{
        filter: drop-shadow(0 10px 18px rgba(37,99,235,0.22));
        transform: translateY(-1px) scale(1.02);
      }

      @media (prefers-reduced-motion: reduce){
        .marker-group, .section-card, .logo-ring { transition: none !important; animation: none !important; }
      }

      /* ===========================
         SPLIT-VIEW FLOW ANIMATION
         =========================== */

      /* Device mockup */
      .device-frame {
        background: #1e293b;
        border-radius: 12px;
        padding: 6px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.05);
        position: relative;
        overflow: hidden;
      }
      .device-screen {
        background: #f8fafc;
        border-radius: 8px;
        overflow: hidden;
      }
      .device-titlebar {
        background: linear-gradient(180deg, #f1f5f9, #e2e8f0);
        padding: 6px 12px;
        display: flex;
        align-items: center;
        gap: 6px;
        border-bottom: 1px solid #cbd5e1;
      }
      .device-dot { width: 8px; height: 8px; border-radius: 50%; }
      .device-dot-r { background: #ef4444; }
      .device-dot-y { background: #eab308; }
      .device-dot-g { background: #22c55e; }
      .device-titlebar-text { font-size: 11px; color: #64748b; margin-left: 8px; font-weight: 500; }

      /* App catalog grid */
      .catalog-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 6px;
        padding: 12px;
      }
      .catalog-app {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        cursor: default;
        padding: 5px 2px;
        border-radius: 8px;
        transition: all 0.2s ease;
        position: relative;
      }
      .catalog-app:hover { background: #f1f5f9; }
      .catalog-app.clicked {
        background: #eff6ff;
        transform: scale(0.95);
      }
      .catalog-app .app-icon {
        width: 32px; height: 32px;
        border-radius: 8px;
        display: grid; place-items: center;
        font-weight: 800; font-size: 12px;
        color: white;
        transition: all 0.3s ease;
        position: relative;
      }
      .catalog-app .app-name {
        font-size: 8px;
        color: #475569;
        text-align: center;
        line-height: 1.1;
      }
      .catalog-app.clicked .app-icon {
        box-shadow: 0 0 0 3px rgba(0,112,243,0.4);
      }

      /* Click ring animation */
      @keyframes clickRing {
        0% { transform: scale(0.8); opacity: 1; }
        100% { transform: scale(1.8); opacity: 0; }
      }
      .click-ring {
        position: absolute;
        inset: 0;
        border-radius: 8px;
        border: 2px solid #0070F3;
        animation: clickRing 0.6s ease-out forwards;
        pointer-events: none;
      }

      /* User status bar */
      .user-status {
        padding: 10px 16px;
        border-top: 1px solid #e2e8f0;
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 40px;
        transition: all 0.4s ease;
        font-size: 12px;
        color: #64748b;
      }
      .user-status.loading { color: #0070F3; }
      .user-status.success { color: #059669; background: #f0fdf4; }
      .user-status.idle { color: #94a3b8; }

      /* Loading spinner */
      @keyframes spin { to { transform: rotate(360deg); } }
      .spinner {
        width: 14px; height: 14px;
        border: 2px solid #e2e8f0;
        border-top-color: #0070F3;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }

      /* Behind the scenes section */
      .bts-section {
        position: relative;
        overflow: hidden;
      }
      .bts-label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        padding: 3px 10px;
        border-radius: 9999px;
        margin-bottom: 8px;
      }
      .bts-label-user {
        color: #059669;
        background: #ecfdf5;
        border: 1px solid #a7f3d0;
      }
      .bts-label-engine {
        color: #0070F3;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
      }

      /* Orchestration row */
      .orch-row {
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.5s ease, transform 0.5s ease;
      }
      .orch-row.visible {
        opacity: 1;
        transform: translateY(0);
      }
      .orch-row.dimming {
        opacity: 0.3;
        filter: blur(1px);
        transition: opacity 1s ease, filter 1s ease;
      }

      /* Decision checks inline */
      .check-item {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px;
        border-radius: 6px;
        font-size: 11px;
        border: 1px solid #e2e8f0;
        background: white;
        transition: all 0.3s ease;
        color: #94a3b8;
      }
      .check-item.pass {
        border-color: #86efac;
        background: #f0fdf4;
        color: #166534;
      }

      /* Execution paths */
      .path-row {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 11px;
        border: 1px solid #e5e7eb;
        background: #fafafa;
        transition: all 0.4s ease;
        color: #94a3b8;
      }
      .path-row.active-path {
        border-color: #0070F3;
        background: #eff6ff;
        color: #1e40af;
        box-shadow: 0 0 8px rgba(0,112,243,0.12);
      }
      .path-row.inactive-path {
        opacity: 0.2;
      }

      /* Connector lines */
      .orch-connector {
        height: 2px;
        background: linear-gradient(to right, #0070F3, #10b981);
        transform-origin: left;
        transform: scaleX(0);
        transition: transform 0.6s ease;
        border-radius: 2px;
        margin: 4px 0;
      }
      .orch-connector.drawn { transform: scaleX(1); }

      /* Config wrap animation */
      @keyframes cfgWrap {
        0% { border-color: transparent; }
        100% { border-color: #f59e0b; }
      }
      .cfg-wrap {
        border: 2px dashed transparent;
        border-radius: 6px;
        padding: 4px 8px;
        transition: all 0.5s ease;
      }
      .cfg-wrap.wrapped {
        animation: cfgWrap 0.6s ease forwards;
        background: rgba(245,158,11,0.05);
      }

      /* Update progress bar */
      .upd-bar {
        height: 3px;
        background: linear-gradient(to right, #0070F3, #10b981);
        border-radius: 2px;
        transform-origin: left;
        transform: scaleX(0);
        transition: transform 1.2s ease;
      }
      .upd-bar.filling { transform: scaleX(1); }

      /* Scenario indicator */
      .scenario-pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border-radius: 9999px;
        font-size: 10px;
        font-weight: 600;
        border: 1px solid #e2e8f0;
        background: white;
        color: #64748b;
        transition: all 0.3s ease;
      }
      .scenario-pill.active-scenario {
        border-color: #0070F3;
        background: #eff6ff;
        color: #0070F3;
      }
      .scenario-pill.done-scenario {
        border-color: #10b981;
        background: #ecfdf5;
        color: #059669;
      }

      /* Final payoff */
      @keyframes finalGlow {
        0% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
        50% { box-shadow: 0 0 30px 10px rgba(16,185,129,0.15); }
        100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
      }
      .final-glow { animation: finalGlow 2s ease-in-out; }

      /* Config bundle items */
      .cfg-item {
        display: flex; align-items: center; gap: 5px;
        padding: 3px 7px; border-radius: 5px;
        font-size: 10px; color: #475569;
        background: white; border: 1px solid #e2e8f0;
        transition: all 0.3s ease;
        opacity: 0; transform: translateX(-6px);
      }
      .cfg-item.attached { opacity: 1; transform: translateX(0); border-color: #a7f3d0; background: #f0fdf4; }
      .cfg-item .cfg-status { color: #059669; font-weight: 600; margin-left: auto; }

      /* DTAP ring pipeline */
      .dtap-bar { display: flex; align-items: center; gap: 0; margin-top: 8px; }
      .dtap-stage {
        flex: 1; text-align: center; padding: 4px 2px;
        font-size: 9px; font-weight: 600; color: #94a3b8;
        border-bottom: 3px solid #e2e8f0;
        transition: all 0.4s ease;
      }
      .dtap-stage.dtap-done { border-color: #10b981; color: #059669; }
      .dtap-stage.dtap-current { border-color: #0070F3; color: #0070F3; }
      .dtap-arrow { font-size: 10px; color: #cbd5e1; flex-shrink: 0; }

      /* Admin console mockup */
      .admin-panel {
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        overflow: hidden;
        font-size: 11px;
        background: #f8fafc;
      }
      .admin-sidebar {
        width: 100px;

      /* ========== PIPELINE (rendered inside admin view) ========== */

      /* ========== FLOW ANIMATION ENGINE (queue-based, supports pause/resume) ========== */

      function clearFlowTimers(){
        if (!STATE.flowTimers) STATE.flowTimers = { intervals: [], timeouts: [] };
        STATE.flowTimers.intervals.forEach(id => clearInterval(id));
        STATE.flowTimers.timeouts.forEach(id => clearTimeout(id));
        STATE.flowTimers.intervals = [];
        STATE.flowTimers.timeouts = [];
      }

      function buildFlowQueue(){
        const queue = [];
        for (let i = 0; i < SCENARIOS.length; i++) {
          const idx = i;
          const isCatalog = SCENARIOS[i].id === 'catalog';
          if (i === 0) {
            queue.push({ delay: 600, fn(){ STATE.flowScenarioIdx = idx; STATE.flowPhase = 'clicking'; if (!isCatalog) { STATE.flowAppOpened = true; } updateFlowDOM(); } });
          } else {
            queue.push({ delay: 1200, fn(){ STATE.flowScenarioIdx = idx; STATE.flowPhase = 'clicking'; if (SCENARIOS[idx].id !== 'catalog') STATE.flowAppOpened = true; updateFlowDOM(); } });
          }
          queue.push({ delay: 1200, fn(){ STATE.flowPhase = 'checking'; updateFlowDOM(); animateChecks(); } });
          queue.push({ delay: 2000, fn(){ STATE.flowPhase = 'routing'; updateFlowDOM(); } });
          queue.push({ delay: 1500, fn(){ STATE.flowPhase = 'config'; updateFlowDOM(); } });
          queue.push({ delay: 1500, fn(){ STATE.flowPhase = 'done'; updateFlowDOM(); } });
          if (i === SCENARIOS.length - 1) {
            queue.push({ delay: 2000, fn(){ STATE.flowPhase = 'final'; updateFlowDOM(); } });
            queue.push({ delay: 3000, fn(){ STATE.flowRunning = false; STATE.flowPaused = false; updateFlowDOM(); } });
          }
        }
        return queue;
      }

      function runFlowQueue(){
        if (STATE.flowPaused || STATE.flowQueueIdx >= STATE.flowQueue.length) return;
        const step = STATE.flowQueue[STATE.flowQueueIdx];
        const tid = setTimeout(() => {
          if (STATE.flowPaused) return; // double-check in case paused mid-timeout
          step.fn();
          STATE.flowQueueIdx++;
          runFlowQueue();
        }, step.delay);
        STATE.flowTimers.timeouts.push(tid);
      }

      function startFlow(){
        if (STATE.flowRunning) return;
        clearFlowTimers();
        STATE.flowRunning = true;
        STATE.flowPaused = false;
        STATE.flowScenarioIdx = 0;
        STATE.flowPhase = 'idle';
        STATE.flowQueue = buildFlowQueue();
        STATE.flowQueueIdx = 0;
        render();
        runFlowQueue();
      }

      function pauseFlow(){
        if (!STATE.flowRunning) return;
        STATE.flowPaused = true;
        // Clear pending timeouts so nothing fires while paused
        STATE.flowTimers.timeouts.forEach(id => clearTimeout(id));
        STATE.flowTimers.timeouts = [];
        render();
      }

      function resumeFlow(){
        if (!STATE.flowRunning || !STATE.flowPaused) return;
        STATE.flowPaused = false;
        render();
        runFlowQueue();
      }

      function animateChecks(){
        const items = document.querySelectorAll('.check-item');
        items.forEach((item, i) => {
          const tid = setTimeout(() => {
            if (STATE.flowPaused) return;
            item.classList.add('pass');
            const ico = item.querySelector('[data-lucide]');
            if (ico) {
              ico.setAttribute('data-lucide', 'check-circle');
              if (window.lucide?.createIcons) try { window.lucide.createIcons(); } catch {}
            }
          }, i * 350);
          STATE.flowTimers.timeouts.push(tid);
        });
      }

      function updateFlowDOM(){
        render();
      }

      function resetFlow(){
        clearFlowTimers();
        STATE.flowStep = -1;
        STATE.flowRunning = false;
        STATE.flowPaused = false;
        STATE.flowScenarioIdx = -1;
        STATE.flowPhase = 'idle';
        STATE.flowQueue = [];
        STATE.flowQueueIdx = 0;
        STATE.flowAppOpened = false;
        STATE._firstOpenDone = false;
        render();
      }

      function render(){
        const root=document.getElementById('app');
        root.innerHTML = `

                    data-action="switch-tab"
                    data-tab="${t.id}"

                    aria-selected="${STATE.activeTab===t.id}">
                    <i data-lucide="${t.icon}" class="w-4 h-4"></i><span>${t.label}</span>
                  </button>
                `).join('')}

          <main class="mx-auto max-w-6xl px-4 pb-16">
            <section class="mt-5">${renderActivePanel()}</section>

          ${renderModal()}
          ${renderWhyModal()}

        if (window.lucide?.createIcons) { try { window.lucide.createIcons(); } catch {} }
        attachEvents();

        if (STATE.activeTab === 'solution') { attachAccordionKeyboard(); }
        if (STATE.activeTab === 'roi') { updateROIOutputs(); }
        if (STATE.activeTab === 'problems') {
          renderCapacityGapChart();
          if (Math.abs(STATE.currentDemandExponent - STATE.targetDemandExponent) > 0.001 || Math.abs(STATE.currentCapacitySlope - STATE.targetCapacitySlope) > 0.001) {
            requestAnimationFrame(animateCurves);
          }

      function chip(label,value,tone){
        const tones={emerald:'from-emerald-400/80 to-teal-400/80',sky:'from-sky-400/80 to-indigo-400/80',yellow:'from-yellow-300/90 to-amber-400/90'};

      /* ========== PROBLEMS TAB (UNCHANGED) ========== */

      function renderProblems(){
        const items=[
          {t:'Clinical App Friction',s:'Physicians lose 5-10 minutes daily to Epic login delays, session timeouts, and broken app launches.',i:'activity'},
          {t:'Citrix Renewal Shock',s:'Hospitals face 2-3x price increases at Citrix renewal while managing tight capital budgets.',i:'trending-up'},

        ];

        return `
          <section id="panel-problems" class="space-y-4">
            <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-4">
              ${items.map(p=>`
                <article class="section-card p-4">
                  <div class="flex items-center gap-2"><i data-lucide="${p.i}" class="w-5 h-5 text-[#0070F3]"></i><h3 class="text-base font-semibold">${p.t}</h3></div>
                  <p class="mt-1 text-sm text-[#4A5568]">${p.s}</p>
                </article>
              `).join('')}
            </div>

            <div class="section-card p-6">
              <div class="grid grid-cols-1 lg:grid-cols-[1fr_300px] gap-6 items-start">
                <div class="chart-container relative">
                  <svg id="capacity-gap-chart" viewBox="0 0 800 420"></svg>
                </div>
                <div class="w-full lg:w-64 bg-white/70 backdrop-blur-lg rounded-2xl shadow-md p-5 border border-slate-200">
                  <h3 class="text-lg font-medium mb-4">Healthcare IT Pressure Points</h3>
                  <div class="grid grid-cols-1 gap-4 items-stretch">
                    ${calloutDropdown('change','alert-triangle','Why Change','bg-slate-50')}
                    ${calloutDropdown('now','clock-4','Why Now','bg-slate-50', false, "")}
                    ${calloutDropdown('recast','sparkles','Why Recast','bg-slate-50', true)}
                  </div>
                </div>
              </div>
            </div>

          </section>
        `;
      }

      /* ========== CHART ========== */

      function renderCapacityGapChart(){
        const svg = document.getElementById('capacity-gap-chart');
        if (!svg) return;

        svg.innerHTML = '';
        svg.setAttribute('viewBox', '0 0 800 420');

        const width = 700, height = 310, margin = {left: 55, bottom: 50, top: 40, right: 50};
        const xScale = t => margin.left + t * width;
        const yScale = v => margin.top + height - v * height;

        const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        defs.innerHTML = `
          <linearGradient id="demandGradient" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#f87171"/>
            <stop offset="100%" stop-color="#dc2626"/>
          </linearGradient>
          <linearGradient id="capacityGradient" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#0A1C60"/>
            <stop offset="100%" stop-color="#0070F3"/>
          </linearGradient>
          <linearGradient id="gapGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgba(239,68,68,0.08)"/>
            <stop offset="100%" stop-color="rgba(10,28,96,0.04)"/>
          </linearGradient>
          <linearGradient id="capFillGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgba(10,28,96,0.08)"/>
            <stop offset="100%" stop-color="rgba(10,28,96,0.02)"/>
          </linearGradient>
        `;
        svg.appendChild(defs);

        // Grid lines
        const gridG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        for (let i = 0; i <= 4; i++) {
          const y = margin.top + (height / 4) * i;
          gridG.innerHTML += '<line x1="' + margin.left + '" y1="' + y + '" x2="' + (margin.left + width) + '" y2="' + y + '" stroke="#f1f5f9" stroke-width="1" stroke-dasharray="4 4"/>';
        }
        svg.appendChild(gridG);

        const xAxis = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        xAxis.classList.add('axis-element', 'chart-element');
        xAxis.innerHTML = `
          <line x1="${margin.left}" y1="${margin.top + height}" x2="${margin.left + width}" y2="${margin.top + height}" class="chart-axis"/>
          <text x="${margin.left + width / 2}" y="${margin.top + height + 38}" text-anchor="middle" class="chart-axis-label">${STATE.chartConfig.xAxis}</text>
          ${STATE.years.map((year, i) => {
            const x = xScale(i / 3);
            return `
              <line x1="${x}" y1="${margin.top + height}" x2="${x}" y2="${margin.top + height + 6}" class="chart-axis"/>
              <text x="${x}" y="${margin.top + height + 22}" text-anchor="middle" class="chart-year-label chart-element">${year}</text>
            `;
          }).join('')}
        `;
        svg.appendChild(xAxis);

        const yAxis = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        yAxis.classList.add('axis-element', 'chart-element');
        yAxis.innerHTML = `
          <line x1="${margin.left}" y1="${margin.top}" x2="${margin.left}" y2="${margin.top + height}" class="chart-axis"/>
          <text x="${margin.left - 14}" y="${margin.top + height / 2}" text-anchor="middle" class="chart-axis-label" transform="rotate(-90, ${margin.left - 14}, ${margin.top + height / 2})">${STATE.chartConfig.yAxis}</text>
        `;
        svg.appendChild(yAxis);

        const exp = STATE.currentDemandExponent;
        const slope = STATE.currentCapacitySlope;

        let demandPath = `M ${xScale(0)} ${yScale(0)}`;
        let capacityPath = `M ${xScale(0)} ${yScale(0.3)}`;

        const demandPoints = [];
        const capacityPoints = [];

        for (let i = 0; i <= 100; i++) {
          const t = i / 100;
          const dem = Math.pow(t, exp);
          const cap = 0.3 + slope * t;
          demandPath += ` L ${xScale(t)} ${yScale(dem)}`;
          capacityPath += ` L ${xScale(t)} ${yScale(cap)}`;
          demandPoints.push({x: xScale(t), y: yScale(dem)});
          capacityPoints.push({x: xScale(t), y: yScale(cap)});
        }

        const demandLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        demandLine.setAttribute('d', demandPath);
        demandLine.setAttribute('stroke', 'url(#demandGradient)');
        demandLine.setAttribute('fill', 'none');
        demandLine.classList.add('demand-line', 'line-element', 'chart-element');
        svg.appendChild(demandLine);

        const capacityLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        capacityLine.setAttribute('d', capacityPath);
        capacityLine.setAttribute('stroke', 'url(#capacityGradient)');
        capacityLine.setAttribute('fill', 'none');
        capacityLine.classList.add('capacity-line', 'line-element', 'chart-element');
        svg.appendChild(capacityLine);

        // Capacity area fill
        const capAreaPath = capacityPath + ` L ${xScale(1)} ${yScale(0)} L ${xScale(0)} ${yScale(0)} Z`;
        const capArea = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        capArea.setAttribute('d', capAreaPath);
        capArea.setAttribute('fill', 'url(#capFillGrad)');
        capArea.classList.add('gap-element', 'chart-element');
        svg.appendChild(capArea);

        // Legend removed for cleaner look

        const gapPath = demandPoints.map(p => `L ${p.x} ${p.y}`).join(' ') +
          capacityPoints.slice().reverse().map(p => `L ${p.x} ${p.y}`).join(' ') + 'Z';

        const gap = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        gap.setAttribute('d', `M ${demandPoints[0].x} ${demandPoints[0].y} ` + gapPath);
        gap.setAttribute('fill', 'url(#gapGradient)');
        gap.classList.add('gap-fill', 'gap-element', 'chart-element');
        svg.appendChild(gap);

        const gapLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        gapLabel.setAttribute('x', xScale(0.5));
        gapLabel.setAttribute('y', yScale(0.5));
        gapLabel.setAttribute('text-anchor', 'middle');
        gapLabel.classList.add('chart-annotation', 'label-element', 'chart-element');
        gapLabel.textContent = STATE.chartConfig.center;
        svg.appendChild(gapLabel);

        STATE.drivers.forEach(d => {
          if (d.markerYear && (d.state === 'normal' || d.state === 'accelerating')) {
            const t = (d.markerYear - 2025) / 3;
            const dem = Math.pow(t, exp);
            const x = xScale(t);
            const y = yScale(dem);
            const isHot = d.id && STATE.highlightDriverId === d.id;
            const emphasis = isHot ? 7 : (d.state === 'accelerating' ? 6 : 5);
            const dotColor = d.state === 'accelerating' ? '#ef4444' : '#ef4444';
            const dotFilter = isHot ? 'filter: drop-shadow(0 3px 8px rgba(239,68,68,0.35));' : '';
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.classList.add('marker-group', 'marker-element', 'chart-element');
            g.setAttribute('role', 'button');
            g.setAttribute('tabindex', '0');
            g.setAttribute('aria-label', `Learn more about ${d.label}`);
            g.innerHTML = `
              <title>${d.short}</title>
              <circle cx="${x}" cy="${y}" r="18" fill="transparent" stroke="none"/>
              <circle cx="${x}" cy="${y}" r="${emphasis}" fill="${dotColor}" stroke="white" stroke-width="2" style="${dotFilter}"/>
              <text x="${x + 10}" y="${y - 2}" class="chart-text label-element chart-element" font-size="11" font-weight="700" fill="#334155">${d.label}</text>
            `;
            g.addEventListener('click', () => openInsight(d));
            g.addEventListener('keydown', e => { if (e.key === 'Enter') openInsight(d); });
            svg.appendChild(g);
          }
        });

        if (STATE.showTippingPoint) {
          const t = (STATE.tippingPointYear - 2025) / 3;
          const x = xScale(t);
          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', x); line.setAttribute('y1', yScale(0));
          line.setAttribute('x2', x); line.setAttribute('y2', yScale(1));
          line.setAttribute('stroke', '#ef4444'); line.setAttribute('stroke-width', '1.5');
          line.setAttribute('stroke-dasharray', '6 4');
          line.classList.add('line-element', 'chart-element');
          svg.appendChild(line);
          const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          label.setAttribute('x', x + 8); label.setAttribute('y', yScale(1) - 6);
          label.setAttribute('font-size', '11');
          label.setAttribute('font-weight', '700');
          label.setAttribute('fill', '#0A1C60');
          label.setAttribute('font-family', 'Inter, system-ui, sans-serif');
          label.classList.add('chart-text', 'label-element', 'chart-element');
          label.textContent = 'IT Inflection Point';
          svg.appendChild(label);
          const ann = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          ann.setAttribute('x', x + 8); ann.setAttribute('y', yScale(0.8) + 5);
          ann.setAttribute('fill', '#ef4444');
          ann.setAttribute('font-size', '10');
          ann.setAttribute('font-weight', '600');
          ann.setAttribute('font-family', 'Inter, system-ui, sans-serif');
          ann.classList.add('chart-text', 'label-element', 'chart-element');
          ann.textContent = STATE.chartConfig.tipping;
          svg.appendChild(ann);
          const hit = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          hit.setAttribute('role', 'button'); hit.setAttribute('tabindex', '0');
          hit.setAttribute('aria-label', 'Learn more about Projected Tipping Point');
          hit.innerHTML = `<rect x="${x - 10}" y="${yScale(1) - 20}" width="20" height="${height}" fill="transparent"/>`;
          hit.addEventListener('click', () => openInsight(STATE.tippingPoint));
          hit.addEventListener('keydown', e => { if (e.key === 'Enter') openInsight(STATE.tippingPoint); });
          svg.appendChild(hit);
        }
      }

      function updateCurves(){
        if (STATE.recastMode) {
          STATE.targetDemandExponent = 1.55;
          STATE.targetCapacitySlope = 0.18;
          STATE.showTippingPoint = false;
          return;
        }
        let numNormal = 0, numAccelerating = 0;
        STATE.drivers.forEach(d => { if (d.state === 'normal') numNormal++; if (d.state === 'accelerating') numAccelerating++; });
        STATE.targetDemandExponent = 1.6 + (numNormal * 0.15 + numAccelerating * 0.3);
        STATE.targetDemandExponent = Math.min(Math.max(STATE.targetDemandExponent, 1.2), 3);
        STATE.targetCapacitySlope = 0;
        STATE.showTippingPoint = numAccelerating >= 3;
      }

      function animateCurves(){
        STATE.currentDemandExponent += (STATE.targetDemandExponent - STATE.currentDemandExponent) * 0.1;
        STATE.currentCapacitySlope += (STATE.targetCapacitySlope - STATE.currentCapacitySlope) * 0.1;
        renderCapacityGapChart();
        if (Math.abs(STATE.currentDemandExponent - STATE.targetDemandExponent) > 0.001 || Math.abs(STATE.currentCapacitySlope - STATE.targetCapacitySlope) > 0.001) {
          requestAnimationFrame(animateCurves);
        }
      }

      function setSlider(id, value){
        const driver = STATE.drivers.find(d => d.id === id);
        if (driver) {
          driver.state = ['off', 'normal', 'accelerating'][value];
          STATE.recastMode = false;
          updateCurves();
          requestAnimationFrame(animateCurves);
        }
      }

      function resetSliders(){
        STATE.recastMode = false;
        STATE.drivers.forEach(d => d.state = 'off');
        STATE.currentDemandExponent = 1.6;
        STATE.targetDemandExponent = 1.6;
        STATE.currentCapacitySlope = 0;
        STATE.targetCapacitySlope = 0;
        STATE.showTippingPoint = false;
        STATE.highlightDriverId = null;
        render();
      }

      function openInsight(content){
        STATE.insightContent = content;
        STATE.highlightDriverId = content?.id || null;
        render();
      }

      function renderInsightModal(){
        if (!STATE.insightContent) return '';
        const c = STATE.insightContent;
        const title = c.title || c.label;
        const intro = c.intro || c.short;
        const bullets = c.bullets || [];
        const closing = c.closing || '';
        return `
          <div class="fixed inset-0 z-50 flex items-center justify-center modal-overlay" role="dialog" aria-modal="true" aria-labelledby="insight-modal-title">
            <div class="w-full max-w-4xl mx-4 rounded-2xl overflow-hidden transform modal-content glass">
              <div class="bg-white/40 backdrop-blur-lg px-8 py-6 flex items-center justify-between" style="border-bottom:1px solid var(--border-subtle)">
                <div class="flex items-center gap-3">
                  <i data-lucide="lightbulb" class="w-8 h-8 text-[#0A1C60]" aria-hidden="true"></i>
                  <h2 id="insight-modal-title" class="text-3xl font-bold tracking-tight text-[#0A1C60]">${title}</h2>
                </div>
                <button type="button" class="text-slate-500 hover:text-slate-700 focus-ring p-2" data-action="close-insight-modal" aria-label="Close">
                  <i data-lucide="x" class="w-6 h-6"></i>
                </button>
              </div>
              <div class="p-8 bg-white/35 backdrop-blur-lg">
                ${intro ? `<p class="text-base leading-relaxed text-[#4A5568] mb-4">${intro}</p>` : ''}
                <div class="space-y-4">
                  ${bullets.map(b=>`
                    <div class="bg-white/70 backdrop-blur-lg p-4 rounded-lg shadow-sm flex items-start gap-3 hover:shadow-md transition-shadow">
                      <i data-lucide="check-circle" class="w-5 h-5 text-[#0070F3] flex-shrink-0 mt-0.5"></i>
                      <p class="text-base leading-relaxed text-[#4A5568]">${b}</p>
                    </div>
                  `).join('')}
                </div>
                ${closing ? `
                  <div class="mt-6 bg-white/70 backdrop-blur-lg p-4 rounded-lg shadow-sm hover:shadow-md transition-shadow flex items-start gap-3">
                    <i data-lucide="sparkles" class="w-5 h-5 text-amber-400 flex-shrink-0 mt-0.5"></i>
                    <p class="text-base italic text-[#4A5568]">${closing}</p>
                  </div>
                ` : ''}
              </div>
            </div>
          </div>
        `;
      }

      const whyOrder = ['change', 'now', 'recast'];

      function calloutDropdown(id, icon, label, headerTone, cta=false, subtext=''){
        return `
          <div class="h-full flex flex-col">
            <button type="button" class="w-full overflow-hidden ring-1 ring-slate-200 focus-ring transition hover:ring-slate-300 shadow-sm" data-action="open-why-modal" data-why="${id}" style="border-radius:var(--radius)">
              <div class="${cx('flex items-center justify-between px-4 py-3', headerTone)}" style="border-bottom:1px solid var(--border-subtle)">
                <div class="flex items-center gap-2">
                  <i data-lucide="${icon}" class="w-4 h-4 text-[#0A1C60]" aria-hidden="true"></i>
                  <span class="text-[18px] font-semibold tracking-normal text-[#0A1C60]">${label}</span>
                </div>
                <i data-lucide="chevron-right" class="w-4 h-4 text-[#4A5568] transition-transform duration-150" aria-hidden="true"></i>
              </div>
            </button>
            ${subtext ? `<p class="px-5 py-2 text-sm text-gray-700">${subtext}</p>` : ''}
          </div>
        `;
      }

      function renderWhyModal(){
        if(!STATE.openWhyModal) return '';
        const id = STATE.openWhyModal;
        const iconMap = { change: 'alert-triangle', now: 'clock-4', recast: 'sparkles' };
        const labelMap = { change: 'Why Change', now: 'Why Now', recast: 'Why Recast' };
        const data = STATE.currentState[id];
        const currentIdx = whyOrder.indexOf(id);
        const prev = currentIdx > 0 ? whyOrder[currentIdx - 1] : null;
        const next = currentIdx < whyOrder.length - 1 ? whyOrder[currentIdx + 1] : null;
        const isRecast = id === 'recast';

        return `
          <div class="fixed inset-0 z-50 flex items-center justify-center modal-overlay" role="dialog" aria-modal="true" aria-labelledby="why-modal-title-${id}">
            <div class="w-full ${isRecast ? 'max-w-5xl' : 'max-w-4xl'} mx-4 rounded-2xl overflow-hidden transform modal-content glass" style="${isRecast ? 'max-height:95vh;display:flex;flex-direction:column' : ''}">
              <div class="bg-white/40 backdrop-blur-lg px-6 py-4 flex items-center justify-between flex-shrink-0" style="border-bottom:1px solid var(--border-subtle)">
                <div class="flex items-center gap-3">
                  <i data-lucide="${iconMap[id]}" class="w-7 h-7 text-[#0A1C60]" aria-hidden="true"></i>
                  <h2 id="why-modal-title-${id}" class="text-2xl font-bold tracking-tight text-[#0A1C60]">${labelMap[id]}</h2>
                </div>
                <button type="button" class="text-slate-500 hover:text-slate-700 focus-ring p-2" data-action="close-why-modal" aria-label="Close"><i data-lucide="x" class="w-5 h-5"></i></button>
              </div>
              <div class="${isRecast ? 'px-6 py-4 overflow-y-auto' : 'p-8'} bg-white/35 backdrop-blur-lg" style="${isRecast ? 'flex:1;min-height:0' : ''}">
                ${isRecast ? `
                  <!-- Compact bullets for Recast -->
                  <p class="text-sm leading-relaxed text-[#4A5568] mb-3">${data.intro}</p>
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-4">
                    ${data.bullets.map(b=>`
                      <div class="bg-white/70 backdrop-blur-lg p-2.5 rounded-lg shadow-sm flex items-start gap-2">
                        <i data-lucide="check-circle" class="w-4 h-4 text-[#0070F3] flex-shrink-0 mt-0.5"></i>
                        <p class="text-xs leading-relaxed text-[#4A5568]">${b}</p>
                      </div>
                    `).join('')}
                  </div>
                  <div class="bg-white/70 backdrop-blur-lg p-2.5 rounded-lg shadow-sm flex items-start gap-2 mb-4">
                    <i data-lucide="lightbulb" class="w-4 h-4 text-amber-400 flex-shrink-0 mt-0.5"></i>
                    <p class="text-xs italic text-[#4A5568]">${data.analyst}</p>
                  </div>

                  <!-- How It Fits Together — embedded -->
                  <div class="rounded-xl border border-slate-200 bg-white/80 p-4">
                    <div class="text-sm font-semibold text-[#0A1C60] mb-3 text-center">How It Fits Together</div>
                    <div class="text-center mb-2">
                      <div class="text-[9px] font-semibold uppercase tracking-widest text-[#64748b] mb-2">Your Existing Clinical Infrastructure</div>
                      <div class="flex flex-wrap justify-center gap-1.5">
                        <span class="px-3 py-1 rounded-full text-xs font-medium text-white" style="background:#374151">Citrix</span>
                        <span class="px-3 py-1 rounded-full text-xs font-medium text-white" style="background:#0078D4">AVD / Nerdio</span>
                        <span class="px-3 py-1 rounded-full text-xs font-medium text-white" style="background:#0078D4">Intune</span>
                        <span class="px-3 py-1 rounded-full text-xs font-medium text-white" style="background:#0078D4">ConfigMgr</span>
                        <span class="px-3 py-1 rounded-full text-xs font-medium text-white" style="background:#E87722">Imprivata</span>
                      </div>
                    </div>
                    <div class="flex justify-center"><div style="width:70%;height:20px;border:2px dashed #cbd5e1;border-top:none;border-radius:0 0 12px 12px"></div></div>
                    <div class="relative my-1.5">
                      <div class="flex items-center">
                        <div class="hidden md:flex flex-col gap-1 flex-shrink-0 mr-3">
                          <div class="flex items-center gap-1 px-2 py-0.5 rounded-full border border-slate-200 bg-white text-[10px] text-[#475569]"><div class="w-1.5 h-1.5 rounded-full bg-green-400"></div>8,000+ Pre-tested Apps</div>
                          <div class="flex items-center gap-1 px-2 py-0.5 rounded-full border border-slate-200 bg-white text-[10px] text-[#475569]"><div class="w-1.5 h-1.5 rounded-full bg-blue-400"></div>Clinical App Packaging</div>
                          <div class="flex items-center gap-1 px-2 py-0.5 rounded-full border border-slate-200 bg-white text-[10px] text-[#475569]"><div class="w-1.5 h-1.5 rounded-full bg-purple-400"></div>Badge-Tap SSO</div>
                        </div>
                        <div class="flex-1 rounded-lg p-3 text-center" style="background:linear-gradient(135deg,#0A1C60 0%,#0070F3 100%)">
                          <div class="text-base font-bold text-white">Application Workspace</div>
                          <div class="text-[11px] text-blue-200 mt-0.5">Package &middot; Deliver &middot; Update &middot; Self-Service &middot; Audit</div>
                        </div>
                        <div class="hidden md:flex flex-col gap-1 flex-shrink-0 ml-3">
                          <div class="flex items-center gap-1 px-2 py-0.5 rounded-full border border-slate-200 bg-white text-[10px] text-[#475569]"><div class="w-1.5 h-1.5 rounded-full bg-indigo-400"></div>Identity-Based Access</div>
                          <div class="flex items-center gap-1 px-2 py-0.5 rounded-full border border-slate-200 bg-white text-[10px] text-[#475569]"><div class="w-1.5 h-1.5 rounded-full bg-red-400"></div>HIPAA Auto-Patching</div>
                        </div>
                      </div>
                    </div>
                    <div class="flex justify-center"><div style="width:70%;height:20px;border:2px solid #0070F3;border-top:none;border-radius:0 0 12px 12px"></div></div>
                    <div class="text-center mt-2">
                      <div class="text-[9px] font-semibold uppercase tracking-widest text-[#0070F3] mb-1.5">Clinicians & Clinical Endpoints</div>
                      <div class="flex flex-wrap justify-center gap-1.5">
                        ${['Shared Cart','Workstation','Virtual Desktop','Home Office','Tablet / BYOD'].map(d => `
                          <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg border border-slate-200 bg-white text-[11px] text-[#475569]">${d}</span>
                        `).join('')}
                      </div>
                    </div>
                  </div>
                ` : `
                  <!-- Standard modal content for Why Change / Why Now -->
                  <p class="text-base leading-relaxed text-[#4A5568] mb-4">${data.intro}</p>
                  <div class="space-y-4">
                    ${data.bullets.map(b=>`
                      <div class="bg-white/70 backdrop-blur-lg p-4 rounded-lg shadow-sm flex items-start gap-3 hover:shadow-md transition-shadow">
                        <i data-lucide="check-circle" class="w-5 h-5 text-[#0070F3] flex-shrink-0 mt-0.5"></i>
                        <p class="text-base leading-relaxed text-[#4A5568]">${b}</p>
                      </div>
                    `).join('')}

      function calculateImpact(){
        const ci = STATE.calcInputs;
        const a = ROI_ASSUMPTIONS[STATE.calcScenario];

        // Core calculations
        const currentSupportHours = round((ci.monthlyTickets * ci.avgTicketMins) / 60);
        const ticketHoursReturned = round(currentSupportHours * a.ticketReduction);
        const ticketsAvoided = Math.round(ci.monthlyTickets * a.ticketReduction);
        const pkgHoursReturned = round(ci.pkgHours * a.pkgReduction);
        const patchHoursReturned = round(ci.patchHours * a.patchReduction);

        const totalHoursMonth = round(ticketHoursReturned + pkgHoursReturned + patchHoursReturned);
        const totalHoursYear = round(totalHoursMonth * 12);
        const fteCapacity = round(totalHoursYear / a.fteHours);
        const strategicHours = Math.round(totalHoursYear * a.strategicRealloc);

        const reqsDeferred = ci.openReqs > 0 ? Math.min(ci.openReqs, Math.floor(fteCapacity)) : 0;
        const delayedInitiatives = ci.delayedInitiatives;

        // Simplification score (index out of 100)
        const envWeight = Math.min(ci.envs * 12, 50);
        const appWeight = Math.min(ci.apps * 0.15, 30);
        const customWeight = Math.min(ci.customApps * 0.5, 20);
        const complexityBefore = Math.min(Math.round(envWeight + appWeight + customWeight), 95);
        const complexityAfter = Math.max(Math.round(complexityBefore * (1 - a.pkgReduction * 0.8)), 10);

        // Risk score (index out of 100)
        const riskBase = complexityBefore + (ci.regulated ? 15 : 0);
        const riskBefore = Math.min(riskBase, 98);
        const riskAfter = Math.max(Math.round(riskBefore * (1 - a.patchReduction * 0.7)), 12);

        STATE.calcResult = {
          currentSupportHours, ticketHoursReturned, ticketsAvoided,
          pkgHoursReturned, patchHoursReturned,
          totalHoursMonth, totalHoursYear,
          fteCapacity, strategicHours, reqsDeferred, delayedInitiatives,
          complexityBefore, complexityAfter, riskBefore, riskAfter
        };
      }

                `).join('')}
              </div>
              <div class="mt-4">
                ${STATE.editTab === 'change' ? editorSection('change','Why Change', ensure(buf.change.intro) || STATE.currentState.change.intro, ensure(buf.change.bullets) || toLines(STATE.currentState.change.bullets), ensure(buf.change.analyst) || STATE.currentState.change.analyst) : ''}
                ${STATE.editTab === 'now' ? editorSection('now','Why Now', ensure(buf.now.intro) || STATE.currentState.now.intro, ensure(buf.now.bullets) || toLines(STATE.currentState.now.bullets), ensure(buf.now.analyst) || STATE.currentState.now.analyst) : ''}
                ${STATE.editTab === 'recast' ? editorSection('recast','Why Recast', ensure(buf.recast.intro) || STATE.currentState.recast.intro, ensure(buf.recast.bullets) || toLines(STATE.currentState.recast.bullets), ensure(buf.recast.analyst) || STATE.currentState.recast.analyst) : ''}
                ${STATE.editTab === 'chart' ? editorSectionChart() : ''}
              </div>
              <div class="mt-5 flex flex-wrap gap-2">
                <button id="btnSaveCurrentState" type="button" data-action="save-currentstate" class="inline-flex items-center gap-2 bg-[#0070F3] text-white px-4 py-2 text-sm font-semibold focus-ring rounded hover:bg-[#005AD0]"><i data-lucide="save" class="w-4 h-4"></i> Save</button>
                <button id="btnResetCurrentState" type="button" data-action="reset-currentstate-defaults" class="inline-flex items-center gap-2 bg-transparent text-[#0A1C60] border-2 border-[#0A1C60] px-4 py-2 text-sm font-semibold focus-ring rounded hover:text-[#0070F3] hover:border-[#0070F3]"><i data-lucide="rotate-ccw" class="w-4 h-4"></i> Reset to default</button>
              </div>
            </div>
          </div>
        `;
      }

      function editorSectionChart(){
        const buffer = STATE.editChartBuffer || { chartConfig: { ...STATE.chartConfig }, drivers: STATE.drivers.map(d => ({ label: d.label, bullets: d.bullets.join('\n') })) };
        const conf = buffer.chartConfig || {};
        const drv = buffer.drivers || [];
        return `
          <div class="flex flex-col gap-4">
            <span class="text-sm font-semibold">XY Chart</span>
            <label class="flex flex-col gap-1"><span class="text-xs text-[#4A5568]">Y-axis label</span><input id="chart-yaxis" value="${conf.yAxis ?? STATE.chartConfig.yAxis}" class="rounded border border-slate-200 bg-white p-3 text-sm focus-ring" /></label>
            <label class="flex flex-col gap-1"><span class="text-xs text-[#4A5568]">X-axis label</span><input id="chart-xaxis" value="${conf.xAxis ?? STATE.chartConfig.xAxis}" class="rounded border border-slate-200 bg-white p-3 text-sm focus-ring" /></label>
            <label class="flex flex-col gap-1"><span class="text-xs text-[#4A5568]">Center text</span><input id="chart-center" value="${conf.center ?? STATE.chartConfig.center}" class="rounded border border-slate-200 bg-white p-3 text-sm focus-ring" /></label>
            <label class="flex flex-col gap-1"><span class="text-xs text-[#4A5568]">Footer caption</span><input id="chart-footer" value="${conf.footer ?? STATE.chartConfig.footer}" class="rounded border border-slate-200 bg-white p-3 text-sm focus-ring" /></label>
            <label class="flex flex-col gap-1"><span class="text-xs text-[#4A5568]">------ annotation</span><input id="chart-tipping" value="${conf.tipping ?? STATE.chartConfig.tipping}" class="rounded border border-slate-200 bg-white p-3 text-sm focus-ring" /></label>
            <div class="space-y-4">
              ${STATE.drivers.map((d, i) => {
                const dBuf = drv[i] || {};
                return `<div><label class="flex flex-col gap-1"><span class="text-xs text-[#4A5568]">Point ${i+1} title</span><input id="driver${i}-label" value="${(dBuf.label ?? d.label)}" class="rounded border border-slate-200 bg-white p-3 text-sm focus-ring" /></label><label class="flex flex-col gap-1 mt-2"><span class="text-xs text-[#4A5568]">Point ${i+1} bullets (one per line, exactly 3)</span><textarea id="driver${i}-bullets" rows="4" class="min-h-[100px] rounded border border-slate-200 bg-white p-3 text-sm leading-5 focus-ring">${(dBuf.bullets ?? d.bullets.join('\n'))}</textarea></label></div>`;
              }).join('')}
            </div>
          </div>
        `;
      }

      function editorSection(key,label,introValue,bulletsValue,analystValue){
        return `
          <div class="flex flex-col gap-4">
            <span class="text-sm font-semibold">${label}</span>
            <label class="flex flex-col gap-1"><span class="text-xs text-[#4A5568]">Introduction</span><textarea id="${key}Intro" data-action="edit-buffer" data-key="${key}" data-subkey="intro" class="min-h-[80px] rounded-[2px] border border-slate-200 bg-white p-3 text-sm leading-5 focus-ring" rows="2">${introValue}</textarea></label>
            <label class="flex flex-col gap-1"><div class="flex items-center gap-2 text-xs text-[#4A5568]"><i data-lucide="check-circle" class="w-4 h-4 text-[#0070F3]"></i>Bullets (one per line, max 4)</div><textarea id="${key}Bullets" data-action="edit-buffer" data-key="${key}" data-subkey="bullets" class="min-h-[160px] rounded-[2px] border border-slate-200 bg-white p-3 text-sm leading-5 focus-ring" rows="6">${bulletsValue}</textarea></label>
            <label class="flex flex-col gap-1"><span class="text-xs text-[#4A5568]">Analyst Trend</span><textarea id="${key}Analyst" data-action="edit-buffer" data-key="${key}" data-subkey="analyst" class="min-h-[80px] rounded-[2px] border border-slate-200 bg-white p-3 text-sm leading-5 focus-ring" rows="2">${analystValue}</textarea></label>
          </div>
        `;
      }

      function parseLines(s, max=4){ return (s || '').split('\n').map(l => l.trim()).filter(Boolean).slice(0, max); }

      /* ========== Event system (UNCHANGED except flow actions) ========== */

      function attachEvents(){
        const root = document.getElementById('app');
        if (!root || root.dataset.bound === '1') return;
        root.dataset.bound = '1';

        root.addEventListener('click', (e) => {
          const act = e.target.closest('[data-action]');
          const action = act?.getAttribute('data-action');

          const node = e.target.closest('.interactive-node');
          if (node) { const id = node.dataset.id; STATE.activePopover = STATE.activePopover === id ? null : id; render(); return; }

          if (!action) return;

          if (action === 'switch-tab') { STATE.activeTab = act.getAttribute('data-tab'); STATE.visitedCards = []; STATE.activePopover = null; STATE.calcResult = null; STATE.openWhyModal = null; STATE.insightContent = null; STATE.flowStep = -1; STATE.flowRunning = false; STATE.flowPaused = false; STATE.flowScenarioIdx = -1; STATE.flowPhase = 'idle'; STATE.flowAppOpened = false; STATE._firstOpenDone = false; STATE.showAdminView = false; STATE.showAutopilot = false; STATE.autopilotStep = -1; clearFlowTimers(); render(); return; }
          if (action === 'advance') { STATE.activeTab = act.getAttribute('data-next'); STATE.openWhyModal = null; render(); return; }
          if (action === 'close-modal') { STATE.modalOpen = false; render(); return; }
          if (action === 'close-why-modal') { STATE.openWhyModal = null; render(); return; }
          if (action === 'close-insight-modal') { STATE.insightContent = null; STATE.highlightDriverId = null; render(); return; }
          if (action === 'why-nav') { STATE.openWhyModal = act.getAttribute('data-to'); render(); return; }

          if (action === 'open-why-modal') {
            const id = act.getAttribute('data-why');
            STATE.recastMode = false;
            STATE.drivers.forEach(d => d.state = 'off');
            STATE.showTippingPoint = false;
            if (id === 'change') { STATE.drivers.forEach(d => { if (['more_apps','constant_updates','too_many_tools','manual_rework'].includes(d.id)) d.state = 'normal'; }); }
            else if (id === 'now') { STATE.drivers.forEach(d => { if (['more_apps','constant_updates','too_many_tools','manual_rework','security_compliance'].includes(d.id)) d.state = 'accelerating'; }); STATE.showTippingPoint = true; }
            else if (id === 'recast') { STATE.recastMode = true; }
            updateCurves(); requestAnimationFrame(animateCurves);
            STATE.openWhyModal = id; render(); return;
          }

          if (action === 'toggle-card') {
            const id = act.getAttribute('data-card');
            const wasOpen = STATE.openCards[id];
            Object.keys(STATE.openCards).forEach(k => STATE.openCards[k] = false);
            STATE.openCards[id] = !wasOpen;
            if (STATE.openCards[id] && !STATE.visitedCards.includes(id)) STATE.visitedCards.push(id);
            render();
            if (STATE.openCards[id]) { setTimeout(() => act.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 200); }
            return;
          }

          if (action === 'expand-all') { Object.keys(STATE.openCards).forEach(k => STATE.openCards[k] = true); STATE.visitedCards = ['core','onboarding','trust']; render(); return; }
          if (action === 'calculate-impact') { calculateImpact(); render(); return; }
          if (action === 'set-scenario') { STATE.calcScenario = act.getAttribute('data-val'); if (STATE.calcResult) calculateImpact(); render(); return; }
          if (action === 'toggle-assumptions') { STATE.showAssumptions = !STATE.showAssumptions; STATE.editingAssumptions = false; render(); return; }
          if (action === 'edit-assumptions') { STATE.editingAssumptions = true; render(); return; }
          if (action === 'cancel-edit-assumptions') { STATE.editingAssumptions = false; render(); return; }
          if (action === 'save-assumptions') {
            const sc = STATE.calcScenario;
            const clamp = (v) => Math.max(0, Math.min(100, cleanNum(v))) / 100;
            const t = document.getElementById('asn-ticket');
            const p = document.getElementById('asn-pkg');
            const pa = document.getElementById('asn-patch');
            const s = document.getElementById('asn-strategic');
            if (t) ROI_ASSUMPTIONS[sc].ticketReduction = clamp(t.value);
            if (p) ROI_ASSUMPTIONS[sc].pkgReduction = clamp(p.value);
            if (pa) ROI_ASSUMPTIONS[sc].patchReduction = clamp(pa.value);
            if (s) ROI_ASSUMPTIONS[sc].strategicRealloc = clamp(s.value);
            STATE.editingAssumptions = false;
            if (STATE.calcResult) calculateImpact();
            render();
            return;
          }
          if (action === 'toggle-regulated') { STATE.calcInputs.regulated = act.getAttribute('data-val') === 'true'; render(); return; }
          if (action === 'start-flow') { startFlow(); return; }
          if (action === 'reset-flow') { resetFlow(); return; }
          if (action === 'pause-flow') { if (STATE.flowPaused) { resumeFlow(); } else { pauseFlow(); } return; }
          if (action === 'toggle-admin-view') { STATE.showAdminView = !STATE.showAdminView; render(); return; }
          if (action === 'toggle-autopilot') { STATE.showAutopilot = !STATE.showAutopilot; STATE.autopilotStep = -1; STATE.flowTimers.intervals.forEach(id => clearInterval(id)); STATE.flowTimers.intervals = []; render(); return; }
          if (action === 'start-autopilot') {
            if (STATE.autopilotStep >= 0) return;
            STATE.autopilotStep = 0; render();
            let apStep = 0;
            const apInterval = setInterval(() => {
              apStep++;
              if (apStep >= 7) { clearInterval(apInterval); STATE.autopilotStep = 6; render(); return; }
              STATE.autopilotStep = apStep; render();
            }, 1800);
            STATE.flowTimers.intervals.push(apInterval);
            return;
          }
          if (action === 'reset-autopilot') {
            STATE.flowTimers.intervals.forEach(id => clearInterval(id));
            STATE.flowTimers.intervals = [];
            STATE.autopilotStep = -1; render(); return;
          }

          if (action === 'open-currentstate-editor') {
            STATE.modalOpen = true; STATE.editTab = 'change';
            STATE.editBuffers = { change: { intro: '', bullets: '', analyst: '' }, now: { intro: '', bullets: '', analyst: '' }, recast: { intro: '', bullets: '', analyst: '' } };
            STATE.editChartBuffer = null; render();
            setTimeout(()=>{ try { window.lucide?.createIcons?.(); } catch{} }, 0);
            setTimeout(()=>{ initCurrentStateModal(); }, 0);
            return;
          }

          if (action === 'switch-edit-tab') { STATE.editTab = act.getAttribute('data-tab'); render(); setTimeout(()=>{ try { window.lucide?.createIcons?.(); } catch{} }, 0); return; }

          if (action === 'save-currentstate') {
            const fallback = STATE.defaultsCurrentState();
            const formData = readFields();
            STATE.currentState = {
              change: { intro: (formData.change.intro || '').trim() || fallback.change.intro, bullets: parseLines(formData.change.bullets) || fallback.change.bullets, analyst: (formData.change.analyst || '').trim() || fallback.change.analyst },
              now: { intro: (formData.now.intro || '').trim() || fallback.now.intro, bullets: parseLines(formData.now.bullets) || fallback.now.bullets, analyst: (formData.now.analyst || '').trim() || fallback.now.analyst },
              recast: { intro: (formData.recast.intro || '').trim() || fallback.recast.intro, bullets: parseLines(formData.recast.bullets) || fallback.recast.bullets, analyst: (formData.recast.analyst || '').trim() || fallback.recast.analyst }
            };
            const raw = STATE.editChartBuffer || readChartFieldsRaw();
            const pick = (v, keep) => (typeof v === 'string' && v.trim()) ? v.trim() : keep;
            const fallbackChart = STATE.defaultsChartConfig();
            const cfg = raw?.chartConfig || {};
            STATE.chartConfig = {
              yAxis: pick(cfg.yAxis, STATE.chartConfig.yAxis || fallbackChart.yAxis),
              xAxis: pick(cfg.xAxis, STATE.chartConfig.xAxis || fallbackChart.xAxis),
              center: pick(cfg.center, STATE.chartConfig.center || fallbackChart.center),
              footer: pick(cfg.footer, STATE.chartConfig.footer || fallbackChart.footer),
              tipping: pick(cfg.tipping, STATE.chartConfig.tipping || fallbackChart.tipping)
            };
            const fallbackDrivers = STATE.defaultsDrivers();
            const dRaw = raw?.drivers || [];
            STATE.drivers.forEach((d, i) => {
              d.label = pick(dRaw[i]?.label, d.label || fallbackDrivers[i].label);
              const bulletsRaw = dRaw[i]?.bullets;
              if (typeof bulletsRaw === 'string') { const b = parseLines(bulletsRaw, 3); d.bullets = b.length === 3 ? b : (d.bullets || fallbackDrivers[i].bullets); }
              else { d.bullets = d.bullets || fallbackDrivers[i].bullets; }
            });
            saveDraft({ ...formData, chartConfig: { ...STATE.chartConfig }, drivers: STATE.drivers.map(d => ({ label: d.label, bullets: d.bullets.join('\n') })) });
            STATE.modalOpen = false; STATE.activeTab = 'problems'; render(); return;
          }

          if (action === 'reset-currentstate-defaults') { clearDraft(); STATE.chartConfig = STATE.defaultsChartConfig(); STATE.drivers = STATE.defaultsDrivers(); STATE.currentState = STATE.defaultsCurrentState(); STATE.editChartBuffer = null; render(); return; }
          if (action === 'reset-sliders') { resetSliders(); return; }
        });

        root.addEventListener('input', (e) => {
          if (e.target?.id === 'roi-users')      { STATE.calcInputs.users = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-endpoints')  { STATE.calcInputs.endpoints = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-envs')       { STATE.calcInputs.envs = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-apps')       { STATE.calcInputs.apps = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-custom')     { STATE.calcInputs.customApps = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-tickets')    { STATE.calcInputs.monthlyTickets = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-ticketmins') { STATE.calcInputs.avgTicketMins = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-pkghrs')     { STATE.calcInputs.pkgHours = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-patchhrs')   { STATE.calcInputs.patchHours = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-reqs')       { STATE.calcInputs.openReqs = cleanNum(e.target.value); return; }
          if (e.target?.id === 'roi-initiatives'){ STATE.calcInputs.delayedInitiatives = cleanNum(e.target.value); return; }
          const buf = e.target.closest('[data-action="edit-buffer"]');
          if (buf) { const key = buf.getAttribute('data-key'); const sub = buf.getAttribute('data-subkey'); if (STATE.editBuffers?.[key]) STATE.editBuffers[key][sub] = e.target.value; }
          if (STATE.modalOpen && STATE.editTab === 'chart') { STATE.editChartBuffer = readChartFieldsRaw(); }
        });
      }

      let accordionKeyboardBound = false;
      function attachAccordionKeyboard(){
        if (accordionKeyboardBound) return;
        accordionKeyboardBound = true;
        document.addEventListener('keydown', (e) => {
          const target = e.target;
          if (!target || !target.classList || !target.classList.contains('accordion-header')) return;
          const headers = Array.from(document.querySelectorAll('.accordion-header'));
          const idx = headers.indexOf(target);
          if (e.key === 'ArrowDown') { headers[(idx + 1) % headers.length]?.focus(); e.preventDefault(); }
          else if (e.key === 'ArrowUp') { headers[(idx - 1 + headers.length) % headers.length]?.focus(); e.preventDefault(); }
          else if (e.key === 'Home') { headers[0]?.focus(); e.preventDefault(); }
          else if (e.key === 'End') { headers[headers.length - 1]?.focus(); e.preventDefault(); }
          else if (e.key === 'Enter' || e.key === ' ') { target.click(); e.preventDefault(); }
        });
      }

      /* ========== Boot ========== */

      STATE.drivers.forEach(d => d.state = 'accelerating');
      STATE.showTippingPoint = true;
      updateCurves();
      STATE.currentDemandExponent = STATE.targetDemandExponent;
      STATE.currentCapacitySlope = STATE.targetCapacitySlope;

      document.addEventListener('DOMContentLoaded', render);

      document.addEventListener('keydown',(e)=>{
        if(e.key==='Escape' && (STATE.modalOpen || STATE.openWhyModal || STATE.insightContent)){
          STATE.modalOpen=false; STATE.openWhyModal=null; STATE.insightContent=null; STATE.highlightDriverId=null; render();
        }
      });
    </script>
  </body>
</html>
